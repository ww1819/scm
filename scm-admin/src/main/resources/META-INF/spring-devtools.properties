# DevTools 默认把依赖 JAR 放在「基础类加载器」、把本项目代码放在「重启类加载器」。
# 解析 Controller 等 Bean 时若与 scm-common（TableDataInfo、BaseController 等）跨加载器不一致，可能出现
# ClassNotFoundException: TableDataInfo。将 scm-common 一并纳入 restart 范围即可。
# 匹配 Maven 依赖 JAR 名或 IDE 下 classpath 路径中含 scm-common 的条目。
restart.include.scmcommon=/.*scm-common.*/
