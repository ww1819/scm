# ??????
scm:
  name: Scm
  version: 4.8.0
  copyrightYear: 2025
  icpNo: 冀ICP备2026009090号-1
  icpLink: https://beian.miit.gov.cn/
  demoEnabled: false
  profile: D:/scm/uploadPath
  addressEnabled: false
  # 敏感配置 ENC(...) 加解密密钥；生产环境务必用环境变量 SCM_CONFIG_CIPHER_KEY，勿与密文同文件明文存放
  config-cipher-key: ${SCM_CONFIG_CIPHER_KEY:ScmLocalDevCipherKey2025!}
  legacy:
    scope-repair:
      # 是否在启动时执行补齐任务（关闭则完全不跑）
      enabled: true
      # true：仅当应用版本 scm.version 与库中已执行记录不一致时执行（推荐，防重复）
      # false：每次启动都执行（仅建议开发/排障）
      upgrade-only: true
      # 手工「补齐」按钮冷却时间（毫秒），防连点；传 force=true 可跳过
      manual-cooldown-ms: 120000
  sql:
    init:
      # 启动时自动执行 SQL 增量脚本（procedure.sql + column.sql）
      enabled: true
      location: classpath:sql/mysql/
      fail-on-error: false
      # true：仅当 scm.version 相对库中记录变更时执行增量脚本（推荐）
      upgrade-only: true
      upgrade-scripts: procedure.sql,column.sql
      # 首次安装空库时执行的全量脚本链
      full-scripts: table.sql,procedure.sql,column.sql,view.sql,trigger.sql,function.sql,menu.sql,data_integrity.sql
  cos:
    enabled: true
    secret-id: ENC(fmNwNkER0gQ8miAjitef1T17AQdp0H99YYn0PpX6xq6Jm3uO9fI4a5o2PU4xcgQ33QqbWuxZHNPMSYICudT5Iw==)
    secret-key: ENC(0TaIU8WG7MfPaq4VDunS4h436cyUU2K4Mgs3bH4NMgn+Xwke24uBxobD58wE50tOkSmSXx5G8/0ubNO8p84bLg==)
    region: ap-guangzhou
    bucket-name: aisipu-1409620366
    base-path: scm-test/
    domain: https://cos.sjzaspt.top
    public-read: true

# ??????
server:
  # ????HTTP??
  port: 8088
  servlet:
    # ??????
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    accept-count: 1000
    threads:
      max: 800
      min-spare: 100

# ????
logging:
  level:
    com.scm: debug
    org.springframework: warn

# ????
user:
  password:
    maxRetryCount: 5

# Spring??
spring:
  thymeleaf:
    mode: HTML
    encoding: utf-8
    cache: false
  messages:
    basename: static/i18n/messages
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  profiles:
    active: druid
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  devtools:
    restart:
      enabled: true

# MyBatis
mybatis:
  typeAliasesPackage: com.scm.**.domain
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper????
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Shiro
shiro:
  user:
    loginUrl: /login
    unauthorizedUrl: /unauth
    indexUrl: /index
    captchaEnabled: false
    captchaType: math
  cookie:
    domain:
    path: /
    httpOnly: true
    maxAge: 30
    # RememberMe 加解密密钥（须为 Base64 的 16 字节 AES-128）。勿留空：留空则每次启动随机生成，旧 Cookie 无法解密并报 CryptoException。
    # 生产环境建议改为独立密钥或环境变量注入，勿直接复用仓库默认值。
    cipherKey: 2jHQZbfMakjp7wszmXQfRw==
  session:
    # ??????-1 ??????
    expireTime: 30
    dbSyncPeriod: 1
    validationInterval: 10
    maxSession: -1
    kickoutAfter: false
  rememberMe:
    enabled: true

# XSS??
xss:
  enabled: true
  excludes: /system/notice/*
  urlPatterns: /system/*,/monitor/*,/tool/*

# CSRF??
csrf:
  enabled: false
  whites: /druid

# Swagger??
swagger:
  enabled: true
