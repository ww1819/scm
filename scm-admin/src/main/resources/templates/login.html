<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>登录耗材供应链系统</title>
    <meta name="description" content="耗材供应链后台管理框架">
    <link href="../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="../static/css/style.min.css" th:href="@{/css/style.min.css}" rel="stylesheet"/>
    <link href="../static/css/login.min.css" th:href="@{/css/login.min.css}" rel="stylesheet"/>
    <link href="../static/scm/css/ry-ui.css" th:href="@{/scm/css/ry-ui.css?v=4.8.0}" rel="stylesheet"/>
    <!-- 360浏览器急速模式 -->
    <meta name="renderer" content="webkit">
    <!-- 避免IE使用兼容模式 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="shortcut icon" href="../static/favicon.ico" th:href="@{favicon.ico}"/>
    <style type="text/css">
        label.error { position:inherit; }
        /* 整体垂直水平居中登录卡片 */
        body.signin {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .signinpanel {
            max-width: 960px;
            margin: 0 auto;
        }
        .signinpanel .row {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 14px;
            padding: 36px 32px;
            box-shadow: 0 22px 48px rgba(0, 0, 0, 0.20);
        }
        .signinpanel,
        .signinpanel .signin-info,
        .signinpanel .signin-info h4,
        .signinpanel .signin-info ul li,
        .signinpanel .signin-info a,
        .signinpanel .signin-info strong,
        .signinpanel .signup-footer {
            color: #333 !important;
        }
        .signinpanel .signin-info a {
            text-decoration: none;
        }
        .signinpanel .signin-info a:hover {
            color: #0b83f0 !important;
        }
        .signinpanel .signin-info h4 {
            font-size: 30px;
        }
        .signinpanel .signin-info ul li {
            font-size: 16px;
        }
        .signinpanel #signupForm h3 {
            font-size: 26px;
        }
        .signinpanel #signupForm .form-control {
            height: 42px;
            font-size: 15px;
        }
        /* 底部唤起登录按钮 */
        .login-entry-bar {
            position: fixed;
            left: 50%;
            bottom: 42px;
            transform: translateX(-50%);
            z-index: 30;
        }
        .login-entry-bar .btn-open-login {
            min-width: 210px;
            padding: 12px 30px;
            font-size: 17px;
            border-radius: 24px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #0b83f0;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
            transition: all 0.25s ease;
        }
        .login-entry-bar .btn-open-login:hover {
            background: #0b83f0;
            color: #fff;
        }
        .login-entry-bar .btn-open-login:active {
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.16);
        }
        /* 背景遮罩层 */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(6, 23, 45, 0.45);
            backdrop-filter: blur(3px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease;
            z-index: 10;
        }
        .login-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        /* 登录卡片的初始与展示动画 */
        .signinpanel {
            position: relative;
            z-index: 20;
            max-width: 880px;
            margin: 0 auto;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .login-panel-hidden {
            opacity: 0;
            transform: translateY(24px) scale(0.98);
            pointer-events: none;
        }
        .login-panel-visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    </style>
    <script>
        if(window.top!==window.self){alert('未登录或登录超时。请重新登录');window.top.location=window.location};
    </script>
</head>
<body class="signin">
    <!-- 底部入口按钮 -->
    <div class="login-entry-bar">
        <button type="button" class="btn-open-login">进入系统</button>
    </div>
    <!-- 遮罩层 -->
    <div class="login-overlay" id="loginOverlay"></div>
    <!-- 登录面板 -->
    <div class="signinpanel login-panel-hidden" id="loginPanel">
        <div class="row">
            <div class="col-sm-7">
                <div class="signin-info">
                    <div class="logopanel m-b" style="display: none;">
                        <h1><img alt="[ 耗材供应链 ]" src="../static/scm.png" th:src="@{/scm.png}"></h1>
                    </div>
                    <div class="m-b"></div>
                    <h4 style="color: #333; font-size: 28px;">欢迎使用！ <strong style="font-weight: bold; color: #000;">医承云配</strong>耗材供应链云平台系统</h4>
                    <ul class="m-b">
                        <li><i class="fa fa-arrow-circle-o-right m-r-xs"></i> SpringBoot</li>
                        <li><i class="fa fa-arrow-circle-o-right m-r-xs"></i> Mybatis</li>
                        <li><i class="fa fa-arrow-circle-o-right m-r-xs"></i> Shiro</li>
                        <li><i class="fa fa-arrow-circle-o-right m-r-xs"></i> Thymeleaf</li>
                        <li><i class="fa fa-arrow-circle-o-right m-r-xs"></i> Bootstrap</li>
                    </ul>
                    <div class="m-t">
                        <strong>还没有账号？</strong><br/>
                        <a th:href="@{/register}">立即注册</a>
                         &nbsp;|&nbsp; <a th:href="@{/supplier/register}">供应商注册</a>
                    </div>
                </div>
            </div>
            <div class="col-sm-5">
                <form id="signupForm" autocomplete="off">
                    <h3 class="no-margins" style="font-size: 24px; margin-bottom: 15px; color: #000;">登录：</h3>
                    <input type="text"     name="username" class="form-control uname"     placeholder="用户名" value="admin"    />
                    <input type="password" name="password" class="form-control pword"     placeholder="密码"   value="admin123" />
					<div class="row m-t" th:if="${captchaEnabled==true}">
						<div class="col-xs-6">
						    <input type="text" name="validateCode" class="form-control code" placeholder="验证码" maxlength="5" />
						</div>
						<div class="col-xs-6">
							<a href="javascript:void(0);" title="点击更换验证码">
								<img th:src="@{/captcha/captchaImage(type=${captchaType})}" class="imgcode" width="85%"/>
							</a>
						</div>
					</div>
                    <div class="checkbox-custom" th:if="${isRemembered}" th:classappend="${captchaEnabled==false} ? 'm-t'">
				        <input type="checkbox" id="rememberme" name="rememberme"> <label for="rememberme">记住我</label>
				    </div>
                    <button class="btn btn-success btn-block" id="btnSubmit" data-loading="正在验证登录，请稍候...">登录</button>
                </form>
            </div>
        </div>
        <div class="signup-footer" style="color: #333;">
            <div class="pull-left">
                ©医承云配供应链云平台 V-3.21 <br>
            </div>
        </div>
    </div>
<script th:inline="javascript"> var ctx = [[@{/}]]; var captchaType = [[${captchaType}]]; var captchaEnabled = [[${captchaEnabled}]];</script>
<!--[if lte IE 8]><script>window.location.href=ctx+'html/ie.html';</script><![endif]-->
<!-- 全局js -->
<script src="../static/js/jquery.min.js" th:src="@{/js/jquery.min.js}"></script>
<script src="../static/ajax/libs/validate/jquery.validate.min.js" th:src="@{/ajax/libs/validate/jquery.validate.min.js}"></script>
<script src="../static/ajax/libs/layer/layer.min.js" th:src="@{/ajax/libs/layer/layer.min.js}"></script>
<script src="../static/ajax/libs/blockUI/jquery.blockUI.js" th:src="@{/ajax/libs/blockUI/jquery.blockUI.js}"></script>
<script src="../static/scm/js/ry-ui.js" th:src="@{/scm/js/ry-ui.js?v=4.8.0}"></script>
<script src="../static/scm/login.js" th:src="@{/scm/login.js}"></script>
<script>
// 登录入口按钮与遮罩/卡片动画
$(function () {
    var $entryBar = $(".login-entry-bar");
    var $overlay = $("#loginOverlay");
    var $panel = $("#loginPanel");

    function openLogin() {
        $entryBar.fadeOut(200);
        $overlay.addClass("active");
        // 使用小延时让遮罩先出现，再弹出卡片
        setTimeout(function () {
            $panel.removeClass("login-panel-hidden").addClass("login-panel-visible");
        }, 80);
    }

    function closeLogin() {
        $panel.removeClass("login-panel-visible").addClass("login-panel-hidden");
        $overlay.removeClass("active");
        $entryBar.fadeIn(200);
    }

    $(".btn-open-login").on("click", function () {
        openLogin();
    });

    // 如需点击遮罩关闭登录卡片，可在此处调用 closeLogin()
});
</script>
</body>
</html>
