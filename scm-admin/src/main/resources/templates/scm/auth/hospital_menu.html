<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('医院菜单授权')" />
	<th:block th:include="include :: ztree-css" />
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form class="form-inline">
					<div class="form-group">
						<label>医院：</label>
						<select id="hospitalId" class="form-control">
							<option value="">请选择</option>
							<option th:each="h : ${hospitals}" th:value="${h.hospitalId}" th:text="${h.hospitalName}"></option>
						</select>
						<a class="btn btn-primary btn-sm" onclick="loadTree()"><i class="fa fa-refresh"></i> 加载菜单</a>
						<a class="btn btn-warning btn-sm" onclick="resetAuth()" shiro:hasPermission="scmAuth:hospitalMenu:reset"><i class="fa fa-undo"></i> 重置为全量</a>
						<a class="btn btn-success btn-sm" onclick="saveAuth()" shiro:hasPermission="scmAuth:hospitalMenu:edit"><i class="fa fa-save"></i> 保存</a>
						<a class="btn btn-default btn-sm" onclick="repairLegacyScope(false)" shiro:hasPermission="system:config:edit" title="为全部启用中的医院、供应商补缺：管理员角色、菜单白名单、管理员角色菜单（不删已有数据）"><i class="fa fa-wrench"></i> 补齐老数据</a>
						<a class="btn btn-default btn-sm" onclick="repairLegacyScope(true)" shiro:hasPermission="system:config:edit" title="跳过冷却时间，立即再执行一次"><i class="fa fa-bolt"></i> 强制补齐</a>
					</div>
				</form>
			</div>
			<div class="col-sm-12" style="margin-top:12px;">
				<label class="check-box"><input type="checkbox" value="1">展开/折叠</label>
				<label class="check-box"><input type="checkbox" value="2">全选/全不选</label>
				<label class="check-box"><input type="checkbox" value="3" checked>父子联动</label>
				<div id="menuTrees" class="ztree ztree-border"></div>
			</div>
		</div>
	</div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: ztree-js" />
	<script th:inline="javascript">
		var prefix = ctx + "scm/auth/hospitalMenu";

		function loadTree() {
			var hid = $("#hospitalId").val();
			if (!hid) { $.modal.alertWarning("请先选择医院"); return; }
			var options = {
				id: "menuTrees",
				url: prefix + "/menuTree/" + hid,
				check: { enable: true, chkboxType: { "Y": "ps", "N": "ps" } },
				expandLevel: 1
			};
			$.tree.init(options);
		}

		$('input').on('ifChanged', function(obj){
			var type = $(this).val();
			var checked = obj.currentTarget.checked;
			if (!$._tree) return;
			if (type == 1) {
				if (checked) $._tree.expandAll(true); else $._tree.expandAll(false);
			} else if (type == "2") {
				if (checked) $._tree.checkAllNodes(true); else $._tree.checkAllNodes(false);
			} else if (type == "3") {
				if (checked) $._tree.setting.check.chkboxType = { "Y": "ps", "N": "ps" };
				else $._tree.setting.check.chkboxType = { "Y": "", "N": "" };
			}
		});

		function saveAuth() {
			var hid = $("#hospitalId").val();
			if (!hid) { $.modal.alertWarning("请先选择医院"); return; }
			var menuIds = $.tree.getCheckedNodes();
			var menuIdsStr = (Array.isArray(menuIds) ? menuIds.join(',') : (menuIds || ''));
			$.ajax({
				cache: true, type: "POST", url: prefix + "/save",
				data: { hospitalId: hid, menuIds: menuIdsStr },
				success: function(data) { $.operate.successCallback(data); }
			});
		}

		function resetAuth() {
			var hid = $("#hospitalId").val();
			if (!hid) { $.modal.alertWarning("请先选择医院"); return; }
			$.modal.confirm("确认将该医院菜单授权重置为全部医院类菜单？", function() {
				$.post(prefix + "/reset", { hospitalId: hid }, function(data) {
					$.operate.successCallback(data);
					loadTree();
				});
			});
		}

		/** 全局老数据补缺：与当前选中医院无关 */
		function repairLegacyScope(force) {
			var tip = "将对全部启用中的医院、供应商执行补缺：缺失的医院管理员/供应商管理员角色、医院与供应商菜单白名单缺失项、以及管理员角色在 sys_role_menu 上缺失的菜单权限（已有数据不删除）。是否继续？";
			if (force) {
				tip = "将强制执行上述补缺（忽略手工冷却时间）。是否继续？";
			}
			$.modal.confirm(tip, function() {
				$.post(ctx + "scm/maintenance/legacyScope/run", { force: force ? "true" : "false" }, function(data) {
					$.operate.successCallback(data);
				});
			});
		}
	</script>
</body>
</html>
