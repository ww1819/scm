<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" class="reconciliation-root">
<head>
	<th:block th:include="include :: header('对账表')" />
	<link rel="stylesheet" href="../../../static/layui/css/layui.css">
	<style>
		html.reconciliation-root,
		html.reconciliation-root body.reconciliation-body {
			height: 100%;
			margin: 0;
			overflow: hidden;
			box-sizing: border-box;
			background: #f3f3f4;
		}

		body.reconciliation-body {
			display: flex;
			flex-direction: column;
			min-height: 0;
		}

		.reconciliation-page {
			flex: 1 1 0%;
			min-height: 0;
			display: flex;
			flex-direction: column;
			padding: 12px 14px;
			box-sizing: border-box;
			overflow: hidden;
		}

		.reconciliation-filter {
			flex: 0 0 auto;
			background: #fff;
			border: 1px solid #e7eaec;
			border-radius: 4px;
			padding: 14px 18px 6px;
			margin-bottom: 12px;
			overflow: visible;
		}

		.reconciliation-filter .filter-row {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			margin-bottom: 10px;
		}

		.reconciliation-filter .filter-label {
			width: 90px;
			text-align: right;
			padding-right: 10px;
			color: #333;
			font-weight: normal;
			flex-shrink: 0;
		}

        .reconciliation-filter .filter-control {
			flex: 1 1 320px;
			max-width: 420px;
		}

		.reconciliation-filter .filter-row.filter-row-inline .filter-control {
			flex: 1 1 240px;
			max-width: 320px;
		}

		.reconciliation-filter .filter-row.filter-row-inline .filter-label-inline {
			width: auto;
			margin-left: 18px;
			padding-right: 10px;
		}

		.reconciliation-filter .filter-control .select2-container {
			width: 100% !important;
		}

		.reconciliation-filter .filter-control .form-control {
			height: 34px;
		}

		.reconciliation-grid-wrap {
			flex: 1 1 0%;
			min-height: 0;
			background: #fff;
			border: 1px solid #e7eaec;
			border-radius: 4px;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.reconciliation-grid-toolbar {
			flex: 0 0 auto;
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 12px 16px;
			border-bottom: 1px solid #eef0f2;
		}

		.reconciliation-grid-toolbar .toolbar-left {
			display: flex;
			align-items: center;
			gap: 10px;
			color: #666;
		}

		.reconciliation-grid-toolbar .toolbar-title {
			font-size: 20px;
			font-weight: 600;
			color: #333;
			margin: 0;
		}

		.reconciliation-grid-toolbar .toolbar-actions .btn {
			margin-left: 6px;
			min-width: 72px;
		}

		.reconciliation-grid-body {
			flex: 1 1 0%;
			min-height: 0;
			overflow: auto;
			padding: 10px 12px 14px;
		}

		.reconciliation-half-year-block {
			margin-bottom: 14px;
		}

		.reconciliation-half-year-block:last-child {
			margin-bottom: 0;
		}

		.reconciliation-month-header {
			display: grid;
			grid-template-columns: repeat(6, minmax(120px, 1fr));
			background: #fafafa;
			border: 1px solid #e7eaec;
			border-bottom: none;
		}

		.reconciliation-month-header div {
			text-align: center;
			padding: 10px 8px;
			font-weight: 600;
			color: #555;
			border-right: 1px solid #e7eaec;
			font-size: 14px;
		}

		.reconciliation-month-header div:last-child {
			border-right: none;
		}

		.reconciliation-month-row {
			display: grid;
			grid-template-columns: repeat(6, minmax(120px, 1fr));
			border-left: 1px solid #e7eaec;
		}

		.reconciliation-month-cell {
			border-right: 1px solid #e7eaec;
			border-bottom: 1px solid #e7eaec;
			padding: 8px 10px 10px;
			min-height: 168px;
			position: relative;
			background: #fff;
			box-sizing: border-box;
		}

		.reconciliation-month-cell:last-child {
			border-right: none;
		}

		.reconciliation-month-card {
			margin-top: 8px;
			border: 1px solid #dbeafe;
			border-radius: 2px;
			overflow: hidden;
			background: #f8fbff;
			font-size: 12px;
			line-height: 1.55;
			color: #444;
		}

		.reconciliation-month-card .card-status {
			background: #5dade2;
			color: #fff;
			padding: 4px 6px;
			font-size: 11px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.reconciliation-month-card .card-status i {
			margin-right: 3px;
			font-size: 10px;
		}

		.reconciliation-month-card .card-body {
			padding: 5px 6px 6px;
		}

		.reconciliation-month-card .card-body div {
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			margin-bottom: 2px;
		}

		.reconciliation-month-card .card-body div:last-child {
			margin-bottom: 0;
		}

		.reconciliation-month-cell.empty-month {
			background: #fcfcfc;
		}

		.reconciliation-month-cell.empty-month .empty-hint {
			margin-top: 36px;
			text-align: center;
			color: #ccc;
			font-size: 12px;
		}

		.reconciliation-empty-tip {
			text-align: center;
			color: #999;
			padding: 48px 0;
		}
	</style>
</head>
<body class="gray-bg reconciliation-body">
	<div class="reconciliation-page">
		<div class="reconciliation-filter">
			<div class="filter-row">
				<label class="filter-label">选择年份：</label>
				<div class="filter-control">
					<div class="input-group">
						<span class="input-group-addon"><i class="fa fa-calendar"></i></span>
						<input type="text" id="reconcileYear" class="form-control" placeholder="请选择年份" readonly/>
					</div>
				</div>
			</div>
			<div class="filter-row filter-row-inline">
				<label class="filter-label">医院信息：</label>
				<div class="filter-control">
					<select id="hospitalId" class="form-control">
						<option value="">请选择医院</option>
						<option th:each="h : ${hospitals}"
						        th:value="${h.hospitalId}"
						        th:text="${h.hospitalName}">医院</option>
					</select>
				</div>
				<label class="filter-label filter-label-inline">供应商：</label>
				<div class="filter-control">
					<select id="supplierId" class="form-control noselect2">
						<option value="">全部供应商</option>
					</select>
				</div>
			</div>
		</div>

		<div class="reconciliation-grid-wrap">
			<div class="reconciliation-grid-toolbar">
				<div class="toolbar-left">
					<i class="fa fa-th-large"></i>
					<h4 class="toolbar-title" id="gridTitle">-</h4>
				</div>
				<div class="toolbar-actions">
					<button type="button" class="btn btn-default btn-sm" onclick="goCurrentYear()">今年</button>
					<button type="button" class="btn btn-default btn-sm" onclick="shiftYear(-1)">上一年</button>
					<button type="button" class="btn btn-default btn-sm" onclick="shiftYear(1)">下一年</button>
				</div>
			</div>
			<div class="reconciliation-grid-body" id="gridBody">
				<div class="reconciliation-empty-tip">请选择医院与年份</div>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<script src="../../../static/layui/layui.js"></script>
	<script th:inline="javascript">
		var prefix = ctx + "settlement/settlement/reconciliation";
		var currentYear = null;
		var bindSupplierId = /*[[${bindSupplierId}]]*/ null;
		var syncingSupplier = false;

		$(function() {
			currentYear = new Date().getFullYear();
			updateGridTitle();
			initYearPicker();
			bindHospitalChange();
			initSupplierSelect([]);
			// 等 common.js 初始化医院 select2 后再绑定并加载供应商
			setTimeout(function() {
				bindHospitalChange();
				if ($('#hospitalId').val()) {
					loadSuppliers(loadYearSummary);
				}
			}, 0);
		});

		function bindHospitalChange() {
			$('#hospitalId').off('change.reconciliation select2:select.reconciliation')
				.on('change.reconciliation select2:select.reconciliation', function() {
					loadSuppliers(loadYearSummary);
				});
		}

		function supplierSelect2Matcher(params, data) {
			if ($.trim(params.term || '') === '') {
				return data;
			}
			if (data.id === undefined || data.id === '') {
				return null;
			}
			var term = (params.term || '').toLowerCase();
			var text = (data.text || '').toLowerCase();
			var el = data.element;
			var pinyin = el ? String($(el).attr('data-pinyin') || '').toLowerCase() : '';
			var code = el ? String($(el).attr('data-code') || '').toLowerCase() : '';
			if (text.indexOf(term) >= 0 || pinyin.indexOf(term) >= 0 || code.indexOf(term) >= 0) {
				return data;
			}
			return null;
		}

		function readSupplierField(item, camel, snake) {
			if (!item) {
				return null;
			}
			if (item[camel] != null && item[camel] !== '') {
				return item[camel];
			}
			if (item[snake] != null && item[snake] !== '') {
				return item[snake];
			}
			return null;
		}

		function initSupplierSelect(list, selectedValue) {
			var $sel = $('#supplierId');
			if ($sel.data('select2')) {
				$sel.select2('destroy');
			}
			$sel.empty();
			if (!bindSupplierId) {
				$sel.append('<option value="">全部供应商</option>');
			}
			(list || []).forEach(function(item) {
				var sid = readSupplierField(item, 'supplierId', 'supplier_id');
				if (sid == null) {
					return;
				}
				var name = readSupplierField(item, 'supplierName', 'supplier_name') || '-';
				var pinyin = readSupplierField(item, 'pinyinCode', 'pinyin_code') || '';
				var code = readSupplierField(item, 'supplierCode', 'supplier_code') || '';
				$('<option></option>')
					.val(String(sid))
					.text(name)
					.attr('data-pinyin', pinyin)
					.attr('data-code', code)
					.appendTo($sel);
			});
			$sel.select2({
				allowClear: !bindSupplierId,
				width: '100%',
				minimumResultsForSearch: 0,
				dropdownParent: $('.reconciliation-filter'),
				matcher: supplierSelect2Matcher
			}).off('change.reconciliation').on('change.reconciliation', function() {
				if (syncingSupplier) {
					return;
				}
				loadYearSummary();
			});
			syncingSupplier = true;
			if (bindSupplierId) {
				$sel.val(String(bindSupplierId)).trigger('change.select2');
				$sel.prop('disabled', true);
				syncingSupplier = false;
				return;
			}
			var value = selectedValue || '';
			if (value && $sel.find('option[value="' + value + '"]').length) {
				$sel.val(String(value)).trigger('change.select2');
			} else {
				$sel.val('').trigger('change.select2');
			}
			syncingSupplier = false;
		}

		function loadSuppliers(callback) {
			var hospitalId = $('#hospitalId').val();
			if (!hospitalId && !bindSupplierId) {
				initSupplierSelect([]);
				if (callback) {
					callback();
				}
				return;
			}
			var currentSupplierId = $('#supplierId').val();
			$.ajax({
				url: prefix + '/suppliers',
				type: 'GET',
				data: { hospitalId: hospitalId },
				success: function(res) {
					if (res.code === web_status.SUCCESS || res.code === 0) {
						initSupplierSelect(res.data || [], currentSupplierId);
					} else {
						initSupplierSelect([]);
					}
					if (callback) {
						callback();
					}
				},
				error: function() {
					initSupplierSelect([]);
					if (callback) {
						callback();
					}
				}
			});
		}

		function initYearPicker() {
			layui.use('laydate', function() {
				var laydate = layui.laydate;
				laydate.render({
					elem: '#reconcileYear',
					type: 'year',
					value: String(currentYear),
					done: function(value) {
						if (!value) {
							return;
						}
						currentYear = parseInt(value, 10);
						updateGridTitle();
						loadYearSummary();
					}
				});
				$('#reconcileYear').val(String(currentYear));
			});
		}

		function updateGridTitle() {
			$('#gridTitle').text(currentYear + '年 对账汇总');
			$('#reconcileYear').val(String(currentYear));
		}

		function goCurrentYear() {
			currentYear = new Date().getFullYear();
			updateGridTitle();
			loadYearSummary();
		}

		function shiftYear(delta) {
			currentYear += delta;
			updateGridTitle();
			loadYearSummary();
		}

		function loadYearSummary() {
			var hospitalId = $('#hospitalId').val();
			if (!hospitalId) {
				$('#gridBody').html('<div class="reconciliation-empty-tip">请选择医院</div>');
				return;
			}
			$.post(prefix + '/yearSummary', {
				hospitalId: hospitalId,
				year: currentYear,
				supplierId: $('#supplierId').val() || ''
			}, function(res) {
				if (res.code === web_status.SUCCESS || res.code === 0) {
					renderMonthGrid(res.data || []);
				} else {
					$('#gridBody').html('<div class="reconciliation-empty-tip">' + (res.msg || '加载失败') + '</div>');
				}
			});
		}

		function formatAmount(value) {
			if (value == null || value === '') {
				return '0';
			}
			var num = parseFloat(value);
			if (isNaN(num)) {
				return value;
			}
			return num.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
		}

		function formatQuantity(value) {
			if (value == null || value === '') {
				return '0';
			}
			var num = parseFloat(value);
			if (isNaN(num)) {
				return value;
			}
			if (Math.floor(num) === num) {
				return num.toLocaleString('zh-CN', { maximumFractionDigits: 0 });
			}
			return num.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
		}

		function hasMonthData(row) {
			var d = parseFloat(row.deliveryAmount) || 0;
			var s = parseFloat(row.settlementAmount) || 0;
			var dq = parseFloat(row.deliveryQuantity) || 0;
			var sq = parseFloat(row.settlementQuantity) || 0;
			return d > 0 || s > 0 || dq > 0 || sq > 0;
		}

		function buildMonthCard(row) {
			if (!hasMonthData(row)) {
				return '<div class="empty-hint">暂无数据</div>';
			}
			var deliveryAmt = formatAmount(row.deliveryAmount);
			var deliveryQty = formatQuantity(row.deliveryQuantity);
			var settlementAmt = formatAmount(row.settlementAmount);
			var settlementQty = formatQuantity(row.settlementQuantity);
			return ''
				+ '<div class="reconciliation-month-card">'
				+ '  <div class="card-status"><i class="fa fa-circle"></i> 已生成</div>'
				+ '  <div class="card-body">'
				+ '    <div title="配送金额: ' + deliveryAmt + '">配送金额: ' + deliveryAmt + '</div>'
				+ '    <div title="配送数量: ' + deliveryQty + '">配送数量: ' + deliveryQty + '</div>'
				+ '    <div title="结算金额: ' + settlementAmt + '">结算金额: ' + settlementAmt + '</div>'
				+ '    <div title="结算数量: ' + settlementQty + '">结算数量: ' + settlementQty + '</div>'
				+ '  </div>'
				+ '</div>';
		}

		function renderMonthGrid(list) {
			var rows = list || [];
			var firstHalf = rows.slice(0, 6);
			var secondHalf = rows.slice(6, 12);
			var html = renderHalfYearBlock(firstHalf) + renderHalfYearBlock(secondHalf);
			$('#gridBody').html(html);
		}

		function renderHalfYearBlock(monthList) {
			if (!monthList || !monthList.length) {
				return '';
			}
			var html = '<div class="reconciliation-half-year-block">';
			html += '<div class="reconciliation-month-header">';
			monthList.forEach(function(row) {
				html += '<div>' + (row.month != null ? row.month : '') + '月份</div>';
			});
			html += '</div><div class="reconciliation-month-row">';
			monthList.forEach(function(row) {
				var emptyClass = hasMonthData(row) ? '' : ' empty-month';
				html += '<div class="reconciliation-month-cell' + emptyClass + '">';
				html += buildMonthCard(row);
				html += '</div>';
			});
			html += '</div></div>';
			return html;
		}
	</script>
</body>
</html>
