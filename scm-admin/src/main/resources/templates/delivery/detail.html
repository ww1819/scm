<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('配送单详情')" />
	<th:block th:include="include :: layout-latest-css" />
	<style>
		body.delivery-detail-page {
			height: 100%;
			overflow: hidden;
		}
		.delivery-detail-page .main-content {
			display: flex;
			flex-direction: column;
			height: 100%;
			min-height: 480px;
			overflow: hidden;
			box-sizing: border-box;
		}
		.delivery-detail-basic {
			flex-shrink: 0;
		}
		#form-delivery-detail.delivery-basic-fields .form-group {
			margin-bottom: 10px;
		}
		#form-delivery-detail.delivery-basic-fields .control-label {
			padding-right: 6px;
			white-space: nowrap;
		}
		.delivery-info-box.search-collapse {
			margin: 0 10px 15px 10px;
			padding: 12px 10px 5px;
			background: #fff !important;
		}
		.delivery-info-box .form-control[readonly] {
			background-color: #fff;
			border-color: #e5e6e7;
		}
		.delivery-basic-header-row {
			margin-bottom: 12px !important;
		}
		.delivery-detail-table-section {
			flex: 1;
			min-height: 0;
			display: flex;
			flex-direction: column;
			margin-top: 8px;
			padding: 0 10px 10px;
			overflow: hidden;
		}
		.delivery-detail-table-section .form-header {
			flex-shrink: 0;
			margin-bottom: 8px;
		}
		.delivery-detail-table-wrap {
			flex: 1;
			min-height: 0;
			position: relative;
			overflow: hidden;
			display: flex;
			flex-direction: column;
		}
		.delivery-detail-table-wrap > .bootstrap-table {
			flex: 1 1 auto;
			min-height: 0;
			height: 100%;
			display: flex;
			flex-direction: column;
		}
		.delivery-detail-table-wrap .fixed-table-container {
			flex: 1;
			min-height: 0;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}
		.delivery-detail-table-wrap .fixed-table-body {
			flex: 1;
			min-height: 0;
			overflow-x: auto !important;
			overflow-y: auto !important;
		}
		.delivery-detail-table-wrap .fixed-table-header {
			background: #fff;
		}
		.delivery-detail-table-wrap .fixed-table-header table.table,
		.delivery-detail-table-wrap .fixed-table-body table.table {
			border-collapse: collapse;
			table-layout: fixed;
		}
		#bootstrap-table.delivery-detail-fixed-table {
			table-layout: fixed !important;
		}
		.delivery-detail-table-wrap .fixed-table-header th .th-inner,
		.delivery-detail-table-wrap .fixed-table-header th .sortable,
		#bootstrap-table thead th .th-inner,
		#bootstrap-table thead th .sortable {
			padding: 8px 10px !important;
			font-size: 14px !important;
			line-height: 1.42857143;
			font-weight: normal;
			text-align: center !important;
			overflow: hidden !important;
			text-overflow: ellipsis !important;
			white-space: nowrap !important;
		}
		.delivery-detail-table-wrap .fixed-table-header th,
		.delivery-detail-table-wrap .fixed-table-body td,
		#bootstrap-table thead th,
		#bootstrap-table tbody td {
			box-sizing: border-box !important;
			border: 1px solid #e7eaec !important;
			padding: 8px 10px !important;
			white-space: nowrap !important;
			word-break: keep-all !important;
			overflow: hidden;
			text-overflow: ellipsis;
			vertical-align: middle !important;
			text-align: center !important;
		}
		.delivery-detail-table-wrap .fixed-table-header th,
		#bootstrap-table thead th {
			background-color: #f5f5f5 !important;
			font-size: 14px !important;
			font-weight: normal;
			color: #333;
			border-bottom: 2px solid #ddd !important;
		}
		.delivery-detail-table-wrap .fixed-table-body td,
		#bootstrap-table tbody td {
			background-color: #fff;
			font-size: 13px !important;
			color: #333;
		}
		.delivery-detail-table-wrap .fixed-table-body .fixed-table-border {
			display: none !important;
		}
	</style>
</head>
<body class="gray-bg delivery-detail-page">
    <div class="main-content">
        <div class="delivery-detail-basic">
        <form id="form-delivery-detail" class="form-horizontal delivery-basic-fields">
            <input type="hidden" id="deliveryId" th:value="${delivery.deliveryId}"/>
            <div class="delivery-basic-header-row" style="display:flex;align-items:center;justify-content:space-between;margin:8px 10px 12px 10px;padding-bottom:5px;border-bottom:1px solid #ddd;">
                <h4 class="form-header h4" style="margin:0;border:0;padding:0;">基本信息</h4>
                <div style="display:flex;align-items:center;gap:8px;">
                    <a class="btn btn-sm btn-default" id="btn-link-order" style="display:none;" href="javascript:void(0)" onclick="openOrderDetail(refOrderId)">
                        <i class="fa fa-file-text-o"></i> 打开本系统订单
                    </a>
                    <a class="btn btn-sm btn-default" id="btn-link-zs" style="display:none;" href="javascript:void(0)" onclick="openZsOrderDetail(refZsOrderIdStr)">
                        <i class="fa fa-file-text-o"></i> 打开第三方订单
                    </a>
                    <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i> 关 闭</button>
                </div>
            </div>
            <div class="search-collapse delivery-info-box">
            <div class="row">
                <div class="col-sm-4">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">配送单号：</label>
                        <div class="col-sm-7">
                            <input type="text" class="form-control" th:value="${delivery.deliveryNo}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">医院名称：</label>
                        <div class="col-sm-7">
                            <input type="text" class="form-control" th:value="${delivery.hospitalName}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">供应商名称：</label>
                        <div class="col-sm-7">
                            <input type="text" class="form-control" th:value="${delivery.supplierName}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-4">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">配送金额：</label>
                        <div class="col-sm-7">
                            <input type="text" class="form-control" th:value="${delivery.deliveryAmount}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">审核状态：</label>
                        <div class="col-sm-7">
                            <input type="text" class="form-control" readonly
                                   th:value="${delivery.auditStatus == '0' ? '待审核' : (delivery.auditStatus == '1' ? '已审核' : (delivery.auditStatus == '2' ? '已拒绝' : '-'))}">
                        </div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">单据状态：</label>
                        <div class="col-sm-7">
                            <input type="text" class="form-control" readonly
                                   th:value="${delivery.deliveryStatus == '0' ? '未审核' : (delivery.deliveryStatus == '1' ? '已审核' : (delivery.deliveryStatus == '2' ? '已配送' : (delivery.deliveryStatus == '3' ? '已入库' : '-')))}">
                        </div>
                    </div>
                </div>
            </div>
            </div>
        </form>
        </div>

        <!-- 接口下载记录：详情页暂不展示，保留 DOM 便于后续恢复 -->
        <div class="row" id="section-download-log" style="display:none;margin-top:16px;">
            <div class="col-sm-12">
                <h4 class="form-header h4">接口下载记录</h4>
                <p class="text-muted" style="font-size: 12px; margin-bottom: 8px;">通过 scminterface 成功下载配送单 XML 时自动记录；存在记录时该单不可反审核。</p>
                <div class="table-responsive">
                    <table id="table-delivery-download-log"></table>
                </div>
            </div>
        </div>

        <div class="delivery-detail-table-section">
            <h4 class="form-header h4">配送明细（含来源订单行）</h4>
            <div class="delivery-detail-table-wrap select-table table-striped">
                <table id="bootstrap-table" class="delivery-detail-fixed-table"></table>
            </div>
        </div>
    </div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:inline="javascript">
		var deliveryId = [[${delivery.deliveryId}]];
		var prefix = ctx + "delivery/delivery";
		var refOrderId = /*[[${delivery.orderId}]]*/ null;
		var refZsOrderIdStr = /*[[${delivery.zsOrderId}]]*/ '';

		var detailColumnWidths = {};
		var DETAIL_DEFAULT_COL_WIDTHS = {
		    serialNumber: 64,
		    materialCode: 130,
		    materialName: 200,
		    specification: 120,
		    model: 100,
		    remainingQuantity: 110,
		    deliveryQuantity: 96,
		    price: 96,
		    amount: 108,
		    productionDate: 118,
		    expireDate: 118,
		    batchNo: 130,
		    registerNo: 150,
		    deliveryAuditStatus: 100,
		    refOrderNo: 150,
		    refOrderLineQty: 120,
		    refOrderMaterialCode: 130,
		    refZsOrderId: 150,
		    refZsLineQty: 120,
		    refZsMaterialCode: 130
		};

		function seedDetailDefaultColumnWidths() {
		    $.extend(detailColumnWidths, DETAIL_DEFAULT_COL_WIDTHS);
		    var opt = $('#bootstrap-table').bootstrapTable('getOptions');
		    if (opt && opt.columns && opt.columns[0]) {
		        $.each(opt.columns[0], function (_, col) {
		            if (!col || !col.field || !col.width) {
		                return;
		            }
		            var w = parseInt(col.width, 10);
		            if (w > 0) {
		                detailColumnWidths[col.field] = Math.max(detailColumnWidths[col.field] || 0, w);
		            }
		        });
		    }
		}

		function ensureDetailTableColgroup($table, colCount) {
		    if (!$table || !$table.length) {
		        return $();
		    }
		    var $colgroup = $table.children('colgroup');
		    if (!$colgroup.length) {
		        $colgroup = $('<colgroup></colgroup>');
		        $table.prepend($colgroup);
		    }
		    while ($colgroup.children('col').length < colCount) {
		        $colgroup.append('<col />');
		    }
		    while ($colgroup.children('col').length > colCount) {
		        $colgroup.children('col:last').remove();
		    }
		    return $colgroup;
		}

		/** 表头列宽 → 表体所有行 + colgroup（固定表头双表必须按列索引同步） */
		function applyDetailColumnWidthFromHeader() {
		    var $container = $('#bootstrap-table').closest('.bootstrap-table').find('.fixed-table-container').first();
		    var $headTable = $container.children('.fixed-table-header').find('table').first();
		    var $bodyTable = $container.children('.fixed-table-body').find('#bootstrap-table');
		    if (!$bodyTable.length) {
		        $bodyTable = $container.children('.fixed-table-body').find('table').not('.fixed-table-border').first();
		    }
		    if (!$headTable.length || !$bodyTable.length) {
		        return;
		    }
		    var $ths = $headTable.find('thead tr:first th');
		    var colCount = $ths.length;
		    if (colCount < 1) {
		        return;
		    }
		    ensureDetailTableColgroup($headTable, colCount);
		    ensureDetailTableColgroup($bodyTable, colCount);
		    var totalW = 0;
		    var setW = function (el, w) {
		        if (!el) {
		            return;
		        }
		        var ws = w + 'px';
		        el.style.setProperty('width', ws, 'important');
		        el.style.setProperty('min-width', ws, 'important');
		        el.style.setProperty('max-width', 'none', 'important');
		    };
		    $ths.each(function () {
		        var colIdx = this.cellIndex;
		        if (colIdx < 0) {
		            return;
		        }
		        var field = $(this).attr('data-field');
		        var w;
		        if (field && detailColumnWidths[field]) {
		            w = detailColumnWidths[field];
		        } else {
		            w = Math.ceil(this.getBoundingClientRect().width);
		            if (!w || w < 40) {
		                w = 40;
		            }
		            if (field) {
		                detailColumnWidths[field] = w;
		            }
		        }
		        setW(this, w);
		        $headTable.find('colgroup col').eq(colIdx).each(function () {
		            setW(this, w);
		        });
		        $bodyTable.find('colgroup col').eq(colIdx).each(function () {
		            setW(this, w);
		        });
		        $bodyTable.find('tbody tr').each(function () {
		            var cell = this.cells[colIdx];
		            if (cell) {
		                setW(cell, w);
		            }
		        });
		        totalW += w;
		    });
		    if (totalW > 0) {
		        var tw = totalW + 'px';
		        $headTable[0].style.setProperty('width', tw, 'important');
		        $bodyTable[0].style.setProperty('width', tw, 'important');
		    }
		}

		function fixDetailTableHeaderAlign() {
		    var $container = $('#bootstrap-table').closest('.bootstrap-table').find('.fixed-table-container').first();
		    var $mainBody = $container.children('.fixed-table-body');
		    var $mainHeader = $container.children('.fixed-table-header');
		    if (!$mainBody.length || !$mainHeader.length) {
		        return;
		    }
		    var scrollW = $mainBody[0].offsetWidth - $mainBody[0].clientWidth;
		    $mainHeader.css('margin-right', scrollW + 'px');
		    applyDetailColumnWidthFromHeader();
		    var sl = $mainBody.scrollLeft();
		    $mainHeader.scrollLeft(sl);
		}

		function scheduleDetailHeaderAlign() {
		    fixDetailTableHeaderAlign();
		    requestAnimationFrame(fixDetailTableHeaderAlign);
		}

		var detailTableLayoutRefreshTimer = null;
		function refreshDetailTableLayoutDebounced() {
		    if (detailTableLayoutRefreshTimer) {
		        clearTimeout(detailTableLayoutRefreshTimer);
		    }
		    detailTableLayoutRefreshTimer = setTimeout(function () {
		        detailTableLayoutRefreshTimer = null;
		        seedDetailDefaultColumnWidths();
		        scheduleDetailHeaderAlign();
		    }, 60);
		}

		function calculateDetailTableHeight() {
		    var $wrap = $('.delivery-detail-table-wrap');
		    if ($wrap.length === 0) {
		        return 400;
		    }
		    var h = $wrap[0].clientHeight || $wrap.innerHeight();
		    h = Math.floor(h - 8);
		    return Math.max(h, 200);
		}

		function layoutDetailTableWrap() {
		    var $section = $('.delivery-detail-table-section');
		    var $page = $('.delivery-detail-page .main-content');
		    if ($section.length === 0 || $page.length === 0) {
		        return;
		    }
		    var bottom = $page[0].getBoundingClientRect().bottom;
		    var $tc = $section.closest('.tab-content');
		    if ($tc.length) {
		        bottom = Math.min(bottom, $tc[0].getBoundingClientRect().bottom - 4);
		    }
		    var $pane = $section.closest('.tab-pane');
		    if ($pane.length && $pane.is(':visible')) {
		        bottom = Math.min(bottom, $pane[0].getBoundingClientRect().bottom - 4);
		    }
		    var top = $section[0].getBoundingClientRect().top;
		    var $wrap = $section.find('.delivery-detail-table-wrap');
		    var h = Math.floor(bottom - top - 36);
		    if (h < 200) {
		        h = 200;
		    }
		    $wrap.css({ height: h + 'px', minHeight: h + 'px', flex: '0 0 auto' });
		}

		function resetDetailTableHeight() {
		    var $table = $('#bootstrap-table');
		    if ($table.length > 0 && $table.bootstrapTable('getOptions')) {
		        $table.bootstrapTable('resetView', { height: calculateDetailTableHeight() });
		    }
		}

		function relayoutDetailTable() {
		    layoutDetailTableWrap();
		    resetDetailTableHeight();
		    refreshDetailTableLayoutDebounced();
		}

		function bindDetailTableScrollSync() {
		    var $container = $('#bootstrap-table').closest('.bootstrap-table').find('.fixed-table-container').first();
		    var $mainBody = $container.children('.fixed-table-body');
		    var $mainHeader = $container.children('.fixed-table-header');
		    $mainBody.off('scroll.detailTableSync').on('scroll.detailTableSync', function () {
		        $mainHeader.scrollLeft($mainBody.scrollLeft());
		    });
		}

		$(function() {
		    if (refOrderId != null) {
		        $('#btn-link-order').show();
		    }
		    if (refZsOrderIdStr != null && refZsOrderIdStr !== '') {
		        $('#btn-link-zs').show();
		    }
		    layoutDetailTableWrap();
		    $('#bootstrap-table').bootstrapTable({
		        url: prefix + "/detailList",
		        method: 'post',
		        contentType: "application/x-www-form-urlencoded",
		        queryParams: function() { return { deliveryId: deliveryId }; },
		        pagination: false,
		        search: false,
		        showRefresh: false,
		        mobileResponsive: false,
		        sortable: true,
		        sortName: 'detailId',
		        sortOrder: 'asc',
		        sidePagination: 'client',
		        height: calculateDetailTableHeight(),
		        responseHandler: ruoyiTableData,
		        onSort: function () {
		            refreshDetailTableLayoutDebounced();
		        },
		        onPostBody: function() {
		            bindDetailTableScrollSync();
		            refreshDetailTableLayoutDebounced();
		        },
		        onLoadSuccess: function() {
		            bindDetailTableScrollSync();
		            refreshDetailTableLayoutDebounced();
		        },
		        columns: [
		            {
		                field: 'serialNumber',
		                title: '序号',
		                align: 'center',
		                width: 64,
		                formatter: function(value, row, index) {
		                    return index + 1;
		                }
		            },
		            { field: 'materialCode', title: '产品编码', align: 'center', width: 130, sortable: true },
		            { field: 'materialName', title: '产品名称', align: 'center', width: 200, sortable: true },
		            { field: 'specification', title: '规格', align: 'center', width: 120, sortable: true },
		            { field: 'model', title: '型号', align: 'center', width: 100, sortable: true },
		            { field: 'remainingQuantity', title: '可配送数量', align: 'center', width: 110, sortable: true, formatter: fmtDec },
		            { field: 'deliveryQuantity', title: '数量', align: 'center', width: 96, sortable: true, formatter: fmtDec },
		            { field: 'price', title: '单价', align: 'center', width: 96, sortable: true, formatter: fmtDec },
		            { field: 'amount', title: '金额', align: 'center', width: 108, sortable: true, formatter: fmtDec },
		            { field: 'productionDate', title: '生产日期', align: 'center', width: 118, sortable: true, formatter: fmtDate },
		            { field: 'expireDate', title: '有效期', align: 'center', width: 118, sortable: true, formatter: fmtDate },
		            { field: 'batchNo', title: '批号', align: 'center', width: 130, sortable: true },
		            { field: 'registerNo', title: '注册证号', align: 'center', width: 150, sortable: true },
		            { field: 'deliveryAuditStatus', title: '配送单审核', align: 'center', width: 100, sortable: true, formatter: fmtAudit },
		            { field: 'refOrderNo', title: '本系统订单号', align: 'center', width: 150, sortable: true, formatter: function(v, row) { return v || (row.refOrderId ? '#' + row.refOrderId : '-'); } },
		            { field: 'refOrderLineQty', title: '订单行订货数', align: 'center', width: 120, formatter: fmtDec },
		            { field: 'refOrderMaterialCode', title: '订单行编码', align: 'center', width: 130 },
		            { field: 'refZsOrderId', title: '第三方订单ID', align: 'center', width: 150, formatter: function(v) { return v || '-'; } },
		            { field: 'refZsLineQty', title: '第三方行数量', align: 'center', width: 120, formatter: fmtDec },
		            { field: 'refZsMaterialCode', title: '第三方编码', align: 'center', width: 130 }
		        ]
		    });
		    bindDetailTableScrollSync();
		    $('#bootstrap-table').on('refresh.bs.table post-header.bs.table reset-view.bs.table', function () {
		        refreshDetailTableLayoutDebounced();
		    });
		    $(window).on('resize', function() {
		        relayoutDetailTable();
		    });
		    setTimeout(relayoutDetailTable, 0);
		    setTimeout(relayoutDetailTable, 200);
		});

		function fmtAudit(v) {
		    var m = { '0': '待审核', '1': '已审核', '2': '已拒绝' };
		    return m[v] || (v == null ? '-' : v);
		}
		function fmtDec(v) {
		    if (v != null && v !== '') return parseFloat(v).toFixed(2);
		    return '-';
		}
		function fmtDate(v) {
		    if (!v) return '-';
		    if (typeof v === 'string' && v.indexOf('-') > -1) {
		        return v.split(' ')[0];
		    }
		    if (typeof $.common !== 'undefined' && typeof $.common.dateFormat === 'function') {
		        return $.common.dateFormat(v, 'yyyy-MM-dd') || '-';
		    }
		    try {
		        var d = new Date(v);
		        if (isNaN(d.getTime())) return '-';
		        var y = d.getFullYear();
		        var m = String(d.getMonth() + 1).padStart(2, '0');
		        var day = String(d.getDate()).padStart(2, '0');
		        return y + '-' + m + '-' + day;
		    } catch (e) {
		        return '-';
		    }
		}

		function openOrderDetail(orderId) {
		    $.modal.openTab('订单详情', ctx + 'order/order/detail/' + orderId);
		}
		function openZsOrderDetail(zsOrderId) {
		    $.modal.openTab('第三方订单', ctx + 'order/zstp/detail/' + zsOrderId);
		}
	</script>
</body>
</html>
