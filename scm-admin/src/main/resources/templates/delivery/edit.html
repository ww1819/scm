<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('修改配送单')" />
	<style>

		/* 优化操作列按钮样式 */
		.btn-operation-delete {
			display: inline-flex !important;
			align-items: center;
			justify-content: center;
			padding: 6px 10px;
			margin: 0 auto;
			color: #fff !important;
			background: linear-gradient(135deg, #d9534f 0%, #c9302c 100%) !important;
			border: none !important;
			border-radius: 4px;
			font-size: 13px;
			line-height: 1;
			text-align: center;
			cursor: pointer;
			transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
			text-decoration: none !important;
			min-width: 32px;
			width: 32px;
			max-width: 32px;
			height: 28px;
			box-shadow: 0 2px 4px rgba(217, 83, 79, 0.3);

			overflow: hidden;
			opacity: 1 !important;
			visibility: visible !important;
			white-space: nowrap !important;
		}
		.btn-operation-delete::before {
			content: '';
			position: absolute;
			top: 50%;
			left: 50%;
			width: 0;
			height: 0;
			border-radius: 50%;
			background: rgba(255, 255, 255, 0.3);

		.btn-operation-delete:hover {

		/* 页面布局优化 */

		/* 表单区域卡片样式 */

<body style="overflow: hidden;">
    <div class="main-content" style="overflow: hidden; height: calc(100vh - 80px);">
        <form id="form-delivery-edit" class="form-horizontal">
            <input name="deliveryId" type="hidden" th:value="${delivery.deliveryId}"/>
            <input type="hidden" name="orderId" id="orderId" th:value="${delivery.orderId != null ? delivery.orderId : ''}">
            <input type="hidden" name="zsOrderId" id="zsOrderId" th:value="${delivery.zsOrderId != null ? delivery.zsOrderId : ''}">
            <input type="hidden" name="srcOrderSupplierId" id="srcOrderSupplierId" th:value="${delivery.srcOrderSupplierId != null ? delivery.srcOrderSupplierId : ''}">
            <input type="hidden" name="srcOrderSupplierName" id="srcOrderSupplierName" th:value="${delivery.srcOrderSupplierName != null ? delivery.srcOrderSupplierName : ''}">
            <input type="hidden" name="srcOrderWarehouseId" id="srcOrderWarehouseId" th:value="${delivery.srcOrderWarehouseId != null ? delivery.srcOrderWarehouseId : ''}">
            <input type="hidden" name="srcOrderWarehouseName" id="srcOrderWarehouseName" th:value="${delivery.srcOrderWarehouseName != null ? delivery.srcOrderWarehouseName : ''}">
            <input type="hidden" name="srcOrderDeptId" id="srcOrderDeptId" th:value="${delivery.srcOrderDeptId != null ? delivery.srcOrderDeptId : ''}">
            <input type="hidden" name="srcOrderDeptName" id="srcOrderDeptName" th:value="${delivery.srcOrderDeptName != null ? delivery.srcOrderDeptName : ''}">
            <input type="hidden" name="zsCustomerId" id="zsCustomerId" th:value="${delivery.zsCustomerId != null ? delivery.zsCustomerId : ''}">
            <input type="hidden" name="orderDate" id="orderDateField" th:value="${delivery.orderDate != null ? #dates.format(delivery.orderDate, 'yyyy-MM-dd') : ''}">
            <input type="hidden" name="warehouse" id="warehouseField" th:value="${delivery.warehouse != null ? delivery.warehouse : ''}">
            <div class="form-card">
                <h4 class="form-header h4">单据录入</h4>
            <div class="row">
            	<div class="col-sm-3">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">配送单号：</label>
                        <div class="col-sm-7">
                            <input name="deliveryNo" class="form-control" type="text" readonly th:value="${delivery.deliveryNo}">
                        </div>
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">医院：</label>
                        <div class="col-sm-7">
                            <select name="hospitalId" id="hospitalId" class="form-control">
                                <option value="">请选择医院（选填）</option>
                                <option th:each="hospital : ${hospitalList}"
                                        th:value="${hospital.hospitalId}"
                                        th:text="${hospital.hospitalName}"
                                        th:selected="${delivery.hospitalId != null && delivery.hospitalId == hospital.hospitalId}">
                                </option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">总金额：</label>
                        <div class="col-sm-7">
                            <input name="deliveryAmount" placeholder="请输入总金额" class="form-control" type="number" step="0.01" min="0" th:value="${delivery.deliveryAmount}">
                        </div>
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">配送商：</label>
                        <div class="col-sm-7">
                            <select name="supplierId" id="supplierId" class="form-control">
                                <option value="">请选择配送商（选填）</option>
                                <option th:each="supplier : ${supplierList}"
                                        th:value="${supplier.supplierId}"
                                        th:text="${supplier.companyName}"
                                        th:selected="${delivery.supplierId != null && delivery.supplierId == supplier.supplierId}">
                                </option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-3">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">发票号：</label>
                        <div class="col-sm-7">
                            <input name="invoiceNo" placeholder="请输入发票号" class="form-control" type="text" maxlength="100" th:value="${delivery.invoiceNo}">
                        </div>
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">发票日期：</label>
                        <div class="col-sm-7">
                            <input name="invoiceDate" id="invoiceDate" placeholder="年/月/日" class="form-control" type="text" readonly th:value="${delivery.invoiceDate != null ? #dates.format(delivery.invoiceDate, 'yyyy-MM-dd') : ''}">
                        </div>
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">订单号：</label>
                        <div class="col-sm-7">
                            <input name="orderNo" placeholder="请输入订单号" class="form-control" type="text" maxlength="50" th:value="${delivery.orderNo}">
                        </div>
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">预计配送日期：</label>
                        <div class="col-sm-7">

	<th:block th:include="include :: bootstrap-table-fixed-columns-js" />
	<script th:inline="javascript">
	    var prefix = ctx + "delivery/delivery";
	    
	    function escapeHtmlForBarcode(s) {
	        if (s == null || s === '') return '';
	        return String(s)
	            .replace(/&/g, '&amp;')
	            .replace(/</g, '&lt;')
	            .replace(/>/g, '&gt;');
	    }
	    
	    // 配送明细数据（从后端传递）
	    var deliveryDetails = /*[[${delivery.deliveryDetails}]]*/ [];
	    
	    // 确保操作列正确渲染的函数 - 定义为全局函数，以便在所有地方都能访问
	    var fillOperationColumn = function() {
	        console.log('fillOperationColumn called'); // 调试信息
	        
	        // 获取表格数据以确定行数
	        var data = $('#detail-table').bootstrapTable('getData');
	        console.log('Table data length:', data ? data.length : 0); // 调试信息
	        
	        if (!data || data.length === 0) {
	            console.log('No data in table, skipping fillOperationColumn');
	            return;
	        }
	        
	        // 方法1: 处理固定列中的操作列 - 使用多种选择器确保找到固定列
	        var fixedColSelectors = [
	            '.fixed-columns-right',
	            '#detail-table .fixed-columns-right',
	            '.fixed-table-body .fixed-columns-right',
	            '.bootstrap-table .fixed-columns-right'
	        ];
	        
	        fixedColSelectors.forEach(function(selector) {
	            var $fixedCols = $(selector);
	            console.log('Fixed columns found with selector "' + selector + '":', $fixedCols.length);
	            
	            $fixedCols.each(function() {
	                var $fixedCol = $(this);
	                // 尝试多种方式查找行
	                var rows = $fixedCol.find('tbody tr');
	                if (rows.length === 0) {
	                    rows = $fixedCol.find('tr');
	                }
	                console.log('Fixed column rows found:', rows.length);
	                
	                rows.each(function() {
	                    var $tr = $(this);
	                    // 尝试多种方式获取行索引
	                    var rowIndex = $tr.data('index');
	                    if (rowIndex === undefined || rowIndex === null) {
	                        rowIndex = $tr.attr('data-index');
	                    }
	                    if (rowIndex === undefined || rowIndex === null) {
	                        rowIndex = $tr.index();
	                    }
	                    // 如果还是无效，尝试从主表格对应行获取
	                    if (rowIndex === undefined || rowIndex === null) {
	                        var mainTableRow = $('#detail-table tbody tr').eq($tr.index());
	                        if (mainTableRow.length > 0) {
	                            rowIndex = mainTableRow.data('index') || mainTableRow.index();
	                        }
	                    }
	                    
	                    // 尝试多种方式查找操作列单元格
	                    var $operationCell = $tr.find('td').first();
	                    if ($operationCell.length === 0) {
	                        $operationCell = $tr.find('td:last-child');
	                    }
	                    if ($operationCell.length === 0) {
	                        $operationCell = $tr.find('td[data-field="operation"]');
	                    }
	                    if ($operationCell.length === 0) {
	                        var allCells = $tr.find('td');
	                        if (allCells.length > 0) {
	                            $operationCell = allCells.last();
	                        }
	                    }
	                    
	                    if ($operationCell.length > 0) {
	                        // 强制填充，无论是否为空
	                        var btnHtml = deliveryDetailOperationHtml(rowIndex);
	                        $operationCell.html(btnHtml);
	                        // 确保按钮可见
	                        $operationCell.find('.btn-operation-delete').css({
	                            'display': 'inline-flex',
	                            'visibility': 'visible',
	                            'opacity': '1'
	                        });
	                        console.log('Filled fixed column cell for row:', rowIndex, 'Cell:', $operationCell[0], 'Button:', $operationCell.find('.btn-operation-delete')[0]); // 调试信息
	                    } else {
	                        console.log('No operation cell found in fixed column for row:', rowIndex, 'TR:', $tr[0]); // 调试信息
	                    }
	                });
	            });
	        });
	            
	        // 方法2: 处理主表格中的操作列（最后一列）
	        var mainTableRows = $('#detail-table tbody tr');
	        console.log('Main table rows:', mainTableRows.length); // 调试信息
	        
	        mainTableRows.each(function() {
	            var $tr = $(this);
	            var rowIndex = $tr.data('index') !== undefined ? $tr.data('index') : $tr.index();
	            // 如果 rowIndex 无效，尝试从 tr 的 data-index 属性获取
	            if (rowIndex === undefined || rowIndex === null) {
	                rowIndex = $tr.attr('data-index');
	                if (rowIndex === undefined) {
	                    rowIndex = $tr.index();
	                }
	            }
	            // 尝试多种方式找到操作列
	            var $operationCell = $tr.find('td[data-field="operation"]');
	            if ($operationCell.length === 0) {
	                $operationCell = $tr.find('td:last-child');
	            }
	            // 如果还是找不到，尝试通过列索引（最后一列应该是操作列）
	            if ($operationCell.length === 0) {
	                var $allCells = $tr.find('td');
	                if ($allCells.length > 0) {
	                    $operationCell = $allCells.last();
	                }
	            }
	            if ($operationCell.length > 0) {
	                var btnHtml = deliveryDetailOperationHtml(rowIndex);
	                $operationCell.html(btnHtml);
	                console.log('Filled main table cell for row:', rowIndex); // 调试信息
	            } else {
	                console.log('No operation cell found in main table for row:', rowIndex); // 调试信息
	            }
	        });
	            
	        // 方法3: 通过列数判断最后一列是否是操作列
	        $('#detail-table tbody tr').each(function() {
	            var $tr = $(this);
	            var rowIndex = $tr.data('index') !== undefined ? $tr.data('index') : $tr.index();
	            // 如果 rowIndex 无效，尝试从 tr 的 data-index 属性获取
	            if (rowIndex === undefined || rowIndex === null) {
	                rowIndex = $tr.attr('data-index');
	                if (rowIndex === undefined) {
	                    rowIndex = $tr.index();
	                }
	            }
	            var $allCells = $tr.find('td');
	            // 检查最后一列是否是操作列（通过列数判断，总共15列，最后一列是操作列）
	            if ($allCells.length >= 15) {
	                var $lastCell = $allCells.last();
	                var btnHtml = deliveryDetailOperationHtml(rowIndex);
	                $lastCell.html(btnHtml);
	                console.log('Filled last cell for row:', rowIndex, 'Cell count:', $allCells.length, 'Cell:', $lastCell[0]); // 调试信息
	            }
	        });
	        
	        // 方法4: 直接查找所有可能的操作列位置并填充
	        $('#detail-table, .fixed-columns-right').find('td[data-field="operation"]').each(function() {
	            var $cell = $(this);
	            var $tr = $cell.closest('tr');
	            var rowIndex = $tr.data('index') !== undefined ? $tr.data('index') : $tr.index();
	            // 如果 rowIndex 无效，尝试从 tr 的 data-index 属性获取
	            if (rowIndex === undefined || rowIndex === null) {
	                rowIndex = $tr.attr('data-index');
	                if (rowIndex === undefined) {
	                    rowIndex = $tr.index();
	                }
	            }
	            var btnHtml = deliveryDetailOperationHtml(rowIndex);
	            $cell.html(btnHtml);
	        });
	        
	        // 方法5: 直接通过表格的列索引填充（最可靠的方法）
	        // 获取表格的所有行，通过列数判断最后一列
	        $('#detail-table').find('tbody tr').each(function() {
	            var $tr = $(this);
	            var $cells = $tr.find('td');
	            // 如果列数 >= 15，最后一列应该是操作列
	            if ($cells.length >= 15) {
	                var $lastCell = $cells.last();
	                var rowIndex = $tr.data('index') !== undefined ? $tr.data('index') : $tr.index();
	                if (rowIndex === undefined || rowIndex === null) {
	                    rowIndex = $tr.attr('data-index') || $tr.index();
	                }
	                var btnHtml = deliveryDetailOperationHtml(rowIndex);
	                $lastCell.html(btnHtml);
	                console.log('Filled last cell for row:', rowIndex, 'Cell count:', $cells.length); // 调试信息
	            }
	        });
	        
	        console.log('fillOperationColumn completed'); // 调试信息
	    };
	    
	    // 初始化日期选择器
	    var laydate;
	    layui.use('laydate', function(){
	        laydate = layui.laydate;
	        
	        // 预计配送日期
	        laydate.render({
	            elem: '#expectedDeliveryDate',
	            type: 'date'
	        });
	        
	        // 发票日期
	        laydate.render({
	            elem: '#invoiceDate',
	            type: 'date'
	        });
	    });
	    
	    function deliveryDetailOperationHtml(rowIndex) {
	        return '<a class="btn btn-xs btn-default" href="javascript:void(0)" onclick="copyDetailRowByIndex(this,' + rowIndex + ')" title="复制拆行（不同批号）" style="margin-right:6px;"><i class="fa fa-copy"></i></a>' +
	            '<a class="btn-operation-delete" href="javascript:void(0)" onclick="deleteDetailRowByIndex(this,' + rowIndex + ')" title="删除该行明细"><i class="fa fa-trash"></i></a>';
	    }
	    function deliveryLineGroupKey(row) {
	        if (!row) return '';
	        if (row.orderDetailId != null && row.orderDetailId !== '') return 'o:' + row.orderDetailId;
	        if (row.zsOrderDetailId) return 'z:' + row.zsOrderDetailId;
	        return '';
	    }
	    function sumDeliveryQtyForGroup(data, groupKey) {
	        if (!groupKey) return null;
	        var s = 0;
	        for (var i = 0; i < data.length; i++) {
	            if (deliveryLineGroupKey(data[i]) === groupKey) {
	                s += parseFloat(data[i].deliveryQuantity || 0);
	            }
	        }
	        return s;
	    }
	    window.copyDetailRowByIndex = function(btn, index) {
	        var allData = $('#detail-table').bootstrapTable('getData');
	        if (!allData || index < 0 || index >= allData.length) return;
	        var row = allData[index];
	        var pack = row.packCoefficient != null && row.packCoefficient !== '' ? parseFloat(row.packCoefficient) : NaN;
	        if (isNaN(pack) || pack <= 0) {
	            $.modal.alertWarning('未维护打包系数时无法按包装拆分，请先填写打包系数，或直接在本行修改批号、效期等信息。');
	            return;
	        }
	        var dq = parseFloat(row.deliveryQuantity || 0);
	        var eps = 1e-6;
	        if (Math.abs(dq - pack) < eps) {
	            $.modal.alertWarning('当前行配送数量已等于打包系数，若需不同批号、效期，请直接在本行修改，勿再复制拆行。');
	            return;
	        }
	        if (dq < pack - eps) {
	            $.modal.alertWarning('配送数量不足一个打包单位（' + pack + '），无法拆分。');
	            return;
	        }
	        var newRow = JSON.parse(JSON.stringify(row));
	        newRow.detailId = null;
	        newRow.deliveryQuantity = pack;
	        newRow.amount = pack * parseFloat(row.price || 0);
	        newRow.batchNo = '';
	        newRow.productionDate = '';
	        newRow.expireDate = '';
	        newRow.mainBarcode = '';
	        newRow.auxBarcode = '';
	        allData[index].deliveryQuantity = dq - pack;
	        allData[index].amount = (dq - pack) * parseFloat(row.price || 0);
	        allData.splice(index + 1, 0, newRow);
	        $('#detail-table').bootstrapTable('load', allData);
	        var totalAmount = 0;
	        for (var i = 0; i < allData.length; i++) {
	            var q = parseFloat(allData[i].deliveryQuantity || 0);
	            var p = parseFloat(allData[i].price || 0);
	            allData[i].amount = q * p;
	            totalAmount += allData[i].amount;
	        }
	        $("input[name='deliveryAmount']").val(totalAmount.toFixed(2));
	        setTimeout(function() {
	            if (typeof fillOperationColumnImmediate === 'function') fillOperationColumnImmediate();
	            if (typeof fillOperationColumn === 'function') fillOperationColumn();
	            $('#detail-table').find('.date-input').data('laydate-init', false);
	            if (typeof initDatePickers === 'function') initDatePickers();
	        }, 100);
	        $.modal.msgSuccess('已拆行：原行保留数量 ' + (dq - pack).toFixed(2) + '，新行数量 ' + pack + '，请填写新行批号与效期');
	    };
	    
	    // 初始化详细信息列表表格
	    $(function() {
	        initDetailTable();
	    });
	    
	    function initDetailTable() {
	        // 转换配送明细数据格式
	        var detailData = [];
	        console.log('initDetailTable called, deliveryDetails:', deliveryDetails); // 调试信息
	        if (deliveryDetails && deliveryDetails.length > 0) {
	            console.log('Found', deliveryDetails.length, 'delivery details'); // 调试信息
	            for (var i = 0; i < deliveryDetails.length; i++) {
	                var detail = deliveryDetails[i];
	                var row = {
	                    detailId: detail.detailId || null,
	                    orderDetailId: detail.orderDetailId || null,
	                    zsOrderDetailId: detail.zsOrderDetailId || '',
	                    materialId: detail.materialId || null,
	                    materialCode: detail.materialCode || '',
	                    materialName: detail.materialName || '',
	                    specification: detail.specification || '',
	                    model: detail.model || '',
	                    unit: detail.unit || '',
	                    remainingQuantity: detail.remainingQuantity || 0,
	                    deliveryQuantity: detail.deliveryQuantity || 0,
	                    lineApplyQty: detail.lineApplyQty != null ? parseFloat(detail.lineApplyQty) : (detail.refOrderLineQty != null ? parseFloat(detail.refOrderLineQty) : (detail.refZsLineQty != null ? parseFloat(detail.refZsLineQty) : null)),
	                    price: detail.price || 0,
	                    amount: detail.amount || 0,
	                    packCoefficient: detail.packCoefficient != null ? detail.packCoefficient : null,
	                    batchNo: detail.batchNo || '',
	                    mainBarcode: detail.mainBarcode || '',
	                    auxBarcode: detail.auxBarcode || '',
	                    productionDate: detail.productionDate || '',
	                    expireDate: detail.expireDate || '',
	                    manufacturer: detail.manufacturer || '',
	                    registerNo: detail.registerNo || ''
	                };
	                detailData.push(row);
	            }
	        }
	        
	        var options = {
	            url: '', // 暂时为空，后续可以添加数据源
	            data: detailData, // 加载配送明细数据
	            pagination: false, // 不分页
	            search: false, // 不显示搜索框
	            showRefresh: false, // 不显示刷新按钮
	            showToggle: false, // 不显示切换视图按钮
	            showColumns: false, // 不显示列选择按钮
	            striped: true, // 斑马纹
	            columns: [{
	                field: 'index',
	                title: '序号',
	                align: 'center',
	                width: 60,
	                formatter: function(value, row, index) {
	                    return index + 1;
	                }
            }, {
                field: 'materialCode',
                title: '产品编码',
                align: 'center',
                width: 150
            }, {
                field: 'materialName',
                title: '产品名称',
                align: 'left',
                width: 200
            }, {
                field: 'specification',
                title: '规格',
                align: 'center',
                width: 120
            }, {
	                field: 'unit',
	                title: '单位',
	                align: 'center',
	                width: 80
	            }, {
	                field: 'remainingQuantity',
	                title: '可配数量',
	                align: 'right',
	                width: 100,
	                formatter: function(value, row, index) {
	                    if (value) {
	                        return parseFloat(value).toFixed(2);
	                    }
	                    return '0.00';
	                }
	            }, {
	                field: 'deliveryQuantity',
	                title: '数量',
	                align: 'right',
	                width: 100,
	                formatter: function(value, row, index) {
	                    var val = value ? parseFloat(value).toFixed(2) : '0.00';
	                    return '<input type="text" class="form-control input-sm" style="text-align:right;width:100%;" value="' + val + '" ' +
	                           'onblur="updateQuantity(this, ' + index + ')" ' +
	                           'onkeypress="if(event.keyCode==13){this.blur();return false;}" />';
	                }
	            }, {
	                field: 'price',
	                title: '单价',
	                align: 'right',
	                width: 100,
	                formatter: function(value, row, index) {
	                    if (value) {
	                        return '¥' + parseFloat(value).toFixed(2);
	                    }
	                    return '¥0.00';
	                }
	            }, {
	                field: 'amount',
	                title: '金额',
	                align: 'right',
	                width: 120,
	                formatter: function(value, row, index) {
	                    if (value) {
	                        return '¥' + parseFloat(value).toFixed(2);
	                    }
	                    // 如果没有金额，计算：数量 * 单价
	                    var qty = parseFloat(row.deliveryQuantity || 0);
	                    var price = parseFloat(row.price || 0);
	                    return '¥' + (qty * price).toFixed(2);
	                }
	            }, {
	                field: 'packCoefficient',
	                title: '打包系数',
	                align: 'right',
	                width: 90,
	                formatter: function(value, row, index) {
	                    if (value != null && value !== '' && !isNaN(parseFloat(value))) {
	                        return parseFloat(value).toString();
	                    }
	                    return '-';
	                }
	            }, {
	                field: 'batchNo',
	                title: '批号',
	                align: 'left',
	                width: 200,
	                cellStyle: function() {
	                    return { css: { 'white-space': 'normal', 'word-break': 'break-all', 'vertical-align': 'top' } };
	                },
	                formatter: function(value, row, index) {
	                    var safe = escapeHtmlForBarcode(value != null ? String(value) : '');
	                    return '<textarea class="form-control input-sm batch-no-textarea" rows="2" maxlength="50" ' +
	                           'onblur="updateBatchNo(this, ' + index + ')">' + safe + '</textarea>';
	                }
	            }, {
	                field: 'expireDate',
	                title: '有效期',
	                align: 'center',
	                width: 150,
	                cellStyle: function() {
	                    return { css: { 'white-space': 'normal', 'vertical-align': 'top' } };
	                },
	                formatter: function(value, row, index) {
	                    var val = '';
	                    if (value) {
	                        if (typeof value === 'string') {
	                            val = value;
	                        } else {
	                            var date = new Date(value);
	                            if (!isNaN(date.getTime())) {
	                                val = date.getFullYear() + '-' + 
	                                      String(date.getMonth() + 1).padStart(2, '0') + '-' + 
	                                      String(date.getDate()).padStart(2, '0');
	                            }
	                        }
	                    }
	                    return '<input type="text" class="form-control input-sm date-input expire-date" style="width:100%;min-width:130px;" value="' + val + '" ' +
	                           'placeholder="年/月/日" ' +
	                           'onblur="updateExpireDate(this, ' + index + ')" ' +
	                           'onkeypress="if(event.keyCode==13){this.blur();return false;}" ' +
	                           'data-field="expireDate" data-index="' + index + '" />';
	                }
	            }, {
	                field: 'productionDate',
	                title: '生产日期',
	                align: 'center',
	                width: 150,
	                cellStyle: function() {
	                    return { css: { 'white-space': 'normal', 'vertical-align': 'top' } };
	                },
	                formatter: function(value, row, index) {
	                    var val = '';
	                    if (value) {
	                        if (typeof value === 'string') {
	                            val = value;
	                        } else {
	                            var date = new Date(value);
	                            if (!isNaN(date.getTime())) {
	                                val = date.getFullYear() + '-' + 
	                                      String(date.getMonth() + 1).padStart(2, '0') + '-' + 
	                                      String(date.getDate()).padStart(2, '0');
	                            }
	                        }
	                    }
	                    return '<input type="text" class="form-control input-sm date-input production-date" style="width:100%;min-width:130px;" value="' + val + '" ' +
	                           'placeholder="年/月/日" ' +
	                           'onblur="updateProductionDate(this, ' + index + ')" ' +
	                           'onkeypress="if(event.keyCode==13){this.blur();return false;}" ' +
	                           'data-field="productionDate" data-index="' + index + '" />';
	                }
	            }, {
	                field: 'mainBarcode',
	                title: '主条码',
	                align: 'left',
	                width: 300,
	                cellStyle: function() {
	                    return { css: { 'white-space': 'normal', 'word-break': 'break-all', 'vertical-align': 'top' } };

	    // 更新数量
	    function updateQuantity(input, index) {
	        var value = $(input).val();
	        if (value && (isNaN(value) || parseFloat(value) < 0)) {
	            $.modal.alertWarning('数量必须是大于等于0的数字');
	            $(input).focus();
	            return;
	        }
	        var $tr = $(input).closest('tr');
	        var data = $('#detail-table').bootstrapTable('getData');
	        var rowIndex = $tr.data('index') !== undefined ? $tr.data('index') : index;
	        if (data[rowIndex]) {
	            var oldQty = parseFloat(data[rowIndex].deliveryQuantity || 0);
	            var newVal = value ? parseFloat(value) : 0;
	            data[rowIndex].deliveryQuantity = newVal;
	            var gk = deliveryLineGroupKey(data[rowIndex]);
	            if (gk && data[rowIndex].lineApplyQty != null && data[rowIndex].lineApplyQty !== '') {
	                var cap = parseFloat(data[rowIndex].lineApplyQty);
	                if (!isNaN(cap) && cap >= 0) {
	                    var sum = sumDeliveryQtyForGroup(data, gk);
	                    if (sum > cap + 1e-6) {
	                        data[rowIndex].deliveryQuantity = oldQty;
	                        $(input).val(oldQty.toFixed(2));
	                        $.modal.alertWarning('同一订单明细行配送数量合计不能超过申请数量（' + cap.toFixed(2) + '）');
	                        return;
	                    }
	                }
	            }
	            var qty = parseFloat(data[rowIndex].deliveryQuantity || 0);
	            var price = parseFloat(data[rowIndex].price || 0);
	            data[rowIndex].amount = qty * price;
	            var amountCell = $tr.find('td[data-field="amount"]');
	            amountCell.text('¥' + (qty * price).toFixed(2));
	        }
	    }

        function submitHandler() {
	        if ($.validate.form()) {
	            // 获取表格中的所有明细数据
	            var detailData = $('#detail-table').bootstrapTable('getData');
	            
	            var caps = {};
	            for (var j = 0; j < detailData.length; j++) {
	                var d0 = detailData[j];
	                var gk0 = deliveryLineGroupKey(d0);
	                if (gk0 && d0.lineApplyQty != null && d0.lineApplyQty !== '' && caps[gk0] === undefined) {
	                    caps[gk0] = parseFloat(d0.lineApplyQty);
	                }
	            }
	            for (var gk1 in caps) {
	                if (!isNaN(caps[gk1])) {
	                    var s0 = sumDeliveryQtyForGroup(detailData, gk1);
	                    if (s0 > caps[gk1] + 1e-6) {
	                        $.modal.alertWarning('同一订单明细行配送数量合计不能超过申请数量（' + caps[gk1].toFixed(2) + '）');
	                        return;
	                    }
	                }
	            }
	            for (var i = 0; i < detailData.length; i++) {
	                var detail = detailData[i];
	                if (detail.quantity !== undefined && detail.deliveryQuantity === undefined) {
	                    detail.deliveryQuantity = detail.quantity;
	                    delete detail.quantity;
	                }
	                var qty = parseFloat(detail.deliveryQuantity || 0);
	                var price = parseFloat(detail.price || 0);
	                detail.amount = qty * price;
	                delete detail.lineApplyQty;
	            }
	            
	            // 序列化表单数据
	            var formData = $("#form-delivery-edit").serializeArray();
	            
	            // 处理空字符串：将空字符串转换为 null（不传递该字段）
	            formData = formData.filter(function(item) {
	                // 对于 hospitalId 和 supplierId，如果值为空字符串，则不传递
	                if ((item.name === 'hospitalId' || item.name === 'supplierId') && item.value === '') {
	                    return false;
	                }
	                return true;
	            });
	            
	            // 添加明细数据（作为JSON字符串）
	            formData.push({
	                name: 'deliveryDetailsJson',
	                value: JSON.stringify(detailData)
	            });
	            
	            // 使用自定义保存逻辑，保存成功后不关闭标签页
	            $.modal.loading("正在处理中，请稍候...");
	            $.ajax({
	                url: prefix + "/edit",
	                type: "post",
	                dataType: "json",
	                data: formData,
	                beforeSend: function (xhr, settings) {
	                    var csrftoken = $('meta[name=csrf-token]').attr('content');
	                    if (($.common.equalsIgnoreCase(settings.type, "POST"))) {
	                        xhr.setRequestHeader("X-CSRF-Token", csrftoken);
	                    }
	                },
	                success: function(result) {
	                    $.modal.closeLoading();
	                    if (result.code == web_status.SUCCESS) {
	                        $.modal.msgSuccess(result.msg);
	                        // 保存成功后，刷新当前页面数据，但不关闭标签页
	                        setTimeout(function() {
	                            // 重新加载页面以获取最新数据
	                            window.location.reload();
	                        }, 1000);
	                    } else if (result.code == web_status.WARNING) {
	                        $.modal.alertWarning(result.msg);
	                    } else {
	                        $.modal.alertError(result.msg);
	                    }
	                },
	                error: function(xhr, status, error) {
	                    $.modal.closeLoading();
	                    // 检查是否是登录超时
	                    if (xhr.status == 401 || xhr.status == 403 || (xhr.responseJSON && xhr.responseJSON.code == 401)) {
	                        $.modal.alertError("登录已超时，请重新登录", function() {

	                        });
	                    } else {
	                        $.modal.alertError("保存失败：" + (error || "未知错误"));
	                    }
	                }
	            });
	        }
	    }

	                                    var detail = order.orderDetails[i];
	                                    var deliveryDetail = {
	                                        orderDetailId: detail.detailId || null,
	                                        materialId: detail.materialId || null,
	                                        materialCode: detail.materialCode || '',
	                                        materialName: detail.materialName || '',
	                                        specification: detail.specification || '',
	                                        model: detail.model || '',
	                                        unit: detail.unit || '',
	                                        remainingQuantity: detail.remainingQuantity || detail.orderQuantity || 0,
	                                        deliveryQuantity: detail.remainingQuantity || detail.orderQuantity || 0,
	                                        lineApplyQty: parseFloat(detail.orderQuantity != null ? detail.orderQuantity : 0),
	                                        price: detail.purchasePrice || 0,
	                                        amount: detail.amount || (detail.purchasePrice * (detail.remainingQuantity || detail.orderQuantity || 0)) || 0,
	                                        packCoefficient: detail.packCoefficient != null ? detail.packCoefficient : null,
	                                        batchNo: '',
	                                        mainBarcode: '',
	                                        auxBarcode: '',
	                                        productionDate: '',
	                                        expireDate: '',
	                                        manufacturer: detail.manufacturer || '',
	                                        registerNo: detail.registerNo || ''
	                                    };
	                                    detailData.push(deliveryDetail);
	                                }
	                                // 清空现有数据并加载新数据
	                                $('#detail-table').bootstrapTable('load', detailData);
	                            } else {
	                                // 如果没有明细，清空表格
	                                $('#detail-table').bootstrapTable('load', []);
	                            }
	                            
	                            $.modal.close(index);
	                            $.modal.msgSuccess("订单信息已引入");
	                        } else {
	                            $.modal.alertError(result.msg || "获取订单信息失败");
	                        }
	                    },
	                    error: function() {
	                        $.modal.alertError("获取订单信息失败");
	                    }
	                });
	                return false;
	            }
	        };
	        $.modal.openOptions(options);
	    }
	    
	    // 关闭页面，返回上一级
	    function closeItem() {
	        // 如果在iframe中，优先使用关闭标签页的方式
	        if (window.parent && window.parent !== window) {
	            try {
	                // 优先使用layer关闭iframe
	                var index = parent.layer.getFrameIndex(window.name);
	                if (index) {
	                    parent.layer.close(index);
	                    return;
	                }
	            } catch(e) {
	                console.log("layer关闭失败:", e);
	            }
	            
	            try {
	                // 尝试直接调用全局的closeItem函数
	                if (typeof window.parent.closeItem === 'function') {
	                    window.parent.closeItem();
	                    return;
	                }
	            } catch(e) {
	                console.log("调用父窗口closeItem失败:", e);
	            }
	            
	            try {
	                // 如果closeItem不可用，尝试直接使用common.js中的逻辑
	                var topWindow = $(window.parent.document);
	                
	                // 点击当前活动标签页的关闭按钮（X图标）
	                var closeBtn = $('.page-tabs-content .active i', topWindow);
	                if (closeBtn.length > 0) {
	                    closeBtn.click();
	                    return;
	                }
	                
	                // 尝试通过data-id关闭标签页
	                var panelUrl = window.frameElement ? window.frameElement.getAttribute('data-panel') : null;
	                if (panelUrl) {
	                    $('.menuTab[data-id="' + panelUrl + '"]', topWindow).find('i').click();
	                    return;
	                }
	            } catch(e) {
	                console.log("关闭标签页失败:", e);
	            }
	        }
	        
	        // 如果不在iframe中，尝试跳转到配送单列表页
	        try {
	            window.location.href = ctx + "delivery/delivery";
	        } catch(e) {
	            console.log("跳转失败:", e);
	        }
	    }
    </script>
</body>
