	<th:block th:include="include :: bootstrap-table-resizable-js" />
	<script th:inline="javascript">
	    var prefix = ctx + "delivery/delivery";
	    var DETAIL_OPERATION_COL_WIDTH = 175;
	    var DETAIL_VSCROLL_GUTTER = 10;
	    var DETAIL_ROW_HEIGHT = 44;
	    var DETAIL_HSCROLL_GUTTER = 14;
	    var detailColumnWidths = {};
	    var DETAIL_COL_RESIZE_SKIP = { btSelectItem: 1, index: 1, operation: 1 };

	    /** 顶部总金额 = 明细金额合计（只读展示） */
	    function syncDeliveryAmountFromDetails() {
	        var $table = $('#detail-table');
	        if (!$table.length) {
	            return;
	        }
	        var opt = $table.bootstrapTable('getOptions');
	        if (!opt) {
	            return;
	        }
	        var data = $table.bootstrapTable('getData') || [];
	        var totalAmount = 0;
	        for (var i = 0; i < data.length; i++) {
	            var row = data[i];
	            var amt = parseFloat(row.amount);
	            if (isNaN(amt)) {
	                var q = parseFloat(row.deliveryQuantity);
	                var p = parseFloat(row.price);
	                if (isNaN(q)) {
	                    q = 0;
	                }
	                if (isNaN(p)) {
	                    p = 0;
	                }
	                amt = q * p;
	            }
	            totalAmount += amt;
	        }
	        $("input[name='deliveryAmount']").val(totalAmount.toFixed(2));
	    }

	    function escapeHtmlForBarcode(s) {
	        if (s == null || s === '') return '';
	        return String(s)
	            .replace(/&/g, '&amp;')
	            .replace(/</g, '&lt;')
	            .replace(/>/g, '&gt;');
	    }

	    function escapeAttrForInput(s) {
	        return escapeHtmlForBarcode(s).replace(/"/g, '&quot;');
	    }

	    /** 数量类字段：展示为非负整数 */
	    function formatDetailInteger(value) {
	        if (value === '' || value === null || value === undefined) {
	            return '0';
	        }
	        var n = parseFloat(value);
	        if (isNaN(n)) {
	            return '0';
	        }
	        return String(Math.round(n));
	    }

	    function parseDetailInteger(value) {
	        if (value === '' || value === null || value === undefined) {
	            return null;
	        }
	        var n = parseFloat(value);
	        if (isNaN(n)) {
	            return null;
	        }
	        return Math.round(n);
	    }

	    function isDetailNonNegIntegerString(trimmed) {
	        return trimmed === '' || /^\d+$/.test(trimmed);
	    }

	    function detailQuantityInputEvents(index) {
	        return 'onblur="updateQuantity(this, ' + index + ')" ' +
	               'oninput="this.value=this.value.replace(/[^\\d]/g,\'\')" ' +
	               'onkeypress="if(event.keyCode==13){this.blur();return false;}"';
	    }

	    function detailCellTextHtml(value) {
	        if (value == null || value === '') {
	            return '';
	        }
	        var s = String(value);
	        return '<span class="detail-cell-text" title="' + escapeAttrForInput(s) + '">' + escapeHtmlForBarcode(s) + '</span>';
	    }

	    function applyDetailColumnWidthFromHeader() {
	        var $bt = $('#detail-table').closest('.bootstrap-table');
	        var $headTable = $bt.find('.fixed-table-header table').first();
	        var $bodyTable = $bt.find('.fixed-table-body table').first();
	        if (!$headTable.length || !$bodyTable.length) {
	            return;
	        }
	        var totalW = 0;
	        $headTable.find('thead th[data-field]').each(function () {
	            var field = $(this).data('field');
	            if (!field || DETAIL_COL_RESIZE_SKIP[field]) {
	                return;
	            }
	            var w = Math.ceil($(this).outerWidth());
	            if (w < 40) {
	                w = 40;
	            }
	            var ws = w + 'px';
	            detailColumnWidths[field] = w;
	            $(this).css({ width: ws, minWidth: ws, maxWidth: 'none' });
	            $bodyTable.find('td[data-field="' + field + '"]').css({ width: ws, minWidth: ws, maxWidth: 'none' });
	            totalW += w;
	        });
	        if (totalW > 0) {
	            var tw = totalW + 'px';
	            $headTable.css('width', tw);
	            $bodyTable.css('width', tw);
	        }
	        updateDetailHscrollRailSize();
	    }

	    function initDetailHeaderColumnResize() {
	        if (typeof $.fn.resizableColumns !== 'function') {
	            return;
	        }
	        var $headTable = $('#detail-table').closest('.bootstrap-table').find('.fixed-table-header table').first();
	        if (!$headTable.length) {
	            return;
	        }
	        if ($headTable.data('resizableColumns')) {
	            $headTable.data('resizableColumns').destroy();
	        }
	        $headTable.resizableColumns({
	            store: false,
	            resizeFromBody: false,
	            selector: 'thead tr:first > th[data-field]:not([data-noresize])',
	            resize: function () {
	                applyDetailColumnWidthFromHeader();
	            },
	            stop: function () {
	                applyDetailColumnWidthFromHeader();
	                scheduleDetailHeaderAlign();
	            }
	        });
	    }

	    function detailTextInputHtml(value, index, maxlength, blurFn) {
	        var safe = escapeAttrForInput(value != null ? String(value) : '');
	        return '<input type="text" class="form-control input-sm detail-text-input" value="' + safe + '" ' +
	               'maxlength="' + maxlength + '" onblur="' + blurFn + '(this, ' + index + ')" ' +
	               'onkeypress="if(event.keyCode==13){this.blur();return false;}" />';
	    }

	    function formatDetailDateValue(value) {
	        if (!value) {
	            return '';
	        }
	        if (typeof value === 'string') {
	            return value.length >= 10 ? value.substring(0, 10) : value;
	        }
	        var date = new Date(value);
	        if (isNaN(date.getTime())) {
	            return '';
	        }
	        return date.getFullYear() + '-' +
	            String(date.getMonth() + 1).padStart(2, '0') + '-' +
	            String(date.getDate()).padStart(2, '0');
	    }

	    function detailDateInputHtml(value, index, field, blurFn) {
	        var safe = escapeAttrForInput(formatDetailDateValue(value));
	        return '<input type="text" class="form-control input-sm detail-date-input date-input" value="' + safe + '" ' +
	               'placeholder="年/月/日" data-field="' + field + '" data-index="' + index + '" ' +
	               'onblur="' + blurFn + '(this, ' + index + ')" ' +
	               'onkeypress="if(event.keyCode==13){this.blur();return false;}" />';
	    }

	    function getDeliveryDetailTableMinWidth() {
	        var sum = 0;
	        var opt = $('#detail-table').bootstrapTable('getOptions');
	        if (opt && opt.columns && opt.columns[0]) {
	            $.each(opt.columns[0], function (_, col) {
	                if (!col || col.field === 'operation') {
	                    return;
	                }
	                if (col.checkbox) {
	                    sum += parseInt(col.width, 10) || 42;
	                    return;
	                }
	                if (col.width) {
	                    sum += parseInt(col.width, 10) || 0;
	                }
	            });
	        }
	        return sum > 0 ? sum + 8 : 800;
	    }

	    function applyDeliveryDetailTableMinWidth() {
	        var w = getDeliveryDetailTableMinWidth() + 'px';
	        var $container = $('#detail-table').closest('.bootstrap-table').find('.fixed-table-container').first();
	        if (!$container.length) {
	            return;
	        }
	        $container.children('.fixed-table-header').find('table').css('min-width', w);
	        $container.children('.fixed-table-body').children('table').css('min-width', w);
	    }

	    var detailTableLayoutTimer = null;
	    var detailTableLayoutLock = false;

	    var DETAIL_WRAP_MIN_HEIGHT = 620;
	    var DETAIL_HSCROLL_RAIL_HEIGHT = 16;

	    function getDetailTableScrollWidth($mainBody) {
	        var $table = $mainBody.children('table');
	        if ($table.length) {
	            return Math.max($table[0].scrollWidth, $table[0].offsetWidth);
	        }
	        return $mainBody[0].scrollWidth;
	    }

	    /** 明细区：按 iframe 可视底边计算高度，避免 100vh / 最小高度把底部横滚条挤出可视区 */
	    function layoutDeliveryAddDetailWrapHeight() {
	        var $page = $('.delivery-form-main');
	        var $section = $page.children('.delivery-detail-section');
	        var $wrap = $('#delivery-detail-list-section');
	        if (!$page.length || !$wrap.length || !$section.length) {
	            return;
	        }
	        var docEl = document.documentElement;
	        var viewH = (docEl && docEl.clientHeight) ? docEl.clientHeight : (window.innerHeight || 0);
	        var pageBottom = Math.min($page[0].getBoundingClientRect().bottom, viewH);
	        var sectionTop = $section[0].getBoundingClientRect().top;
	        var sectionH = Math.floor(pageBottom - sectionTop - 4);
	        if (sectionH < 100) {
	            sectionH = 100;
	        }
	        $section.css({
	            display: 'flex',
	            flexDirection: 'column',
	            flex: '1 1 0%',
	            minHeight: '0',
	            height: sectionH + 'px',
	            maxHeight: sectionH + 'px',
	            overflow: 'hidden',
	            boxSizing: 'border-box'
	        });
	        var secStyle = window.getComputedStyle($section[0]);

	    function deliveryDetailOperationHtml(rowIndex) {

	    function deliveryLineGroupKey(row) {
	        if (!row) return '';
	        if (row.orderDetailId != null && row.orderDetailId !== '') return 'o:' + row.orderDetailId;
	        if (row.zsOrderDetailId) return 'z:' + row.zsOrderDetailId;
	        return '';
	    }
	    function sumDeliveryQtyForGroup(data, groupKey) {
	        if (!groupKey) return null;
	        var s = 0;
	        for (var i = 0; i < data.length; i++) {
	            if (deliveryLineGroupKey(data[i]) === groupKey) {
	                var v = data[i].deliveryQuantity;
	                if (v === '' || v === null || v === undefined) continue;
	                var x = parseFloat(v);
	                s += isNaN(x) ? 0 : x;
	            }
	        }
	        return s;
	    }
	    /** 提交前剔除 bootstrap-table 复选框等内部字段，避免 JSON 含 "0":false 导致后端反序列化失败 */
	    function sanitizeDeliveryDetailRowsForSave(rows) {
	        var strip = { btSelectItem: 1, state: 1, index: 1 };
	        var out = [];
	        for (var i = 0; i < rows.length; i++) {
	            var row = rows[i];
	            var clean = {};
	            for (var k in row) {
	                if (!Object.prototype.hasOwnProperty.call(row, k)) continue;
	                if (strip[k] || /^\d+$/.test(k)) continue;
	                clean[k] = row[k];
	            }
	            out.push(clean);
	        }
	        return out;
	    }
	    function resolveDetailRowIndex(btn, indexHint) {
	        if (btn) {
	            var $tr = $(btn).closest('tr');
	            var ri = $tr.data('index');
	            if (ri === undefined || ri === null) {
	                ri = $tr.attr('data-index');
	            }
	            if (ri !== undefined && ri !== null && ri !== '') {
	                var parsed = parseInt(ri, 10);
	                if (!isNaN(parsed) && parsed >= 0) {
	                    return parsed;
	                }
	            }
	        }
	        if (indexHint !== undefined && indexHint !== null && String(indexHint) !== '') {
	            var p2 = parseInt(indexHint, 10);
	            if (!isNaN(p2) && p2 >= 0) {
	                return p2;
	            }
	        }
	        return -1;
	    }
	    window.copyDetailRowByIndex = function(btn, indexHint) {
	        var snapshot = $('#detail-table').bootstrapTable('getData');
	        var rowIndex = resolveDetailRowIndex(btn, indexHint);
	        if (!snapshot || rowIndex < 0 || rowIndex >= snapshot.length) {
	            $.modal.alertWarning('无法定位要复制的行，请刷新页面后重试。');
	            return;
	        }
	        var allData = snapshot.slice();
	        var row = allData[rowIndex];
	        var pack = row.packCoefficient != null && row.packCoefficient !== '' ? parseFloat(row.packCoefficient) : NaN;
	        var rawDq = row.deliveryQuantity;
	        var dqNum = (rawDq === '' || rawDq === null || rawDq === undefined) ? NaN : parseFloat(rawDq);
	        var eps = 1e-6;
	        function reloadAfterCopy() {
	            for (var i = 0; i < allData.length; i++) {
	                var q = parseFloat(allData[i].deliveryQuantity);
	                if (isNaN(q)) {
	                    q = 0;
	                }
	                var p = parseFloat(allData[i].price || 0);
	                allData[i].amount = q * p;
	            }

	        if (data[rowIndex]) {
	            var oldQtyRaw = data[rowIndex].deliveryQuantity;
	            var newVal = trimmed === '' ? '' : parseInt(trimmed, 10);
	            data[rowIndex].deliveryQuantity = newVal;
	            var gk = deliveryLineGroupKey(data[rowIndex]);
	            if (gk && data[rowIndex].lineApplyQty != null && data[rowIndex].lineApplyQty !== '') {
	                var cap = parseFloat(data[rowIndex].lineApplyQty);

	                    var sum = sumDeliveryQtyForGroup(data, gk);
	                    if (sum > cap + 1e-6) {
	                        data[rowIndex].deliveryQuantity = oldQtyRaw;
	                        if (oldQtyRaw === '' || oldQtyRaw === null || oldQtyRaw === undefined) {
	                            $(input).val('');

	                        }

	                        return;
	                    }
	                }
	            }
	            if (trimmed !== '') {
	                $(input).val(String(newVal));
	            }
	            var qty = (newVal === '' || newVal === null || newVal === undefined) ? 0 : parseInt(newVal, 10);
	            if (isNaN(qty)) qty = 0;

	    function parseDetailDateOnly(str) {
	        if (!str || !String(str).trim()) {
	            return null;
	        }
	        var s = String(str).trim().substring(0, 10);
	        var parts = s.split('-');
	        if (parts.length < 3) {
	            return null;
	        }
	        var y = parseInt(parts[0], 10);
	        var m = parseInt(parts[1], 10);
	        var d = parseInt(parts[2], 10);
	        if (isNaN(y) || isNaN(m) || isNaN(d)) {
	            return null;
	        }
	        var dt = new Date(y, m - 1, d);
	        if (dt.getFullYear() !== y || dt.getMonth() !== m - 1 || dt.getDate() !== d) {
	            return null;
	        }
	        return dt;
	    }

	        var t = new Date();
	        return new Date(t.getFullYear(), t.getMonth(), t.getDate());
	    }

	        }
	        var oldValue = data[rowIndex].productionDate || '';
	        var parsed = parseDetailDateOnly(value);
	        if (parsed) {
	            var today = getDetailTodayDate();
	            if (parsed.getTime() > today.getTime()) {
	                if (!window.confirm('生产日期大于当前日期，是否要继续？')) {
	                    $(input).val(formatDetailDateValue(oldValue));

	        data[rowIndex].productionDate = value ? String(value).trim().substring(0, 10) : '';
	    }

        /** 保存前将批号/日期/条码等输入框当前值同步到行数据（避免未失焦时 getData 仍是旧值） */
        function syncDetailEditableFieldsFromDom() {
            var $table = $('#detail-table');
            if (!$table.length) {
                return [];
            }
            var data = [];
            try {
                data = $table.bootstrapTable('getData') || [];
            } catch (e) {
                return [];
            }
            var $mainBody = $table.closest('.bootstrap-table').find('.fixed-table-container > .fixed-table-body').first();
            $mainBody.find('tbody tr').each(function () {
                var idx = $(this).data('index');
                if (idx === undefined || idx === null || !data[idx]) {
                    return;
                }
                var row = data[idx];
                var $tr = $(this);
                var batchIn = $tr.find('td[data-field="batchNo"] input');
                if (batchIn.length) {
                    row.batchNo = batchIn.val() || '';
                }
                var prodIn = $tr.find('td[data-field="productionDate"] input');
                if (prodIn.length) {
                    row.productionDate = prodIn.val() ? String(prodIn.val()).trim().substring(0, 10) : '';
                }
                var expIn = $tr.find('td[data-field="expireDate"] input');
                if (expIn.length) {
                    row.expireDate = expIn.val() ? String(expIn.val()).trim().substring(0, 10) : '';
                }
                var mainIn = $tr.find('td[data-field="mainBarcode"] input');
                if (mainIn.length) {
                    row.mainBarcode = mainIn.val() || '';
                }
                var auxIn = $tr.find('td[data-field="auxBarcode"] input');
                if (auxIn.length) {
                    row.auxBarcode = auxIn.val() || '';
                }
            });
            return data;
        }

        function normalizeDetailDateFieldsForSave(rows) {
            if (!rows || !rows.length) {
                return;
            }
            for (var i = 0; i < rows.length; i++) {
                var row = rows[i];
                if (!row) {
                    continue;
                }
                if (row.productionDate) {
                    row.productionDate = String(row.productionDate).trim().substring(0, 10);
                } else {
                    row.productionDate = '';
                }
                if (row.expireDate) {
                    row.expireDate = String(row.expireDate).trim().substring(0, 10);
                } else {
                    row.expireDate = '';
                }
            }
        }

        function submitHandler() {
	        if ($.validate.form()) {
	            // 获取表格中的所有明细数据（含未失焦的批号/日期输入）
	            var detailData = syncDetailEditableFieldsFromDom();
	            normalizeDetailDateFieldsForSave(detailData);

	            // 校验：配送数量为0（或未填写）的明细行，提示具体行号，要求完善或删除后再保存
	            var zeroQtyRows = [];
	            for (var z = 0; z < detailData.length; z++) {
	                var zq = parseFloat(detailData[z].deliveryQuantity);
	                if (isNaN(zq) || zq === 0) {
	                    zeroQtyRows.push(z + 1);
	                }
	            }
	            if (zeroQtyRows.length > 0) {
	                $.modal.alertWarning('第 ' + zeroQtyRows.join('、') + ' 行配送数量为0，请完善配送数量或删除明细后再进行保存操作');
	                return;
	            }

	            var caps = {};
	            for (var j = 0; j < detailData.length; j++) {
	                var d0 = detailData[j];
	                var gk0 = deliveryLineGroupKey(d0);
	                if (gk0 && d0.lineApplyQty != null && d0.lineApplyQty !== '' && caps[gk0] === undefined) {
	                    caps[gk0] = parseFloat(d0.lineApplyQty);
	                }
	            }
	            for (var gk1 in caps) {
	                if (!isNaN(caps[gk1])) {
	                    var s0 = sumDeliveryQtyForGroup(detailData, gk1);
	                    if (s0 > caps[gk1] + 1e-6) {
	                        $.modal.alertWarning('同一订单明细行配送数量合计不能超过申请数量（' + formatDetailInteger(caps[gk1]) + '）');
	                        return;
	                    }
	                }
	            }
	            for (var i = 0; i < detailData.length; i++) {
	                var detail = detailData[i];
	                if (detail.quantity !== undefined && detail.deliveryQuantity === undefined) {
	                    detail.deliveryQuantity = detail.quantity;
	                    delete detail.quantity;
	                }
	                var qty = parseFloat(detail.deliveryQuantity || 0);
	                var price = parseFloat(detail.price || 0);
	                detail.amount = qty * price;
	                delete detail.lineApplyQty;
	            }
	            
	            // 序列化表单数据
	            var formData = $("#form-delivery-edit").serializeArray();
	            
	            // 处理空字符串：将空字符串转换为 null（不传递该字段）
	            formData = formData.filter(function(item) {
	                // 对于 hospitalId 和 supplierId，如果值为空字符串，则不传递
	                if ((item.name === 'hospitalId' || item.name === 'supplierId') && item.value === '') {
	                    return false;
	                }
	                return true;
	            });
	            
	            // 添加明细数据（作为JSON字符串）
	            formData.push({
	                name: 'deliveryDetailsJson',
	                value: JSON.stringify(sanitizeDeliveryDetailRowsForSave(detailData))
	            });
	            
	            // 使用自定义保存逻辑，保存成功后不关闭标签页
	            $.modal.loading("正在处理中，请稍候...");
	            $.ajax({
	                url: prefix + "/edit",
	                type: "post",
	                dataType: "json",
	                data: formData,
	                beforeSend: function (xhr, settings) {
	                    var csrftoken = $('meta[name=csrf-token]').attr('content');
	                    if (($.common.equalsIgnoreCase(settings.type, "POST"))) {
	                        xhr.setRequestHeader("X-CSRF-Token", csrftoken);
	                    }
	                },
	                success: function(result) {
	                    $.modal.closeLoading();
	                    if (result.code == web_status.SUCCESS) {
	                        $.modal.msgSuccess(result.msg);
	                        // 保存成功后，刷新当前页面数据，但不关闭标签页
	                        setTimeout(function() {
	                            // 重新加载页面以获取最新数据
	                            window.location.reload();
	                        }, 1000);
	                    } else if (result.code == web_status.WARNING) {
	                        $.modal.alertWarning(result.msg);
	                    } else {
	                        $.modal.alertError(result.msg);
	                    }
	                },
	                error: function(xhr, status, error) {
	                    $.modal.closeLoading();
	                    // 检查是否是登录超时
	                    if (xhr.status == 401 || xhr.status == 403 || (xhr.responseJSON && xhr.responseJSON.code == 401)) {
	                        $.modal.alertError("登录已超时，请重新登录", function() {
	                            top.location.href = ctx + "login";
	                        });
	                    } else {
	                        $.modal.alertError("保存失败：" + (error || "未知错误"));
	                    }
	                }
	            });
	        }
	    }

	    function exportAcceptanceExcelSlip() {
	        var deliveryId = $("input[name='deliveryId']").val();
	        if (!deliveryId) {
	            $.modal.msgWarning("配送单ID不存在，无法导出");
	            return;
	        }
	        $.modal.loading('正在导出验收单 Excel，请稍候...');
	        var body = new URLSearchParams();
	        body.append('exportMode', 'selected');
	        body.append('ids', deliveryId);
	        body.append('orderByColumn', 'createTime');
	        body.append('isAsc', 'desc');
	        var headers = { 'X-Requested-With': 'XMLHttpRequest' };
	        var csrftoken = $('meta[name=csrf-token]').attr('content');
	        if (csrftoken) {
	            headers['X-CSRF-Token'] = csrftoken;
	        }
	        fetch(prefix + '/printAcceptanceExportExcel', {
	            method: 'POST',
	            headers: headers,
	            body: body,
	            credentials: 'same-origin'
	        }).then(function(response) {
	            $.modal.closeLoading();
	            var ctype = (response.headers.get('Content-Type') || '').toLowerCase();
	            if (ctype.indexOf('application/json') !== -1) {
	                return response.json().then(function(result) {
	                    if (result.code == web_status.SUCCESS && result.msg) {
	                        window.location.href = ctx + 'common/download?fileName=' + encodeURIComponent(result.msg) + '&delete=' + true;
	                    } else if (result.code == web_status.WARNING) {
	                        $.modal.alertWarning(result.msg);
	                    } else {
	                        $.modal.alertError(result.msg || '导出失败');
	                    }
	                });
	            }
	            if (!response.ok) {
	                return response.text().then(function(text) {
	                    try {
	                        var err = JSON.parse(text);
	                        $.modal.alertError(err.msg || '导出失败');
	                    } catch (e2) {
	                        $.modal.alertError('导出失败（HTTP ' + response.status + '）');
	                    }
	                });
	            }
	            return response.blob().then(function(blob) {
	                var fileName = '';
	                var cd = response.headers.get('Content-Disposition') || response.headers.get('content-disposition');
	                if (cd) {
	                    var m = cd.match(/filename\*=utf-8''([^;]+)/i);
	                    if (m && m[1]) {
	                        try { fileName = decodeURIComponent(m[1].trim()); } catch (e0) { fileName = m[1].trim(); }
	                    }
	                }
	                if (!fileName) {
	                    var d = new Date();
	                    var p = function(n) { return (n < 10 ? '0' : '') + n; };
	                    fileName = '配送单验收单样式_' + d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate())
	                        + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds()) + '.xlsx';
	                }
	                var blobUrl = window.URL.createObjectURL(blob);
	                var a = document.createElement('a');
	                a.href = blobUrl;
	                a.download = fileName;
	                document.body.appendChild(a);
	                a.click();
	                document.body.removeChild(a);
	                window.URL.revokeObjectURL(blobUrl);
	                $.modal.msgSuccess('导出成功');
	            });
	        }).catch(function() {
	            $.modal.closeLoading();
	            $.modal.alertError('导出失败');
	        });
	    }

	    /** 本系统订单行：可再申请配送数量（已扣已审核配送、待审核配送、已拒绝） */
	    function scmOrderDetailDeliveryCap(detail) {
	        if (!detail) {
	            return 0;
	        }
	        if (detail.undeliveredQty != null && detail.undeliveredQty !== '') {
	            var u = parseFloat(detail.undeliveredQty);
	            if (!isNaN(u) && u >= 0) {
	                return u;
	            }
	        }
	        var oq = detail.orderQuantity != null ? parseFloat(detail.orderQuantity) : 0;
	        var a = detail.deliveredAuditedQty != null ? parseFloat(detail.deliveredAuditedQty) : 0;
	        var p = detail.deliveredPendingAuditQty != null ? parseFloat(detail.deliveredPendingAuditQty) : 0;
	        var cap = oq - a - p;
	        if (isNaN(cap) || cap < 0) {
	            return 0;
	        }
	        return cap;
	    }
	    
	    // 引入订单 - 打开订单选择对话框
	    function importOrder() {
	        var options = {
	            title: '选择订单',
	            url: ctx + "order/order/select",
	            width: "1280",
	            height: "720",
	            btn: 0,
	            callBack: function(index, layero, selectedRowIds) {
	                var orderId = selectedRowIds;
	                if (!orderId || orderId === '') {
	                    var body = $.modal.getChildFrame(index);
	                    orderId = body.find('#rowIds').val();
	                }
	                if (!orderId || orderId == '') {
	                    $.modal.alertWarning("请至少选择一条记录");
	                    return false;
	                }
	                var closeLayer = function() {
	                    var layerIndex = index || window.__deliveryOrderLayerIndex;
	                    try {
	                        if (!layerIndex && window.top) {
	                            layerIndex = window.top.__deliveryOrderLayerIndex;
	                        }
	                    } catch (e) { /* ignore */ }
	                    if (layerIndex) {
	                        top.layer.close(layerIndex);
	                    }
	                    window.__deliveryOrderLayerIndex = null;
	                    try {
	                        window.top.__deliveryOrderLayerIndex = null;
	                        delete window.top.__deliveryOrderCallBack;
	                        delete window.top.__deliveryOrderOpenerWin;
	                    } catch (e) { /* ignore */ }
	                    delete window.__deliveryOrderCallBack;
	                    delete window.__deliveryOrderOpenerWin;
	                };

	                // 获取选中的订单ID（只取第一个）
	                var ids = orderId.split(',');
	                var selectedOrderId = ids[0];
	                
	                // 通过AJAX获取订单详细信息（专用引用订单接口：服务端已过滤掉配送数量达到申请数量的明细）
	                $.ajax({
	                    url: prefix + "/selectOrder/" + selectedOrderId,
	                    type: "GET",
	                    dataType: "json",
	                    success: function(result) {
	                        if (result.code == 0 && result.data) {
	                            var order = result.data;
	                            $("#zsOrderId").val('');
	                            $("#zsCustomerId").val('');
	                            if (order.orderId) {
	                                $("#orderId").val(order.orderId);
	                            } else {
	                                $("#orderId").val('');
	                            }
	                            $("#srcOrderSupplierId").val(order.supplierId != null && order.supplierId !== '' ? String(order.supplierId) : '');
	                            $("#srcOrderSupplierName").val(order.orderSupplierName || order.supplierName || '');
	                            $("#srcOrderWarehouseId").val(order.warehouseId != null && order.warehouseId !== '' ? String(order.warehouseId) : '');
	                            $("#srcOrderWarehouseName").val(order.warehouse || '');
	                            $("#srcOrderDeptId").val(order.orderDeptId != null && order.orderDeptId !== '' ? String(order.orderDeptId) : '');
	                            $("#srcOrderDeptName").val(order.orderDeptName || order.department || '');
	                            // 填充表单字段
	                            if (order.orderNo) {
	                                $("input[name='orderNo']").val(order.orderNo);
	                            }
	                            if (order.hospitalId) {
	                                $("#hospitalId").val(order.hospitalId);
	                            }
	                            if (order.supplierId) {
	                                $("#supplierId").val(order.supplierId);
	                            }
	                            if (order.orderDate) {
	                                var orderDate = new Date(order.orderDate);
	                                var formattedDate = orderDate.getFullYear() + '-' + 
	                                    String(orderDate.getMonth() + 1).padStart(2, '0') + '-' + 
	                                    String(orderDate.getDate()).padStart(2, '0');
	                                $("#orderDateField").val(formattedDate);
	                            } else {
	                                $("#orderDateField").val('');
	                            }
	                            $("#warehouseField").val(order.warehouse || '');
	                            if (order.remark) {
	                                $("input[name='remark']").val(order.remark);
	                            }
	                            
	                            // 填充订单明细到详细信息列表
	                            if (order.orderDetails && order.orderDetails.length > 0) {
	                                var detailData = [];
	                                for (var i = 0; i < order.orderDetails.length; i++) {
	                                    var detail = order.orderDetails[i];
	                                    var cap = Math.round(scmOrderDetailDeliveryCap(detail));
	                                    if (isNaN(cap) || cap <= 0) {
	                                        continue;
	                                    }
	                                    var price = parseFloat(detail.purchasePrice) || 0;
	                                    var amt = price * cap;
	                                    if (isNaN(amt)) {
	                                        amt = 0;
	                                    }
	                                    var deliveryDetail = {
	                                        orderDetailId: detail.detailId || null,
	                                        materialId: detail.materialId == null || detail.materialId === '' ? null : detail.materialId,
	                                        materialCode: detail.materialCode || '',
	                                        materialName: detail.materialName || '',
	                                        specification: detail.specification || '',
	                                        model: detail.model || '',
	                                        unit: detail.unit || '',
	                                        refOrderLineQty: detail.orderQuantity != null ? parseFloat(detail.orderQuantity) : null,
	                                        remainingQuantity: cap,
	                                        deliveryQuantity: cap,
	                                        lineApplyQty: cap,
	                                        price: detail.purchasePrice || 0,
	                                        amount: amt,
	                                        packCoefficient: detail.packCoefficient != null ? detail.packCoefficient : null,
	                                        batchNo: '',
	                                        mainBarcode: '',
	                                        auxBarcode: '',
	                                        productionDate: '',
	                                        expireDate: '',
	                                        manufacturer: detail.manufacturer || '',
	                                        registerNo: detail.registerNo || '',
	                                        nationalInsuranceCode: '',
	                                        remark: detail.remark || ''
	                                    };
	                                    detailData.push(deliveryDetail);
	                                }
	                                if (order.orderDetails.length > 0 && detailData.length === 0) {
	                                    $.modal.msgWarning('该订单明细可配送数量均为0，未带入任何行');
	                                }
	                                // 清空现有数据并加载新数据
	                                $('#detail-table').bootstrapTable('load', detailData);
	                            } else {
	                                // 如果没有明细，清空表格
	                                $('#detail-table').bootstrapTable('load', []);
	                            }
	                            syncDeliveryAmountFromDetails();
	                            
	                            closeLayer();
	                            $.modal.msgSuccess("订单信息已引入");
	                        } else {
	                            $.modal.alertError(result.msg || "获取订单信息失败");
	                        }
	                    },
	                    error: function() {
	                        $.modal.alertError("获取订单信息失败");
	                    }
	                });
	            }
	        };
	        window.__deliveryOrderCallBack = options.callBack;
	        window.__deliveryOrderOpenerWin = window;
	        try {
	            window.top.__deliveryOrderCallBack = options.callBack;
	            window.top.__deliveryOrderOpenerWin = window;
	        } catch (e) { /* ignore */ }
	        $.modal.openOptions(options);
	    }
	    
	    // 关闭页面，返回上一级
	    function closeItem() {
	        // 如果在iframe中，优先使用关闭标签页的方式
	        if (window.parent && window.parent !== window) {
	            try {
	                // 优先使用layer关闭iframe
	                var index = parent.layer.getFrameIndex(window.name);
	                if (index) {
	                    parent.layer.close(index);
	                    return;
	                }
	            } catch(e) {
	                console.log("layer关闭失败:", e);
	            }
	            
	            try {
	                // 尝试直接调用全局的closeItem函数
	                if (typeof window.parent.closeItem === 'function') {
	                    window.parent.closeItem();
	                    return;
	                }
	            } catch(e) {
	                console.log("调用父窗口closeItem失败:", e);
	            }
	            
	            try {
	                // 如果closeItem不可用，尝试直接使用common.js中的逻辑
	                var topWindow = $(window.parent.document);
	                
	                // 点击当前活动标签页的关闭按钮（X图标）
	                var closeBtn = $('.page-tabs-content .active i', topWindow);
	                if (closeBtn.length > 0) {
	                    closeBtn.click();
	                    return;
	                }
	                
	                // 尝试通过data-id关闭标签页
	                var panelUrl = window.frameElement ? window.frameElement.getAttribute('data-panel') : null;
	                if (panelUrl) {
	                    $('.menuTab[data-id="' + panelUrl + '"]', topWindow).find('i').click();
	                    return;
	                }
	            } catch(e) {
	                console.log("关闭标签页失败:", e);
	            }
	        }
	        
	        // 如果不在iframe中，尝试跳转到配送单列表页
	        try {
	            window.location.href = ctx + "delivery/delivery";
	        } catch(e) {
	            console.log("跳转失败:", e);
	        }
	    }
