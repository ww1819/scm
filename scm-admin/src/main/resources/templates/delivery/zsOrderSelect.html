<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('选择第三方订单')" />
	<th:block th:include="include :: layout-latest-css" />
	<style>
		.select-list .select-time .scm-push-datetime { min-width: 172px; width: 172px; display: inline-block; vertical-align: middle; padding-left: 8px; height: 30px; line-height: 30px; border: 1px solid #e5e6e7; border-radius: 4px; }
		.order-select-sheet-bar {
			background: #fff;
			border: 1px solid #e7eaec;
			border-bottom: none;
			padding: 0 10px;
			margin-bottom: 0;
		}
		.order-select-sheet-bar .nav-tabs {
			border-bottom: 1px solid #e7eaec;
			margin-bottom: 0;
		}
		.order-select-sheet-bar .nav-tabs > li > a {
			padding: 10px 16px;
			color: #676a6c;
			border-radius: 0;
			margin-right: 2px;
		}
		.order-select-sheet-bar .nav-tabs > li.active > a,
		.order-select-sheet-bar .nav-tabs > li.active > a:hover,
		.order-select-sheet-bar .nav-tabs > li.active > a:focus {
			color: #1ab394;
			font-weight: 600;
			border: 1px solid #e7eaec;
			border-bottom-color: #fff;
			background: #fff;
		}
	</style>
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="zs-order-form">
					<input type="hidden" name="params[sheetTab]" id="sheetTab" value="none"/>
					<div class="select-list">
						<ul>
							<li>
								单号(DH)：<input type="text" name="dh" placeholder="模糊"/>
							</li>
							<li>
								医院：<input type="text" name="hospitalKeyword" placeholder="编码/名称/首拼简码"/>
							</li>
							<li>
								供应商：<input type="text" name="supplierKeyword" placeholder="编码/名称/首拼简码"/>
							</li>
							<li class="select-time">
								<label>推送时间范围：</label>
								<input type="text" class="scm-push-datetime" id="zsPushBegin" placeholder="开始 yyyy-MM-dd HH:mm:ss" name="params[pushBegin]" autocomplete="off"/>
								<span>-</span>
								<input type="text" class="scm-push-datetime" id="zsPushEnd" placeholder="结束 yyyy-MM-dd HH:mm:ss" name="params[pushEnd]" autocomplete="off"/>
							</li>
							<li>
								服务标识：<input type="text" name="customer"/>
							</li>
							<li>
								科室名称：<input type="text" name="ksmc"/>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="resetZs()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>

			<div class="col-sm-12 order-select-sheet-bar">
				<ul class="nav nav-tabs" id="zsOrderSheetTabs" role="tablist">
					<li role="presentation" class="active">
						<a href="javascript:void(0)" data-sheet="none" onclick="switchZsOrderSheet('none')">未配送</a>
					</li>
					<li role="presentation">
						<a href="javascript:void(0)" data-sheet="partial" onclick="switchZsOrderSheet('partial')">部分配送</a>
					</li>
					<li role="presentation">
						<a href="javascript:void(0)" data-sheet="done" onclick="switchZsOrderSheet('done')">全部配送</a>
					</li>
					<li role="presentation">
						<a href="javascript:void(0)" data-sheet="void" onclick="switchZsOrderSheet('void')">已作废</a>
					</li>
					<li role="presentation">
						<a href="javascript:void(0)" data-sheet="partialVoid" onclick="switchZsOrderSheet('partialVoid')">部分作废</a>
					</li>
				</ul>
			</div>

	        <div class="col-sm-12 select-table table-striped">
			    <table id="bootstrap-table"></table>
			</div>
		</div>
	</div>

	<input type="hidden" id="rowIds" name="rowIds"/>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:inline="javascript">
		var prefix = ctx + "delivery/delivery";
		var zsTableId = "bootstrap-table";
		var currentSheetTab = 'none';

		function normalizePushRangeParams(obj, beginSel, endSel) {
			if (!obj || typeof obj !== 'object') {
				return;
			}
			var beginKey = 'params[pushBegin]';
			var endKey = 'params[pushEnd]';
			function fix(key, endOfDay) {
				var v = obj[key];
				if (v == null || v === '') {
					return;
				}
				var s = String(v).replace(/^\s+|\s+$/g, '');
				if (!s) {
					return;
				}
				if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
					obj[key] = endOfDay ? (s + ' 23:59:59') : (s + ' 00:00:00');
				}
			}
			fix(beginKey, false);
			fix(endKey, true);
			if (beginSel && obj[beginKey]) {
				$(beginSel).val(obj[beginKey]);
			}
			if (endSel && obj[endKey]) {
				$(endSel).val(obj[endKey]);
			}
		}

		function initZsPushRangeLaydate() {
			if (typeof layui === 'undefined') {
				return;
			}
			layui.use('laydate', function () {
				var laydate = layui.laydate;
				laydate.render({
					elem: '#zsPushBegin',
					type: 'datetime',
					format: 'yyyy-MM-dd HH:mm:ss',
					theme: 'molv',
					trigger: 'click',
					btns: ['clear', 'now', 'confirm']
				});
				laydate.render({
					elem: '#zsPushEnd',
					type: 'datetime',
					format: 'yyyy-MM-dd HH:mm:ss',
					theme: 'molv',
					trigger: 'click',
					btns: ['clear', 'now', 'confirm']
				});
			});
		}

		function isSheetSelectable(sheet) {
			return sheet === 'none' || sheet === 'partial';
		}

		function switchZsOrderSheet(sheet) {
			currentSheetTab = sheet || 'none';
			$('#sheetTab').val(currentSheetTab);
			$('#zsOrderSheetTabs li').removeClass('active');
			$('#zsOrderSheetTabs a[data-sheet="' + currentSheetTab + '"]').parent().addClass('active');
			updateZsSheetCheckboxColumn();
			$.table.search();
		}

		function updateZsSheetCheckboxColumn() {
			var $table = $('#' + zsTableId);
			if (!$table.length || !$table.bootstrapTable('getOptions')) {
				return;
			}
			if (isSheetSelectable(currentSheetTab)) {
				$table.bootstrapTable('showColumn', 'checkbox');
			} else {
				$table.bootstrapTable('uncheckAll');
				$table.bootstrapTable('hideColumn', 'checkbox');
				$("#rowIds").val('');
			}
		}

		$(function() {
			initZsPushRangeLaydate();
		    initZsTable();
		});

		function zsOrderQueryParams(params) {
			table.set(zsTableId);
			var formParams = $.common.formToJSON("zs-order-form");
			normalizePushRangeParams(formParams, '#zsPushBegin', '#zsPushEnd');
			return $.extend({}, formParams, {
				pageNum: Math.floor(params.offset / params.limit) + 1,
				pageSize: params.limit,
				orderByColumn: params.sort,
				isAsc: params.order,
				searchValue: params.search
			});
		}

		function initZsTable() {
		    var options = {
		        id: zsTableId,
		        formId: "zs-order-form",
		        url: prefix + "/zsOrder/list",
		        queryParams: zsOrderQueryParams,
		        modalName: "第三方订单",
		        uniqueId: "id",
		        rememberSelected: true,
		        maintainSelected: true,
		        columns: [{
		            checkbox: true,
		            field: 'checkbox'
		        },
		        {
		            field: 'id',
		            title: '主键ID',
		            visible: false
		        },
		        {
		            field: 'dh',
		            title: '单号(DH)'
		        },
		        {
		            field: 'hospitalCode',
		            title: '平台医院编码',
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'hospitalName',
		            title: '平台医院名称',
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'supplierCode',
		            title: '平台供应商编码',
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'supplierName',
		            title: '平台供应商名称',
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'ckno',
		            title: '订单仓库编码',
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'ck',
		            title: '订单仓库名称',
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'supno',
		            title: '订单供应商编码',
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'sup',
		            title: '订单供应商名称',
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'ksbh',
		            title: '订单科室编码',
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'ksmc',
		            title: '订单科室名称',
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'createTime',
		            title: '推送时间',
		            formatter: function (v) {
		                if (v == null || v === '') return '-';
		                return typeof v === 'string' && v.length >= 19 ? v.substring(0, 19) : v;
		            }
		        },
		        {
		            field: 'customer',
		            title: '服务标识'
		        },
		        {
		            field: 'scmSupCode',
		            title: 'SCM供应商编码'
		        },
		        {
		            field: 'voidStatus',
		            title: '作废状态',
		            align: 'center',
		            formatter: function (v) {
		                return (v === '1' || v === 1) ? '<span class="label label-danger">已作废</span>' : '<span class="label label-success">正常</span>';
		            }
		        },
		        {
		            field: 'sheetJe',
		            title: '金额',
		            formatter: function (value, row, index) {
		                if (value != null && value !== '') {
		                    return '¥' + parseFloat(value).toFixed(2);
		                }
		                return '';
		            }
		        }]
		    };
		    $.table.init(options);
		    updateZsSheetCheckboxColumn();

		    $("#" + zsTableId).on("check.bs.table check-all.bs.table uncheck.bs.table uncheck-all.bs.table", function (e, rowsAfter, rowsBefore) {
		        if (!isSheetSelectable(currentSheetTab)) {
		            return;
		        }
		        var rows = $.common.equals("uncheck-all", e.type) ? rowsBefore : rowsAfter;
		        var rowIds = $.table.affectedRowIds(rows);
		        $("#rowIds").val(rowIds.join(','));
		    });
		}

		function resetZs() {
			var sheet = currentSheetTab;
			if (typeof resetDate === 'function') {
				resetDate();
			}
			$("#zs-order-form")[0].reset();
			$('#sheetTab').val(sheet);
			currentSheetTab = sheet;
			$('#zsOrderSheetTabs li').removeClass('active');
			$('#zsOrderSheetTabs a[data-sheet="' + sheet + '"]').parent().addClass('active');
			$.table.search();
		}
	</script>
</body>
</html>
