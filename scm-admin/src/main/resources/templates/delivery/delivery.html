<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('配送单列表')" />
	<th:block th:include="include :: layout-latest-css" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-css" />
	<style>
		.delivery-table-wrap {
			min-height: 0;
			position: relative;
			padding-bottom: 0;
			overflow: hidden;
			display: flex;
			flex-direction: column;
		}

		.delivery-table-wrap > .bootstrap-table {
			flex: 1 1 auto;
			min-height: 0;
		}

		.delivery-table-wrap .bootstrap-table {
			display: flex;
			flex-direction: column;
			height: 100%;
			padding-bottom: 0;
		}

		.delivery-table-wrap .fixed-table-container {
			flex: 1 1 auto;
			min-height: 0;
			padding-bottom: 0;
		}

		.delivery-table-wrap .fixed-table-body {
			overflow-x: auto !important;
			overflow-y: auto !important;
		}

		.delivery-table-wrap.delivery-list-table .fixed-columns-right {
			z-index: 5;
			box-shadow: -4px 0 8px rgba(0, 0, 0, 0.08);
		}

		.delivery-table-wrap .fixed-table-body .fixed-table-border {
			display: none !important;
			height: 0 !important;
		}

		.delivery-table-wrap .fixed-table-pagination {
			position: relative;
			flex-shrink: 0;
			left: auto;
			right: auto;
			bottom: auto;
			background: #fff;
			z-index: 3;
			border-top: 1px solid #eee;
			margin: 0 !important;
			padding: 4px 10px 2px;
		}

		.delivery-table-wrap.delivery-list-table .fixed-table-pagination .pagination {
			margin-right: 172px;
		}
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header th .th-inner,
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header th .sortable {
			text-align: center !important;
			justify-content: center;
		}
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header th[data-field="srcOrderWarehouseName"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="srcOrderWarehouseName"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header th[data-field="deliveryAmount"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="deliveryAmount"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header th[data-field="auditStatus"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="auditStatus"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header th[data-field="createByDisplay"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="createByDisplay"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header th[data-field="auditByDisplay"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="auditByDisplay"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header th[data-field="expectedDeliveryDate"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="expectedDeliveryDate"] {
			text-align: center !important;
		}
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="expectedDeliveryDate"] .delivery-cell-ellipsis {
			text-align: center;
		}

		.delivery-table-wrap.delivery-list-table .fixed-table-header {
			position: relative;
			top: auto;
			z-index: 2;
			background: #fff;
			overflow: hidden;
		}
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header table,
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body > table {
			table-layout: fixed;
		}
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header th,
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body tbody td {
			box-sizing: border-box;
			vertical-align: middle;
		}
		/* 主表滚动区隐藏操作列内容，由右侧 fixed-columns-right 展示（保留列宽，避免横滚表头错位） */
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header th[data-field="deliveryOperate"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="deliveryOperate"] {
			padding: 0 !important;
			border-left: 0 !important;
			border-right: 0 !important;
			font-size: 0;
			line-height: 0;
			color: transparent;
			overflow: hidden;
		}
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header th[data-field="deliveryOperate"] > *,
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="deliveryOperate"] > * {
			display: none;
		}
		.delivery-table-wrap.delivery-list-table .fixed-columns-right .fixed-table-header th,
		.delivery-table-wrap.delivery-list-table .fixed-columns-right .fixed-table-body td {
			background-color: #fff;
			vertical-align: middle;
			white-space: nowrap;
		}
		.delivery-table-wrap.delivery-list-table .fixed-columns-right .fixed-table-header th[data-field="deliveryOperate"] {
			background-color: #f5f5f5;
			min-width: 160px;
			width: 160px;
			text-align: center;
		}
		.delivery-table-wrap.delivery-list-table .fixed-columns-right .fixed-table-header th[data-field="deliveryOperate"] .th-inner {
			text-align: center;
			justify-content: center;
		}
		.delivery-table-wrap.delivery-list-table .fixed-columns-right .fixed-table-body td[data-field="deliveryOperate"] {
			min-width: 160px;
			width: 160px;
			padding: 6px 8px;
			text-align: center;
		}
		.delivery-table-wrap.delivery-list-table.table-striped .fixed-columns-right .fixed-table-body tbody tr:nth-of-type(odd) td {
			background-color: #f9f9f9;
		}
		.delivery-table-wrap.delivery-list-table .fixed-columns-right .fixed-table-body {
			overflow-x: hidden !important;
			overflow-y: hidden !important;
		}
		.delivery-table-wrap.delivery-list-table .fixed-table-body tbody td {
			white-space: nowrap;
			vertical-align: middle !important;
		}
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="supplierName"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="srcOrderSupplierName"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="expectedDeliveryDate"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="relatedOrder"] {
			overflow: hidden;
			text-overflow: ellipsis;
		}
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="supplierName"] {
			max-width: 180px;
		}
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header th[data-field="srcOrderSupplierName"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="srcOrderSupplierName"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header th[data-field="expectedDeliveryDate"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="expectedDeliveryDate"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-header th[data-field="relatedOrder"],
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="relatedOrder"] {
			padding-left: 12px !important;
			padding-right: 14px !important;
		}
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="srcOrderSupplierName"] {
			max-width: 180px;
		}
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="expectedDeliveryDate"] {
			max-width: 120px;
		}
		.delivery-table-wrap.delivery-list-table .fixed-table-container > .fixed-table-body td[data-field="relatedOrder"] {
			max-width: 180px;
		}
		.delivery-table-wrap.delivery-list-table .delivery-cell-ellipsis {
			display: block;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			max-width: 100%;
		}
		/* 搜索区：上下内边距一致 */
		.container-div > .row > .search-collapse {
			padding-top: 10px !important;
			padding-bottom: 10px !important;
		}
		.container-div .search-collapse .select-list ul {
			margin-bottom: 0;
		}
		.container-div .search-collapse .select-list li {
			margin: 4px 15px 4px 0;
		}
		#delivery-form .select-list li.select-time label {
			margin-bottom: 0;
		}
		#delivery-form .select-list li.delivery-filter-text input {
			width: 160px;
		}
		#delivery-form .select-list li.delivery-filter-short select {
			width: 96px;
		}

		#toolbar #btn-delivery-edit.disabled,
		#toolbar #btn-delivery-audit.disabled,
		#toolbar #btn-delivery-remove.disabled,
		#toolbar #btn-delivery-unaudit.disabled,
		#toolbar #toolbar-btn-delivery-print.disabled,
		#toolbar #toolbar-btn-delivery-print-acceptance.disabled,
		#toolbar #btn-delivery-print-export.disabled,
		#toolbar #btn-delivery-acceptance-export.disabled {
			pointer-events: none;
			cursor: not-allowed;
			opacity: 1;
			background-color: #e0e0e0 !important;
			border-color: #ccc !important;
			color: #999 !important;
		}
	</style>
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="delivery-form">
					<div class="select-list">
						<ul>
							<li class="select-time">
								<label>制单日期：</label>
								<input type="text" class="time-input" id="deliveryStartTime" placeholder="开始时间" name="params[beginTime]"/>
								<span>-</span>
								<input type="text" class="time-input" id="deliveryEndTime" placeholder="结束时间" name="params[endTime]"/>
							</li>
							<li class="delivery-filter-text">
								配送单号：<input type="text" name="deliveryNo"/>
							</li>
							<li class="delivery-filter-text">
								医院名称：<input type="text" name="hospitalName"/>
							</li>
							<li class="delivery-filter-short">
								单据状态：<select name="deliveryStatus">
									<option value="">所有</option>
									<option value="0">未审核</option>
									<option value="1">已审核</option>
									<option value="2">已配送</option>
									<option value="3">已入库</option>
								</select>
							</li>
							<li class="delivery-filter-short">
								审核状态：<select name="auditStatus">
									<option value="">所有</option>
									<option value="0">待审核</option>
									<option value="1">已审核</option>
									<option value="2">已拒绝</option>
								</select>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()" style="display: none;"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="resetPre()" style="display: none;"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>

	        <div class="btn-group-sm" id="toolbar" role="group">
	        	<a class="btn btn-success" onclick="$.operate.addTab()" shiro:hasPermission="delivery:delivery:add">
	                <i class="fa fa-plus"></i> 新增
	            </a>
	             <a class="btn btn-primary single disabled" id="btn-delivery-edit" onclick="editDeliveryTabGuard()" shiro:hasPermission="delivery:delivery:edit">
		            <i class="fa fa-edit"></i> 修改
		        </a>
	            <a class="btn btn-info multiple disabled" id="btn-delivery-audit" onclick="auditDeliveries()" shiro:hasPermission="delivery:delivery:audit">
	                <i class="fa fa-check"></i> 审核
	            </a>
	            <a class="btn btn-warning multiple disabled" id="btn-delivery-unaudit" onclick="unAuditDeliveries()" shiro:hasPermission="delivery:delivery:unaudit">
	                <i class="fa fa-undo"></i> 反审核
	            </a>
	            <a class="btn btn-danger multiple disabled" id="btn-delivery-remove" onclick="removeDeliveriesGuard()" shiro:hasPermission="delivery:delivery:remove">
	                <i class="fa fa-remove"></i> 删除
	            </a>
	            <a class="btn btn-default multiple disabled" id="toolbar-btn-delivery-print" href="javascript:void(0)" shiro:hasPermission="delivery:delivery:print">
	                <i class="fa fa-print"></i> 配送单打印
	            </a>
	            <a class="btn btn-default multiple disabled" id="toolbar-btn-delivery-print-acceptance" href="javascript:void(0)" shiro:hasPermission="delivery:delivery:print">
	                <i class="fa fa-print"></i> 验收单打印
	            </a>
	            <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="delivery:delivery:export">
		            <i class="fa fa-download"></i> 导出
		        </a>
	            <a class="btn btn-default multiple disabled" id="btn-delivery-print-export" onclick="openDeliveryPrintStyleExcelDialog()" shiro:hasPermission="delivery:delivery:export">
		            <i class="fa fa-file-excel-o"></i> 打印导出
		        </a>
	            <a class="btn btn-default multiple disabled" id="btn-delivery-acceptance-export" onclick="openDeliveryAcceptancePrintStyleExcelDialog()" shiro:hasPermission="delivery:delivery:export">
		            <i class="fa fa-file-excel-o"></i> 验收单导出
		        </a>
	            <a class="btn btn-primary" onclick="$.table.search()">
		            <i class="fa fa-search"></i> 搜索
		        </a>
	            <a class="btn btn-warning" onclick="resetPre()">
		            <i class="fa fa-refresh"></i> 重置
		        </a>
	        </div>

	        <div class="col-sm-12 select-table table-striped delivery-table-wrap delivery-list-table">
			    <table id="bootstrap-table"></table>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-js" />
	<script th:inline="javascript">
		var editFlag = [[${@permission.hasPermi('delivery:delivery:edit')}]];
		var removeFlag = [[${@permission.hasPermi('delivery:delivery:remove')}]];
		var prefix = ctx + "delivery/delivery";

		$(function() {
		    initDefaultDeliveryDateRange();
		    layoutDeliveryTableWrapHeight();
		    queryDeliveryList();
		    $(window).resize(function() {
		    	layoutDeliveryTableWrapHeight();
		    	adjustTableHeight();
		    	setTimeout(refreshDeliveryTableLayout, 100);
		    });

		    // 仅打印按钮：避免与「审核」等其它 toolbar 按钮冲突
		    $(document).on('click', '#toolbar-btn-delivery-print', function(e) {
		        e.preventDefault();
		        e.stopPropagation();
		        console.log('Print button clicked');
		        var $btn = $(this);

		        // 如果按钮被禁用，提示用户
		        if ($btn.hasClass('disabled')) {
		            $.modal.msgWarning("未审核的配送单不能配送单打印，请仅选择已审核单据");
		            return false;
		        }

		        // 直接执行打印逻辑
		        var rows = getDeliveryTableSelections();
		        console.log('Selected rows count:', rows ? rows.length : 0);

		        if (!rows || rows.length === 0) {
		            $.modal.msgWarning("请至少选择一条记录进行打印");
		            return false;
		        }
		        if (selectionHasPendingAuditDelivery(rows)) {
		            $.modal.msgWarning("未审核的配送单不能配送单打印，请仅选择已审核单据");
		            return false;
		        }

		        if (rows.length === 1) {
		            // 单个打印
		            var deliveryId = rows[0].deliveryId;
		            console.log('Opening print page for deliveryId:', deliveryId);
		            var printUrl = prefix + "/print/" + deliveryId;
		            console.log('Print URL:', printUrl);
		            try {
		                var printWindow = window.open(printUrl, '_blank');
		                if (!printWindow || printWindow.closed || typeof printWindow.closed == 'undefined') {
		                    $.modal.alertError("浏览器阻止了弹窗，请允许弹窗后重试");
		                }
		            } catch (err) {
		                console.error('Error opening print window:', err);
		                $.modal.alertError("打开打印页面失败：" + err.message);
		            }
		        } else {
		            // 批量打印
		            $.modal.confirm("确定要打印选中的 " + rows.length + " 条配送单吗？", function() {
		                rows.forEach(function(row, index) {
		                    setTimeout(function() {
		                        var printUrl = prefix + "/print/" + row.deliveryId;
		                        console.log('Opening print page for deliveryId:', row.deliveryId, 'URL:', printUrl);
		                        try {
		                            var printWindow = window.open(printUrl, '_blank');
		                            if (!printWindow && index === 0) {
		                                $.modal.alertError("浏览器阻止了弹窗，请允许弹窗后重试");
		                            }
		                        } catch (err) {
		                            console.error('Error opening print window:', err);
		                        }
		                    }, index * 200);
		                });
		            });
		        }

		        return false;
		    });

		    $(document).on('click', '#toolbar-btn-delivery-print-acceptance', function(e) {
		        e.preventDefault();
		        e.stopPropagation();
		        var $btn = $(this);
		        if ($btn.hasClass('disabled')) {
		            $.modal.msgWarning("未审核的配送单不能验收单打印，请仅选择已审核单据");
		            return false;
		        }
		        var rows = getDeliveryTableSelections();
		        if (!rows || rows.length === 0) {
		            $.modal.msgWarning("请至少选择一条记录");
		            return false;
		        }
		        if (selectionHasPendingAuditDelivery(rows)) {
		            $.modal.msgWarning("未审核的配送单不能验收单打印，请仅选择已审核单据");
		            return false;
		        }
		        if (rows.length > 1) {
		            $.modal.msgWarning("验收单打印每次请选择一条配送单");
		            return false;
		        }
		        var url = prefix + "/printAcceptance/" + rows[0].deliveryId;
		        var w = window.open(url, '_blank');
		        if (!w || w.closed || typeof w.closed === 'undefined') {
		            $.modal.alertError("浏览器阻止了弹窗，请允许弹窗后重试");
		        }
		        return false;
		    });
		});

		function layoutDeliveryTableWrapHeight() {
			var $wrap = $('.delivery-table-wrap');
			if (!$wrap.length) {
				return;
			}
			var top = $wrap[0].getBoundingClientRect().top;
			var h = Math.floor(window.innerHeight - top - 14);
			h = Math.min(Math.max(h, 400), 580);
			$wrap[0].style.height = h + 'px';
			$wrap[0].style.minHeight = h + 'px';
		}

		function calculateTableHeight() {
			layoutDeliveryTableWrapHeight();
			var $wrap = $('.delivery-table-wrap');
			if ($wrap.length === 0) {
				return 440;
			}
			var $bt = $wrap.find('.bootstrap-table');
			var wrapH = $wrap[0].clientHeight || $wrap.innerHeight() || 0;
			var toolbarH = $bt.find('.fixed-table-toolbar').outerHeight(true) || 0;
			var pagH = $bt.find('.fixed-table-pagination').outerHeight(true) || 46;
			var containerH = Math.floor(wrapH - toolbarH - pagH - 2);
			return Math.max(containerH, 240);
		}

		function adjustTableHeight() {
			var $table = $('#bootstrap-table');
			if ($table.length > 0 && $table.bootstrapTable('getOptions')) {
				$table.bootstrapTable('resetView', { height: calculateTableHeight() });
			}
		}

		var deliveryTableId = 'bootstrap-table';

		var deliveryColWidths = {
			index: 60,
			deliveryNo: 150,
			hospitalName: 180,
			supplierName: 180,
			auditByDisplay: 90,
			auditTime: 110,
			downloadLogCount: 100,
			srcOrderDeptName: 120,
			srcOrderSupplierName: 180,
			expectedDeliveryDate: 120,
			srcOrderWarehouseName: 100,
			deliveryAmount: 100,
			auditStatus: 100,
			createByDisplay: 90,
			createTime: 105,
			relatedOrder: 180,
			deliveryOperate: 160
		};

		function getDeliveryTableTotalWidth() {
			var sum = 0;
			var opt = $('#' + deliveryTableId).bootstrapTable('getOptions');
			if (opt && opt.columns && opt.columns[0]) {
				$.each(opt.columns[0], function (_, col) {
					if (!col || col.visible === false) {
						return;
					}
					if (col.checkbox) {
						sum += 42;
					} else if (col.field && deliveryColWidths[col.field] != null) {
						sum += deliveryColWidths[col.field];
					} else if (col.width) {
						sum += parseInt(col.width, 10) || 0;
					} else {
						sum += 100;
					}
				});
			}
			return Math.max(sum, 1200);
		}

		function applyDeliveryFieldColumnWidth(field, widthPx) {
			var w = widthPx + 'px';
			var $container = $('#' + deliveryTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $th = $mainHeader.find('th[data-field="' + field + '"]');
			if ($th.length === 0) {
				return;
			}
			var colIdx = $th[0].cellIndex;
			var setW = function (el) {
				el.style.setProperty('width', w, 'important');
				el.style.setProperty('min-width', w, 'important');
				el.style.setProperty('max-width', w, 'important');
			};
			$th.each(function () { setW(this); });
			$mainBody.find('table tbody tr').each(function () {
				var cell = this.cells[colIdx];
				if (cell) {
					setW(cell);
				}
			});
			$mainHeader.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
			$mainBody.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
		}

		function applyDeliveryCheckboxColumnWidth() {
			var w = '42px';
			var $container = $('#' + deliveryTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $th = $mainHeader.find('th.bs-checkbox');
			if ($th.length === 0) {
				return;
			}
			var colIdx = $th[0].cellIndex;
			var setW = function (el) {
				el.style.setProperty('width', w, 'important');
				el.style.setProperty('min-width', w, 'important');
				el.style.setProperty('max-width', w, 'important');
			};
			$th.each(function () { setW(this); });
			$mainBody.find('table tbody tr').each(function () {
				var cell = this.cells[colIdx];
				if (cell) {
					setW(cell);
				}
			});
			$mainHeader.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
			$mainBody.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
		}

		function syncDeliveryHeaderBodyColumnWidths() {
			var $container = $('#' + deliveryTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $headerThs = $mainHeader.find('thead tr').first().children('th');
			var $firstRow = $mainBody.find('tbody tr').first();
			if ($firstRow.length === 0) {
				return;
			}
			var setW = function (el, w) {
				el.style.setProperty('width', w, 'important');
				el.style.setProperty('min-width', w, 'important');
				el.style.setProperty('max-width', w, 'important');
			};
			$headerThs.each(function (i) {
				var bodyCell = $firstRow[0].cells[i];
				if (!bodyCell) {
					return;
				}
				var w = bodyCell.style.width;
				if (!w) {
					w = window.getComputedStyle(bodyCell).width;
				}
				if (w) {
					setW(this, w);
					$mainHeader.find('colgroup col').eq(i).each(function () { setW(this, w); });
					$mainBody.find('colgroup col').eq(i).each(function () { setW(this, w); });
				}
			});
		}

		function scheduleDeliveryColumnWidths() {
			applyDeliveryCheckboxColumnWidth();
			$.each(deliveryColWidths, function (field, width) {
				applyDeliveryFieldColumnWidth(field, width);
			});
			syncDeliveryHeaderBodyColumnWidths();
			requestAnimationFrame(function () {
				applyDeliveryCheckboxColumnWidth();
				$.each(deliveryColWidths, function (field, width) {
					applyDeliveryFieldColumnWidth(field, width);
				});
				syncDeliveryHeaderBodyColumnWidths();
			});
		}

		function fixDeliveryTableHeaderAlign() {
			var $bt = $('#' + deliveryTableId).closest('.bootstrap-table');
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			if (!$mainBody.length || !$mainHeader.length) {
				return;
			}
			var scrollW = $mainBody[0].offsetWidth - $mainBody[0].clientWidth;
			$mainHeader.css('margin-right', scrollW > 0 ? (scrollW + 'px') : '');
		}

		function syncDeliveryHeaderBodyScrollLeft() {
			var $container = $('#' + deliveryTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			if ($mainBody.length && $mainHeader.length) {
				$mainHeader.scrollLeft($mainBody[0].scrollLeft);
			}
		}

		function bindDeliveryMainHorizontalScroll() {
			var $bt = $('#' + deliveryTableId).closest('.bootstrap-table');
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');

		function applyDeliveryMainTableMinWidth() {
			var sum = getDeliveryTableTotalWidth();
			var w = sum + 'px';
			var $container = $('#' + deliveryTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $headerTable = $container.children('.fixed-table-header').find('table');

		function syncDeliveryOperateColumnScroll() {
			var $bt = $('#' + deliveryTableId).closest('.bootstrap-table');
			var $rightBody = $bt.find('.fixed-columns-right .fixed-table-body');
			if ($rightBody.length === 0) {
				return;
			}
			var $mainBody = $bt.find('.fixed-table-container').children('.fixed-table-body');
			$mainBody.off('scroll.deliveryOperateSync').on('scroll.deliveryOperateSync', function () {
				$rightBody.scrollTop($mainBody.scrollTop());

		function escDeliveryCellAttr(s) {
			return String(s == null ? '' : s)
				.replace(/&/g, '&amp;')
				.replace(/"/g, '&quot;')
				.replace(/'/g, '&#39;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;');
		}

		function formatDeliveryDateOnly(value) {
			if (value == null || value === '') {
				return '-';
			}
			var s = String(value).trim();
			return s.length >= 10 ? s.substring(0, 10) : s;
		}

		function deliveryCellEllipsis(value) {
			var s = (value == null || value === '') ? '-' : String(value);
			if (s === '-') {
				return s;
			}
			var esc = escDeliveryCellAttr(s);
			return '<span class="delivery-cell-ellipsis" title="' + esc + '">' + esc + '</span>';
		}

		function deliveryRelatedOrderCell(row) {
			var parts = [];
			var titleParts = [];
			if (row.orderId) {
				var orderLabel = row.orderNo ? row.orderNo : '本系统订单';
				parts.push('<a href="javascript:void(0)" onclick="$.modal.openTab(\'订单详情\',\'' + ctx + 'order/order/detail/' + row.orderId + '\')">' + escDeliveryCellAttr(orderLabel) + '</a>');
				titleParts.push(orderLabel);
			}
			if (row.zsOrderId) {
				var zsLabel = row.orderNo ? row.orderNo : '第三方订单';
				parts.push('<a href="javascript:void(0)" onclick="$.modal.openTab(\'第三方订单\',\'' + ctx + 'order/zstp/detail/' + row.zsOrderId + '\')">' + escDeliveryCellAttr(zsLabel) + '</a>');
				titleParts.push(zsLabel);
			}
			if (!parts.length) {
				return '<span class="text-muted">-</span>';
			}
			var title = escDeliveryCellAttr(titleParts.join(' / '));
			return '<span class="delivery-cell-ellipsis" title="' + title + '">' + parts.join('<br/>') + '</span>';
		}

		function refreshDeliveryTableLayout() {
			fixDeliveryTableHeaderAlign();
			scheduleDeliveryColumnWidths();
			applyDeliveryMainTableMinWidth();
			syncDeliveryHeaderBodyScrollLeft();
			bindDeliveryMainHorizontalScroll();
			syncDeliveryOperateColumnScroll();
		}

		function isDeliveryAudited(row) {
		    return row && ((row.auditStatus === '1') || (row.auditStatus == null && row.deliveryStatus === '1'));
		}

		function selectionHasAuditedDelivery(rows) {
		    if (!rows || !rows.length) {
		        return false;
		    }
		    for (var i = 0; i < rows.length; i++) {
		        if (isDeliveryAudited(rows[i])) {
		            return true;
		        }
		    }
		    return false;
		}

		function selectionHasPendingAuditDelivery(rows) {
		    if (!rows || !rows.length) {
		        return false;
		    }
		    for (var i = 0; i < rows.length; i++) {
		        if (!isDeliveryAudited(rows[i])) {
		            return true;
		        }
		    }
		    return false;
		}

		var deliveryPendingAuditDisableBtns = '#btn-delivery-unaudit, #toolbar-btn-delivery-print, #toolbar-btn-delivery-print-acceptance, #btn-delivery-print-export, #btn-delivery-acceptance-export';

		function getDeliveryTableSelections() {
		    var rows = $('#bootstrap-table').bootstrapTable('getSelections') || [];
		    if (table.options && table.options.rememberSelected) {
		        var remembered = table.rememberSelecteds[deliveryTableId];
		        if (remembered && remembered.length) {
		            rows = remembered;
		        }
		    }
		    return rows;
		}

		/** 已审核单：禁用修改/审核/删除；未审核单：禁用反审核/打印/打印导出/验收单导出 */
		function updateDeliveryAuditSensitiveButtons() {
		    var rows = getDeliveryTableSelections();
		    var n = rows.length;
		    var hasPending = selectionHasPendingAuditDelivery(rows);
		    $(deliveryPendingAuditDisableBtns).toggleClass('disabled', n > 0 && hasPending);
		    if (n === 0) {
		        $('#btn-delivery-edit').addClass('disabled');
		        return;
		    }
		    if (selectionHasAuditedDelivery(rows)) {
		        $('#btn-delivery-edit, #btn-delivery-audit, #btn-delivery-remove').addClass('disabled');
		    } else {
		        $('#btn-delivery-audit, #btn-delivery-remove').removeClass('disabled');
		        $('#btn-delivery-edit').toggleClass('disabled', n !== 1);
		    }
		}

		function editDeliveryTabGuard() {
		    var rows = $('#bootstrap-table').bootstrapTable('getSelections') || [];
		    if (rows.length === 1 && isDeliveryAudited(rows[0])) {
		        $.modal.msgWarning("已审核的配送单不能修改");
		        return;
		    }
		    $.operate.editTab();
		}

		function removeDeliveriesGuard() {
		    var rows = $('#bootstrap-table').bootstrapTable('getSelections') || [];
		    for (var i = 0; i < rows.length; i++) {
		        if (isDeliveryAudited(rows[i])) {
		            $.modal.msgWarning("所选记录中包含已审核配送单，不能删除");
		            return;
		        }
		    }
		    $.operate.removeAll();
		}

		function auditDeliveries() {
		    var rows = $('#bootstrap-table').bootstrapTable('getSelections');
		    if (!rows || rows.length === 0) {
		        $.modal.msgWarning("请至少选择一条记录");
		        return;
		    }
		    for (var i = 0; i < rows.length; i++) {
		        if (isDeliveryAudited(rows[i])) {
		            $.modal.msgWarning("所选记录中包含已审核配送单，请重新选择");
		            return;
		        }
		    }
		    var ids = [];
		    for (var j = 0; j < rows.length; j++) {
		        ids.push(rows[j].deliveryId);
		    }
		    $.modal.confirm("确定要审核选中的 " + ids.length + " 条配送单吗？", function() {
		        $.operate.submit(prefix + "/audit", "post", "json", { ids: ids.join() });
		    });
		}

		function unAuditDeliveries() {
		    if ($('#btn-delivery-unaudit').hasClass('disabled')) {
		        $.modal.msgWarning("未审核的配送单不能反审核，请仅选择已审核单据");
		        return;
		    }
		    var rows = getDeliveryTableSelections();
		    if (!rows || rows.length === 0) {
		        $.modal.msgWarning("请至少选择一条记录");
		        return;
		    }
		    for (var i = 0; i < rows.length; i++) {
		        if (rows[i].auditStatus !== '1') {
		            $.modal.msgWarning("所选记录中包含非「已审核」配送单，请重新选择");
		            return;
		        }
		        if (rows[i].deliveryStatus === '2' || rows[i].deliveryStatus === '3') {
		            $.modal.msgWarning("所选记录中包含已配送或已入库配送单，不允许反审核");
		            return;
		        }
		        var c = parseInt(rows[i].downloadLogCount, 10);
		        if (!isNaN(c) && c > 0) {
		            $.modal.msgWarning("所选记录中存在已有接口下载记录的配送单，不允许反审核（请先取消含下载记录的单据）");
		            return;
		        }
		    }
		    var ids = [];
		    for (var j = 0; j < rows.length; j++) {
		        ids.push(rows[j].deliveryId);
		    }
		    $.modal.confirm("确定要反审核选中的 " + ids.length + " 条配送单吗？", function() {
		        $.operate.submit(prefix + "/unAudit", "post", "json", { ids: ids.join() });
		    });
		}

		function formatDeliveryDate(date) {
			var y = date.getFullYear();
			var m = String(date.getMonth() + 1).padStart(2, '0');
			var d = String(date.getDate()).padStart(2, '0');
			return y + '-' + m + '-' + d;
		}

		/** 默认：结束日期为当天，开始日期为当天往前 7 天 */
		function initDefaultDeliveryDateRange() {
			var end = new Date();
			var start = new Date();
			start.setDate(end.getDate() - 7);
			$('#deliveryEndTime').val(formatDeliveryDate(end));
			$('#deliveryStartTime').val(formatDeliveryDate(start));
		}

		function resetPre() {
			if (typeof resetDate === 'function') {
				resetDate();
			}
			$("#delivery-form")[0].reset();
			initDefaultDeliveryDateRange();
			$.table.search();
		}

		/** 按「物资配送单」打印版式导出 Excel（每单一个 Sheet），支持已勾选 / 全部 */

				title: '打印样式导出 Excel',
				area: ['480px', '280px'],
				shadeClose: true,
				content: '<div style="padding:20px 24px 12px;">'
					+ '<p style="color:#666;font-size:13px;line-height:1.65;margin-bottom:18px;">请选择导出范围：Excel 中每个配送单单独一个工作表，版式与「打印」页面一致。保存时若浏览器支持，将弹出系统对话框由您选择保存路径与文件名；否则使用浏览器默认下载。</p>'

					+ '</div>',
				success: function(layero, index) {
					layero.find('#btn-delivery-print-excel-selected').on('click', function() {
						var rows = $('#bootstrap-table').bootstrapTable('getSelections');
						if (!rows || rows.length === 0) {
							$.modal.msgWarning('请先勾选要导出的配送单');
							return;
						}
						var ids = [];
						for (var i = 0; i < rows.length; i++) {
							ids.push(rows[i].deliveryId);
						}
						submitPrintStyleExcelExport('selected', ids.join(','));
						layer.close(index);
					});
					layero.find('#btn-delivery-print-excel-all').on('click', function() {
						submitPrintStyleExcelExport('all', null);
						layer.close(index);
					});
				}
			});
		}

		/** 按「医用耗材质量验收单」打印版式导出 Excel（每单一个 Sheet），支持已勾选 / 全部 */
		function openDeliveryAcceptancePrintStyleExcelDialog() {
			if ($('#btn-delivery-acceptance-export').hasClass('disabled')) {
				$.modal.msgWarning("未审核的配送单不能验收单导出，请仅选择已审核单据");
				return;
			}
			if (typeof layer === 'undefined') {
				$.modal.msgError('页面未加载完成，请刷新后重试');
				return;
			}
			layer.open({
				type: 1,
				title: '验收单样式导出 Excel',
				area: ['480px', '300px'],
				shadeClose: true,
				content: '<div style="padding:20px 24px 12px;">'
					+ '<p style="color:#666;font-size:13px;line-height:1.65;margin-bottom:18px;">请选择导出范围：Excel 中每个配送单单独一个工作表，版式与「验收单打印」页面一致（医用耗材质量验收单）。</p>'
					+ '<button type="button" id="btn-delivery-acceptance-excel-selected" class="btn btn-primary btn-block" style="margin-bottom:12px;">导出已勾选</button>'
					+ '<button type="button" id="btn-delivery-acceptance-excel-all" class="btn btn-warning btn-block">导出全部（按当前搜索条件，不分页）</button>'
					+ '</div>',
				success: function(layero, index) {
					layero.find('#btn-delivery-acceptance-excel-selected').on('click', function() {
						var rows = $('#bootstrap-table').bootstrapTable('getSelections');
						if (!rows || rows.length === 0) {
							$.modal.msgWarning('请先勾选要导出的配送单');
							return;
						}
						var ids = [];
						for (var i = 0; i < rows.length; i++) {
							ids.push(rows[i].deliveryId);
						}
						submitAcceptancePrintStyleExcelExport('selected', ids.join(','));
						layer.close(index);
					});
					layero.find('#btn-delivery-acceptance-excel-all').on('click', function() {
						submitAcceptancePrintStyleExcelExport('all', null);
						layer.close(index);
					});
				}
			});
		}

		/** 从响应头解析导出文件名（与后端 Content-Disposition 一致） */
		function resolvePrintExportFileName(response, fallbackPrefix) {
			var fileName = '';
			var cd = response.headers.get('Content-Disposition') || response.headers.get('content-disposition');
			if (cd) {
				var m = cd.match(/filename\*=utf-8''([^;]+)/i);
				if (m && m[1]) {
					try { fileName = decodeURIComponent(m[1].trim()); } catch (e0) { fileName = m[1].trim(); }
				}
				if (!fileName) {
					m = cd.match(/filename\*=UTF-8''([^;]+)/i);
					if (m && m[1]) {
						try { fileName = decodeURIComponent(m[1].trim()); } catch (e1) { fileName = m[1].trim(); }
					}
				}
				if (!fileName) {
					m = cd.match(/filename="([^"]+)"/i);
					if (m && m[1]) { fileName = m[1]; }
				}
				if (!fileName) {
					m = cd.match(/filename=([^;]+)/i);
					if (m && m[1]) { fileName = m[1].trim().replace(/^"+|"+$/g, ''); }
				}
			}
			if (!fileName) {
				var d = new Date();
				var p = function(n) { return (n < 10 ? '0' : '') + n; };
				var fp = fallbackPrefix || '配送单打印样式_';
				fileName = fp + d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate())
					+ p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds()) + '.xlsx';
			}
			if (!/\.xlsx$/i.test(fileName)) {
				fileName += '.xlsx';
			}
			return fileName;
		}

		/**
		 * 保存导出文件：优先使用系统「另存为」由用户选择路径（File System Access API）；
		 * 不支持时回退为浏览器默认下载。
		 */
		function savePrintExportBlob(blob, fileName) {
			if (typeof window.showSaveFilePicker === 'function') {
				return window.showSaveFilePicker({
					suggestedName: fileName,
					types: [{
						description: 'Excel 工作簿',
						accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] }
					}]
				}).then(function(handle) {
					return handle.createWritable();
				}).then(function(writable) {
					return writable.write(blob).then(function() { return writable.close(); });
				}).then(function() {
					$.modal.msgSuccess('已保存到所选位置');
				}).catch(function(err) {
					if (err && err.name === 'AbortError') {
						$.modal.msgWarning('已取消保存');
						return;
					}
					triggerBlobDownload(blob, fileName);
					$.modal.msgSuccess('已保存（浏览器默认下载目录）');
				});
			}
			triggerBlobDownload(blob, fileName);
			$.modal.msgSuccess('导出成功');
			return Promise.resolve();
		}

		function triggerBlobDownload(blob, fileName) {
			var url = window.URL.createObjectURL(blob);
			var a = document.createElement('a');
			a.href = url;
			a.download = fileName;
			document.body.appendChild(a);
			a.click();
			document.body.removeChild(a);
			window.URL.revokeObjectURL(url);
		}

		function submitPrintStyleExcelExport(exportMode, idsComma) {
			submitDeliveryStyleExcelExport(exportMode, idsComma, '/printExportExcel', '配送单打印样式_');
		}

		function submitAcceptancePrintStyleExcelExport(exportMode, idsComma) {
			submitDeliveryStyleExcelExport(exportMode, idsComma, '/printAcceptanceExportExcel', '配送单验收单样式_');
		}

		function submitDeliveryStyleExcelExport(exportMode, idsComma, endpointPath, fallbackFilePrefix) {
			$.modal.loading('正在导出，请稍候...');
			var body = new URLSearchParams();
			body.append('exportMode', exportMode);
			if (exportMode === 'selected' && idsComma) {
				body.append('ids', idsComma);
			} else if (exportMode === 'all') {
				$('#delivery-form').serializeArray().forEach(function(item) {
					if (item.name && item.value !== '') {
						body.append(item.name, item.value);
					}
				});
			}
			var tableParams = $('#bootstrap-table').bootstrapTable('getOptions');
			body.append('orderByColumn', tableParams.sortName || 'createTime');
			body.append('isAsc', tableParams.sortOrder || 'desc');
			var headers = { 'X-Requested-With': 'XMLHttpRequest' };
			var csrftoken = $('meta[name=csrf-token]').attr('content');
			if (csrftoken) {
				headers['X-CSRF-Token'] = csrftoken;
			}
			fetch(prefix + endpointPath, {
				method: 'POST',
				headers: headers,
				body: body,
				credentials: 'same-origin'
			}).then(function(response) {
				$.modal.closeLoading();
				var ctype = (response.headers.get('Content-Type') || '').toLowerCase();
				if (ctype.indexOf('application/json') !== -1) {
					return response.json().then(function(result) {
						if (result.code == web_status.SUCCESS && result.msg) {
							window.location.href = ctx + 'common/download?fileName=' + encodeURIComponent(result.msg) + '&delete=' + true;
						} else if (result.code == web_status.WARNING) {
							$.modal.alertWarning(result.msg);
						} else {
							$.modal.alertError(result.msg || '导出失败');
						}
					});
				}
				if (!response.ok) {
					return response.text().then(function(text) {
						try {
							var err = JSON.parse(text);
							$.modal.alertError(err.msg || '导出失败');
						} catch (e2) {
							$.modal.alertError('导出失败（HTTP ' + response.status + '）');
						}
					});
				}
				return response.blob().then(function(blob) {
					var fileName = resolvePrintExportFileName(response, fallbackFilePrefix);
					return savePrintExportBlob(blob, fileName);
				});
			}).catch(function() {
				$.modal.closeLoading();
				$.modal.alertError('导出失败');
			});
		}

	</script>
