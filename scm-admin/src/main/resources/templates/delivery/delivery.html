<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('配送单列表')" />
	<th:block th:include="include :: layout-latest-css" />
	<style>
		.delivery-table-wrap {
			min-height: 730px;
			position: relative;
			padding-bottom: 6px;
			overflow: hidden;
		}

		.delivery-table-wrap .bootstrap-table {
			height: 100%;
			padding-bottom: 46px;
		}

		.delivery-table-wrap .fixed-table-container {
			padding-bottom: 46px;
		}

		.delivery-table-wrap .fixed-table-body {
			overflow-x: auto !important;
			overflow-y: auto !important;
		}

		.delivery-table-wrap .fixed-table-pagination {
			position: absolute;
			left: 10px;
			right: 10px;
			bottom: 0;
			background: #fff;
			z-index: 3;
			border-top: 1px solid #eee;
			margin: 0 !important;
			padding: 6px 0;
		}

		.delivery-table-wrap .fixed-table-pagination .pagination {
			margin-right: 28px;
		}

		.delivery-table-wrap .fixed-table-header {
			position: sticky;
			top: 0;
			z-index: 2;
			background: #fff;
		}
	</style>
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="delivery-form">
					<div class="select-list">
						<ul>
							<li>
								配送单号：<input type="text" name="deliveryNo"/>
							</li>
							<li>
								医院名称：<input type="text" name="hospitalName"/>
							</li>
							<li>
								单据状态：<select name="deliveryStatus">
									<option value="">所有</option>
									<option value="0">未审核</option>
									<option value="1">已审核</option>
									<option value="2">已配送</option>
									<option value="3">已入库</option>
								</select>
							</li>
							<li>
								审核状态：<select name="auditStatus">
									<option value="">所有</option>
									<option value="0">待审核</option>
									<option value="1">已审核</option>
									<option value="2">已拒绝</option>
								</select>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()" style="display: none;"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="resetPre()" style="display: none;"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>

	        <div class="btn-group-sm" id="toolbar" role="group">
	        	<a class="btn btn-success" onclick="$.operate.addTab()" shiro:hasPermission="delivery:delivery:add">
	                <i class="fa fa-plus"></i> 新增
	            </a>
	             <a class="btn btn-primary single disabled" onclick="$.operate.editTab()" shiro:hasPermission="delivery:delivery:edit">
		            <i class="fa fa-edit"></i> 修改
		        </a>
	            <a class="btn btn-info multiple disabled" onclick="auditDeliveries()" shiro:hasPermission="delivery:delivery:audit">
	                <i class="fa fa-check"></i> 审核
	            </a>
	            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="delivery:delivery:remove">
	                <i class="fa fa-remove"></i> 删除
	            </a>
	            <a class="btn btn-default multiple disabled" id="toolbar-btn-delivery-print" href="javascript:void(0)" shiro:hasPermission="delivery:delivery:print">
	                <i class="fa fa-print"></i> 打印
	            </a>
	            <a class="btn btn-warning" onclick="openDeliveryPrintExportDialog()" shiro:hasPermission="delivery:delivery:export">
		            <i class="fa fa-download"></i> 导出
		        </a>
	            <a class="btn btn-primary" onclick="$.table.search()">
		            <i class="fa fa-search"></i> 搜索
		        </a>
	            <a class="btn btn-warning" onclick="resetPre()">
		            <i class="fa fa-refresh"></i> 重置
		        </a>
	        </div>

	        <div class="col-sm-12 select-table table-striped delivery-table-wrap">
			    <table id="bootstrap-table"></table>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:inline="javascript">
		var editFlag = [[${@permission.hasPermi('delivery:delivery:edit')}]];
		var removeFlag = [[${@permission.hasPermi('delivery:delivery:remove')}]];
		var prefix = ctx + "delivery/delivery";

		$(function() {
		    queryDeliveryList();
		    $(window).resize(function() {
		    	adjustTableHeight();
		    });

		    // 仅打印按钮：避免与「审核」等其它 toolbar 按钮冲突
		    $(document).on('click', '#toolbar-btn-delivery-print', function(e) {
		        e.preventDefault();
		        e.stopPropagation();
		        console.log('Print button clicked');
		        var $btn = $(this);

		        // 如果按钮被禁用，提示用户
		        if ($btn.hasClass('disabled')) {
		            console.log('Button is disabled');
		            $.modal.msgWarning("请至少选择一条记录进行打印");
		            return false;
		        }

		        // 直接执行打印逻辑
		        var rows = $('#bootstrap-table').bootstrapTable('getSelections');
		        console.log('Selected rows count:', rows ? rows.length : 0);

		        if (!rows || rows.length === 0) {
		            $.modal.msgWarning("请至少选择一条记录进行打印");
		            return false;
		        }

		        if (rows.length === 1) {
		            // 单个打印
		            var deliveryId = rows[0].deliveryId;
		            console.log('Opening print page for deliveryId:', deliveryId);
		            var printUrl = prefix + "/print/" + deliveryId;
		            console.log('Print URL:', printUrl);
		            try {
		                var printWindow = window.open(printUrl, '_blank');
		                if (!printWindow || printWindow.closed || typeof printWindow.closed == 'undefined') {
		                    $.modal.alertError("浏览器阻止了弹窗，请允许弹窗后重试");
		                }
		            } catch (err) {
		                console.error('Error opening print window:', err);
		                $.modal.alertError("打开打印页面失败：" + err.message);
		            }
		        } else {
		            // 批量打印
		            $.modal.confirm("确定要打印选中的 " + rows.length + " 条配送单吗？", function() {
		                rows.forEach(function(row, index) {
		                    setTimeout(function() {
		                        var printUrl = prefix + "/print/" + row.deliveryId;
		                        console.log('Opening print page for deliveryId:', row.deliveryId, 'URL:', printUrl);
		                        try {
		                            var printWindow = window.open(printUrl, '_blank');
		                            if (!printWindow && index === 0) {
		                                $.modal.alertError("浏览器阻止了弹窗，请允许弹窗后重试");
		                            }
		                        } catch (err) {
		                            console.error('Error opening print window:', err);
		                        }
		                    }, index * 200);
		                });
		            });
		        }

		        return false;
		    });
		});

		function calculateTableHeight() {
			var $detail = $('.delivery-table-wrap');
			if ($detail.length === 0) {
				return 700;
			}
			return Math.max($detail.innerHeight() - 8, 650);
		}

		function adjustTableHeight() {
			var $table = $('#bootstrap-table');
			if ($table.length > 0 && $table.bootstrapTable('getOptions')) {
				$table.bootstrapTable('resetView', { height: calculateTableHeight() });
			}
		}

		function auditDeliveries() {
		    var rows = $('#bootstrap-table').bootstrapTable('getSelections');
		    if (!rows || rows.length === 0) {
		        $.modal.msgWarning("请至少选择一条记录");
		        return;
		    }
		    for (var i = 0; i < rows.length; i++) {
		        if (rows[i].auditStatus === '1') {
		            $.modal.msgWarning("所选记录中包含已审核配送单，请重新选择");
		            return;
		        }
		    }
		    var ids = [];
		    for (var j = 0; j < rows.length; j++) {
		        ids.push(rows[j].deliveryId);
		    }
		    $.modal.confirm("确定要审核选中的 " + ids.length + " 条配送单吗？", function() {
		        $.operate.submit(prefix + "/audit", "post", "json", { ids: ids.join() });
		    });
		}

		function queryDeliveryList() {
		    var options = {
		        url: prefix + "/list",
		        createUrl: prefix + "/add",
		        updateUrl: prefix + "/edit/{id}",
		        removeUrl: prefix + "/remove",
		        sortName: "createTime",
		        sortOrder: "desc",
		        modalName: "配送单",
		        uniqueId: "deliveryId",
		        height: calculateTableHeight(),
		        columns: [{
		            checkbox: true
		        },
		        {
		            field: 'index',
		            title: '序号',
		            align: 'center',
		            width: 60,
		            formatter: function(value, row, index) {
		                return index + 1;
		            }
		        },
		        {
		            field: 'deliveryNo',
		            title: '配送单号',
		            sortable: true
		        },
		        {
		            field: 'hospitalName',
		            title: '医院名称',
		            formatter: function(value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'supplierName',
		            title: '供应商名称',
		            formatter: function(value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'srcOrderSupplierName',
		            title: '订单供应商',
		            formatter: function(value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'srcOrderWarehouseName',
		            title: '订单仓库',
		            formatter: function(value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'srcOrderDeptName',
		            title: '订单申请科室',
		            formatter: function(value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'deliveryAmount',
		            title: '配送金额'
		        },
		        {
		            field: 'deliveryStatus',
		            title: '单据状态',
		            formatter: function(value, row, index) {
		            	var statusMap = {'0': '未审核', '1': '已审核', '2': '已配送', '3': '已入库'};
		            	return statusMap[value] || value || '-';
		            }
		        },
		        {
		            field: 'auditStatus',
		            title: '审核状态',
		            formatter: function(value, row, index) {
		            	var m = {'0': '<span class="label label-warning">待审核</span>', '1': '<span class="label label-success">已审核</span>', '2': '<span class="label label-danger">已拒绝</span>'};
		            	return m[value] || (value != null ? value : '<span class="label label-default">-</span>');
		            }
		        },
		        {
		            field: 'auditBy',
		            title: '审核人',
		            formatter: function(value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'auditTime',
		            title: '审核时间',
		            sortable: true
		        },
		        {
		            field: 'expectedDeliveryDate',
		            title: '预计配送日期',
		            sortable: true
		        },
		        {
		            field: 'createTime',
		            title: '创建时间',
		            sortable: true
		        },
		        {
		            title: '操作',
		            align: 'center',
		            formatter: function(value, row, index) {
		            	var actions = [];
		                actions.push('<a class="btn btn-info btn-xs" href="javascript:void(0)" onclick="$.modal.openTab(\'配送单详情\',\'' + prefix + '/detail/' + row.deliveryId + '\')"><i class="fa fa-eye"></i>详情</a> ');
		                if (row.orderId) {
		                    actions.push('<a class="btn btn-default btn-xs" href="javascript:void(0)" onclick="$.modal.openTab(\'订单\',\'' + ctx + 'order/order/detail/' + row.orderId + '\')">订单</a> ');
		                }
		                if (row.zsOrderId) {
		                    actions.push('<a class="btn btn-default btn-xs" href="javascript:void(0)" onclick="$.modal.openTab(\'第三方订单\',\'' + ctx + 'order/zstp/detail/' + row.zsOrderId + '\')">第三方</a> ');
		                }
		                var audited = (row.auditStatus === '1') || (row.auditStatus == null && row.deliveryStatus === '1');
		                if (!audited) {
		                    actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.editTab(\'' + row.deliveryId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
		                    actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.deliveryId + '\')"><i class="fa fa-remove"></i>删除</a> ');
		                }
		                return actions.join('');
		            }
		        }]
		    };
		    $.table.init(options);
		}

		function resetPre() {
			$("#delivery-form")[0].reset();
			$.table.search();
		}

		/** 导出：按配送单「打印」页样式在新窗口打开 HTML，可打印或另存为 PDF */
		function openDeliveryPrintExportDialog() {
			if (typeof layer === 'undefined') {
				$.modal.msgError('页面未加载完成，请刷新后重试');
				return;
			}
			layer.open({
				type: 1,
				title: '导出配送单（打印样式）',
				area: ['480px', '280px'],
				shadeClose: true,
				content: '<div style="padding:20px 24px 12px;">'
					+ '<p style="color:#666;font-size:13px;line-height:1.65;margin-bottom:18px;">请选择导出范围：版面与工具栏「打印」打开的页面一致，可在浏览器中使用打印或另存为 PDF 保存。</p>'
					+ '<button type="button" id="btn-delivery-print-export-selected" class="btn btn-primary btn-block" style="margin-bottom:12px;">导出已勾选</button>'
					+ '<button type="button" id="btn-delivery-print-export-all" class="btn btn-warning btn-block">导出全部（按当前搜索条件，不分页）</button>'
					+ '</div>',
				success: function(layero, index) {
					layero.find('#btn-delivery-print-export-selected').on('click', function() {
						var rows = $('#bootstrap-table').bootstrapTable('getSelections');
						if (!rows || rows.length === 0) {
							$.modal.msgWarning('请先勾选要导出的配送单');
							return;
						}
						var ids = [];
						for (var i = 0; i < rows.length; i++) {
							ids.push(rows[i].deliveryId);
						}
						openPrintExportForm('selected', ids.join(','));
						layer.close(index);
					});
					layero.find('#btn-delivery-print-export-all').on('click', function() {
						openPrintExportForm('all', null);
						layer.close(index);
					});
				}
			});
		}

		function openPrintExportForm(exportMode, idsComma) {
			var action = prefix + '/printExport';
			var form = $('<form method="get" action="' + action + '" target="_blank"></form>');
			form.append($('<input type="hidden" name="exportMode" />').val(exportMode));
			if (exportMode === 'selected' && idsComma) {
				form.append($('<input type="hidden" name="ids" />').val(idsComma));
			} else if (exportMode === 'all') {
				var arr = $('#delivery-form').serializeArray();
				for (var j = 0; j < arr.length; j++) {
					if (!arr[j].name || arr[j].value === '') {
						continue;
					}
					form.append($('<input type="hidden" />').attr('name', arr[j].name).val(arr[j].value));
				}
			}
			$('body').append(form);
			form.trigger('submit');
			form.remove();
		}

	</script>
</body>
</html>
