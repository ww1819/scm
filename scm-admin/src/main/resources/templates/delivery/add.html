	<th:block th:include="include :: footer" />

	<th:block th:include="include :: bootstrap-table-resizable-js" />
	<script>
	    var prefix = ctx + "delivery/delivery";
	    var DETAIL_OPERATION_COL_WIDTH = 175;
	    var DETAIL_OP_PANEL_RIGHT = 10;
	    var DETAIL_ROW_HEIGHT = 44;
	    var DETAIL_HSCROLL_GUTTER = 14;
	    var detailColumnWidths = {};
	    var DETAIL_COL_RESIZE_SKIP = { btSelectItem: 1, index: 1, operation: 1 };
	    /** 默认列宽（保证表头完整显示；含排序图标预留） */
	    var DETAIL_DEFAULT_COL_WIDTHS = {
	        btSelectItem: 42,
	        index: 56,
	        materialCode: 120,
	        materialName: 156,
	        specification: 120,
	        unit: 60,
	        remainingQuantity: 108,
	        deliveryQuantity: 80,
	        price: 92,
	        amount: 100,
	        packCoefficient: 100,
	        batchNo: 160,
	        expireDate: 118,
	        productionDate: 118,
	        mainBarcode: 150,
	        auxBarcode: 150,
	        manufacturer: 160,
	        model: 80,
	        registerNo: 200,
	        nationalInsuranceCode: 160,
	        remark: 140
	    };

	    function seedDetailDefaultColumnWidths() {
	        $.extend(detailColumnWidths, DETAIL_DEFAULT_COL_WIDTHS);
	        var opt = $('#detail-table').bootstrapTable('getOptions');
	        if (opt && opt.columns && opt.columns[0]) {
	            $.each(opt.columns[0], function (_, col) {
	                if (!col) {
	                    return;
	                }
	                if (col.checkbox) {
	                    detailColumnWidths.btSelectItem = parseInt(col.width, 10) || 42;
	                    return;
	                }
	                if (col.field && col.width) {
	                    var w = parseInt(col.width, 10);
	                    if (w > 0) {
	                        detailColumnWidths[col.field] = Math.max(
	                            detailColumnWidths[col.field] || 0,
	                            w
	                        );
	                    }
	                }
	            });
	        }
	    }

	    function escapeHtmlForBarcode(s) {
	        if (s == null || s === '') return '';
	        return String(s)
	            .replace(/&/g, '&amp;')
	            .replace(/</g, '&lt;')
	            .replace(/>/g, '&gt;');
	    }

	    function escapeAttrForInput(s) {
	        return escapeHtmlForBarcode(s).replace(/"/g, '&quot;');
	    }

	    function detailCellTextHtml(value) {
	        if (value == null || value === '') {
	            return '';
	        }
	        var s = String(value);
	        return '<span class="detail-cell-text" title="' + escapeAttrForInput(s) + '">' + escapeHtmlForBarcode(s) + '</span>';
	    }

	    function detailSortText(a, b) {
	        var sa = (a == null || a === undefined) ? '' : String(a);
	        var sb = (b == null || b === undefined) ? '' : String(b);
	        return sa.localeCompare(sb, 'zh-CN', { numeric: true, sensitivity: 'base' });
	    }

	    function detailSortNumber(a, b) {
	        var na = parseFloat(a);
	        var nb = parseFloat(b);
	        if (isNaN(na)) {
	            na = 0;
	        }
	        if (isNaN(nb)) {
	            nb = 0;
	        }
	        return na - nb;
	    }

	    function detailRowAmountValue(row) {
	        if (!row) {
	            return 0;
	        }
	        var amt = parseFloat(row.amount);
	        if (!isNaN(amt)) {
	            return amt;
	        }
	        return parseFloat(row.deliveryQuantity || 0) * parseFloat(row.price || 0) || 0;
	    }

	    function detailSortAmount(a, b, rowA, rowB) {
	        return detailRowAmountValue(rowA) - detailRowAmountValue(rowB);
	    }

	    function cleanupDetailTableLegacyWidgets() {
	        var $bt = $('#detail-table').closest('.bootstrap-table');
	        $bt.find('.fixed-columns-right').hide();
	        $bt.find('.detail-col-resize-bar').remove();
	    }

	    function detailTextInputHtml(value, index, maxlength, blurFn) {
	        var safe = escapeAttrForInput(value != null ? String(value) : '');
	        var titleAttr = safe ? (' title="' + safe + '"') : '';
	        return '<input type="text" class="form-control input-sm detail-text-input" value="' + safe + '"' + titleAttr + ' ' +
	               'maxlength="' + maxlength + '" onblur="' + blurFn + '(this, ' + index + ')" ' +
	               'onkeypress="if(event.keyCode==13){this.blur();return false;}" />';
	    }

	    function formatDetailDateValue(value) {
	        if (!value) {
	            return '';
	        }
	        if (typeof value === 'string') {
	            return value.length >= 10 ? value.substring(0, 10) : value;
	        }
	        var date = new Date(value);
	        if (isNaN(date.getTime())) {
	            return '';
	        }
	        return date.getFullYear() + '-' +
	            String(date.getMonth() + 1).padStart(2, '0') + '-' +
	            String(date.getDate()).padStart(2, '0');
	    }

	    function detailDateInputHtml(value, index, field, blurFn) {
	        var safe = escapeAttrForInput(formatDetailDateValue(value));
	        var titleAttr = safe ? (' title="' + safe + '"') : '';
	        return '<input type="text" class="form-control input-sm detail-date-input date-input" value="' + safe + '"' + titleAttr + ' ' +
	               'placeholder="年/月/日" data-field="' + field + '" data-index="' + index + '" ' +
	               'onblur="' + blurFn + '(this, ' + index + ')" ' +
	               'onkeypress="if(event.keyCode==13){this.blur();return false;}" />';
	    }

	    /** 明细单元格悬停显示完整内容（列宽不足被省略时） */
	    function initDetailCellTitles() {
	        var $table = $('#detail-table');
	        var data = [];
	        try {
	            data = $table.bootstrapTable('getData') || [];
	        } catch (e) {
	            return;
	        }
	        $table.closest('.bootstrap-table').find('.fixed-table-body tbody tr').each(function () {
	            var idx = $(this).data('index');
	            if (idx === undefined || idx === null || !data[idx]) {
	                return;
	            }
	            var row = data[idx];
	            $(this).find('td[data-field]').each(function () {
	                var field = $(this).attr('data-field');
	                if (!field || field === 'btSelectItem' || field === 'operation' || field === 'index') {
	                    return;
	                }
	                var $td = $(this);
	                var $inp = $td.find('input').first();
	                var title = '';
	                if ($inp.length) {
	                    title = ($inp.val() || '').trim();
	                } else if (field === 'price') {
	                    title = row.price ? ('¥' + parseFloat(row.price).toFixed(2)) : '¥0.00';
	                } else if (field === 'amount') {
	                    var amt = parseFloat(row.amount);
	                    if (isNaN(amt)) {
	                        amt = parseFloat(row.deliveryQuantity || 0) * parseFloat(row.price || 0);
	                    }
	                    title = '¥' + (isNaN(amt) ? 0 : amt).toFixed(2);
	                } else if (field === 'remainingQuantity' || field === 'deliveryQuantity') {
	                    var n = parseFloat(row[field]);
	                    title = isNaN(n) ? '0.00' : n.toFixed(2);
	                } else if (field === 'packCoefficient') {
	                    if (row.packCoefficient != null && row.packCoefficient !== '' && !isNaN(parseFloat(row.packCoefficient))) {
	                        title = String(parseFloat(row.packCoefficient));
	                    } else {
	                        title = '-';
	                    }
	                } else {
	                    var val = row[field];
	                    if (val == null || val === '') {
	                        title = (field === 'manufacturer' || field === 'registerNo') ? '-' : '';
	                    } else {
	                        title = String(val);
	                    }
	                }
	                if (title) {
	                    $td.attr('title', title);
	                    $inp.attr('title', title);
	                    $td.find('.detail-cell-text').attr('title', title);
	                } else {
	                    $td.removeAttr('title');
	                    $inp.removeAttr('title');
	                }
	            });
	        });
	    }

	    function getDeliveryDetailTableMinWidth() {
	        var sum = 0;
	        var opt = $('#detail-table').bootstrapTable('getOptions');
	        if (opt && opt.columns && opt.columns[0]) {
	            $.each(opt.columns[0], function (_, col) {
	                if (!col || col.field === 'operation') {
	                    return;
	                }
	                if (col.checkbox) {
	                    sum += parseInt(col.width, 10) || 42;
	                    return;
	                }
	                if (col.width) {
	                    sum += parseInt(col.width, 10) || 0;
	                }
	            });
	        }
	        return sum > 0 ? sum + 8 : 800;
	    }

	    function ensureDetailTableColgroup($table, colCount) {
	        if (!$table || !$table.length) {
	            return $();
	        }
	        var $colgroup = $table.children('colgroup');
	        if (!$colgroup.length) {
	            $colgroup = $('<colgroup></colgroup>');
	            $table.prepend($colgroup);
	        }
	        while ($colgroup.children('col').length < colCount) {
	            $colgroup.append('<col />');
	        }
	        while ($colgroup.children('col').length > colCount) {
	            $colgroup.children('col:last').remove();
	        }
	        return $colgroup;
	    }

	    /** 表头列宽 → 表体所有行 + colgroup（固定表头双表必须按列索引同步） */
	    function applyDetailColumnWidthFromHeader() {
	        var $container = $('#detail-table').closest('.bootstrap-table').find('.fixed-table-container').first();
	        var $headTable = $container.children('.fixed-table-header').find('table').first();
	        var $bodyTable = $container.children('.fixed-table-body').find('#detail-table');
	        if (!$bodyTable.length) {
	            $bodyTable = $container.children('.fixed-table-body').find('table').not('.fixed-table-border').first();
	        }
	        if (!$headTable.length || !$bodyTable.length) {
	            return;
	        }
	        var $ths = $headTable.find('thead tr:first th');
	        var colCount = $ths.length;
	        if (colCount < 1) {
	            return;
	        }
	        ensureDetailTableColgroup($headTable, colCount);
	        ensureDetailTableColgroup($bodyTable, colCount);
	        var totalW = 0;
	        var setW = function (el, w, lockMax) {
	            if (!el) {
	                return;
	            }
	            var ws = w + 'px';
	            el.style.setProperty('width', ws, 'important');
	            el.style.setProperty('min-width', ws, 'important');
	            if (lockMax) {
	                el.style.setProperty('max-width', ws, 'important');
	            } else {
	                el.style.setProperty('max-width', 'none', 'important');
	            }
	        };
	        $ths.each(function () {
	            var colIdx = this.cellIndex;
	            if (colIdx < 0) {
	                return;
	            }
	            var field = $(this).attr('data-field');
	            var w;
	            if (field === 'operation') {
	                w = 0;
	                $(this).css({ padding: 0, border: 0, fontSize: 0, lineHeight: 0, overflow: 'hidden' });
	            } else if (field && detailColumnWidths[field]) {
	                w = detailColumnWidths[field];
	            } else if ($(this).hasClass('bs-checkbox')) {
	                w = detailColumnWidths.btSelectItem || 42;
	            } else {
	                w = Math.ceil(this.getBoundingClientRect().width);
	                if (!w || w < 40) {
	                    w = 40;
	                }
	                if (field) {
	                    detailColumnWidths[field] = w;
	                }
	            }
	            var lockMax = $(this).hasClass('bs-checkbox');
	            setW(this, w, lockMax);
	            $headTable.find('colgroup col').eq(colIdx).each(function () {
	                setW(this, w, false);
	            });
	            $bodyTable.find('colgroup col').eq(colIdx).each(function () {
	                setW(this, w, false);
	            });
	            $bodyTable.find('tbody tr').each(function () {
	                var cell = this.cells[colIdx];
	                if (cell) {
	                    setW(cell, w, lockMax);
	                    if (field === 'operation') {
	                        cell.style.setProperty('padding', '0', 'important');
	                        cell.style.setProperty('border', '0', 'important');
	                    }
	                }
	            });
	            totalW += w;
	        });
	        if (totalW > 0) {
	            var tw = totalW + 'px';
	            $headTable[0].style.setProperty('width', tw, 'important');
	            $bodyTable[0].style.setProperty('width', tw, 'important');
	        }
	        updateDetailHscrollRailSize();
	    }

	    function initDetailHeaderColumnResize() {
	        if (typeof $.fn.resizableColumns !== 'function') {
	            return;
	        }
	        var $headTable = $('#detail-table').closest('.bootstrap-table').find('.fixed-table-header table').first();
	        if (!$headTable.length) {
	            return;
	        }
	        if ($headTable.data('resizableColumns')) {
	            $headTable.data('resizableColumns').destroy();
	        }
	        $headTable.find('thead th').each(function () {
	            var field = $(this).data('field');
	            if ($(this).hasClass('bs-checkbox') || (field && DETAIL_COL_RESIZE_SKIP[field])) {
	                $(this).attr('data-noresize', 'true');
	            } else {
	                $(this).removeAttr('data-noresize');
	            }
	        });
	        $headTable.resizableColumns({
	            store: false,
	            resizeFromBody: false,
	            selector: 'thead tr:first > th[data-field]:not([data-noresize])',
	            resize: function () {
	                applyDetailColumnWidthFromHeader();
	            },
	            stop: function () {
	                applyDetailColumnWidthFromHeader();
	                requestAnimationFrame(function () {
	                    applyDetailColumnWidthFromHeader();
	                    scheduleDetailHeaderAlign();
	                });
	            }
	        });
	    }

	    function applyDeliveryDetailTableMinWidth() {
	        var w = getDeliveryDetailTableMinWidth() + 'px';
	        var $container = $('#detail-table').closest('.bootstrap-table').find('.fixed-table-container').first();
	        if (!$container.length) {
	            return;
	        }
	        $container.children('.fixed-table-header').find('table').css('min-width', w);
	        $container.children('.fixed-table-body').children('table').css('min-width', w);
	    }

	    function buildDetailOperationFixedPanel() {
	        var $table = $('#detail-table');
	        var $wrap = $('#delivery-detail-list-section');
	        var $bt = $table.closest('.bootstrap-table');
	        if (!$bt.length) {
	            return;
	        }
	        try {
	            if (!$table.bootstrapTable('getOptions')) {
	                return;
	            }
	        } catch (e) {
	            return;
	        }
	        $wrap.addClass('detail-has-fixed-op');
	        $bt.find('.fixed-columns-right').hide();

	        var $panel = $bt.children('.detail-op-fixed-panel');
	        if (!$panel.length) {
	            $panel = $('<div class="detail-op-fixed-panel">' +
	                '<div class="detail-op-fixed-head">操作</div>' +
	                '<div class="detail-op-fixed-body"></div></div>');
	            $bt.append($panel);
	        }

	        var data = $table.bootstrapTable('getData') || [];
	        var rowsHtml = '';
	        for (var i = 0; i < data.length; i++) {
	            rowsHtml += '<div class="detail-op-fixed-row" data-index="' + i + '">' +
	                deliveryDetailOperationHtml(i) + '</div>';
	        }
	        $panel.find('.detail-op-fixed-body').html('<div class="detail-op-fixed-body-inner">' + rowsHtml + '</div>');
	        layoutDetailOperationFixedPanel();
	    }

	    function layoutDetailOperationFixedPanel() {
	        var $bt = $('#detail-table').closest('.bootstrap-table');
	        var $panel = $bt.children('.detail-op-fixed-panel');
	        if (!$panel.length) {
	            return;
	        }
	        var $container = $bt.find('.fixed-table-container').first();
	        var $mainHeader = $container.children('.fixed-table-header');
	        var $mainBody = $container.children('.fixed-table-body');
	        var top = $container.position().top;
	        var h = $container.outerHeight();
	        var headH = $mainHeader.outerHeight() || 38;
	        var panelH = Math.max((h || 0) - DETAIL_HSCROLL_GUTTER, 0);
	        $panel.css({
	            top: top + 'px',
	            height: (panelH > 0 ? panelH : '') + (panelH > 0 ? 'px' : ''),
	            width: DETAIL_OPERATION_COL_WIDTH + 'px',
	            right: DETAIL_OP_PANEL_RIGHT + 'px'
	        });
	        $panel.find('.detail-op-fixed-head').css({
	            height: headH + 'px',
	            lineHeight: headH + 'px'
	        });
	        layoutDetailHscrollRail();
	        scheduleDetailOperationPanelSync();
	        syncDetailOperationPanelScrollOffset();
	    }

	    function layoutDetailHscrollRail() {
	        var $bt = $('#detail-table').closest('.bootstrap-table');
	        var $rail = $bt.children('.detail-hscroll-rail');
	        if (!$rail.length) {
	            return;
	        }
	        var $wrap = $('#delivery-detail-list-section');
	        var rightReserve = $wrap.hasClass('detail-has-fixed-op')
	            ? (DETAIL_OPERATION_COL_WIDTH + DETAIL_OP_PANEL_RIGHT) : 0;

	    /** 明细外包层：从当前位置铺满到窗口（标签页）底部 */
	    function layoutDeliveryAddDetailWrapHeight() {
	        var $page = $('.delivery-form-main');
	        var $section = $page.children('.delivery-detail-section');
	        var $wrap = $('#delivery-detail-list-section');
	        var $toolbar = $section.find('.delivery-detail-toolbar');
	        if (!$page.length || !$wrap.length || !$section.length) {
	            return;
	        }
	        var el = $wrap[0];
	        var docEl = document.documentElement;
	        var viewH = (docEl && docEl.clientHeight) ? docEl.clientHeight : (window.innerHeight || 0);
	        var wrapTop = el.getBoundingClientRect().top;
	        var sectionTop = $section[0].getBoundingClientRect().top;
	        var toolbarH = $toolbar.length ? $toolbar.outerHeight(true) : 0;
	        var hByWrap = Math.floor(viewH - wrapTop - 10);
	        var hBySection = Math.floor(viewH - sectionTop - toolbarH - 14);
	        var h = Math.max(hByWrap, hBySection, 480);
	        $section.css({
	            display: 'flex',
	            flexDirection: 'column',
	            flex: '1 1 auto',
	            minHeight: '0',
	            overflow: 'hidden'
	        });
	        el.style.setProperty('flex', '1 1 auto', 'important');
	        el.style.setProperty('height', h + 'px', 'important');
	        el.style.setProperty('min-height', '480px', 'important');
	        el.style.removeProperty('max-height');
	        el.style.setProperty('box-sizing', 'border-box', 'important');
	    }

	            detailTableLayoutLock = false;
	        }
	    }

	    /** 操作列：复制拆行 + 删除 */
	    function deliveryDetailOperationHtml(rowIndex) {
	        return '<div class="detail-op-btns">' +
	            '<a class="btn btn-xs detail-op-btn-copy" href="javascript:void(0)" onclick="copyDetailRowByIndex(this,' + rowIndex + ')" title="复制拆行（不同批号）"><i class="fa fa-copy"></i><span>复制</span></a>' +
	            '<a class="btn btn-xs detail-op-btn-del" href="javascript:void(0)" onclick="deleteDetailRowByIndex(this,' + rowIndex + ')" title="删除该行明细"><i class="fa fa-trash"></i><span>删除</span></a>' +
	            '</div>';
	    }
	    function deliveryLineGroupKey(row) {
	        if (!row) return '';
	        if (row.orderDetailId != null && row.orderDetailId !== '') return 'o:' + row.orderDetailId;
	        if (row.zsOrderDetailId) return 'z:' + row.zsOrderDetailId;
	        return '';
	    }
	    function sumDeliveryQtyForGroup(data, groupKey) {
	        if (!groupKey) return null;
	        var s = 0;
	        for (var i = 0; i < data.length; i++) {
	            if (deliveryLineGroupKey(data[i]) === groupKey) {
	                var v = data[i].deliveryQuantity;
	                if (v === '' || v === null || v === undefined) continue;
	                var x = parseFloat(v);
	                s += isNaN(x) ? 0 : x;
	            }
	        }
	        return s;
	    }
	    /** 提交前剔除 bootstrap-table 复选框等内部字段，避免 JSON 含 "0":false 导致后端反序列化失败 */
	    function sanitizeDeliveryDetailRowsForSave(rows) {
	        var strip = { btSelectItem: 1, state: 1, index: 1 };
	        var out = [];
	        for (var i = 0; i < rows.length; i++) {
	            var row = rows[i];
	            var clean = {};
	            for (var k in row) {
	                if (!Object.prototype.hasOwnProperty.call(row, k)) continue;
	                if (strip[k] || /^\d+$/.test(k)) continue;
	                clean[k] = row[k];
	            }
	            out.push(clean);
	        }
	        return out;
	    }
	    /** 从当前行 DOM（含右侧固定列）解析行号，避免操作列 HTML 里写死的 index 与表格不同步 */
	    function resolveDetailRowIndex(btn, indexHint) {
	        if (btn) {
	            var $tr = $(btn).closest('tr');
	            var ri = $tr.data('index');
	            if (ri === undefined || ri === null) {
	                ri = $tr.attr('data-index');
	            }
	            if (ri !== undefined && ri !== null && ri !== '') {
	                var parsed = parseInt(ri, 10);
	                if (!isNaN(parsed) && parsed >= 0) {
	                    return parsed;
	                }
	            }
	        }
	        if (indexHint !== undefined && indexHint !== null && String(indexHint) !== '') {
	            var p2 = parseInt(indexHint, 10);
	            if (!isNaN(p2) && p2 >= 0) {
	                return p2;
	            }
	        }
	        return -1;
	    }
	    window.copyDetailRowByIndex = function(btn, indexHint) {
	        var snapshot = $('#detail-table').bootstrapTable('getData');
	        var rowIndex = resolveDetailRowIndex(btn, indexHint);
	        if (!snapshot || rowIndex < 0 || rowIndex >= snapshot.length) {
	            $.modal.alertWarning('无法定位要复制的行，请刷新页面后重试。');
	            return;
	        }
	        var allData = snapshot.slice();
	        var row = allData[rowIndex];
	        var pack = row.packCoefficient != null && row.packCoefficient !== '' ? parseFloat(row.packCoefficient) : NaN;
	        var rawDq = row.deliveryQuantity;
	        var dqNum = (rawDq === '' || rawDq === null || rawDq === undefined) ? NaN : parseFloat(rawDq);
	        var eps = 1e-6;
	        function reloadAfterCopy() {
	            var totalAmount = 0;
	            for (var i = 0; i < allData.length; i++) {
	                var q = parseFloat(allData[i].deliveryQuantity);
	                if (isNaN(q)) q = 0;
	                var p = parseFloat(allData[i].price || 0);
	                allData[i].amount = q * p;
	                totalAmount += allData[i].amount;
	            }
	            $("input[name='deliveryAmount']").val(totalAmount.toFixed(2));
	            reloadDetailTableData(allData);
	            setTimeout(function() {
	                $('#detail-table').find('.date-input').data('laydate-init', false);
	                if (typeof initDatePickers === 'function') initDatePickers();
	            }, 100);
	        }
	        if (!isNaN(pack) && pack > 0) {
	            if (isNaN(dqNum)) {
	                $.modal.alertWarning('请先填写本行配送数量。');
	                return;
	            }
	            var dq = dqNum;
	            if (Math.abs(dq - pack) < eps) {
	                $.modal.alertWarning('当前行配送数量已等于打包系数，若需不同批号、效期，请直接在本行修改，勿再复制拆行。');
	                return;
	            }
	            if (dq < pack - eps) {
	                $.modal.alertWarning('配送数量不足一个打包单位（' + pack + '），无法拆分。');
	                return;
	            }
	            var newRow = JSON.parse(JSON.stringify(row));
	            newRow.detailId = null;
	            newRow.deliveryQuantity = pack;
	            newRow.amount = pack * parseFloat(row.price || 0);
	            newRow.batchNo = '';
	            newRow.productionDate = '';
	            newRow.expireDate = '';
	            newRow.mainBarcode = '';
	            newRow.auxBarcode = '';
	            allData[rowIndex].deliveryQuantity = dq - pack;
	            allData[rowIndex].amount = (dq - pack) * parseFloat(row.price || 0);
	            allData.splice(rowIndex + 1, 0, newRow);
	            reloadAfterCopy();
	            $.modal.msgSuccess('已拆行：原行保留数量 ' + (dq - pack).toFixed(2) + '，新行数量 ' + pack + '，请填写新行批号与效期');
	            return;
	        }
	        if (isNaN(dqNum)) {
	            $.modal.alertWarning('请先填写本行配送数量。');
	            return;
	        }
	        var remRaw = row.remainingQuantity;
	        var rem = (remRaw === '' || remRaw === null || remRaw === undefined) ? NaN : parseFloat(remRaw);
	        if (!isNaN(rem) && Math.abs(dqNum - rem) < eps) {
	            $.modal.alertWarning('当前配送数量等于订单明细待配送数量，无法复制。请直接在本行修改批号、效期等信息，或调整配送数量后再复制。');
	            return;
	        }
	        var newRow2 = JSON.parse(JSON.stringify(row));
	        newRow2.detailId = null;
	        newRow2.deliveryQuantity = 0;
	        newRow2.amount = 0;
	        newRow2.batchNo = '';
	        newRow2.productionDate = '';
	        newRow2.expireDate = '';
	        newRow2.mainBarcode = '';
	        newRow2.auxBarcode = '';
	        allData.splice(rowIndex + 1, 0, newRow2);
	        reloadAfterCopy();
	        $.modal.msgSuccess('已复制明细，新行数量默认为 0，请填写数量及批号、效期等');
	    };

	    // 更新数量
	    function updateQuantity(input, index) {
	        var value = $(input).val();
	        var trimmed = (value || '').trim();
	        if (trimmed !== '' && (isNaN(trimmed) || parseFloat(trimmed) < 0)) {
	            $.modal.alertWarning('数量必须是大于等于0的数字');
	            $(input).focus();
	            return;
	        }
	        var $tr = $(input).closest('tr');
	        var data = $('#detail-table').bootstrapTable('getData');
	        var rowIndex = $tr.data('index') !== undefined ? $tr.data('index') : index;
	        if (data[rowIndex]) {
	            var oldQtyRaw = data[rowIndex].deliveryQuantity;
	            var newVal = trimmed === '' ? '' : parseFloat(trimmed);
	            data[rowIndex].deliveryQuantity = newVal;
	            var gk = deliveryLineGroupKey(data[rowIndex]);
	            if (gk && data[rowIndex].lineApplyQty != null && data[rowIndex].lineApplyQty !== '') {
	                var cap = parseFloat(data[rowIndex].lineApplyQty);
	                if (!isNaN(cap) && cap >= 0) {
	                    var sum = sumDeliveryQtyForGroup(data, gk);
	                    if (sum > cap + 1e-6) {
	                        data[rowIndex].deliveryQuantity = oldQtyRaw;
	                        if (oldQtyRaw === '' || oldQtyRaw === null || oldQtyRaw === undefined) {
	                            $(input).val('');
	                        } else {
	                            $(input).val(parseFloat(oldQtyRaw).toFixed(2));
	                        }
	                        $.modal.alertWarning('同一订单明细行配送数量合计不能超过申请数量（' + cap.toFixed(2) + '）');
	                        return;
	                    }
	                }
	            }
	            var qty = (newVal === '' || newVal === null || newVal === undefined) ? 0 : parseFloat(newVal);
	            if (isNaN(qty)) qty = 0;
	            var price = parseFloat(data[rowIndex].price || 0);
	            data[rowIndex].amount = qty * price;
	            var amountCell = $tr.find('td[data-field="amount"]');
	            amountCell.text('¥' + (qty * price).toFixed(2));
	        }
	    }

        function submitHandler() {
	        if ($.validate.form()) {
	            // 获取表格中的所有明细数据
	            var detailData = $('#detail-table').bootstrapTable('getData');

	            // 转换字段名：quantity -> deliveryQuantity
	            var caps = {};
	            for (var j = 0; j < detailData.length; j++) {
	                var d0 = detailData[j];
	                var gk0 = deliveryLineGroupKey(d0);
	                if (gk0 && d0.lineApplyQty != null && d0.lineApplyQty !== '' && caps[gk0] === undefined) {
	                    caps[gk0] = parseFloat(d0.lineApplyQty);
	                }
	            }
	            for (var gk1 in caps) {
	                if (!isNaN(caps[gk1])) {
	                    var s0 = sumDeliveryQtyForGroup(detailData, gk1);
	                    if (s0 > caps[gk1] + 1e-6) {
	                        $.modal.alertWarning('同一订单明细行配送数量合计不能超过申请数量（' + caps[gk1].toFixed(2) + '）');
	                        return;
	                    }
	                }
	            }
	            for (var i = 0; i < detailData.length; i++) {
	                var detail = detailData[i];
	                // 如果存在quantity字段，转换为deliveryQuantity
	                if (detail.quantity !== undefined && detail.deliveryQuantity === undefined) {
	                    detail.deliveryQuantity = detail.quantity;
	                    delete detail.quantity;
	                }
	                // 确保materialId存在（从materialCode或其他字段获取）
	                if (!detail.materialId && detail.materialCode) {
	                    // 这里可能需要通过materialCode查询materialId，暂时留空
	                }
	                // 计算金额
	                var qty = parseFloat(detail.deliveryQuantity || 0);
	                var price = parseFloat(detail.price || 0);
	                detail.amount = qty * price;
	                delete detail.lineApplyQty;
	            }

	            // 序列化表单数据
	            var formData = $("#form-delivery-add").serializeArray();

	            // 处理空字符串：将空字符串转换为 null（不传递该字段）
	            formData = formData.filter(function(item) {
	                // 对于 hospitalId 和 supplierId，如果值为空字符串，则不传递
	                if ((item.name === 'hospitalId' || item.name === 'supplierId') && item.value === '') {
	                    return false;
	                }
	                return true;
	            });

	            // 添加明细数据（作为JSON字符串）
	            formData.push({
	                name: 'deliveryDetailsJson',
	                value: JSON.stringify(sanitizeDeliveryDetailRowsForSave(detailData))
	            });

	            // 使用自定义保存逻辑，保存成功后关闭标签页并刷新列表
	            $.modal.loading("正在处理中，请稍候...");
	            $.ajax({
	                url: prefix + "/add",
	                type: "post",
	                dataType: "json",
	                data: formData,
	                beforeSend: function (xhr, settings) {
	                    var csrftoken = $('meta[name=csrf-token]').attr('content');
	                    if (($.common.equalsIgnoreCase(settings.type, "POST"))) {
	                        xhr.setRequestHeader("X-CSRF-Token", csrftoken);
	                    }
	                },
	                success: function(result) {
	                    $.modal.closeLoading();
	                    if (result.code == web_status.SUCCESS) {
	                        $.modal.msgSuccess(result.msg);
	                        // 保存成功后，关闭标签页并刷新列表
	                        setTimeout(function() {
	                            closeItem();
	                            // 刷新父页面的表格
	                            if (window.parent && window.parent.$.table) {
	                                window.parent.$.table.refresh();
	                            }
	                        }, 1000);
	                    } else if (result.code == web_status.WARNING) {
	                        $.modal.alertWarning(result.msg);
	                    } else {
	                        $.modal.alertError(result.msg);
	                    }
	                },
	                error: function(xhr, status, error) {
	                    $.modal.closeLoading();
	                    // 检查是否是登录超时
	                    if (xhr.status == 401 || xhr.status == 403 || (xhr.responseJSON && xhr.responseJSON.code == 401)) {
	                        $.modal.alertError("登录已超时，请重新登录", function() {
	                            top.location.href = ctx + "login";
	                        });
	                    } else {
	                        $.modal.alertError("保存失败：" + (error || "未知错误"));
	                    }
	                }
	            });
	        }
	    }

	    function scmOrderDetailDeliveryCap(detail) {
	        if (!detail) {
	            return 0;
	        }
	        if (detail.undeliveredQty != null && detail.undeliveredQty !== '') {
	            var u = parseFloat(detail.undeliveredQty);

	        }
	        var oq = detail.orderQuantity != null ? parseFloat(detail.orderQuantity) : 0;
	        var a = detail.deliveredAuditedQty != null ? parseFloat(detail.deliveredAuditedQty) : 0;
	        var p = detail.deliveredPendingAuditQty != null ? parseFloat(detail.deliveredPendingAuditQty) : 0;
	        var cap = oq - a - p;
	        if (isNaN(cap) || cap < 0) {
	            return 0;
	        }
	        return cap;
	    }

	    // 引用第三方订单（zs_tp_order）生成配送明细草稿
	    function importZsOrder() {
	        var options = {
	            title: '选择第三方订单',
	            url: ctx + "delivery/delivery/zsOrder/select",
	            width: "1280",
	            height: "720",
	            btn: 0,
	            callBack: function(index, layero, selectedRowIds) {
	                var rowIds = selectedRowIds;
	                if (!rowIds || rowIds === '') {
	                    var body = $.modal.getChildFrame(index);
	                    rowIds = body.find('#rowIds').val();
	                }
	                if (!rowIds || rowIds == '') {
	                    $.modal.alertWarning("请至少选择一条第三方订单");
	                    return false;
	                }
	                var closeLayer = function() {
	                    var layerIndex = index || window.__deliveryZsOrderLayerIndex;
	                    try {
	                        if (!layerIndex && window.top) {
	                            layerIndex = window.top.__deliveryZsOrderLayerIndex;
	                        }
	                    } catch (e) { /* ignore */ }
	                    if (layerIndex) {
	                        top.layer.close(layerIndex);
	                    }
	                    window.__deliveryZsOrderLayerIndex = null;
	                    try {
	                        window.top.__deliveryZsOrderLayerIndex = null;
	                        delete window.top.__deliveryZsOrderCallBack;
	                        delete window.top.__deliveryZsOrderOpenerWin;
	                    } catch (e) { /* ignore */ }
	                    delete window.__deliveryZsOrderCallBack;
	                    delete window.__deliveryZsOrderOpenerWin;
	                };
	                var ids = rowIds.split(',');
	                var selectedId = ids[0];
	                $.ajax({
	                    url: prefix + "/selectZsOrder/" + encodeURIComponent(selectedId),
	                    type: "GET",
	                    dataType: "json",
	                    success: function(result) {
	                        if (result.code == 0 && result.data) {
	                            var data = result.data;
	                            if (data.orderNo) {
	                                $("input[name='orderNo']").val(data.orderNo);
	                            }
	                            if (data.orderAmount != null && data.orderAmount !== '') {
	                                $("input[name='deliveryAmount']").val(parseFloat(data.orderAmount).toFixed(2));
	                            }
	                            if (data.remark) {
	                                $("input[name='remark']").val(data.remark);
	                            }
	                            $("#orderId").val('');
	                            $("#zsOrderId").val(data.zsOrderId || '');
	                            $("#zsCustomerId").val(data.zsCustomerId || '');
	                            if (data.scmSupplierId != null && data.scmSupplierId !== '') {
	                                $("#supplierId").val(String(data.scmSupplierId));
	                            }
	                            if (data.hospitalId != null && data.hospitalId !== '') {
	                                $("#hospitalId").val(String(data.hospitalId));
	                            }
	                            $("#spdSupplierId").val(data.spdSupplierId || '');
	                            $("#srcOrderSupplierId").val(data.srcOrderSupplierId || '');
	                            $("#srcOrderSupplierName").val(data.srcOrderSupplierName || '');
	                            $("#srcOrderWarehouseId").val(data.srcOrderWarehouseId || '');
	                            $("#srcOrderWarehouseName").val(data.srcOrderWarehouseName || '');
	                            $("#srcOrderDeptId").val(data.srcOrderDeptId || '');
	                            $("#srcOrderDeptName").val(data.srcOrderDeptName || '');
	                            if (data.orderDate) {
	                                var orderDate = new Date(data.orderDate);
	                                var formattedDate = orderDate.getFullYear() + '-' +
	                                    String(orderDate.getMonth() + 1).padStart(2, '0') + '-' +
	                                    String(orderDate.getDate()).padStart(2, '0');
	                                $("#expectedDeliveryDate").val(formattedDate);
	                                $("#orderDateField").val(formattedDate);
	                            } else {
	                                $("#orderDateField").val('');
	                            }
	                            $("#warehouseField").val(data.warehouse || '');
	                            if (data.deliveryDetails && data.deliveryDetails.length > 0) {
	                                var detailData = [];
	                                for (var i = 0; i < data.deliveryDetails.length; i++) {
	                                    var detail = data.deliveryDetails[i];
	                                    var applyCap = detail.lineApplyQty != null && detail.lineApplyQty !== '' ? parseFloat(detail.lineApplyQty)
	                                        : (detail.remainingQuantity != null && detail.remainingQuantity !== '' ? parseFloat(detail.remainingQuantity)
	                                            : (detail.deliveryQuantity != null && detail.deliveryQuantity !== '' ? parseFloat(detail.deliveryQuantity) : 0));
	                                    if (isNaN(applyCap) || applyCap <= 0) {
	                                        continue;
	                                    }
	                                    detailData.push({
	                                        materialId: detail.materialId || 0,
	                                        zsOrderDetailId: detail.zsOrderDetailId || '',
	                                        materialCode: detail.materialCode || '',
	                                        materialName: detail.materialName || '',
	                                        specification: detail.specification || '',
	                                        model: detail.model || '',
	                                        unit: detail.unit || '',
	                                        refZsLineQty: detail.refZsLineQty != null && detail.refZsLineQty !== '' ? parseFloat(detail.refZsLineQty) : null,
	                                        remainingQuantity: detail.remainingQuantity != null && detail.remainingQuantity !== '' ? parseFloat(detail.remainingQuantity) : (detail.deliveryQuantity || 0),
	                                        deliveryQuantity: detail.deliveryQuantity != null && detail.deliveryQuantity !== '' ? parseFloat(detail.deliveryQuantity) : 0,
	                                        lineApplyQty: detail.lineApplyQty != null && detail.lineApplyQty !== '' ? parseFloat(detail.lineApplyQty) : parseFloat(detail.remainingQuantity || detail.deliveryQuantity || 0),
	                                        price: detail.price || 0,
	                                        amount: detail.amount || 0,
	                                        packCoefficient: detail.packCoefficient != null ? detail.packCoefficient : null,
	                                        batchNo: detail.batchNo || '',
	                                        mainBarcode: detail.mainBarcode || '',
	                                        auxBarcode: detail.auxBarcode || '',
	                                        productionDate: detail.productionDate || '',
	                                        expireDate: detail.expireDate || '',
	                                        manufacturer: detail.manufacturer || '',
	                                        registerNo: detail.registerNo || '',
	                                        nationalInsuranceCode: detail.nationalInsuranceCode || '',
	                                        remark: detail.remark || ''
	                                    });
	                                }
	                                if (data.deliveryDetails.length > 0 && detailData.length === 0) {
	                                    $.modal.msgWarning('该第三方订单无可配送明细（可配送数量均为0），未带入任何行');
	                                }
	                                reloadDetailTableData(detailData);
	                            } else {
	                                reloadDetailTableData([]);
	                            }
	                            closeLayer();
	                            $.modal.msgSuccess("已引入第三方订单数据，请核对后保存");
	                        } else {
	                            $.modal.alertError(result.msg || "加载第三方订单失败");
	                        }
	                    },
	                    error: function() {
	                        $.modal.alertError("加载第三方订单失败");
	                    }
	                });
	            }
	        };
	        window.__deliveryZsOrderCallBack = options.callBack;
	        window.__deliveryZsOrderOpenerWin = window;
	        try {
	            window.top.__deliveryZsOrderCallBack = options.callBack;
	            window.top.__deliveryZsOrderOpenerWin = window;
	        } catch (e) { /* ignore */ }
	        $.modal.openOptions(options);
	    }

	    // 引入订单 - 打开订单选择对话框
	    function importOrder() {
	        var options = {
	            title: '选择订单',
	            url: ctx + "order/order/select",
	            width: "1280",
	            height: "720",
	            btn: 0,
	            callBack: function(index, layero, selectedRowIds) {
	                var orderId = selectedRowIds;
	                if (!orderId || orderId === '') {
	                    var body = $.modal.getChildFrame(index);
	                    orderId = body.find('#rowIds').val();
	                }
	                if (!orderId || orderId == '') {
	                    $.modal.alertWarning("请至少选择一条记录");
	                    return false;
	                }
	                var closeLayer = function() {
	                    var layerIndex = index || window.__deliveryOrderLayerIndex;
	                    try {
	                        if (!layerIndex && window.top) {
	                            layerIndex = window.top.__deliveryOrderLayerIndex;
	                        }
	                    } catch (e) { /* ignore */ }
	                    if (layerIndex) {
	                        top.layer.close(layerIndex);
	                    }
	                    window.__deliveryOrderLayerIndex = null;
	                    try {
	                        window.top.__deliveryOrderLayerIndex = null;
	                        delete window.top.__deliveryOrderCallBack;
	                        delete window.top.__deliveryOrderOpenerWin;
	                    } catch (e) { /* ignore */ }
	                    delete window.__deliveryOrderCallBack;
	                    delete window.__deliveryOrderOpenerWin;
	                };

	                // 获取选中的订单ID（只取第一个）
	                var ids = orderId.split(',');
	                var selectedOrderId = ids[0];

	                // 通过AJAX获取订单详细信息
	                $.ajax({
	                    url: ctx + "order/order/" + selectedOrderId,
	                    type: "GET",
	                    dataType: "json",
	                    success: function(result) {
	                        if (result.code == 0 && result.data) {
	                            var order = result.data;
	                            $("#zsOrderId").val('');
	                            $("#zsCustomerId").val('');
	                            $("#spdSupplierId").val(order.spdSupplierId || '');
	                            if (order.orderId) {
	                                $("#orderId").val(order.orderId);
	                            } else {
	                                $("#orderId").val('');
	                            }
	                            $("#srcOrderSupplierId").val(order.supplierId != null && order.supplierId !== '' ? String(order.supplierId) : '');
	                            $("#srcOrderSupplierName").val(order.orderSupplierName || order.supplierName || '');
	                            $("#srcOrderWarehouseId").val(order.warehouseId != null && order.warehouseId !== '' ? String(order.warehouseId) : '');
	                            $("#srcOrderWarehouseName").val(order.warehouse || '');
	                            $("#srcOrderDeptId").val(order.orderDeptId != null && order.orderDeptId !== '' ? String(order.orderDeptId) : '');
	                            $("#srcOrderDeptName").val(order.orderDeptName || order.department || '');
	                            // 填充表单字段
	                            if (order.orderNo) {
	                                $("input[name='orderNo']").val(order.orderNo);
	                            }
	                            if (order.hospitalId) {
	                                $("#hospitalId").val(order.hospitalId);
	                            }
	                            if (order.supplierId) {
	                                $("#supplierId").val(order.supplierId);
	                            }
	                            if (order.orderAmount) {
	                                $("input[name='deliveryAmount']").val(order.orderAmount);
	                            }
	                            if (order.orderDate) {
	                                var orderDate = new Date(order.orderDate);
	                                var formattedDate = orderDate.getFullYear() + '-' +
	                                    String(orderDate.getMonth() + 1).padStart(2, '0') + '-' +
	                                    String(orderDate.getDate()).padStart(2, '0');
	                                $("#expectedDeliveryDate").val(formattedDate);
	                                $("#orderDateField").val(formattedDate);
	                            } else {
	                                $("#orderDateField").val('');
	                            }
	                            $("#warehouseField").val(order.warehouse || '');
	                            if (order.remark) {
	                                $("input[name='remark']").val(order.remark);
	                            }

	                            // 填充订单明细到详细信息列表
	                            if (order.orderDetails && order.orderDetails.length > 0) {
	                                var detailData = [];
	                                for (var i = 0; i < order.orderDetails.length; i++) {
	                                    var detail = order.orderDetails[i];
	                                    var cap = scmOrderDetailDeliveryCap(detail);
	                                    if (isNaN(cap) || cap <= 0) {
	                                        continue;
	                                    }
	                                    var price = parseFloat(detail.purchasePrice) || 0;
	                                    var amt = price * cap;
	                                    if (isNaN(amt)) {
	                                        amt = 0;
	                                    }
	                                    var deliveryDetail = {
	                                        orderDetailId: detail.detailId || null,
	                                        materialId: detail.materialId || null,
	                                        materialCode: detail.materialCode || '',
	                                        materialName: detail.materialName || '',
	                                        specification: detail.specification || '',
	                                        model: detail.model || '',
	                                        unit: detail.unit || '',
	                                        refOrderLineQty: detail.orderQuantity != null ? parseFloat(detail.orderQuantity) : null,
	                                        remainingQuantity: cap,
	                                        deliveryQuantity: cap,
	                                        lineApplyQty: cap,
	                                        price: detail.purchasePrice || 0,
	                                        amount: amt,
	                                        packCoefficient: detail.packCoefficient != null ? detail.packCoefficient : null,
	                                        batchNo: '',
	                                        mainBarcode: '',
	                                        auxBarcode: '',
	                                        productionDate: '',
	                                        expireDate: '',
	                                        manufacturer: detail.manufacturer || '',
	                                        registerNo: detail.registerNo || '',
	                                        nationalInsuranceCode: '',
	                                        remark: detail.remark || ''
	                                    };
	                                    detailData.push(deliveryDetail);
	                                }
	                                if (order.orderDetails.length > 0 && detailData.length === 0) {
	                                    $.modal.msgWarning('该订单明细可配送数量均为0，未带入任何行');
	                                }
	                                reloadDetailTableData(detailData);
	                            } else {
	                                reloadDetailTableData([]);
	                            }

	                            closeLayer();
	                            $.modal.msgSuccess("订单信息已引入");
	                        } else {
	                            $.modal.alertError(result.msg || "获取订单信息失败");
	                        }
	                    },
	                    error: function() {
	                        $.modal.alertError("获取订单信息失败");
	                    }
	                });
	            }
	        };
	        window.__deliveryOrderCallBack = options.callBack;
	        window.__deliveryOrderOpenerWin = window;
	        try {
	            window.top.__deliveryOrderCallBack = options.callBack;
	            window.top.__deliveryOrderOpenerWin = window;
	        } catch (e) { /* ignore */ }
	        $.modal.openOptions(options);
	    }

	    // 关闭页面，返回上一级
	    function closeItem() {
	        // 如果在iframe中，优先使用关闭标签页的方式
	        if (window.parent && window.parent !== window) {
	            try {
	                // 优先使用layer关闭iframe
	                var index = parent.layer.getFrameIndex(window.name);
	                if (index) {
	                    parent.layer.close(index);
	                    return;
	                }
	            } catch(e) {
	                console.log("layer关闭失败:", e);
	            }

	            try {
	                // 尝试直接调用全局的closeItem函数
	                if (typeof window.parent.closeItem === 'function') {
	                    window.parent.closeItem();
	                    return;
	                }
	            } catch(e) {
	                console.log("调用父窗口closeItem失败:", e);
	            }

	            try {
	                // 如果closeItem不可用，尝试直接使用common.js中的逻辑
	                var topWindow = $(window.parent.document);

	                // 点击当前活动标签页的关闭按钮（X图标）
	                var closeBtn = $('.page-tabs-content .active i', topWindow);
	                if (closeBtn.length > 0) {
	                    closeBtn.click();
	                    return;
	                }

	                // 尝试通过data-id关闭标签页
	                var panelUrl = window.frameElement ? window.frameElement.getAttribute('data-panel') : null;
	                if (panelUrl) {
	                    $('.menuTab[data-id="' + panelUrl + '"]', topWindow).find('i').click();
	                    return;
	                }
	            } catch(e) {
	                console.log("关闭标签页失败:", e);
	            }
	        }

	        // 如果不在iframe中，尝试跳转到配送单列表页
	        try {
	            window.location.href = ctx + "delivery/delivery";
	        } catch(e) {
	            console.log("跳转失败:", e);
	        }
	    }
    </script>
