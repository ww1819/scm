<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('配送单详情')" />
	<th:block th:include="include :: layout-latest-css" />
</head>
<body>
    <div class="main-content">
        <form id="form-delivery-view" class="form-horizontal">
            <input name="deliveryId" type="hidden" th:value="${delivery.deliveryId}"/>
            <h4 class="form-header h4">基本信息</h4>
            <div class="row">
            	<div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">配送单号：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${delivery.deliveryNo}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">医院名称：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${delivery.hospitalName}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">供应商名称：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${delivery.supplierName}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">配送金额：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${delivery.deliveryAmount}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">预计配送日期：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${delivery.expectedDeliveryDate != null ? #dates.format(delivery.expectedDeliveryDate, 'yyyy-MM-dd') : ''}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">单据状态：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${delivery.deliveryStatus == '0' ? '未审核' : (delivery.deliveryStatus == '1' ? '已审核' : (delivery.deliveryStatus == '2' ? '已配送' : (delivery.deliveryStatus == '3' ? '已入库' : '')))}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">审核状态：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${delivery.auditStatus == '0' ? '待审核' : (delivery.auditStatus == '1' ? '已审核' : (delivery.auditStatus == '2' ? '已拒绝' : '-'))}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">审核人：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${delivery.auditBy != null ? delivery.auditBy : ''}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">审核时间：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${delivery.auditTime != null ? #dates.format(delivery.auditTime, 'yyyy-MM-dd HH:mm:ss') : ''}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-12">
                    <a class="btn btn-info btn-sm" href="javascript:void(0)" onclick="openDeliveryDetailFull()"><i class="fa fa-list"></i> 配送明细（含订单行）</a>
                    <span id="wrap-link-order" style="display:none;"><a class="btn btn-default btn-sm" href="javascript:void(0)" onclick="openOrderDetail()"><i class="fa fa-file-text-o"></i> 本系统订单</a></span>
                    <span id="wrap-link-zs" style="display:none;"><a class="btn btn-default btn-sm" href="javascript:void(0)" onclick="openZsOrderDetail()"><i class="fa fa-file-text-o"></i> 中设订单</a></span>
                </div>
            </div>
            <h4 class="form-header h4">其他信息</h4>
            <div class="row">
                <div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label">备注：</label>
                        <div class="col-xs-10">
                            <textarea maxlength="500" class="form-control" rows="3" readonly th:text="${delivery.remark}"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
      
    <div class="row">
        <div class="col-sm-offset-5 col-sm-10">
            <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i>关 闭</button>
        </div>
    </div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:inline="javascript">
		var deliveryId = /*[[${delivery.deliveryId}]]*/ 0;
		var refOrderId = /*[[${delivery.orderId}]]*/ null;
		var refZsOrderIdStr = /*[[${delivery.zsOrderId}]]*/ '';

		function openDeliveryDetailFull() {
			$.modal.openTab("配送单明细", ctx + "delivery/delivery/detail/" + deliveryId);
		}
		function openOrderDetail() {
			if (refOrderId != null) {
				$.modal.openTab("订单明细", ctx + "order/order/detail/" + refOrderId);
			}
		}
		function openZsOrderDetail() {
			if (refZsOrderIdStr != null && refZsOrderIdStr !== '') {
				$.modal.openTab("中设订单", ctx + "order/zstp/detail/" + refZsOrderIdStr);
			}
		}
		$(function() {
			if (refOrderId != null) {
				$("#wrap-link-order").show();
			}
			if (refZsOrderIdStr != null && refZsOrderIdStr !== '') {
				$("#wrap-link-zs").show();
			}
		});
	</script>
</body>
</html>
