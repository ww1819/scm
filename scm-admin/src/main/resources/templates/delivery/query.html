	<script th:inline="javascript">
		var detailPrefix = ctx + "delivery/delivery/query/detail";
		var summaryPrefix = ctx + "delivery/delivery/query/summary";
		var detailTableInitialized = false;
		var summaryTableInitialized = false;
		
		// 日期格式化函数
		function formatDate(value, format) {
		    if (value == null || value === '') {
		        return '-';
		    }
		    if (typeof value === 'string') {
		        var s = value.trim();
		        if (!s) {
		            return '-';
		        }
		        if (s.indexOf('-') > -1) {
		            if (format === 'yyyy-MM-dd HH:mm:ss') {
		                if (s.length <= 10) {
		                    return s + ' 00:00:00';
		                }
		                return s;
		            }
		            return s.split(' ')[0];
		        }
		    }
		    if (typeof $.common !== 'undefined' && typeof $.common.formatDate === 'function') {
		        var formatted = $.common.formatDate(value, format || 'yyyy-MM-dd');
		        if (formatted) {
		            return formatted;
		        }
		    }
		    if (typeof $.common !== 'undefined' && typeof $.common.dateFormat === 'function') {
		        var formattedLegacy = $.common.dateFormat(value, format || 'yyyy-MM-dd');
		        if (formattedLegacy) {
		            return formattedLegacy;
		        }
		    }
		    try {
		        var date = new Date(value);
		        if (isNaN(date.getTime())) {
		            return '-';
		        }
		        var year = date.getFullYear();
		        var month = String(date.getMonth() + 1).padStart(2, '0');
		        var day = String(date.getDate()).padStart(2, '0');
		        if (format === 'yyyy-MM-dd HH:mm:ss') {
		            var hours = String(date.getHours()).padStart(2, '0');
		            var minutes = String(date.getMinutes()).padStart(2, '0');
		            var seconds = String(date.getSeconds()).padStart(2, '0');
		            return year + '-' + month + '-' + day + ' ' + hours + ':' + minutes + ':' + seconds;
		        }
		        return year + '-' + month + '-' + day;
		    } catch (e) {
		        return '-';
		    }
		}

		function pickDetailField(row, field) {
		    if (!row) {
		        return null;
		    }
		    var val = row[field];
		    if (val != null && val !== '') {
		        return val;
		    }
		    return null;
		}

		$(function() {
		    // 初始化明细表
		    initDetailTable();
		    $(window).on('resize', function() {
		    	relayoutDeliveryQueryTables();
		    });
		    $('a[data-toggle="tab"]').on('shown.bs.tab', function() {
		    	setTimeout(relayoutDeliveryQueryTables, 0);
		    });
		    setTimeout(relayoutDeliveryQueryTables, 300);
		});

		var detailTableId = 'bootstrap-table-detail';
		var detailColWidths = {
			serialNumber: 60,
			deliveryNo: 176,
			materialCode: 120,
			materialName: 200,
			specification: 110,
			model: 100,
			unit: 72,
			deliveryQuantity: 110,
			price: 100,
			amount: 110,
			batchNo: 200,
			expireDate: 120,
			productionDate: 120,
			supplierName: 180,
			hospitalName: 180,
			deliveryAuditStatus: 90,
			mainBarcode: 240,
			auxBarcode: 240,
			manufacturer: 150,
			registerNo: 160

		function escDeliveryCellAttr(s) {
			return String(s == null ? '' : s)
				.replace(/&/g, '&amp;')
				.replace(/"/g, '&quot;')
				.replace(/'/g, '&#39;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;');
		}

		function deliveryCellEllipsis(value) {
			var s = (value == null || value === '') ? '-' : String(value);
			if (s === '-') {
				return s;
			}
			var esc = escDeliveryCellAttr(s);
			return '<span class="delivery-cell-ellipsis" title="' + esc + '">' + esc + '</span>';
		}

		function deliveryNoCell(value) {
			var s = (value == null || value === '') ? '-' : String(value);
			if (s === '-') {
				return s;
			}
			return escDeliveryCellAttr(s);
		}

		function measureDetailTextWidthPx(text) {
			if (text == null || text === '') {
				return 0;
			}
			var canvas = measureDetailTextWidthPx._canvas;
			if (!canvas) {
				canvas = document.createElement('canvas');
				measureDetailTextWidthPx._canvas = canvas;
			}
			var ctx = canvas.getContext('2d');
			ctx.font = '13px "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif';
			return ctx.measureText(String(text)).width;
		}

		/** 配送单号列宽随当前页最长单号自适应，完整显示且不过宽 */
		function fitDetailDeliveryNoColumnWidth() {
			var field = 'deliveryNo';
			var minPx = 132;
			var maxPx = 204;
			var padPx = 26;
			var maxContentW = measureDetailTextWidthPx('DEL1780414967762296');
			maxContentW = Math.max(maxContentW, measureDetailTextWidthPx('配送单号'));
			var $table = $('#' + detailTableId);
			if ($table.length && $table.bootstrapTable('getOptions')) {
				var rows = $table.bootstrapTable('getData') || [];
				for (var i = 0; i < rows.length; i++) {
					var no = rows[i] && rows[i].deliveryNo;
					if (no) {
						maxContentW = Math.max(maxContentW, measureDetailTextWidthPx(String(no)));
					}
				}
			}
			detailColWidths[field] = Math.ceil(Math.min(maxPx, Math.max(minPx, maxContentW + padPx)));
		}

		function deliveryBarcodeCell(value) {
			if (value == null || value === '') {
				return '-';

			var s = escDeliveryCellAttr(String(value));
			var html = String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\r\n|\n|\r/g, '<br/>');
			return '<div class="barcode-cell-wrap" title="' + s + '">' + html + '</div>';
		}

		function formatDetailAuditStatus(value, row) {

			if (status == null || status === '') {

			}

		function layoutDeliveryDetailTableWrapHeight() {
			var $wrap = $('#detail-tab .delivery-table-wrap');

				return;

		function calculateDetailTableHeight() {
			layoutDeliveryDetailTableWrapHeight();
			var $wrap = $('#detail-tab .delivery-table-wrap');
			if ($wrap.length === 0) {
				return 440;
			}
			var $bt = $wrap.find('.bootstrap-table');
			var wrapH = $wrap[0].clientHeight || $wrap.innerHeight() || 0;
			var toolbarH = $bt.find('.fixed-table-toolbar').outerHeight(true) || 0;
			var pagH = $bt.find('.fixed-table-pagination').outerHeight(true) || 46;
			var containerH = Math.floor(wrapH - toolbarH - pagH - 2);
			return Math.max(containerH, 240);
		}

		/** 表体撑满容器剩余高度，使横向滚动条贴近底部分页栏 */
		function stretchDetailTableBodyHeight() {
			var $wrap = $('#detail-tab .delivery-table-wrap');
			if (!$wrap.length) {
				return;
			}
			var $bt = $wrap.children('.bootstrap-table');
			if (!$bt.length) {
				$bt = $wrap.find('.bootstrap-table').first();
			}
			var $container = $bt.find('.fixed-table-container').first();
			var $header = $container.children('.fixed-table-header');
			var $body = $container.children('.fixed-table-body');
			if (!$container.length || !$body.length) {
				return;
			}
			var wrapH = $wrap[0].clientHeight || 0;
			if (wrapH < 1) {
				return;
			}
			var toolbarH = $bt.find('.fixed-table-toolbar').outerHeight(true) || 0;
			var pagH = $bt.find('.fixed-table-pagination').outerHeight(true) || 46;
			var containerH = Math.max(Math.floor(wrapH - toolbarH - pagH), 240);
			$container[0].style.setProperty('height', containerH + 'px', 'important');
			$container[0].style.setProperty('min-height', containerH + 'px', 'important');
			$container[0].style.setProperty('max-height', containerH + 'px', 'important');
			var headerH = $header.outerHeight(true) || 0;
			var bodyH = Math.max(Math.floor(containerH - headerH), 180);
			$body[0].style.setProperty('height', bodyH + 'px', 'important');
			$body[0].style.setProperty('min-height', bodyH + 'px', 'important');
			$body[0].style.setProperty('max-height', bodyH + 'px', 'important');
		}

		function adjustDetailTableHeight() {
			var $table = $('#' + detailTableId);
			if ($table.length > 0 && $table.bootstrapTable('getOptions')) {
				$table.bootstrapTable('resetView', { height: calculateDetailTableHeight() });
				stretchDetailTableBodyHeight();
			}
		}

		function getDetailTableTotalWidth() {
			var sum = 0;
			var opt = $('#' + detailTableId).bootstrapTable('getOptions');
			if (opt && opt.columns && opt.columns[0]) {
				$.each(opt.columns[0], function (_, col) {
					if (!col || col.visible === false) {
						return;
					}
					if (col.field && detailColWidths[col.field] != null) {
						sum += detailColWidths[col.field];
					} else if (col.width) {
						sum += parseInt(col.width, 10) || 0;
					} else {
						sum += 100;
					}
				});
			}
			return Math.max(sum, 1200);
		}

		function applyDetailFieldColumnWidth(field, widthPx) {
			var w = widthPx + 'px';
			var $container = $('#' + detailTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $th = $mainHeader.find('th[data-field="' + field + '"]');
			if ($th.length === 0) {
				return;
			}
			var setW = function (el) {
				el.style.setProperty('width', w, 'important');
				el.style.setProperty('min-width', w, 'important');
				el.style.setProperty('max-width', w, 'important');
			};
			$th.each(function () { setW(this); });
			$mainBody.find('td[data-field="' + field + '"]').each(function () { setW(this); });
			var colIdx = $th[0].cellIndex;
			$mainHeader.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
			$mainBody.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
		}

		function syncDetailHeaderBodyColumnWidths() {
			var $container = $('#' + detailTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var setW = function (el, widthVal) {
				el.style.setProperty('width', widthVal, 'important');
				el.style.setProperty('min-width', widthVal, 'important');
				el.style.setProperty('max-width', widthVal, 'important');
			};
			$.each(detailColWidths, function (field, widthPx) {
				var w = widthPx + 'px';
				var $th = $mainHeader.find('th[data-field="' + field + '"]');
				if ($th.length === 0) {
					return;
				}
				$th.each(function () { setW(this, w); });
				$mainBody.find('td[data-field="' + field + '"]').each(function () { setW(this, w); });
				var colIdx = $th[0].cellIndex;
				$mainHeader.find('table colgroup col').eq(colIdx).each(function () { setW(this, w); });
				$mainBody.find('table colgroup col').eq(colIdx).each(function () { setW(this, w); });
			});
		}

		/**
		 * 汇总表：表格外包层高度
		 */
		function layoutDeliveryQueryWrapHeights() {
			var $page = $('.delivery-query-page.container-div');
			if (!$page.length) {
				return;
			}
			var pageEl = $page[0];
			var pageBottom = pageEl.getBoundingClientRect().bottom;
			function applyWrap(selector) {
				var $w = $(selector);
				if (!$w.length) {
					return;
				}
				if (!$w.closest('.tab-pane').is(':visible')) {
					return;
				}
				var el = $w[0];
				var top = el.getBoundingClientRect().top;
				var bottom = pageBottom;
				var $tc = $w.closest('.tab-content');
				if ($tc.length) {
					bottom = Math.min(bottom, $tc[0].getBoundingClientRect().bottom - 4);
				}
				var $pane = $w.closest('.tab-pane');
				if ($pane.length) {
					bottom = Math.min(bottom, $pane[0].getBoundingClientRect().bottom - 4);
				}
				var base = Math.floor(bottom - top - 6);
				var h = base;
				if (h < 260) {
					h = 260;
				}
				el.style.setProperty('flex', '0 0 auto', 'important');
				el.style.setProperty('height', h + 'px', 'important');
				el.style.setProperty('min-height', h + 'px', 'important');
				el.style.removeProperty('max-height');
				el.style.setProperty('box-sizing', 'border-box', 'important');
			}
			applyWrap('#summary-tab .query-table-wrap');
		}

		function relayoutDeliveryQueryTables() {
			if ($('#detail-tab').hasClass('active')) {
				layoutDeliveryDetailTableWrapHeight();
				adjustDetailTableHeight();
				refreshDetailTableLayout();
			}
			if ($('#summary-tab').hasClass('active')) {
				layoutDeliveryQueryWrapHeights();
				resetQueryTableHeights();
			}
		}

		function calculateQueryTableHeight(tableSelector) {
			var $table = $(tableSelector);
			var $wrap = $table.closest('.query-table-wrap');
			if ($wrap.length === 0) {
				return 600;
			}
			var el = $wrap[0];
			/* 略小于外包层，给工具栏/表头/分页和边框留余量，避免被外包层 overflow 裁掉 */
			var h = el ? el.clientHeight : Math.floor($wrap.innerHeight());
			if (!h || h < 1) {
				h = Math.floor($wrap.innerHeight());
			}
			h = Math.floor(h - 12);
			return Math.max(h, 280);
		}

		function resetQueryTableHeights() {
			var $summary = $('#bootstrap-table-summary');
			if ($summary.length > 0 && $summary.bootstrapTable('getOptions')) {
				$summary.bootstrapTable('resetView', { height: calculateQueryTableHeight('#bootstrap-table-summary') });
				$summary.closest('.bootstrap-table').find('.fixed-table-body').scrollLeft(0);
			}
			setTimeout(function() {
				var $s = $('#bootstrap-table-summary');
				if ($s.length > 0 && $s.bootstrapTable('getOptions')) {
					$s.bootstrapTable('resetView', { height: calculateQueryTableHeight('#bootstrap-table-summary') });
				}
			}, 80);
		}

		            align: 'center',
		            width: 60,
		            formatter: function(value, row, index) {
		                var $table = $('#bootstrap-table-summary');
		                var options = $table.bootstrapTable('getOptions');
		                if (!options) return index + 1;
		                var pageSize = options.pageSize || 10;
		                var pageNumber = options.pageNumber || $table.data('currentPage') || 1;
		                return (pageNumber - 1) * pageSize + index + 1;
		            }
		        },
		        {
		            field: 'deliveryNo',
		            title: '配送单号',
		            sortable: true
		        },
		        {
		            field: 'hospitalName',
		            title: '医院名称',
		            formatter: function(value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'supplierName',
		            title: '供应商名称',
		            formatter: function(value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'srcOrderSupplierName',
		            title: '订单供应商',
		            formatter: function(value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'srcOrderWarehouseName',
		            title: '订单仓库',
		            formatter: function(value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'srcOrderDeptName',
		            title: '订单申请科室',
		            formatter: function(value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'deliveryAmount',
		            title: '配送金额',
		            sortable: true,
		            formatter: function(value, row, index) {
		                if (value != null) {
		                    return parseFloat(value).toFixed(2);
		                }
		                return '-';
		            }
		        },
		        {
		            field: 'deliveryStatus',
		            title: '单据状态',
		            formatter: function(value, row, index) {
		            	var statusMap = {'0': '待配送', '1': '配送中', '2': '已完成', '3': '已取消'};
		            	return statusMap[value] || '';
		            }
		        },
		        {
		            field: 'createTime',
		            title: '制单日期',
		            sortable: true,
		            formatter: function(value, row, index) {
		                return formatDate(value, "yyyy-MM-dd HH:mm:ss");
		            }
		        },
		        {
		            field: 'createByDisplay',
		            title: '制单人'
		        },
		        {
		            field: 'expectedDeliveryDate',
		            title: '预计配送日期',
		            sortable: true,
		            formatter: function(value, row, index) {
		                return formatDate(value, "yyyy-MM-dd");
		            }
		        },
		        {
		            field: 'deliveryAddress',
		            title: '配送地址'
		        },
		        {
		            field: 'remark',
		            title: '备注'
		        }]
		    };
		    
		        // 使用若依框架的表格初始化方法
		    var $table = $('#bootstrap-table-summary');
		    if ($table.length > 0) {
		        // 保存当前页码用于序号计算
		        options.onPageChange = function(number, size) {
		            $table.data('currentPage', number);
		        };
		        // 添加加载成功回调
		        options.onLoadSuccess = function(data) {
		            console.log("汇总表加载成功，数据量:", data ? (data.rows ? data.rows.length : (Array.isArray(data) ? data.length : 0)) : 0);
		            var $table = $('#bootstrap-table-summary');
		            mountSummaryToolbar();
		            // 确保加载完成后更新页码
		            if ($table && $table.bootstrapTable) {
		                var options = $table.bootstrapTable('getOptions');
		                if (options) {
		                    $table.data('currentPage', options.pageNumber || 1);
		                }
		            }
		            setTimeout(relayoutDeliveryQueryTables, 0);
		            setTimeout(relayoutDeliveryQueryTables, 150);
		        };
		        // 添加加载错误回调
		        options.onLoadError = function(status, res) {
		            console.error("汇总表加载失败，状态码:", status);
		            console.error("响应内容:", res);
		            if (status === 401 || status === 403) {
		                $.modal.msgError("登录已过期，请重新登录");
		                setTimeout(function() {
		                    window.location.href = ctx + "login";
		                }, 1500);
		            } else {
		                $.modal.msgError("数据加载失败，请刷新页面重试");
		            }
		        };
		        $.table.init(options);
		        $table.data('currentPage', 1);
		        summaryTableInitialized = true;
		        setTimeout(mountSummaryToolbar, 0);
		        setTimeout(relayoutDeliveryQueryTables, 0);
		        setTimeout(relayoutDeliveryQueryTables, 120);
		        
		        // 延迟刷新一次，确保数据正确加载
		        setTimeout(function() {
		            if ($table.bootstrapTable('getOptions')) {
		                $table.bootstrapTable('refresh');
		                relayoutDeliveryQueryTables();
		            }
		        }, 500);
		    }
		}

		// 明细表搜索
		function searchDetail() {
		    $.table.search("delivery-detail-form", "bootstrap-table-detail");
		}

		// 明细表重置
		function resetDetail() {
		    $("#delivery-detail-form")[0].reset();
		    $.table.search("delivery-detail-form", "bootstrap-table-detail");
		}

		// 明细表导出
		function exportDetail() {
		    var params = {
		        deliveryNo: $('input[name="deliveryNo"]', '#delivery-detail-form').val(),
		        materialCode: $('input[name="materialCode"]', '#delivery-detail-form').val(),
		        materialName: $('input[name="materialName"]', '#delivery-detail-form').val()
		    };
		    var form = $('<form></form>');
		    form.attr('method', 'post');
		    form.attr('action', detailPrefix + "/export");
		    $.each(params, function(key, value) {
		        if (value) {
		            var input = $('<input></input>');
		            input.attr('type', 'hidden');
		            input.attr('name', key);
		            input.attr('value', value);
		            form.append(input);
		        }
		    });
		    form.appendTo('body');
		    form.submit();
		    form.remove();
		}

		// 汇总表搜索
		function searchSummary() {
		    $.table.search("delivery-summary-form", "bootstrap-table-summary");
		}

		// 汇总表重置
		function resetSummary() {
		    $("#delivery-summary-form")[0].reset();
		    $.table.search("delivery-summary-form", "bootstrap-table-summary");
		}

		// 汇总表导出
		function exportSummary() {
		    var params = {
		        deliveryNo: $('input[name="deliveryNo"]', '#delivery-summary-form').val(),
		        hospitalName: $('input[name="hospitalName"]', '#delivery-summary-form').val(),
		        supplierName: $('input[name="supplierName"]', '#delivery-summary-form').val(),
		        deliveryStatus: $('select[name="deliveryStatus"]', '#delivery-summary-form').val()
		    };
		    var form = $('<form></form>');
		    form.attr('method', 'post');
		    form.attr('action', summaryPrefix + "/export");
		    $.each(params, function(key, value) {
		        if (value) {
		            var input = $('<input></input>');
		            input.attr('type', 'hidden');
		            input.attr('name', key);
		            input.attr('value', value);
		            form.append(input);
		        }
		    });
		    form.appendTo('body');
		    form.submit();
		    form.remove();
		}
	</script>
</body>
