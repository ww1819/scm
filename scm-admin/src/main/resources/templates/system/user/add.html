<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('新增用户')" />
	<th:block th:include="include :: select2-css" />
	<style>
		.maintain-supplier-wrap { position: relative; }
		#maintainSupplierSuggestPanel {
			position: absolute; left: 0; right: 0; top: 100%; z-index: 2000;
			max-height: 220px; overflow-y: auto; display: none;
			border: 1px solid #ddd; background: #fff; margin-top: 2px;
			box-shadow: 0 2px 6px rgba(0,0,0,.12);
		}
		#maintainSupplierSuggestPanel .list-group-item { cursor: pointer; padding: 6px 10px; border: 0; border-bottom: 1px solid #eee; }
		#maintainSupplierSuggestPanel .list-group-item:hover { background: #f5f5f5; }
		.field-muted { background-color: #eee !important; cursor: not-allowed !important; color: #888 !important; }
		#rolePickerModal .fixed-table-toolbar { display: none; }
		#rolePickerModal .bootstrap-table .table { margin-bottom: 0; }
	</style>
</head>
<body>
    <div class="main-content">
        <form id="form-user-add" class="form-horizontal">
            <input name="deptId" type="hidden" id="treeId"/>
            <h4 class="form-header h4">基本信息</h4>
            <div class="row">
            	<div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label is-required">用户名称：</label>
                        <div class="col-sm-8">
                            <input name="userName" placeholder="请输入用户名称" class="form-control" type="text" maxlength="30" required>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">归属部门：</label>
                        <div class="col-sm-8">
                            <div class="input-group">
                            	<input name="deptName" onclick="selectDeptTree()" id="treeName" type="text" placeholder="请选择归属部门" class="form-control">
                                <span class="input-group-addon"><i class="fa fa-search"></i></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">手机号码：</label>
                        <div class="col-sm-8">
                            <div class="input-group">
                                <input id="phonenumber" name="phonenumber" placeholder="请输入手机号码" class="form-control" type="text" maxlength="11">
                                <span class="input-group-addon"><i class="fa fa-mobile"></i></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">邮箱：</label>
                        <div class="col-sm-8">
                            <div class="input-group">
                                <input id="email" name="email" class="form-control email" type="text" maxlength="50" placeholder="请输入邮箱">
                                <span class="input-group-addon"><i class="fa fa-envelope"></i></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label is-required">登录账号：</label>
                        <div class="col-sm-8">
                            <input id="loginName" name="loginName" placeholder="请输入登录账号" class="form-control" type="text" maxlength="30" required>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label is-required">登录密码：</label>
                        <div class="col-sm-8">
                            <div class="input-group">
                                <input id="password" name="password" placeholder="请输入登录密码" class="form-control" type="password" th:value="${@config.getKey('sys.user.initPassword')}" required>
                                <span class="input-group-addon" title="登录密码,鼠标按下显示密码"
                                    onmousedown="$('#password').attr('type','text')"
                                    onmouseup="$('#password').attr('type','password')"><i class="fa fa-key"></i></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">用户性别：</label>
                        <div class="col-sm-8">
                            <select name="sex" class="form-control m-b" th:with="type=${@dict.getType('sys_user_sex')}">
				                <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
				            </select>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">用户状态：</label>
                        <div class="col-sm-8">
                            <label class="toggle-switch switch-solid">
	                            <input type="checkbox" id="status" checked>
	                            <span></span>
	                        </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
            	<div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label">岗位：</label>
                        <div class="col-xs-4">
                            <select id="post" class="form-control select2-multiple" multiple>
								<option th:each="post:${posts}" th:value="${post.postId}" th:text="${post.postName}" th:disabled="${post.status == '1'}"></option>
							</select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
            	<div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label is-required">角色：</label>
                        <div class="col-xs-10">
                            <div class="input-group">
                                <input type="text" class="form-control" id="pickedRoleDisplay" readonly placeholder="请点击右侧按钮，在弹窗中选择角色"/>
                                <span class="input-group-btn">
                                    <button type="button" class="btn btn-default" onclick="openRolePicker()"><i class="fa fa-search"></i> 选择角色</button>
                                </span>
                            </div>
                            <input type="hidden" id="pickedRoleId"/>
                            <input type="hidden" id="pickedRoleKey"/>
                            <input type="hidden" id="pickedRoleName"/>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">维护供应商：</label>
                        <div class="col-sm-8 maintain-supplier-wrap">
                            <input type="hidden" name="maintainSupplierId" id="maintainSupplierId"/>
                            <input type="text" class="form-control" id="maintainSupplierSearch" placeholder="输入公司名称关键字，点选候选项" autocomplete="off"/>
                            <div id="maintainSupplierSuggestPanel" class="list-group"></div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">维护医院：</label>
                        <div class="col-sm-8">
                            <select name="maintainHospitalId" id="maintainHospitalId" class="form-control">
                                <option value="">请选择医院</option>
                                <option th:each="h : ${hospitals}" th:value="${h.hospitalId}" th:text="${h.hospitalName}"></option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <h4 class="form-header h4">其他信息</h4>
            <div class="row">
                <div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label">备注：</label>
                        <div class="col-xs-10">
                            <textarea name="remark" maxlength="500" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <div class="modal fade" id="rolePickerModal" tabindex="-1" data-backdrop="static">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title">选择角色</h4>
                </div>
                <div class="modal-body">
                    <div class="row" style="margin-bottom:10px;">
                        <div class="col-sm-4">
                            <label class="control-label">角色名称</label>
                            <input type="text" class="form-control" id="rpc_roleName" placeholder="模糊查询"/>
                        </div>
                        <div class="col-sm-4">
                            <label class="control-label">医院名称</label>
                            <input type="text" class="form-control" id="rpc_hospitalName" placeholder="绑定医院"/>
                        </div>
                        <div class="col-sm-4">
                            <label class="control-label">供应商名称</label>
                            <input type="text" class="form-control" id="rpc_supplierName" placeholder="绑定供应商"/>
                        </div>
                    </div>
                    <p>
                        <a class="btn btn-primary btn-sm" onclick="rolePickerSearch()"><i class="fa fa-search"></i> 查询</a>
                        <a class="btn btn-warning btn-sm" onclick="rolePickerReset()"><i class="fa fa-refresh"></i> 重置</a>
                    </p>
                    <table id="rolePickerTable"></table>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-sm-offset-5 col-sm-10">
            <button type="button" class="btn btn-sm btn-primary" onclick="submitHandler()"><i class="fa fa-check"></i>保 存</button>&nbsp;
            <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i>关 闭 </button>
        </div>
    </div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: select2-js" />
	<script th:inline="javascript">
	    var prefix = ctx + "system/user";

        var rolePickerTableInited = false;

        function roleKeyFromSelect() {
            return $.common.trim($('#pickedRoleKey').val() || '');
        }
        function roleNameFromSelect() {
            return $.common.trim($('#pickedRoleName').val() || '');
        }

        function openRolePicker() {
            $('#rolePickerModal').modal('show');
            if (!rolePickerTableInited) {
                initRolePickerTable();
                rolePickerTableInited = true;
            } else {
                $('#rolePickerTable').bootstrapTable('refresh');
            }
        }

        function rolePickerSearch() {
            if (rolePickerTableInited) {
                $('#rolePickerTable').bootstrapTable('refresh', { pageNumber: 1 });
            }
        }

        function rolePickerReset() {
            $('#rpc_roleName').val('');
            $('#rpc_hospitalName').val('');
            $('#rpc_supplierName').val('');
            rolePickerSearch();
        }

        function initRolePickerTable() {
            $('#rolePickerTable').bootstrapTable({
                url: prefix + '/rolePicker/list',
                method: 'post',
                contentType: 'application/x-www-form-urlencoded; charset=UTF-8',
                striped: true,
                sidePagination: 'server',
                pagination: true,
                pageSize: 10,
                pageList: [10, 25, 50],
                height: 360,
                queryParams: function (params) {
                    return {
                        pageNum: params.offset / params.limit + 1,
                        pageSize: params.limit,
                        roleName: $('#rpc_roleName').val(),
                        pickerHospitalName: $('#rpc_hospitalName').val(),
                        pickerSupplierName: $('#rpc_supplierName').val()
                    };
                },
                responseHandler: function (res) {
                    if (res.code === web_status.SUCCESS) {
                        return { rows: res.rows, total: res.total };
                    }
                    $.modal.alertWarning(res.msg || '加载失败');
                    return { rows: [], total: 0 };
                },
                columns: [
                    { field: 'roleId', title: '编号', width: 70 },
                    { field: 'roleName', title: '角色名称', sortable: true },
                    { field: 'roleKey', title: '权限字符' },
                    { field: 'pinyinCode', title: '首拼简码', formatter: function (v) { return v || '—'; } },
                    {
                        field: 'hospitalName',
                        title: '绑定医院',
                        formatter: function (v) { return v || '—'; }
                    },
                    {
                        field: 'supplierCompanyName',
                        title: '绑定供应商',
                        formatter: function (v) { return v || '—'; }
                    },
                    {
                        title: '操作',
                        align: 'center',
                        formatter: function (value, row, index) {
                            return '<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="applyPickedRoleAt(' + index + ')"><i class="fa fa-check"></i> 选择</a>';
                        }
                    }
                ]
            });
        }

        function applyPickedRoleAt(index) {
            var rows = $('#rolePickerTable').bootstrapTable('getData');
            var row = rows[index];
            if (!row) {
                return;
            }
            $('#pickedRoleId').val(row.roleId);
            $('#pickedRoleKey').val(row.roleKey || '');
            $('#pickedRoleName').val(row.roleName || '');
            var hn = row.hospitalName || '—';
            var sn = row.supplierCompanyName || '—';
            $('#pickedRoleDisplay').val((row.roleName || '') + '（医院：' + hn + '，供应商：' + sn + '）');
            $('#rolePickerModal').modal('hide');
            applyMaintainFieldsByRole();
        }
        function isHospitalPrincipalRole() {
            var k = roleKeyFromSelect();
            var n = roleNameFromSelect();
            if (!k && !n) return false;
            if (k === 'hospital_admin') return true;
            if (n === '医院') return true;
            return n.indexOf('医院') >= 0;
        }
        function isSupplierPrincipalRole() {
            var k = roleKeyFromSelect();
            var n = roleNameFromSelect();
            if (!k && !n) return false;
            if (k === 'supplier' || k === 'supplier_admin' || k === 'supplier_sales') return true;
            if (n === '供应商') return true;
            return n.indexOf('供应商') >= 0;
        }
        function applyMaintainFieldsByRole() {
            var h = isHospitalPrincipalRole();
            var s = isSupplierPrincipalRole();
            var $h = $('#maintainHospitalId');
            var $sid = $('#maintainSupplierId');
            var $st = $('#maintainSupplierSearch');
            var $wrap = $('.maintain-supplier-wrap');
            if (h && !s) {
                $h.prop('disabled', false).removeClass('field-muted');
                $sid.val('').prop('disabled', true);
                $st.val('').prop('disabled', true).addClass('field-muted');
                $wrap.addClass('field-muted');
                $('#maintainSupplierSuggestPanel').hide().empty();
            } else if (s && !h) {
                $h.val('').prop('disabled', true).addClass('field-muted');
                $sid.prop('disabled', false);
                $st.prop('disabled', false).removeClass('field-muted');
                $wrap.removeClass('field-muted');
            } else {
                $h.val('').prop('disabled', true).addClass('field-muted');
                $sid.val('').prop('disabled', true);
                $st.val('').prop('disabled', true).addClass('field-muted');
                $wrap.addClass('field-muted');
                $('#maintainSupplierSuggestPanel').hide().empty();
            }
        }
	
        $("#form-user-add").validate({
        	onkeyup: false,
        	rules:{
        		loginName:{
        			minlength: 2,
        			maxlength: 20,
        			remote: {
                        url: prefix + "/checkLoginNameUnique",
                        type: "post",
                        dataType: "json",
                        data: {
                        	"loginName": function() {
                                return $.common.trim($("#loginName").val());
                            }
                        }
                    }
        		},
        		password:{
        			minlength: 5,
        			maxlength: 20,
        			specialSign: true
        		},
        		email:{
                    email:true,
                    remote: {
                        url: prefix + "/checkEmailUnique",
                        type: "post",
                        dataType: "json",
                        data: {
                            "email": function () {
                                return $.common.trim($("#email").val());
                            }
                        }
                    }
        		},
        		phonenumber:{
        			isPhone:true,
                    remote: {
                        url: prefix + "/checkPhoneUnique",
                        type: "post",
                        dataType: "json",
                        data: {
                            "phonenumber": function () {
                                return $.common.trim($("#phonenumber").val());
                            }
                        }
                    }
        		},
        	},
        	messages: {
                "loginName": {
                    remote: "用户已经存在"
                },
        		"email": {
                    remote: "Email已经存在"
                },
        		"phonenumber":{
                	remote: "手机号码已经存在"
        		}
            },
            focusCleanup: true
        });
        
        function submitHandler() {
            var roleId = $.common.trim($("#pickedRoleId").val());
            if (!roleId) {
                $.modal.msgWarning("请选择角色");
                return;
            }
        	var chrtype = [[${#strings.defaultString(@config.getKey('sys.account.chrtype'), 0)}]];
			var password = $("#password").val();
	        if ($.validate.form() && checkpwd(chrtype, password)) {
	        	var data = $("#form-user-add").serializeArray();
	        	var status = $("input[id='status']").is(':checked') == true ? 0 : 1;
	        	var postIds = $.form.selectSelects("post");
	        	data.push({"name": "status", "value": status});
	        	data.push({"name": "roleIds", "value": roleId});
	        	data.push({"name": "postIds", "value": postIds});
	        	$.operate.saveTab(prefix + "/add", data);
	        }
	    }
         
        /* 用户管理-新增-选择部门树 */
        function selectDeptTree() {
        	var treeId = $("#treeId").val();
        	var deptId = $.common.isEmpty(treeId) ? "100" : $("#treeId").val();
        	var url = ctx + "system/user/selectDeptTree/" + deptId;
			var options = {
				title: '选择部门',
				width: "380",
				url: url,
				callBack: doSubmit
			};
			$.modal.openOptions(options);
		}
		
		function doSubmit(index, layero){
			var body = $.modal.getChildFrame(index);
   			$("#treeId").val(body.find('#treeId').val());
   			$("#treeName").val(body.find('#treeName').val());
   			$.modal.close(index);
		}

		$(function() {
            $('#post').select2({
                placeholder: "请选择岗位",
                allowClear: true
            });
            applyMaintainFieldsByRole();
            var supplierTimer;
            $('#maintainSupplierSearch').on('input', function () {
                if ($('#maintainSupplierSearch').prop('disabled')) {
                    return;
                }
                clearTimeout(supplierTimer);
                var kw = $.common.trim($(this).val());
                supplierTimer = setTimeout(function () {
                    if (kw === '') {
                        $('#maintainSupplierSuggestPanel').hide().empty();
                        return;
                    }
                    $.get(prefix + '/maintainSupplierOptions', { keyword: kw }, function (res) {
                        if (res.code !== 0 || !res.data) {
                            return;
                        }
                        var $p = $('#maintainSupplierSuggestPanel').empty();
                        $.each(res.data, function (i, row) {
                            $('<a class="list-group-item"></a>')
                                .attr('href', 'javascript:void(0)')
                                .data('id', row.id)
                                .data('text', row.text)
                                .text(row.text)
                                .appendTo($p);
                        });
                        if (res.data.length) {
                            $p.show();
                        } else {
                            $p.hide();
                        }
                    });
                }, 300);
            });
            $('#maintainSupplierSuggestPanel').on('mousedown', '.list-group-item', function (e) {
                e.preventDefault();
                var $t = $(this);
                $('#maintainSupplierId').val($t.data('id'));
                $('#maintainSupplierSearch').val($t.data('text'));
                $('#maintainSupplierSuggestPanel').hide().empty();
            });
            $(document).on('click', function (e) {
                if (!$(e.target).closest('.maintain-supplier-wrap').length) {
                    $('#maintainSupplierSuggestPanel').hide();
                }
            });
            $('#maintainSupplierSearch').on('blur', function () {
                setTimeout(function () {
                    if ($.common.trim($('#maintainSupplierSearch').val()) === '') {
                        $('#maintainSupplierId').val('');
                    }
                }, 250);
            });
        })
    </script>
</body>
</html>
