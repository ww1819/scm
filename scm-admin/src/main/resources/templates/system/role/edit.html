<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('修改角色')" />
	<th:block th:include="include :: ztree-css" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-role-edit" th:object="${role}">
			<input id="roleId" name="roleId" type="hidden" th:field="*{roleId}"/>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">角色名称：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="roleName" id="roleName" th:field="*{roleName}" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">首拼简码：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" th:value="${role.pinyinCode}" readonly placeholder="保存时按角色名称自动生成">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">权限字符：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="roleKey" id="roleKey" th:field="*{roleKey}" required>
					<span class="help-block m-b-none"><i class="fa fa-info-circle"></i> 控制器中定义的权限字符，如：@RequiresRoles("")</span>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">显示顺序：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="roleSort" id="roleSort" th:field="*{roleSort}" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">状态：</label>
				<div class="col-sm-8">
					<label class="toggle-switch switch-solid">
                        <input type="checkbox" id="status" th:checked="${role.status == '0' ? true : false}">
                        <span></span>
                    </label>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">备注：</label>
				<div class="col-sm-8">
					<input id="remark" name="remark" class="form-control" type="text" th:field="*{remark}">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">角色类型：</label>
				<div class="col-sm-8">
					<select name="roleType" id="roleType" class="form-control" th:field="*{roleType}">
						<option value="platform">平台</option>
						<option value="hospital">医院</option>
						<option value="supplier">供应商</option>
					</select>
				</div>
			</div>
			<div class="form-group" id="grpBindHospital" style="display:none;">
				<label class="col-sm-3 control-label">绑定医院：</label>
				<div class="col-sm-8">
					<select name="hospitalId" id="hospitalId" class="form-control" th:field="*{hospitalId}">
						<option value="">请选择</option>
						<option th:each="h : ${hospitals}" th:value="${h.hospitalId}" th:text="${h.hospitalName}"></option>
					</select>
				</div>
			</div>
			<div class="form-group" id="grpBindSupplier" style="display:none;">
				<label class="col-sm-3 control-label">绑定供应商：</label>
				<div class="col-sm-8">
					<select name="supplierId" id="supplierId" class="form-control" th:field="*{supplierId}">
						<option value="">请选择</option>
						<option th:each="s : ${suppliers}" th:value="${s.supplierId}" th:text="${s.companyName}"></option>
					</select>
				</div>
			</div>
			<div class="form-group" id="grpOrgAdmin">
				<label class="col-sm-3 control-label">机构管理员角色：</label>
				<div class="col-sm-8">
					<select name="orgAdmin" id="orgAdmin" class="form-control" th:field="*{orgAdmin}">
						<option value="0">否</option>
						<option value="1">是（同一医院/供应商仅允许一个）</option>
					</select>
					<span class="help-block m-b-none text-muted">为「是」时，新建/刷新机构仅向该角色自动下发「仅管理员开放」的菜单。</span>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">菜单权限：</label>
				<div class="col-sm-8">
					<div id="menuDataHealthWarn" class="alert alert-warning" style="display:none; margin-bottom: 10px;"></div>
				    <label class="check-box">
				        <input type="checkbox" value="1">展开/折叠</label>
				    <label class="check-box">
				        <input type="checkbox" value="2">全选/全不选</label>
				    <label class="check-box">
				        <input type="checkbox" value="3" checked>父子联动</label>
				    <div id="menuTrees" class="ztree ztree-border"></div>
				</div>
			</div>
		</form>
	</div>
	<div class="row">
		<div class="col-sm-offset-3 col-sm-8 m-b-md">
			<button type="button" class="btn btn-sm btn-primary" onclick="submitHandler()"><i class="fa fa-check"></i>保 存</button>&nbsp;
			<button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i>关 闭</button>
		</div>
	</div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: ztree-js" />
	<script type="text/javascript" th:inline="javascript">
		/* 服务端已绑定值，用于下拉回显（避免 syncRoleTenantUi 初始化时清空） */
		var roleBoundHospitalId = /*[[${role.hospitalId}]]*/ '';
		var roleBoundSupplierId = /*[[${role.supplierId}]]*/ '';
		var roleBoundOrgAdmin = /*[[${role.orgAdmin}]]*/ '0';

	     $(function() {
			var url = ctx + "system/menu/roleMenuTreeData?roleId=" + $("#roleId").val();
			var options = {
				id: "menuTrees",
		        url: url,
		        check: { enable: true },
		        expandLevel: 0
		    };
			$.tree.init(options);
			loadInvalidMenuSummary();
			$("#roleType").on("change", function() { syncRoleTenantUi(false); });
			syncRoleTenantUi(true);
		});

		function syncRoleTenantUi(restoreBound) {
			var t = $("#roleType").val();
			if (!t) {
				t = "platform";
			}
			if (t === "hospital") {
				$("#grpBindHospital").show();
				$("#grpBindSupplier").hide();
				if (!restoreBound) {
					$("#supplierId").val("");
				}
				$("#grpOrgAdmin").show();
			} else if (t === "supplier") {
				$("#grpBindHospital").hide();
				if (!restoreBound) {
					$("#hospitalId").val("");
				}
				$("#grpBindSupplier").show();
				$("#grpOrgAdmin").show();
			} else {
				$("#grpBindHospital").hide();
				$("#grpBindSupplier").hide();
				if (!restoreBound) {
					$("#hospitalId").val("");
					$("#supplierId").val("");
					$("#orgAdmin").val("0");
				}
				$("#grpOrgAdmin").hide();
			}
			if (restoreBound) {
				restoreRoleBindFields(t);
			}
		}

		function restoreRoleBindFields(roleType) {
			if (roleType === "hospital" && roleBoundHospitalId != null && roleBoundHospitalId !== '') {
				$("#hospitalId").val(String(roleBoundHospitalId));
			}
			if (roleType === "supplier" && roleBoundSupplierId != null && roleBoundSupplierId !== '') {
				$("#supplierId").val(String(roleBoundSupplierId));
			}
			if ((roleType === "hospital" || roleType === "supplier") && roleBoundOrgAdmin != null && roleBoundOrgAdmin !== '') {
				$("#orgAdmin").val(String(roleBoundOrgAdmin));
			}
		}

		function loadInvalidMenuSummary() {
			$.get(ctx + "system/menu/invalidNameSummary", function(res) {
				var ok = res && (res.code === 0 || res.code === "0");
				if (!ok || !res.data) {
					return;
				}
				var count = Number(res.data.count || 0);
				if (count <= 0) {
					return;
				}
				var samples = (res.data.samples || []).join("，");
				var tip = "检测到 " + count + " 条菜单名称异常（空/null/undefined），已自动兜底显示。建议执行 data_integrity.sql 修复。";
				if (samples) {
					tip += " 示例：" + samples;
				}
				$("#menuDataHealthWarn").text(tip).show();
			});
		}
	
		$("#form-role-edit").validate({
			onkeyup: false,
			rules:{
				roleName:{
					remote: {
		                url: ctx + "system/role/checkRoleNameUnique",
		                type: "post",
		                dataType: "json",
		                data: {
							"roleId": function() {
							    return $("#roleId").val();
							},
							"roleName": function() {
							    return $.common.trim($("#roleName").val());
							}
		                }
		            }
				},
				roleKey:{
					remote: {
		                url: ctx + "system/role/checkRoleKeyUnique",
		                type: "post",
		                dataType: "json",
		                data: {
							"roleId": function() {
								return $("#roleId").val();
							},
							"roleKey": function() {
							    return $.common.trim($("#roleKey").val());
							}
		                }
		            }
				},
				roleSort:{
					digits:true
				},
			},
			messages: {
		        "roleName": {
		            remote: "角色名称已经存在"
		        },
		        "roleKey": {
		            remote: "角色权限已经存在"
		        }
		    },
		    focusCleanup: true
		});
		
		$('input').on('ifChanged', function(obj){
			var type = $(this).val();
			var checked = obj.currentTarget.checked;
			if (type == 1) {
			    if (checked) {
			        $._tree.expandAll(true);
			    } else {
			        $._tree.expandAll(false);
			    }
			} else if (type == "2") {
			    if (checked) {
			        $._tree.checkAllNodes(true);
			    } else {
			        $._tree.checkAllNodes(false);
			    }
			} else if (type == "3") {
			    if (checked) {
			        $._tree.setting.check.chkboxType = { "Y": "ps", "N": "ps" };
			    } else {
			        $._tree.setting.check.chkboxType = { "Y": "", "N": "" };
			    }
			}
		})

		function edit() {
			var roleId = $("input[name='roleId']").val();
			var roleName = $("input[name='roleName']").val();
			var roleKey = $("input[name='roleKey']").val();
			var roleSort = $("input[name='roleSort']").val();
			var status = $("input[id='status']").is(':checked') == true ? 0 : 1;
			var remark = $("input[name='remark']").val();
			var menuIds = $.tree.getCheckedNodes();
			$.ajax({
				cache : true,
				type : "POST",
				url : ctx + "system/role/edit",
				data : {
					"roleId": roleId,
					"roleName": roleName,
					"roleKey": roleKey,
					"roleSort": roleSort,
					"status": status,
					"remark": remark,
					"roleType": $("#roleType").val(),
					"hospitalId": $("#hospitalId").val() || "",
					"supplierId": $("#supplierId").val() || "",
					"orgAdmin": $("#orgAdmin").val(),
					"menuIds": menuIds
				},
				async : false,
				error : function(request) {
					$.modal.alertError("系统错误");
				},
				success : function(data) {
					$.operate.successCallback(data);
				}
			});
		}
		
		function submitHandler() {
	        if ($.validate.form()) {
	        	edit();
	        }
	    }
	</script>
</body>
</html>
