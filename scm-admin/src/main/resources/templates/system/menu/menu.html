<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('菜单列表')" />
</head>
<body class="gray-bg">
    <div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="menu-form">
					<div class="select-list">
						<ul>
							<li>
								菜单名称：<input type="text" name="menuName"/>
							</li>
							<li>
								菜单状态：<select name="visible" th:with="type=${@dict.getType('sys_show_hide')}">
									<option value="">所有</option>
									<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
								</select>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.treeTable.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>
                
            <div class="btn-group-sm" id="toolbar" role="group">
		        <a class="btn btn-success" onclick="$.operate.add(0)" shiro:hasPermission="system:menu:add">
                    <i class="fa fa-plus"></i> 新增
                </a>
                <a class="btn btn-primary" onclick="$.operate.edit()" shiro:hasPermission="system:menu:edit">
		            <i class="fa fa-edit"></i> 修改
		        </a>
		        <a class="btn btn-info" onclick="saveSort()">
                    <i class="fa fa-sort-amount-asc"></i> 保存排序
                </a>
                <a class="btn btn-default" id="expandAllBtn">
                    <i class="fa fa-exchange"></i> 展开/折叠
                </a>
                <a class="btn btn-default" onclick="openChangeLogToolbar()" shiro:hasPermission="system:menu:list">
                    <i class="fa fa-history"></i> 变更记录
                </a>
                <a class="btn btn-warning" onclick="grantAllHospitals()" shiro:hasPermission="system:menu:edit" title="仅当前勾选的菜单节点，不含上级目录与下级菜单">
                    <i class="fa fa-hospital-o"></i> 全院全角色赋权
                </a>
                <a class="btn btn-warning" onclick="grantAllSuppliers()" shiro:hasPermission="system:menu:edit" title="仅当前勾选的菜单节点；供应商全局白名单（hospital_id 为空）">
                    <i class="fa fa-truck"></i> 全商全角色赋权
                </a>
	        </div>
       		 <div class="col-sm-12 select-table table-striped">
	            <table id="bootstrap-tree-table"></table>
	        </div>
	    </div>
	</div>
	
	<th:block th:include="include :: footer" />
	<script th:inline="javascript">
		var addFlag = [[${@permission.hasPermi('system:menu:add')}]];
		var editFlag = [[${@permission.hasPermi('system:menu:edit')}]];
		var removeFlag = [[${@permission.hasPermi('system:menu:remove')}]];
		var listFlag = [[${@permission.hasPermi('system:menu:list')}]];
		var datas = [[${@dict.getType('sys_show_hide')}]];
		var prefix = ctx + "system/menu";
		var originalOrders = {};

		$(function() {
		    var options = {
		        code: "menuId",
		        parentCode: "parentId",
		        uniqueId: "menuId",
		        expandAll: false,
		        expandFirst: false,
		        url: prefix + "/list",
		        createUrl: prefix + "/add/{id}",
		        updateUrl: prefix + "/edit/{id}",
		        removeUrl: prefix + "/remove/{id}",
		        modalName: "菜单",
		        columns: [{
                    field: 'selectItem', 
                    radio: true
                 },
                 {
		            title: '菜单名称',
		            field: 'menuName',
		            width: '20',
		            widthUnit: '%',
		            formatter: function(value, row, index) {
		                if ($.common.isEmpty(row.icon)) {
		                    return row.menuName;
		                } else {
		                    return '<i class="' + row.icon + '"></i> <span class="nav-label">' + row.menuName + '</span>';
		                }
		            }
		        },
		        {
		            field: 'orderNum',
		            title: '排序',
		            width: '10',
		            widthUnit: '%',
		            align: "center",
		            formatter: function(value, row, index) {
		            	var menuIdText = $.common.sprintf("<input type='hidden' name='menuIds' value='%s'>", row.menuId);
                    	var orderNumText = $.common.sprintf("<input type='text' name='orderNums' value='%s' class='form-control' style='display: inline-block; width:60px; text-align:center;'>", row.orderNum);
                    	originalOrders[row.menuId] = row.orderNum;
                    	return menuIdText + orderNumText;
                    }
		        },
		        {
		            field: 'url',
		            title: '请求地址',
		            width: '15',
		            widthUnit: '%',
		            align: "center",
		            formatter: function(value, row, index) {
                    	return $.table.tooltip(value);
                    }
		        },
		        {
		            title: '类型',
		            field: 'menuType',
		            width: '10',
		            widthUnit: '%',
		            align: "center",
		            formatter: function(value, item, index) {
		                if (item.menuType == 'M') {
		                    return '<span class="label label-success">目录</span>';
		                }
		                else if (item.menuType == 'C') {
		                    return '<span class="label label-primary">菜单</span>';
		                }
		                else if (item.menuType == 'F') {
		                    return '<span class="label label-warning">按钮</span>';
		                }
		            }
		        },
		        {
		            field: 'visible',
		            title: '可见',
		            width: '10',
		            widthUnit: '%',
		            align: "center",
		            formatter: function(value, row, index) {
		            	if (row.menuType == 'F') {
		                    return '-';
		                }
		            	return $.table.selectDictLabel(datas, row.visible);
		            }
		        },
		        {
		            field: 'perms',
		            title: '权限标识',
		            width: '15',
		            widthUnit: '%',
		            align: "center",
		            formatter: function(value, row, index) {
                    	return $.table.tooltip(value);
                    }
		        },
		        {
		            field: 'authType',
		            title: 'SCM类型',
		            width: '12',
		            widthUnit: '%',
		            align: "center",
		            formatter: function(value, row, index) {
		                var grant = row.hospitalGrantSupplierFlag === '1' || row.hospitalGrantSupplierFlag === 1 ? '<span class="label label-danger" title="需由医院按院授予供应商">院授</span> ' : '';
		                var authMap = { platform: '平台', hospital: '医院', supplier: '供应商', hospital_supplier: '医院+供应商' };
		                var bizMap = { other: '其他', platform_ops: '平台运维', scm_auth: '授权与数据权限', tenant: '客户租户', supplier_master: '供应商主数据', hospital_master: '医院主数据', master_data: '基础主数据', certificate: '资质证件', supply_chain: '订单配送', settlement: '结算', datacenter: '数据中心', integration: '接口对接' };
		                var acn = authMap[value] || ($.common.isEmpty(value) ? '-' : value);
		                var biz = row.menuBizCategory || '';
		                var bizCn = bizMap[biz] || biz || '-';
		                return grant + '<div><span class="label label-primary">' + acn + '</span></div><div class="text-muted" style="font-size:11px;margin-top:3px;">' + bizCn + '</div>';
		            }
		        },
		        {
		            title: '操作',
		            width: '20',
		            widthUnit: '%',
		            align: "center",
		            formatter: function(value, row, index) {
		                var actions = [];
		                actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.menuId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
		                actions.push('<a class="btn btn-info btn-xs ' + addFlag + '" href="javascript:void(0)" onclick="$.operate.add(\'' + row.menuId + '\')"><i class="fa fa-plus"></i>新增</a> ');
		                actions.push('<a class="btn btn-default btn-xs ' + listFlag + '" href="javascript:void(0)" onclick="openMenuChangeLog(\'' + row.menuId + '\')"><i class="fa fa-history"></i>变更</a> ');
		                actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.menuId + '\')"><i class="fa fa-trash"></i>删除</a>');
		                return actions.join('');
		            }
		        }]
		    };
		    $.treeTable.init(options);
		});

		function openMenuChangeLog(menuId) {
			var url = prefix + "/changeLog/" + menuId;
			var options = { title: "菜单变更记录与历史状态", width: "960", height: "560", url: url };
			$.modal.openOptions(options);
		}

		function openChangeLogToolbar() {
			var rows = $.bttTable.bootstrapTreeTable("getSelections");
			if (!rows || rows.length === 0) {
				$.modal.alertWarning("请先选择一条菜单");
				return;
			}
			openMenuChangeLog(rows[0].menuId);
		}

		function grantAllHospitals() {
			var rows = $.bttTable.bootstrapTreeTable("getSelections");
			if (!rows || rows.length === 0) {
				$.modal.alertWarning("请先在表格中点选一行菜单");
				return;
			}
			var menuId = rows[0].menuId;
			$.modal.confirm("确认为当前<strong>仅勾选的一条菜单</strong>（不含上级目录与下级菜单），向<strong>全部在营医院</strong>及该院下<strong>所有角色</strong>赋权？（已存在的关联行会自动跳过，可能耗时数秒）", function() {
				$.operate.post(prefix + "/grantAllHospitals", { menuId: menuId });
			});
		}

		function grantAllSuppliers() {
			var rows = $.bttTable.bootstrapTreeTable("getSelections");
			if (!rows || rows.length === 0) {
				$.modal.alertWarning("请先在表格中点选一行菜单");
				return;
			}
			var menuId = rows[0].menuId;
			$.modal.confirm("确认为当前<strong>仅勾选的一条菜单</strong>（不含上级目录与下级菜单），向<strong>全部在营供应商</strong>及该商下<strong>所有角色</strong>赋权？（供应商侧为全局白名单 hospital_id 为空；已存在行自动跳过）", function() {
				$.operate.post(prefix + "/grantAllSuppliers", { menuId: menuId });
			});
		}

		/* 保存排序-菜单 */
		function saveSort() {
			var changedMenuIds = [];
			var changedOrderNums = [];
		    $("input[name='menuIds']").each(function() {
		        var menuId = $(this).val();
		        var currentOrder = $(this).next("input[name='orderNums']").val();
		        if (originalOrders[menuId] !== currentOrder) {
		            changedMenuIds.push(menuId);
		            changedOrderNums.push(currentOrder);
		        }
		    });
		    if (changedMenuIds.length === 0) {
		        $.modal.alertWarning("未检测到排序修改");
		        return;
		    }
		    $.operate.post(prefix + "/updateSort", { "menuIds": changedMenuIds.join(","), "orderNums": changedOrderNums.join(",") });
		}
	</script>
</body>
</html>
