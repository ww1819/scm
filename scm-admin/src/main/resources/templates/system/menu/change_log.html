<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('菜单变更记录')" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content" style="padding:12px;">
		<p class="text-muted m-b-sm">菜单ID：<span th:text="${menuId}">0</span> — 按时间正序展示；「生效时段」表示该次变更后菜单处于该快照状态的时间范围（至下一次变更或至今）。</p>
		<div class="table-responsive">
			<table class="table table-striped table-bordered table-hover table-condensed">
				<thead>
					<tr>
						<th style="width:88px;">类型</th>
						<th style="width:100px;">操作人</th>
						<th style="width:160px;">操作时间</th>
						<th>生效时段</th>
						<th style="width:200px;">操作</th>
					</tr>
				</thead>
				<tbody id="chgBody">
					<tr><td colspan="5" class="text-center text-muted">加载中…</td></tr>
				</tbody>
			</table>
		</div>
	</div>
	<th:block th:include="include :: footer" />
	<script th:inline="javascript">
		var menuId = [[${menuId}]];
		var prefix = ctx + "system/menu";

		var TYPE_MAP = { I: "新增", U: "修改", D: "删除", S: "排序" };
		var AUTH_MAP = { platform: "平台", hospital: "医院", supplier: "供应商", hospital_supplier: "医院+供应商" };
		var SCOPE_MAP = { none: "不同步到院/商白名单", all_hospital: "新建医院默认进医院菜单白名单", all_supplier: "新建供应商默认进供应商菜单白名单", all: "院、商建档均默认同步" };
		var BIZ_MAP = { other: "其他", platform_ops: "平台运维", scm_auth: "授权与数据权限", tenant: "客户租户", supplier_master: "供应商主数据", hospital_master: "医院主数据", master_data: "基础主数据", certificate: "资质证件", supply_chain: "订单配送", settlement: "结算", datacenter: "数据中心", integration: "接口对接" };
		var MT_MAP = { M: "目录", C: "菜单", F: "按钮" };

		function typeLabel(t) { return TYPE_MAP[t] || t || "-"; }
		function fmtTime(v) {
			if (!v) return "-";
			if (typeof v === "string") return v;
			return v;
		}

		function periodText(rows, index) {
			var cur = rows[index];
			var next = rows[index + 1];
			var from = fmtTime(cur.operTime);
			if (!next) {
				return from + " ~ 至今";
			}
			return from + " ~ " + fmtTime(next.operTime);
		}

		function fieldLabel(k) {
			var m = { menuId: "菜单ID", menuName: "名称", parentId: "父菜单ID", orderNum: "排序", url: "地址", target: "打开方式", menuType: "类型", visible: "显示", isRefresh: "刷新", perms: "权限", icon: "图标", remark: "备注", authType: "权限类型", defaultOpenScope: "默认开放范围", hospitalGrantSupplierFlag: "需院授供应商", menuBizCategory: "业务分类", defaultOpenHospital: "默认对医院开放", hospitalAdminOnly: "仅医院管理员默认", defaultOpenSupplier: "默认对供应商开放", supplierAdminOnly: "仅供应商管理员默认" };
			return m[k] || k;
		}

		function decorateRow(obj) {
			if (!obj || typeof obj !== "object") return obj;
			var o = {};
			for (var k in obj) {
				if (!obj.hasOwnProperty(k)) continue;
				var v = obj[k];
				if (k === "authType") o[k] = AUTH_MAP[v] || v;
				else if (k === "defaultOpenScope") o[k] = SCOPE_MAP[v] || v;
				else if (k === "menuBizCategory") o[k] = BIZ_MAP[v] || v;
				else if (k === "menuType") o[k] = MT_MAP[v] || v;
				else if (k === "hospitalGrantSupplierFlag") o[k] = (v === "1" || v === 1) ? "是" : "否";
				else if (k === "defaultOpenHospital" || k === "defaultOpenSupplier" || k === "hospitalAdminOnly" || k === "supplierAdminOnly") o[k] = (v === "1" || v === 1) ? "是" : "否";
				else if (k === "visible") o[k] = (v === "0" || v === 0) ? "显示" : "隐藏";
				else o[k] = v;
			}
			return o;
		}

		function tableFromObj(title, obj) {
			obj = decorateRow(obj);
			var keys = Object.keys(obj);
			var sb = '<h4 class="m-t-sm">' + title + '</h4><table class="table table-bordered table-condensed m-b-md"><tbody>';
			for (var i = 0; i < keys.length; i++) {
				var k = keys[i];
				sb += "<tr><th style='width:140px;'>" + fieldLabel(k) + "</th><td>" + (obj[k] === undefined || obj[k] === null ? "" : String(obj[k])) + "</td></tr>";
			}
			sb += "</tbody></table>";
			return sb;
		}

		function renderSnapshotHtml(snap, changeType) {
			var html = "";
			if (snap.before) {
				html += tableFromObj("变更前 / 删除前", snap.before);
			}
			if (snap.after) {
				html += tableFromObj("变更后 / 当前版本", snap.after);
			}
			if (!html) {
				html = "<p class='text-muted'>无快照数据</p>";
			}
			return html;
		}

		function escapeHtml(s) {
			if (!s) {
				return "";
			}
			return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
		}

		function openSnapshot(logId) {
			$.get(prefix + "/changeLogRow/" + logId, function (res) {
				if (parseInt(res.code, 10) !== 0) {
					$.modal.msgError(res.msg || "加载失败");
					return;
				}
				var row = res.data;
				var snap = {};
				try {
					snap = JSON.parse(row.menuSnapshot || "{}");
				} catch (e) {
					snap = {};
				}
				var inner = "<div style='padding:10px 14px;max-height:460px;overflow:auto'>" + renderSnapshotHtml(snap, row.changeType) + "</div>";
				var title = "历史状态 — " + typeLabel(row.changeType) + " — " + fmtTime(row.operTime);
				if (top.layer) {
					top.layer.open({ type: 1, title: title, area: ["860px", "560px"], shadeClose: true, content: inner });
				} else {
					$.modal.alert(inner);
				}
			});
		}

		$(function () {
			$.get(prefix + "/changeLogData/" + menuId, function (res) {
				var $body = $("#chgBody");
				$body.empty();
				if (parseInt(res.code, 10) !== 0) {
					$body.append("<tr><td colspan='5' class='text-center text-danger'>" + (res.msg || "加载失败") + "</td></tr>");
					return;
				}
				var rows = res.data || [];
				if (rows.length === 0) {
					$body.append("<tr><td colspan='5' class='text-center text-muted'>暂无变更记录（本功能上线后的新增/修改/删除/排序才会写入）</td></tr>");
					return;
				}
				for (var i = 0; i < rows.length; i++) {
					var r = rows[i];
					var tr = $("<tr/>");
					tr.append("<td>" + typeLabel(r.changeType) + "</td>");
					tr.append("<td>" + (r.operBy || "-") + "</td>");
					tr.append("<td>" + fmtTime(r.operTime) + "</td>");
					tr.append("<td>" + periodText(rows, i) + "</td>");
					var btn = "<button type='button' class='btn btn-primary btn-xs' onclick='openSnapshot(" + r.logId + ")'><i class='fa fa-eye'></i> 历史状态</button> ";
					btn += "<button type='button' class='btn btn-info btn-xs' onclick='showRawJson(" + r.logId + ")'><i class='fa fa-file-text-o'></i> 原始 JSON</button>";
					tr.append("<td>" + btn + "</td>");
					$body.append(tr);
				}
			});
		});

		function showRawJson(logId) {
			$.get(prefix + "/changeLogRow/" + logId, function (res) {
				if (parseInt(res.code, 10) !== 0) {
					$.modal.msgError(res.msg || "加载失败");
					return;
				}
				var row = res.data;
				var pre = "<pre style='max-height:420px;overflow:auto;text-align:left'>" + escapeHtml(row.menuSnapshot || "") + "</pre>";
				if (top.layer) {
					top.layer.open({ type: 1, title: "快照 JSON", area: ["720px", "520px"], shadeClose: true, content: "<div style='padding:10px'>" + pre + "</div>" });
				} else {
					$.modal.alert(pre);
				}
			});
		}
	</script>
</body>
</html>
