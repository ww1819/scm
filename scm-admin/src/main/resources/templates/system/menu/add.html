<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('新增菜单')" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-menu-add">
			<input id="treeId" name="parentId" type="hidden" th:value="${menu.menuId}" />
			<div class="form-group">
				<label class="col-sm-3 control-label">上级菜单：</label>
				<div class="col-sm-8">
				    <div class="input-group">
					    <input class="form-control" type="text" onclick="selectMenuTree()" id="treeName" readonly="true" th:value="${menu.menuName}">
				        <span class="input-group-addon"><i class="fa fa-search"></i></span>
				    </div>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">菜单类型：</label>
				<div class="col-sm-8">
					<label class="radio-box"> <input type="radio" name="menuType" value="M" /> 目录 </label> 
					<label class="radio-box"> <input type="radio" name="menuType" value="C" /> 菜单 </label> 
					<label class="radio-box"> <input type="radio" name="menuType" value="F" /> 按钮 </label>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">菜单名称：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="menuName" id="menuName" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label" title="访问的请求地址，如：`/system/user`，如外网地址需内链访问则以`http(s)://`开头">请求地址：<i class="fa fa-question-circle-o"></i></label>
				<div class="col-sm-8">
					<input id="url" name="url" class="form-control" type="text">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">打开方式：</label>
				<div class="col-sm-8">
					<select id="target" name="target" class="form-control m-b">
	                    <option value="menuItem">页签</option>
	                    <option value="menuBlank">新窗口</option>
	                </select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">权限标识：</label>
				<div class="col-sm-8">
					<input id="perms" name="perms" class="form-control" type="text">
					<span class="help-block m-b-none"><i class="fa fa-info-circle"></i> 控制器中定义的权限标识，如：@RequiresPermissions("")</span>
				</div>
			</div>
			<div class="form-group" id="scmScopeGroup">
				<label class="col-sm-3 control-label">SCM 权限维度：</label>
				<div class="col-sm-8">
					<div class="m-b-sm">
						<button type="button" class="btn btn-info btn-xs" onclick="inferScmMetadata()"><i class="fa fa-magic"></i> 根据权限串/路由/名称智能推断</button>
					</div>
					<div class="row">
						<div class="col-sm-6 m-b-sm">
							<label class="control-label">权限类型</label>
							<select name="authType" id="authType" class="form-control">
								<option value="">（保存时自动推断）</option>
								<option value="platform">平台（platform）</option>
								<option value="hospital">医院（hospital）</option>
								<option value="supplier">供应商（supplier）</option>
								<option value="hospital_supplier">医院+供应商（hospital_supplier）</option>
							</select>
						</div>
						<div class="col-sm-6 m-b-sm" id="grantFlagWrap">
							<label class="control-label">需医院按院授予供应商</label>
							<select name="hospitalGrantSupplierFlag" id="hospitalGrantSupplierFlag" class="form-control">
								<option value="0" selected>否</option>
								<option value="1">是</option>
							</select>
						</div>
					</div>
					<div class="row">
						<div class="col-sm-6 m-b-sm">
							<label class="control-label">默认开放范围</label>
							<select name="defaultOpenScope" id="defaultOpenScope" class="form-control">
								<option value="">（保存时自动推断）</option>
								<option value="none">不同步到院/商白名单（none）</option>
								<option value="all_hospital">新建医院默认进医院菜单白名单（all_hospital）</option>
								<option value="all_supplier">新建供应商默认进供应商菜单白名单（all_supplier）</option>
								<option value="all">院、商建档均默认同步（all）</option>
							</select>
						</div>
						<div class="col-sm-6 m-b-sm">
							<label class="control-label">业务分类</label>
							<select name="menuBizCategory" id="menuBizCategory" class="form-control">
								<option value="">（保存时自动推断）</option>
								<option value="other">其他（other）</option>
								<option value="platform_ops">平台运维（platform_ops）</option>
								<option value="scm_auth">授权与数据权限（scm_auth）</option>
								<option value="tenant">客户租户（tenant）</option>
								<option value="supplier_master">供应商主数据（supplier_master）</option>
								<option value="hospital_master">医院主数据（hospital_master）</option>
								<option value="master_data">基础主数据（master_data）</option>
								<option value="certificate">资质证件（certificate）</option>
								<option value="supply_chain">订单配送（supply_chain）</option>
								<option value="settlement">结算（settlement）</option>
								<option value="datacenter">数据中心（datacenter）</option>
								<option value="integration">接口对接（integration）</option>
							</select>
						</div>
					</div>
					<div class="row">
						<div class="col-sm-6 m-b-sm">
							<label class="control-label">默认对医院开放</label>
							<select name="defaultOpenHospital" id="defaultOpenHospital" class="form-control">
								<option value="0" selected>否</option>
								<option value="1">是</option>
							</select>
						</div>
						<div class="col-sm-6 m-b-sm">
							<label class="control-label">仅医院管理员默认获得</label>
							<select name="hospitalAdminOnly" id="hospitalAdminOnly" class="form-control">
								<option value="0" selected>否</option>
								<option value="1">是</option>
							</select>
						</div>
					</div>
					<div class="row">
						<div class="col-sm-6 m-b-sm">
							<label class="control-label">默认对供应商开放</label>
							<select name="defaultOpenSupplier" id="defaultOpenSupplier" class="form-control">
								<option value="0" selected>否</option>
								<option value="1">是</option>
							</select>
						</div>
						<div class="col-sm-6 m-b-sm">
							<label class="control-label">仅供应商管理员默认获得</label>
							<select name="supplierAdminOnly" id="supplierAdminOnly" class="form-control">
								<option value="0" selected>否</option>
								<option value="1">是</option>
							</select>
						</div>
					</div>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required" title="数字越小越靠前">显示排序：<i class="fa fa-question-circle-o"></i></label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="orderNum" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label" title="单击选择需要使用的FontAwesome图标">图标：<i class="fa fa-question-circle-o"></i></label>
				<div class="col-sm-8">
					<input id="icon" name="icon" class="form-control" type="text" placeholder="选择图标">
                    <div class="ms-parent" style="width: 100%;">
                        <div class="icon-drop animated flipInX" style="display: none;max-height:200px;overflow-y:auto">
                            <div data-th-include="system/menu/icon"></div>
                        </div>
                    </div>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label" title="选择隐藏则菜单将不会出现在侧边栏，也没有权限被访问">菜单状态：<i class="fa fa-question-circle-o"></i></label>
				<div class="col-sm-3">
				    <div class="radio-box" th:each="dict : ${@dict.getType('sys_show_hide')}">
						<input type="radio" th:id="${dict.dictCode}" name="visible" th:value="${dict.dictValue}" th:checked="${dict.default}">
						<label th:for="${dict.dictCode}" th:text="${dict.dictLabel}"></label>
					</div>
				</div>
				<label class="col-sm-2 control-label is-refresh" title="打开菜单选项卡是否刷新页面">是否刷新：<i class="fa fa-question-circle-o"></i></label>
				<div class="col-sm-3 is-refresh">
				    <div class="radio-box">
						<input type="radio" id="refresh-no" name="isRefresh" value="1" checked>
						<label for="refresh-no">否</label>
					</div>
					<div class="radio-box">
						<input type="radio" id="refresh-yes" name="isRefresh" value="0">
						<label for="refresh-yes">是</label>
					</div>
				</div>
			</div>
		</form>
	</div>
	<th:block th:include="include :: footer" />
	 <script>
        var prefix = ctx + "system/menu";
        
        $("#form-menu-add").validate({
        	onkeyup: false,
        	rules:{
        		menuType:{
        			required:true,
        		},
        		menuName:{
        			remote: {
                        url: prefix + "/checkMenuNameUnique",
                        type: "post",
                        dataType: "json",
                        data: {
                        	"parentId": function() {
		                		return $("input[name='parentId']").val();
		                    },
                        	"menuName" : function() {
                                return $.common.trim($("#menuName").val());
                            }
                        }
                    }
        		},
        		orderNum:{
        			digits:true
        		},
        	},
        	messages: {
                "menuName": {
                    remote: "菜单已经存在"
                }
            },
            focusCleanup: true
        });
        
        function submitHandler() {
	        if ($.validate.form()) {
	            $.operate.save(prefix + "/add", $('#form-menu-add').serialize());
	        }
	    }

        $(function() {
            $("#authType").on("change", toggleGrantByAuth);
            toggleGrantByAuth();
        	$("input[name='icon']").focus(function() {
                $(".icon-drop").show();
            });
        	$("#form-menu-add").click(function(event) {
        	    var obj = event.srcElement || event.target;
        	    if (!$(obj).is("input[name='icon']")) {
        	    	$(".icon-drop").hide();
        	    }
        	});
        	$(".icon-drop").find(".ico-list i").on("click", function() {
        		$('#icon').val($(this).attr('class'));
            });
        	$('input').on('ifChecked', function(event){  
        		var menuType = $(event.target).val();
        		if (menuType == "M") {
                    $("#url").parents(".form-group").hide();
                    $("#perms").parents(".form-group").hide();
                    $("#icon").parents(".form-group").show();
                    $("#target").parents(".form-group").hide();
                    $(".is-refresh").hide();
                    $("#scmScopeGroup").show();
                } else if (menuType == "C") {
                	$("#url").parents(".form-group").show();
                    $("#perms").parents(".form-group").show();
                    $("#icon").parents(".form-group").show();
                    $("#target").parents(".form-group").show();
                    $(".is-refresh").show();
                    $("#scmScopeGroup").show();
                } else if (menuType == "F") {
                	$("#url").parents(".form-group").hide();
                    $("#perms").parents(".form-group").show();
                    $("#icon").parents(".form-group").hide();
                    $("#target").parents(".form-group").hide();
                    $(".is-refresh").hide();
                    $("#scmScopeGroup").show();
                }
        	});  
            $('input[name="menuType"]:checked').trigger('ifChecked');
        });

        function toggleGrantByAuth() {
            if ($("#authType").val() === "hospital_supplier") {
                $("#grantFlagWrap").show();
            } else {
                $("#grantFlagWrap").hide();
                $("#hospitalGrantSupplierFlag").val("0");
            }
        }

        function inferScmMetadata() {
            $.get(prefix + "/inferScmMetadata", {
                perms: $("#perms").val(),
                url: $("#url").val(),
                menuName: $("#menuName").val()
            }, function(res) {
                if (parseInt(res.code, 10) !== 0) {
                    $.modal.msgError(res.msg || "推断失败");
                    return;
                }
                var d = res.data;
                if (!d) { return; }
                if (d.authType) { $("#authType").val(d.authType); }
                if (d.hospitalGrantSupplierFlag !== undefined && d.hospitalGrantSupplierFlag !== null) {
                    $("#hospitalGrantSupplierFlag").val(String(d.hospitalGrantSupplierFlag));
                }
                if (d.defaultOpenScope) { $("#defaultOpenScope").val(d.defaultOpenScope); }
                if (d.menuBizCategory) { $("#menuBizCategory").val(d.menuBizCategory); }
                if (d.defaultOpenHospital !== undefined && d.defaultOpenHospital !== null) { $("#defaultOpenHospital").val(String(d.defaultOpenHospital)); }
                if (d.hospitalAdminOnly !== undefined && d.hospitalAdminOnly !== null) { $("#hospitalAdminOnly").val(String(d.hospitalAdminOnly)); }
                if (d.defaultOpenSupplier !== undefined && d.defaultOpenSupplier !== null) { $("#defaultOpenSupplier").val(String(d.defaultOpenSupplier)); }
                if (d.supplierAdminOnly !== undefined && d.supplierAdminOnly !== null) { $("#supplierAdminOnly").val(String(d.supplierAdminOnly)); }
                toggleGrantByAuth();
                $.modal.msgSuccess("已填充推断结果，请核对后保存");
            });
        }

        /*菜单管理-新增-选择菜单树*/
        function selectMenuTree() {
        	var treeId = $("#treeId").val();
        	var menuId = treeId > 0 ? treeId : 1;
        	var url = prefix + "/selectMenuTree/" + menuId;
			var options = {
				title: '菜单选择',
				width: "380",
				url: url,
				callBack: doSubmit
			};
			$.modal.openOptions(options);
		}
		
		function doSubmit(index, layero){
			var body = $.modal.getChildFrame(index);
   			$("#treeId").val(body.find('#treeId').val());
   			$("#treeName").val(body.find('#treeName').val());
   			$.modal.close(index);
		}
    </script>
</body>
</html>
