<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('客户菜单功能管理')" />
	<th:block th:include="include :: layout-latest-css" />
	<style>
		.menu-pause-page .container-div { padding: 10px 15px; }
		.menu-pause-page .row { margin-bottom: 8px; }
		.menu-pause-page .row.section { margin-top: 12px; margin-bottom: 6px; }
		.menu-pause-page .toolbar-row { margin-bottom: 6px; }
		.menu-pause-page .section-title { margin: 0 0 6px 0; font-size: 14px; font-weight: 600; color: #333; }
		.menu-pause-page .section-desc { margin: 0 0 6px 0; font-size: 12px; color: #999; }
		.menu-pause-page .select-table { margin-bottom: 0; }
		.menu-pause-page .table { margin-bottom: 8px; }
		.menu-pause-page .alert-compact { padding: 8px 12px; margin-bottom: 0; font-size: 13px; }
		.menu-pause-page #tenantSelect { min-width: 200px; height: 32px; padding: 4px 8px; }
		.menu-pause-page .current-tenant { font-size: 13px; color: #5a5a5a; margin-left: 16px; }
		.menu-pause-page .current-tenant strong { color: #333; }
	</style>
</head>
<body class="gray-bg menu-pause-page">
	<div class="container-div">
		<div class="row toolbar-row">
			<div class="col-sm-12">
				<div class="form-inline">
					<label class="control-label" style="margin-right:8px;">选择客户</label>
					<select id="tenantSelect" class="form-control">
						<option value="">请选择客户</option>
					</select>
					<span id="currentTenantWrap" class="current-tenant" style="display:none;"><strong>当前客户：</strong><span id="currentTenantName">-</span></span>
				</div>
			</div>
		</div>
		<div class="row" id="rowHint">
			<div class="col-sm-12">
				<div class="alert alert-info alert-compact">
					<i class="fa fa-info-circle"></i> 请从下拉列表选择客户，将显示其菜单权限、暂停状态及暂停记录。
				</div>
			</div>
		</div>
		<div class="row section" id="rowMenuList" style="display: none;">
			<div class="col-sm-12">
				<h6 class="section-title"><i class="fa fa-list"></i> 客户菜单权限及状态</h6>
				<p class="section-desc">已授权菜单及暂停状态，可对单条执行暂停/恢复</p>
				<div class="select-table table-striped table-condensed">
					<table id="bootstrap-table-pause"></table>
				</div>
			</div>
		</div>
		<div class="row section" id="rowLogList" style="display: none;">
			<div class="col-sm-12">
				<h6 class="section-title"><i class="fa fa-history"></i> 暂停记录</h6>
				<p class="section-desc">该客户菜单暂停/恢复的操作历史</p>
				<div class="select-table table-striped table-condensed">
					<table id="bootstrap-table-log"></table>
				</div>
			</div>
		</div>
	</div>

	<!-- 暂停/恢复 备注弹窗 -->
	<div id="remarkModal" class="modal fade" tabindex="-1">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<button type="button" class="close" data-dismiss="modal">&times;</button>
					<h4 class="modal-title" id="remarkModalTitle">备注</h4>
				</div>
				<div class="modal-body">
					<div class="form-group">
						<label>备注（选填）：</label>
						<input type="text" id="remarkInput" class="form-control" placeholder="请输入暂停/恢复原因或说明" maxlength="200" />
					</div>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-primary" id="remarkModalConfirm">确定</button>
					<button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
				</div>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:inline="javascript">
		var prefix = ctx + "tenant/menuPause";
		var tenantId = '';
		var tenantName = '';

		$(function() {
			loadTenantOptions();
			$('#tenantSelect').on('change', onTenantChange);
		});

		function getUrlParam(name) {
			var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
			var r = window.location.search.substr(1).match(reg);
			return r != null ? decodeURIComponent(r[2]) : null;
		}

		function loadTenantOptions() {
			$.get(prefix + "/tenantOptions", function(res) {
				if (res.code === 0 && res.data) {
					var $sel = $('#tenantSelect');
					$sel.find('option:not(:first)').remove();
					$.each(res.data, function(i, o) {
						$sel.append('<option value="' + o.tenantId + '">' + (o.tenantName || o.tenantId) + '</option>');
					});
					var preset = getUrlParam('tenantId');
					if (preset) {
						$sel.val(preset);
						onTenantChange();
					}
				}
			});
		}

		function onTenantChange() {
			var val = $('#tenantSelect').val();
			if (!val) {
				tenantId = '';
				tenantName = '';
				$('#currentTenantWrap').hide();
				$('#rowMenuList').hide();
				$('#rowLogList').hide();
				$('#rowHint').show();
				return;
			}
			tenantId = val;
			tenantName = $('#tenantSelect option:selected').text();
			$('#currentTenantName').text(tenantName);
			$('#currentTenantWrap').show();
			$('#rowMenuList').show();
			$('#rowLogList').show();
			$('#rowHint').hide();
			loadPauseTable();
			loadLogTable();
		}

		function loadPauseTable() {
			if (!tenantId) return;
			$('#bootstrap-table-pause').bootstrapTable('destroy').bootstrapTable({
				url: prefix + '/list/' + tenantId,
				method: 'post',
				pagination: true,
				pageSize: 10,
				pageList: [10, 25, 50],
				search: true,
				showRefresh: true,
				showColumns: false,
				sidePagination: 'client',
				classes: 'table table-condensed',
				columns: [
					{ field: 'menuId', title: '菜单ID', visible: false },
					{ field: 'menuName', title: '菜单名称', align: 'left' },
					{
						field: 'pauseStatus',
						title: '权限状态',
						align: 'center',
						formatter: function(v) {
							return v == '0' ? '<span class="label label-success">正常</span>' : '<span class="label label-warning">已暂停</span>';
						}
					},
					{ field: 'pauseTime', title: '暂停时间', formatter: function(v) { return v || '-'; } },
					{
						title: '操作',
						align: 'center',
						formatter: function(v, row) {
							if (row.pauseStatus == '1') {
								return '<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="openResume(\'' + row.menuId + '\', \'' + (row.menuName || '').replace(/'/g, "\\'") + '\')"><i class="fa fa-play"></i> 恢复</a>';
							} else {
								return '<a class="btn btn-warning btn-xs" href="javascript:void(0)" onclick="openPause(\'' + row.menuId + '\', \'' + (row.menuName || '').replace(/'/g, "\\'") + '\')"><i class="fa fa-pause-circle-o"></i> 暂停</a>';
							}
						}
					}
				]
			});
		}

		function loadLogTable() {
			if (!tenantId) return;
			$('#bootstrap-table-log').bootstrapTable('destroy').bootstrapTable({
				url: prefix + '/logList/' + tenantId,
				method: 'post',
				pagination: true,
				pageSize: 10,
				pageList: [10, 25, 50],
				showRefresh: true,
				showColumns: false,
				sidePagination: 'server',
				classes: 'table table-condensed',
				queryParams: function(params) {
					return $.table.queryParams(params);
				},
				columns: [
					{ field: 'logId', title: 'logId', visible: false },
					{ field: 'menuName', title: '菜单名称', align: 'left' },
					{
						field: 'action',
						title: '动作',
						align: 'center',
						formatter: function(v) {
							return v == '0' ? '<span class="label label-success">恢复</span>' : '<span class="label label-warning">暂停</span>';
						}
					},
					{ field: 'operBy', title: '操作人' },
					{ field: 'operTime', title: '操作时间' },
					{ field: 'remark', title: '备注' }
				]
			});
		}

		function openPause(menuId, menuName) {
			$('#remarkModalTitle').text('暂停菜单：' + (menuName || menuId));
			$('#remarkInput').val('');
			$('#remarkModalConfirm').off('click').on('click', function() {
				var remark = $('#remarkInput').val() || '';
				$('#remarkModal').modal('hide');
				doPause(menuId, remark);
			});
			$('#remarkModal').modal('show');
		}

		function openResume(menuId, menuName) {
			$('#remarkModalTitle').text('恢复菜单：' + (menuName || menuId));
			$('#remarkInput').val('');
			$('#remarkModalConfirm').off('click').on('click', function() {
				var remark = $('#remarkInput').val() || '';
				$('#remarkModal').modal('hide');
				doResume(menuId, remark);
			});
			$('#remarkModal').modal('show');
		}

		function doPause(menuId, remark) {
			$.ajax({
				type: "POST",
				url: prefix + "/pause",
				data: { tenantId: tenantId, menuId: menuId, remark: remark },
				success: function(data) {
					$.operate.successCallback(data);
					loadPauseTable();
					loadLogTable();
				},
				error: function() {
					$.modal.alertError("操作失败");
				}
			});
		}

		function doResume(menuId, remark) {
			$.operate.post(prefix + "/resume", { tenantId: tenantId, menuId: menuId, remark: remark }, function() {
				loadPauseTable();
				loadLogTable();
			});
		}
	</script>
</body>
</html>
