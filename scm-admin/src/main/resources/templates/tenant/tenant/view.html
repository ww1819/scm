<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('客户详情')" />
</head>
<body>
    <div class="main-content">
        <form id="form-tenant-view" class="form-horizontal">
            <input name="tenantId" type="hidden" th:value="${tenant.tenantId}"/>
            <h4 class="form-header h4">基本信息</h4>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">租户ID：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${tenant.tenantId}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">客户名称：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${tenant.tenantName}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">租户编码：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${tenant.tenantCode}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">拼音简码：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${tenant.pinyinCode}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">状态：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${tenant.status == '0' ? '正常' : '停用'}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">计划停用时间：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${tenant.plannedStopTime != null ? #dates.format(tenant.plannedStopTime, 'yyyy-MM-dd HH:mm:ss') : ''}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">联系人：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${tenant.contactPerson}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">联系电话：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${tenant.contactPhone}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">创建时间：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:value="${tenant.createTime != null ? #dates.format(tenant.createTime, 'yyyy-MM-dd HH:mm:ss') : ''}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label">备注：</label>
                        <div class="col-xs-10">
                            <textarea class="form-control" rows="3" readonly th:text="${tenant.remark}"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </form>

        <h4 class="form-header h4">启用停用时间段</h4>
        <div class="table-responsive">
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>开始时间</th>
                        <th>结束时间</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${periods == null || #lists.isEmpty(periods)}"><td colspan="3" class="text-center">暂无记录</td></tr>
                    <tr th:each="p : ${periods}">
                        <td th:text="${#dates.format(p.startTime, 'yyyy-MM-dd HH:mm:ss')}"></td>
                        <td th:text="${p.endTime != null ? #dates.format(p.endTime, 'yyyy-MM-dd HH:mm:ss') : '-'}"></td>
                        <td th:text="${p.status == '0' ? '启用' : '停用'}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <h4 class="form-header h4">启用停用记录</h4>
        <div class="table-responsive">
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>动作</th>
                        <th>操作人</th>
                        <th>操作时间</th>
                        <th>备注</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${statusLogs == null || #lists.isEmpty(statusLogs)}"><td colspan="4" class="text-center">暂无记录</td></tr>
                    <tr th:each="log : ${statusLogs}">
                        <td th:text="${log.action == '0' ? '启用' : '停用'}"></td>
                        <td th:text="${log.operBy}"></td>
                        <td th:text="${log.operTime != null ? #dates.format(log.operTime, 'yyyy-MM-dd HH:mm:ss') : ''}"></td>
                        <td th:text="${log.remark}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <h4 class="form-header h4">信息修改记录</h4>
        <div class="table-responsive">
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>字段</th>
                        <th>原值</th>
                        <th>新值</th>
                        <th>操作人</th>
                        <th>操作时间</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${modifyLogs == null || #lists.isEmpty(modifyLogs)}"><td colspan="5" class="text-center">暂无记录</td></tr>
                    <tr th:each="log : ${modifyLogs}">
                        <td th:text="${log.fieldName}"></td>
                        <td th:text="${log.oldValue}"></td>
                        <td th:text="${log.newValue}"></td>
                        <td th:text="${log.operBy}"></td>
                        <td th:text="${log.operTime != null ? #dates.format(log.operTime, 'yyyy-MM-dd HH:mm:ss') : ''}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="row" style="position: fixed; bottom: 0; left: 0; right: 0; background-color: #fff; padding: 15px 20px; border-top: 1px solid #ddd; z-index: 1000;">
        <div class="col-sm-offset-5 col-sm-10">
            <button type="button" class="btn btn-sm btn-info" onclick="authMenu()" shiro:hasPermission="tenant:tenant:auth"><i class="fa fa-key"></i>客户功能授权</button>&nbsp;
            <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i>关 闭</button>
        </div>
    </div>
    <div style="height: 70px;"></div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:inline="javascript">
	    var prefix = ctx + "tenant/tenant";
	    function authMenu() {
	        var tenantId = $('input[name="tenantId"]').val();
	        if (!tenantId) { $.modal.alertError("客户ID不存在"); return; }
	        $.modal.openTab("客户授权", prefix + '/authMenu/' + tenantId);
	    }
	</script>
</body>
</html>
