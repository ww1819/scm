<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('客户授权')" />
	<th:block th:include="include :: ztree-css" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-tenant-auth">
			<input id="tenantId" name="tenantId" type="hidden" th:value="${tenant.tenantId}"/>
			<div class="form-group">
				<label class="col-sm-3 control-label">客户名称：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" th:value="${tenant.tenantName}" readonly/>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">功能菜单：</label>
				<div class="col-sm-8">
					<label class="check-box">
						<input type="checkbox" value="1">展开/折叠</label>
					<label class="check-box">
						<input type="checkbox" value="2">全选/全不选</label>
					<label class="check-box">
						<input type="checkbox" value="3" checked>父子联动</label>
					<div id="menuTrees" class="ztree ztree-border"></div>
				</div>
			</div>
		</form>
	</div>
	<div class="row" style="position: fixed; bottom: 0; left: 0; right: 0; background-color: #fff; padding: 15px 20px; border-top: 1px solid #ddd; z-index: 1000;">
		<div class="col-sm-offset-5 col-sm-10">
			<button type="button" class="btn btn-sm btn-primary" onclick="submitHandler()"><i class="fa fa-check"></i>保 存</button>&nbsp;
			<button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i>关 闭</button>
		</div>
	</div>
	<div style="height: 70px;"></div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: ztree-js" />
	<script th:inline="javascript">
		var tenantId = /*[[${tenant.tenantId}]]*/ '';
		var prefix = ctx + "tenant/tenant";

		$(function() {
			var url = prefix + "/authMenu/treeData/" + tenantId;
			var options = {
				id: "menuTrees",
				url: url,
				check: { enable: true, chkboxType: { "Y": "ps", "N": "ps" } },
				expandLevel: 1
			};
			$.tree.init(options);
		});

		$('input').on('ifChanged', function(obj){
			var type = $(this).val();
			var checked = obj.currentTarget.checked;
			if (type == 1) {
				if (checked) $._tree.expandAll(true);
				else $._tree.expandAll(false);
			} else if (type == "2") {
				if (checked) $._tree.checkAllNodes(true);
				else $._tree.checkAllNodes(false);
			} else if (type == "3") {
				if (checked) $._tree.setting.check.chkboxType = { "Y": "ps", "N": "ps" };
				else $._tree.setting.check.chkboxType = { "Y": "", "N": "" };
			}
		});

		function submitHandler() {
			var menuIds = $.tree.getCheckedNodes();
			var menuIdsStr = (Array.isArray(menuIds) ? menuIds.join(',') : (menuIds || ''));
			$.ajax({
				cache: true,
				type: "POST",
				url: prefix + "/authMenu/save",
				data: { "tenantId": tenantId, "menuIds": menuIdsStr },
				async: false,
				error: function(request) {
					$.modal.alertError("系统错误");
				},
				success: function(data) {
					$.operate.successCallback(data);
				}
			});
		}
	</script>
</body>
</html>
