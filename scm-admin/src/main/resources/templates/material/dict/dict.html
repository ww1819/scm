<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('物资字典列表')" />
	<th:block th:include="include :: layout-latest-css" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-css" />
	<style>
		.material-dict-table-wrap {
			min-height: 0;
			position: relative;
			padding-bottom: 0;
			overflow: hidden;
			display: flex;
			flex-direction: column;
		}

		.material-dict-table-wrap > .bootstrap-table {
			flex: 1 1 auto;
			min-height: 0;
		}

		.material-dict-table-wrap .bootstrap-table {
			display: flex;
			flex-direction: column;
			height: 100%;
			padding-bottom: 0;
		}

		.material-dict-table-wrap .fixed-table-container {
			flex: 1 1 auto;
			min-height: 0;
			padding-bottom: 0;
		}

		.material-dict-table-wrap .fixed-table-body {
			overflow-x: auto !important;
			overflow-y: auto !important;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-columns-right {
			z-index: 5;
			box-shadow: -4px 0 8px rgba(0, 0, 0, 0.08);
		}

		.material-dict-table-wrap .fixed-table-body .fixed-table-border {
			display: none !important;
			height: 0 !important;
		}

		.material-dict-table-wrap .fixed-table-pagination {
			position: relative;
			flex-shrink: 0;
			left: auto;
			right: auto;
			bottom: auto;
			background: #fff;
			z-index: 3;
			border-top: 1px solid #eee;
			margin: 0 !important;
			padding: 4px 10px 2px;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-table-pagination .pagination {
			margin-right: 172px;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-header th .th-inner,
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-header th .sortable {
			text-align: center !important;
			justify-content: center;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-header th[data-field="rowIndex"],
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-body td[data-field="rowIndex"],
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-header th[data-field="unit"],
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-body td[data-field="unit"],
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-header th[data-field="status"],
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-body td[data-field="status"],
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-header th[data-field="purchasePrice"],
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-body td[data-field="purchasePrice"] {
			text-align: center !important;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-table-header {
			position: relative;
			top: auto;
			z-index: 2;
			background: #fff;
			overflow: hidden;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-header table,
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-body > table {
			table-layout: fixed;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-header th,
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-body tbody td {
			box-sizing: border-box;
			vertical-align: middle;
		}

		/* 主表滚动区隐藏操作列内容，由右侧 fixed-columns-right 展示（与配送单据申请一致） */
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-header th[data-field="materialOperate"],
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-body td[data-field="materialOperate"] {
			padding: 0 !important;
			border-left: 0 !important;
			border-right: 0 !important;
			font-size: 0;
			line-height: 0;
			color: transparent;
			overflow: hidden;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-header th[data-field="materialOperate"] > *,
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-body td[data-field="materialOperate"] > * {
			display: none;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-columns-right .fixed-table-header th,
		.material-dict-table-wrap.material-dict-list-table .fixed-columns-right .fixed-table-body td {
			background-color: #fff;
			vertical-align: middle;
			white-space: nowrap;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-columns-right .fixed-table-header th[data-field="materialOperate"] {
			background-color: #f5f5f5;
			min-width: 160px;
			width: 160px;
			text-align: center;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-columns-right .fixed-table-header th[data-field="materialOperate"] .th-inner {
			text-align: center;
			justify-content: center;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-columns-right .fixed-table-body td[data-field="materialOperate"] {
			min-width: 160px;
			width: 160px;
			padding: 6px 8px;
			text-align: center;
		}

		.material-dict-table-wrap.material-dict-list-table.table-striped .fixed-columns-right .fixed-table-body tbody tr:nth-of-type(odd) td {
			background-color: #f9f9f9;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-columns-right .fixed-table-body {
			overflow-x: hidden !important;
			overflow-y: hidden !important;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-table-body tbody td {
			white-space: nowrap;
			vertical-align: middle !important;
		}

		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-body td[data-field="materialCode"],
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-body td[data-field="materialName"],
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-body td[data-field="specification"],
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-body td[data-field="model"],
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-body td[data-field="manufacturerName"],
		.material-dict-table-wrap.material-dict-list-table .fixed-table-container > .fixed-table-body td[data-field="categoryName"] {
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.material-dict-table-wrap.material-dict-list-table .material-dict-cell-ellipsis {
			display: block;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			max-width: 100%;
		}

		/* 搜索区：与配送单据申请一致 */
		.container-div > .row > .search-collapse {
			padding-top: 10px !important;
			padding-bottom: 10px !important;
		}

		.container-div .search-collapse .select-list ul {
			margin-bottom: 0;
		}

		.container-div .search-collapse .select-list li {
			margin: 4px 15px 4px 0;
		}
	</style>
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="material-dict-form">
					<div class="select-list">
						<ul>
							<li>
								产品编码：<input type="text" name="materialCode"/>
							</li>
							<li>
								产品名称：<input type="text" name="materialName"/>
							</li>
							<li>
								状态：<select name="status">
									<option value="">所有</option>
									<option value="0">正常</option>
									<option value="1">停用</option>
								</select>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()" style="display: none;"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="resetPre()" style="display: none;"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>

	        <div class="btn-group-sm" id="toolbar" role="group">
	        	<a class="btn btn-success" onclick="$.operate.addTab()" shiro:hasPermission="material:dict:add">
	                <i class="fa fa-plus"></i> 新增
	            </a>
	             <a class="btn btn-primary single disabled" onclick="$.operate.editTab()" shiro:hasPermission="material:dict:edit">
		            <i class="fa fa-edit"></i> 修改
		        </a>
	            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="material:dict:remove">
	                <i class="fa fa-remove"></i> 删除
	            </a>
	            <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="material:dict:export">
		            <i class="fa fa-download"></i> 导出
		        </a>
	            <a class="btn btn-primary" onclick="$.table.search()">
		            <i class="fa fa-search"></i> 搜索
		        </a>
	            <a class="btn btn-warning" onclick="resetPre()">
		            <i class="fa fa-refresh"></i> 重置
		        </a>
	        </div>

	        <div class="col-sm-12 select-table table-striped material-dict-table-wrap material-dict-list-table">
			    <table id="bootstrap-table"></table>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-js" />
	<script th:inline="javascript">
		var editFlag = [[${@permission.hasPermi('material:dict:edit')}]];
		var removeFlag = [[${@permission.hasPermi('material:dict:remove')}]];
		var prefix = ctx + "material/dict";
		var materialDictTableId = 'bootstrap-table';

		var materialColWidths = {
			rowIndex: 60,
			materialCode: 150,
			materialName: 200,
			specification: 120,
			model: 120,
			unit: 80,
			purchasePrice: 100,
			manufacturerName: 150,
			categoryName: 120,
			status: 100,
			createTime: 160,
			materialOperate: 160
		};

		$(function() {
		    layoutMaterialDictTableWrapHeight();
		    queryMaterialDictList();
		    $(window).resize(function() {
		    	layoutMaterialDictTableWrapHeight();
		    	adjustTableHeight();
		    	setTimeout(refreshMaterialDictTableLayout, 100);
		    });
		});

		function layoutMaterialDictTableWrapHeight() {
			var $wrap = $('.material-dict-table-wrap');
			if (!$wrap.length) {
				return;
			}
			var top = $wrap[0].getBoundingClientRect().top;
			var h = Math.floor(window.innerHeight - top - 14);
			h = Math.min(Math.max(h, 400), 580);
			$wrap[0].style.height = h + 'px';
			$wrap[0].style.minHeight = h + 'px';
		}

		function calculateTableHeight() {
			layoutMaterialDictTableWrapHeight();
			var $wrap = $('.material-dict-table-wrap');
			if ($wrap.length === 0) {
				return 440;
			}
			var $bt = $wrap.find('.bootstrap-table');
			var wrapH = $wrap[0].clientHeight || $wrap.innerHeight() || 0;
			var toolbarH = $bt.find('.fixed-table-toolbar').outerHeight(true) || 0;
			var pagH = $bt.find('.fixed-table-pagination').outerHeight(true) || 46;
			var containerH = Math.floor(wrapH - toolbarH - pagH - 2);
			return Math.max(containerH, 240);
		}

		function adjustTableHeight() {
			var $table = $('#' + materialDictTableId);
			if ($table.length > 0 && $table.bootstrapTable('getOptions')) {
				$table.bootstrapTable('resetView', { height: calculateTableHeight() });
			}
		}

		function escMaterialCellAttr(s) {
			return String(s == null ? '' : s)
				.replace(/&/g, '&amp;')
				.replace(/"/g, '&quot;')
				.replace(/'/g, '&#39;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;');
		}

		function materialCellEllipsis(value) {
			var s = (value == null || value === '') ? '-' : String(value);
			if (s === '-') {
				return s;
			}
			return '<span class="material-dict-cell-ellipsis" title="' + escMaterialCellAttr(s) + '">' + escMaterialCellAttr(s) + '</span>';
		}

		function getMaterialDictTableTotalWidth() {
			var sum = 0;
			var opt = $('#' + materialDictTableId).bootstrapTable('getOptions');
			if (opt && opt.columns && opt.columns[0]) {
				$.each(opt.columns[0], function (_, col) {
					if (!col || col.visible === false) {
						return;
					}
					if (col.checkbox) {
						sum += 42;
					} else if (col.field && materialColWidths[col.field] != null) {
						sum += materialColWidths[col.field];
					} else if (col.width) {
						sum += parseInt(col.width, 10) || 0;
					} else {
						sum += 100;
					}
				});
			}
			return Math.max(sum, 1200);
		}

		function applyMaterialDictFieldColumnWidth(field, widthPx) {
			var w = widthPx + 'px';
			var $container = $('#' + materialDictTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $th = $mainHeader.find('th[data-field="' + field + '"]');
			if ($th.length === 0) {
				return;
			}
			var colIdx = $th[0].cellIndex;
			var setW = function (el) {
				el.style.setProperty('width', w, 'important');
				el.style.setProperty('min-width', w, 'important');
				el.style.setProperty('max-width', w, 'important');
			};
			$th.each(function () { setW(this); });
			$mainBody.find('table tbody tr').each(function () {
				var cell = this.cells[colIdx];
				if (cell) {
					setW(cell);
				}
			});
			$mainHeader.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
			$mainBody.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
		}

		function applyMaterialDictCheckboxColumnWidth() {
			var w = '42px';
			var $container = $('#' + materialDictTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $th = $mainHeader.find('th.bs-checkbox');
			if ($th.length === 0) {
				return;
			}
			var colIdx = $th[0].cellIndex;
			var setW = function (el) {
				el.style.setProperty('width', w, 'important');
				el.style.setProperty('min-width', w, 'important');
				el.style.setProperty('max-width', w, 'important');
			};
			$th.each(function () { setW(this); });
			$mainBody.find('table tbody tr').each(function () {
				var cell = this.cells[colIdx];
				if (cell) {
					setW(cell);
				}
			});
			$mainHeader.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
			$mainBody.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
		}

		function syncMaterialDictHeaderBodyColumnWidths() {
			var $container = $('#' + materialDictTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $headerThs = $mainHeader.find('thead tr').first().children('th');
			var $firstRow = $mainBody.find('tbody tr').first();
			if ($firstRow.length === 0) {
				return;
			}
			var setW = function (el, widthVal) {
				el.style.setProperty('width', widthVal, 'important');
				el.style.setProperty('min-width', widthVal, 'important');
				el.style.setProperty('max-width', widthVal, 'important');
			};
			$headerThs.each(function (i) {
				var bodyCell = $firstRow[0].cells[i];
				if (!bodyCell) {
					return;
				}
				var w = bodyCell.style.width;
				if (!w) {
					w = window.getComputedStyle(bodyCell).width;
				}
				if (w) {
					setW(this, w);
					$mainHeader.find('colgroup col').eq(i).each(function () { setW(this, w); });
					$mainBody.find('colgroup col').eq(i).each(function () { setW(this, w); });
				}
			});
		}

		function scheduleMaterialDictColumnWidths() {
			applyMaterialDictCheckboxColumnWidth();
			$.each(materialColWidths, function (field, width) {
				applyMaterialDictFieldColumnWidth(field, width);
			});
			syncMaterialDictHeaderBodyColumnWidths();
			requestAnimationFrame(function () {
				applyMaterialDictCheckboxColumnWidth();
				$.each(materialColWidths, function (field, width) {
					applyMaterialDictFieldColumnWidth(field, width);
				});
				syncMaterialDictHeaderBodyColumnWidths();
			});
		}

		function fixMaterialDictTableHeaderAlign() {
			var $bt = $('#' + materialDictTableId).closest('.bootstrap-table');
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			if (!$mainBody.length || !$mainHeader.length) {
				return;
			}
			var scrollW = $mainBody[0].offsetWidth - $mainBody[0].clientWidth;
			$mainHeader.css('margin-right', scrollW > 0 ? (scrollW + 'px') : '');
		}

		function syncMaterialDictHeaderBodyScrollLeft() {
			var $container = $('#' + materialDictTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			if ($mainBody.length && $mainHeader.length) {
				$mainHeader.scrollLeft($mainBody[0].scrollLeft);
			}
		}

		function bindMaterialDictMainHorizontalScroll() {
			var $bt = $('#' + materialDictTableId).closest('.bootstrap-table');
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			$mainBody.off('scroll.materialDictMainH').on('scroll.materialDictMainH', function () {
				$mainHeader.scrollLeft($mainBody.scrollLeft());
			});
		}

		function applyMaterialDictMainTableMinWidth() {
			var sum = getMaterialDictTableTotalWidth();
			var w = sum + 'px';
			var $container = $('#' + materialDictTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $headerTable = $container.children('.fixed-table-header').find('table');
			var $bodyTable = $container.children('.fixed-table-body').children('table');
			$headerTable.css({ width: w, minWidth: w, maxWidth: w });
			$bodyTable.css({ width: w, minWidth: w, maxWidth: w });
		}

		function syncMaterialDictOperateColumnScroll() {
			var $bt = $('#' + materialDictTableId).closest('.bootstrap-table');
			var $rightBody = $bt.find('.fixed-columns-right .fixed-table-body');
			if ($rightBody.length === 0) {
				return;
			}
			var $mainBody = $bt.find('.fixed-table-container').children('.fixed-table-body');
			$mainBody.off('scroll.materialDictOperateSync').on('scroll.materialDictOperateSync', function () {
				$rightBody.scrollTop($mainBody.scrollTop());
			});
		}

		function refreshMaterialDictTableLayout() {
			fixMaterialDictTableHeaderAlign();
			scheduleMaterialDictColumnWidths();
			applyMaterialDictMainTableMinWidth();
			syncMaterialDictHeaderBodyScrollLeft();
			bindMaterialDictMainHorizontalScroll();
			syncMaterialDictOperateColumnScroll();
		}

		function queryMaterialDictList() {
		    var options = {
		        url: prefix + "/list",
		        createUrl: prefix + "/add",
		        updateUrl: prefix + "/edit/{id}",
		        removeUrl: prefix + "/remove",
		        exportUrl: prefix + "/export",
		        sortName: "createTime",
		        sortOrder: "desc",
		        modalName: "物资字典",
		        uniqueId: "materialId",
		        rememberSelected: true,
		        maintainSelected: true,
		        mobileResponsive: false,
		        fixedColumns: true,
		        fixedNumber: 0,
		        fixedRightNumber: 1,
		        pageList: [10, 25, 50],
		        height: calculateTableHeight(),
		        onLoadSuccess: function () {
		            layoutMaterialDictTableWrapHeight();
		            setTimeout(function () {
		                adjustTableHeight();
		                refreshMaterialDictTableLayout();
		            }, 50);
		            setTimeout(function () {
		                var $t = $('#' + materialDictTableId);
		                if ($t.bootstrapTable('getOptions')) {
		                    $t.bootstrapTable('resetView', { height: calculateTableHeight() });
		                }
		                refreshMaterialDictTableLayout();
		            }, 200);
		            setTimeout(refreshMaterialDictTableLayout, 450);
		        },
		        onPostBody: function () {
		            refreshMaterialDictTableLayout();
		        },
		        columns: [{
		            checkbox: true
		        },
		        {
		            field: 'materialId',
		            title: '物资ID',
		            width: 80,
		            visible: false
		        },
		        {
		            field: 'rowIndex',
		            title: '序号',
		            align: 'center',
		            width: 60,
		            formatter: function (value, row, index) {
		                return $.table.serialNumber(index);
		            }
		        },
		        {
		            field: 'materialCode',
		            title: '产品编码',
		            sortable: true,
		            width: 150,
		            formatter: function (value) {
		                return materialCellEllipsis(value);
		            }
		        },
		        {
		            field: 'materialName',
		            title: '产品名称',
		            width: 200,
		            formatter: function (value, row) {
		                var displayValue = value || '-';
		                return '<a href="javascript:void(0)" onclick="$.operate.view(\'' + row.materialId + '\')" title="' + escMaterialCellAttr(displayValue) + '">' + escMaterialCellAttr(displayValue) + '</a>';
		            }
		        },
		        {
		            field: 'specification',
		            title: '规格',
		            width: 120,
		            formatter: function (value) {
		                return materialCellEllipsis(value);
		            }
		        },
		        {
		            field: 'model',
		            title: '型号',
		            width: 120,
		            formatter: function (value) {
		                return materialCellEllipsis(value);
		            }
		        },
		        {
		            field: 'unit',
		            title: '单位',
		            width: 80,
		            align: 'center',
		            formatter: function (value) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'purchasePrice',
		            title: '价格',
		            width: 100,
		            align: 'center',
		            formatter: function (value) {
		                if (value != null && value !== '') {
		                    return '¥' + parseFloat(value).toFixed(2);
		                }
		                return '¥0.00';
		            }
		        },
		        {
		            field: 'manufacturerName',
		            title: '厂家',
		            width: 150,
		            formatter: function (value) {
		                return materialCellEllipsis(value);
		            }
		        },
		        {
		            field: 'categoryName',
		            title: '分类',
		            width: 120,
		            formatter: function (value) {
		                return materialCellEllipsis(value);
		            }
		        },
		        {
		        	field: 'status',
		        	title: '启用',
		        	align: 'center',
		        	width: 100,
		        	formatter: function (value, row) {
		        		var status = row.status;
		        		var statusStr = String(status || '').trim();
		        		var isEnabled = (status === '0' || status === 0 || statusStr === '0');
		        		if (isEnabled) {
		        			return '<span class="badge badge-success">启用</span>';
		        		}
		        		return '<span class="badge badge-danger">未启用</span>';
		        	}
		        },
		        {
		            field: 'createTime',
		            title: '创建时间',
		            sortable: true,
		            width: 160
		        },
		        {
		            field: 'materialOperate',
		            title: '操作',
		            align: 'center',
		            width: 160,
		            formatter: function (value, row) {
		            	var actions = [];
		                actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.editTab(\'' + row.materialId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
		                actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.materialId + '\')"><i class="fa fa-remove"></i>删除</a> ');
		                return actions.join('');
		            }
		        }]
		    };
		    $.table.init(options);
		}

		function resetPre() {
			$("#material-dict-form")[0].reset();
			$.table.search();
		}

		function disableMaterialDict(materialId) {
			$.modal.confirm("确认要停用物资吗？", function() {
				$.operate.post(prefix + "/changeStatus", { "materialId": materialId, "status": "1" });
		    });
		}

		function enableMaterialDict(materialId) {
			$.modal.confirm("确认要启用物资吗？", function() {
				$.operate.post(prefix + "/changeStatus", { "materialId": materialId, "status": "0" });
		    });
		}
	</script>
</body>
</html>
