<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('物资字典列表')" />
	<th:block th:include="include :: layout-latest-css" />
	<style>
		/* 优化表格列间距 */
		#bootstrap-table th,
		#bootstrap-table td {
			padding: 8px 12px !important;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}
		/* 表格容器允许横向滚动 */
		.select-table {
			overflow-x: auto;
		}
		/* 确保表格有最小宽度 */
		#bootstrap-table {
			min-width: 1200px;
		}
		/* 长文本显示完整内容（鼠标悬停时） */
		#bootstrap-table td span[title] {
			cursor: help;
		}
	</style>
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="material-dict-form">
					<div class="select-list">
						<ul>
							<li>
								产品编码：<input type="text" name="materialCode"/>
							</li>
							<li>
								产品名称：<input type="text" name="materialName"/>
							</li>
							<li>
								状态：<select name="status">
									<option value="">所有</option>
									<option value="0">正常</option>
									<option value="1">停用</option>
								</select>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="resetPre()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>
			
	        <div class="btn-group-sm" id="toolbar" role="group">
	        	<a class="btn btn-success" onclick="$.operate.addTab()" shiro:hasPermission="material:dict:add">
	                <i class="fa fa-plus"></i> 新增
	            </a>
	             <a class="btn btn-primary single disabled" onclick="$.operate.editTab()" shiro:hasPermission="material:dict:edit">
		            <i class="fa fa-edit"></i> 修改
		        </a>
	            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="material:dict:remove">
	                <i class="fa fa-remove"></i> 删除
	            </a>
	            <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="material:dict:export">
		            <i class="fa fa-download"></i> 导出
		        </a>
	        </div>
	        
	        <div class="col-sm-12 select-table table-striped">
			    <table id="bootstrap-table"></table>
			</div>
		</div>
	</div>
	
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:inline="javascript">
		var editFlag = [[${@permission.hasPermi('material:dict:edit')}]];
		var removeFlag = [[${@permission.hasPermi('material:dict:remove')}]];
		var prefix = ctx + "material/dict";
		// 获取启用是否字典数据
		var enableDatas = [[${@dict.getType('sys_yes_no')}]];

		$(function() {
		    queryMaterialDictList();
		});

		function queryMaterialDictList() {
		    var options = {
		        url: prefix + "/list",
		        createUrl: prefix + "/add",
		        updateUrl: prefix + "/edit/{id}",
		        removeUrl: prefix + "/remove",
		        exportUrl: prefix + "/export",
		        sortName: "createTime",
		        sortOrder: "desc",
		        modalName: "物资字典",
		        // 启用表格的响应式布局
		        cardView: false,
		        // 设置表格最小宽度，确保列不会被过度压缩
		        showColumns: true,
		        columns: [{
		            checkbox: true,
		            width: 50
		        },
		        {
		            field: 'materialId',
		            title: '物资ID',
		            width: 80,
		            visible: false
		        },
		        {
		            field: 'materialCode',
		            title: '产品编码',
		            sortable: true,
		            width: 150,
		            formatter: function (value, row, index) {
		                return '<span title="' + (value || '') + '">' + (value || '-') + '</span>';
		            }
		        },
		        {
		            field: 'materialName',
		            title: '产品名称',
		            width: 200,
		            formatter: function (value, row, index) {
		                var displayValue = value || '-';
		                return '<a href="javascript:void(0)" onclick="$.operate.view(\'' + row.materialId + '\')" title="' + displayValue + '">' + displayValue + '</a>';
		            }
		        },
		        {
		            field: 'specification',
		            title: '规格',
		            width: 120,
		            formatter: function (value, row, index) {
		                return '<span title="' + (value || '') + '">' + (value || '-') + '</span>';
		            }
		        },
		        {
		            field: 'model',
		            title: '型号',
		            width: 120,
		            formatter: function (value, row, index) {
		                return '<span title="' + (value || '') + '">' + (value || '-') + '</span>';
		            }
		        },
		        {
		            field: 'unit',
		            title: '单位',
		            width: 80,
		            align: 'center',
		            formatter: function (value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'purchasePrice',
		            title: '价格',
		            width: 100,
		            align: 'right',
		            formatter: function (value, row, index) {
		                if (value != null && value !== '') {
		                    return '¥' + parseFloat(value).toFixed(2);
		                }
		                return '¥0.00';
		            }
		        },
		        {
		            field: 'manufacturerName',
		            title: '厂家',
		            width: 150,
		            formatter: function (value, row, index) {
		                return '<span title="' + (value || '') + '">' + (value || '-') + '</span>';
		            }
		        },
		        {
		            field: 'categoryName',
		            title: '分类',
		            width: 120,
		            formatter: function (value, row, index) {
		                return '<span title="' + (value || '') + '">' + (value || '-') + '</span>';
		            }
		        },
		        {
		        	title: '启用',
		        	align: 'center',
		        	width: 100,
		        	formatter: function (value, row, index) {
		        		// status='0'表示启用（点亮），显示"启用"；status='1'表示停用（未点亮），显示"未启用"
		        		var status = row.status;
		        		// 统一转换为字符串进行比较，处理null、undefined、空字符串等情况
		        		var statusStr = String(status || '').trim();
		        		// 判断是否为启用状态：status='0'或0表示启用（点亮）
		        		var isEnabled = (status === '0' || status === 0 || statusStr === '0');
		        		// 根据启用状态显示文字：启用（点亮）->"启用"，未启用（未点亮）->"未启用"
		        		if (isEnabled) {
		        			return '<span class="badge badge-success">启用</span>';
		        		} else {
		        			return '<span class="badge badge-danger">未启用</span>';
		        		}
		        	}
		        },
		        {
		            field: 'createTime',
		            title: '创建时间',
		            sortable: true,
		            width: 160
		        },
		        {
		            title: '操作',
		            align: 'center',
		            width: 150,
		            formatter: function(value, row, index) {
		            	var actions = [];
		                actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.editTab(\'' + row.materialId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
		                actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.materialId + '\')"><i class="fa fa-remove"></i>删除</a> ');
		                return actions.join('');
		            }
		        }]
		    };
		    $.table.init(options);
		}
		
		function resetPre() {
			$("#material-dict-form")[0].reset();
			$.table.search();
		}

		function statusTools(row) {
		    // 判断启用状态：status为'0'或0表示启用（点亮），其他值表示停用（灰色）
		    var status = row.status;
		    // 统一转换为字符串进行比较，处理null、undefined、空字符串等情况
		    var statusStr = String(status || '').trim();
		    var isEnabled = (status === '0' || status === 0 || statusStr === '0');
		    if (isEnabled) {
    			return '<i class="fa fa-toggle-on text-info fa-2x" onclick="disableMaterialDict(\'' + row.materialId + '\')"></i> ';
    		} else {
    			return '<i class="fa fa-toggle-off text-info fa-2x" onclick="enableMaterialDict(\'' + row.materialId + '\')"></i> ';
    		}
		}
		
		function disableMaterialDict(materialId) {
			$.modal.confirm("确认要停用物资吗？", function() {
				$.operate.post(prefix + "/changeStatus", { "materialId": materialId, "status": "1" });
		    })
		}

		function enableMaterialDict(materialId) {
			$.modal.confirm("确认要启用物资吗？", function() {
				$.operate.post(prefix + "/changeStatus", { "materialId": materialId, "status": "0" });
		    })
		}
	</script>
</body>
</html>
