<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('医院关联修改审核')" />
	<th:block th:include="include :: layout-latest-css" />
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="audit-modify-form">
					<div class="select-list">
						<ul>
							<li>审核状态：
								<select name="auditStatus">
									<option value="" selected>全部</option>
									<option value="0">待审核</option>
									<option value="1">已通过</option>
									<option value="2">已拒绝</option>
								</select>
							</li>
							<li>医院：
								<input type="text" name="hospitalKeyword" placeholder="编码/名称/拼音简码"/>
							</li>
							<li>供应商：
								<input type="text" name="supplierKeyword" placeholder="编码/名称/拼音简码"/>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
							</li>
						</ul>
					</div>
				</form>
			</div>
			<div class="btn-group-sm" id="toolbar" role="group">
				<a class="btn btn-warning" onclick="$.table.exportExcel('audit-modify-form')" shiro:hasPermission="hospital:associateModify:export">
					<i class="fa fa-download"></i> 导出
				</a>
			</div>
			<div class="col-sm-12 select-table table-striped">
				<table id="bootstrap-table"></table>
			</div>
		</div>
	</div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:inline="javascript">
		var auditModifyFlag = [[${@permission.hasPermi('hospital:associateModify:audit')}]];
		var prefix = ctx + "hospital/associateModifyAudit";

		function fmtDate(v) {
			if (v == null || v === '') return '-';
			if (typeof v === 'string' && v.length >= 10) return v.substring(0, 10);
			return v;
		}

		$(function() {
			var options = {
				url: prefix + "/list",
				exportUrl: prefix + "/export",
				formId: "audit-modify-form",
				queryParams: function(params) {
					var curParams = {
						pageSize: params.limit,
						pageNum: params.offset / params.limit + 1,
						searchValue: params.search,
						orderByColumn: params.sort,
						isAsc: params.order
					};
					return $.extend(curParams, $.common.formToJSON("audit-modify-form"));
				},
				sortName: "createTime",
				sortOrder: "desc",
				modalName: "医院关联修改审核",
				columns: [{
					field: 'modifyApplyId',
					title: '申请ID',
					visible: false
				}, {
					field: 'relationId',
					title: '关联ID',
					width: 90
				}, {
					title: '序号',
					align: 'center',
					formatter: function (value, row, index) { return $.table.serialNumber(index); }
				}, {
					field: 'hospitalCode',
					title: '医院编码'
				}, {
					field: 'hospitalName',
					title: '医院名称'
				}, {
					field: 'supplierCode',
					title: '供应商编码'
				}, {
					field: 'supplierName',
					title: '供应商名称'
				}, {
					field: 'prevSupplyStartDate',
					title: '变更前供货开始',
					formatter: function(v) { return fmtDate(v); }
				}, {
					field: 'prevSupplyEndDate',
					title: '变更前供货结束',
					formatter: function(v) { return fmtDate(v); }
				}, {
					field: 'supplyStartDate',
					title: '申请供货开始',
					formatter: function(v) { return fmtDate(v); }
				}, {
					field: 'supplyEndDate',
					title: '申请供货结束',
					formatter: function(v) { return fmtDate(v); }
				}, {
					field: 'contractNo',
					title: '合同编号',
					formatter: function(v) { return v || '-'; }
				}, {
					field: 'auditStatus',
					title: '审核状态',
					formatter: function(v) {
						if (v == '0') return '<span class="label label-warning">待审核</span>';
						if (v == '1') return '<span class="label label-success">已通过</span>';
						if (v == '2') return '<span class="label label-danger">已拒绝</span>';
						return v || '-';
					}
				}, {
					field: 'auditByDisplay',
					title: '审核人',
					formatter: function(v, row) { return v || row.auditBy || '-'; }
				}, {
					field: 'auditTime',
					title: '审核时间'
				}, {
					field: 'auditRemark',
					title: '审核备注'
				}, {
					title: '操作',
					align: 'center',
					formatter: function(value, row) {
						if (row.auditStatus != '0') return '-';
						var a = [];
						a.push('<a class="btn btn-success btn-xs ' + auditModifyFlag + '" href="javascript:void(0)" onclick="doAuditModify(\'' + row.modifyApplyId + '\',\'1\')"><i class="fa fa-check"></i>通过</a> ');
						a.push('<a class="btn btn-danger btn-xs ' + auditModifyFlag + '" href="javascript:void(0)" onclick="doAuditModify(\'' + row.modifyApplyId + '\',\'2\')"><i class="fa fa-remove"></i>拒绝</a>');
						return a.join('');
					}
				}]
			};
			$.table.init(options);
		});

		function doAuditModify(modifyApplyId, approved) {
			var msg = approved === '1' ? '确认审核通过？通过后关联表供货期限等将按申请更新。' : '确认拒绝该修改申请吗？';
			$.modal.confirm(msg, function() {
				var remark = approved === '2' ? (prompt('请输入拒绝原因（选填）') || '') : '';
				$.post(prefix + "/audit", { modifyApplyId: modifyApplyId, approved: approved, auditRemark: remark }, function(res) {
					if (res.code == web_status.SUCCESS) {
						$.modal.msgSuccess(res.msg || '操作成功');
						$.table.refresh();
					} else {
						$.modal.msgError(res.msg || '操作失败');
					}
				});
			});
		}
	</script>
</body>
</html>
