<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro" class="tp-query-root">
<head>
	<th:block th:include="include :: header('第三方订单查询')" />
	<th:block th:include="include :: layout-latest-css" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-css" />
	<style>
		/* 页面布局：与配送信息查询-配送明细表一致，明细框占满剩余可视区域 */
		html.tp-query-root,
		html.tp-query-root body.tp-query-body {
			height: 100%;
			margin: 0;
			overflow: hidden;
			box-sizing: border-box;
		}
		body.tp-query-body {
			display: flex;
			flex-direction: column;
			min-height: 0;
		}
		.tp-query-page.container-div {
			flex: 1 1 0%;
			min-height: 0;
			height: auto !important;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}
		.tp-query-page > .row {
			flex: 1;
			display: flex;
			flex-direction: column;
			margin: 0;
			min-height: 0;
			overflow: visible;
		}
		.tp-query-page .search-collapse,
		.tp-query-page #toolbar {
			flex-shrink: 0;
		}
		/* 明细框：主表横滚 + fixed-columns 冻结操作列（对齐配送明细表 query-table-wrap） */
		.query-table-wrap.tp-query-table {
			flex: 1;
			min-height: 0;
			position: relative;
			padding-bottom: 0;
			overflow-x: hidden;
			overflow-y: visible;
			display: flex;
			flex-direction: column;
		}
		.query-table-wrap.tp-query-table > .bootstrap-table {
			flex: 1 1 auto;
			min-height: 0;
			width: 100%;
			display: flex;
			flex-direction: column;
			height: 100%;
		}
		.query-table-wrap.tp-query-table .fixed-table-container {
			display: flex;
			flex-direction: column;
			flex: 1;
			min-height: 0;
			padding-bottom: 0;
		}
		.query-table-wrap.tp-query-table .fixed-table-body {
			overflow-x: hidden !important;
			overflow-y: auto !important;
			flex: 1;
			min-height: 0;
		}
		/* 明细框底部横向滚动条（与表头/表体联动，固定在分页上方） */
		.query-table-wrap.tp-query-table .tp-detail-hscroll {
			flex-shrink: 0;
			overflow-x: auto;
			overflow-y: hidden;
			height: 14px;
			min-height: 14px;
			background: #f5f5f5;
			border-top: 1px solid #e5e5e5;
			box-sizing: border-box;
			-webkit-overflow-scrolling: touch;
			scrollbar-width: thin;
		}
		.query-table-wrap.tp-query-table .tp-detail-hscroll::-webkit-scrollbar {
			height: 10px;
		}
		.query-table-wrap.tp-query-table .tp-detail-hscroll::-webkit-scrollbar-thumb {
			background: rgba(0, 0, 0, 0.28);
			border-radius: 5px;
		}
		.query-table-wrap.tp-query-table .tp-detail-hscroll::-webkit-scrollbar-track {
			background: #eee;
		}
		.query-table-wrap.tp-query-table .tp-detail-hscroll-inner {
			height: 1px;
			pointer-events: none;
		}
		.query-table-wrap.tp-query-table .fixed-table-pagination {
			position: relative;
			bottom: auto;
			display: block !important;
			background: #fff;
			z-index: 6;
			border-top: 1px solid #eee;
			margin: 0 !important;
			margin-top: 12px !important;
			padding: 10px 10px 14px !important;
			flex-shrink: 0;
		}
		.query-table-wrap.tp-query-table .fixed-table-pagination .pagination {
			margin-right: 28px;
		}
		.query-table-wrap.tp-query-table .fixed-table-header {
			position: relative;
			top: auto;
			z-index: 2;
			background: #fff !important;
		}
		.query-table-wrap.tp-query-table .fixed-table-header th {
			background-color: #f5f5f5 !important;
			border-bottom: 2px solid #ddd !important;
		}
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-header th,
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-body tbody td,
		.query-table-wrap.tp-query-table .fixed-columns-right .fixed-table-header th,
		.query-table-wrap.tp-query-table .fixed-columns-right .fixed-table-body td {
			box-sizing: border-box !important;
			padding: 8px 14px !important;
			white-space: nowrap !important;
			word-break: keep-all !important;
			overflow: hidden;
			text-overflow: ellipsis;
			vertical-align: middle;
		}
		/* 主表固定列宽算法，订单编号列才能按 175px 生效 */
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-header table,
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-body > table {
			table-layout: fixed;
		}
		/* 序号、编码、订单编号列宽（仅主表滚动区） */
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-header th[data-field="index"],
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-body td[data-field="index"] {
			min-width: 80px !important;
			width: 80px !important;
			max-width: 80px !important;
		}
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-header th[data-field="hospitalCode"],
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-body td[data-field="hospitalCode"] {
			min-width: 160px !important;
			width: 160px !important;
			max-width: 160px !important;
		}
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-header th[data-field="supplierCode"],
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-body td[data-field="supplierCode"] {
			min-width: 160px !important;
			width: 160px !important;
			max-width: 160px !important;
		}
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-header th[data-field="dh"],
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-body td[data-field="dh"] {
			min-width: 175px !important;
			width: 175px !important;
			max-width: 175px !important;
		}
		/* 平台/订单供应商名称：加宽并单行省略 */
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-header th[data-field="supplierName"],
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-body td[data-field="supplierName"],
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-header th[data-field="sup"],
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-body td[data-field="sup"] {
			min-width: 220px !important;
			width: 220px !important;
			max-width: 220px !important;
			padding-left: 14px !important;
			padding-right: 14px !important;
			white-space: nowrap !important;
			overflow: hidden !important;
			text-overflow: ellipsis !important;
		}
		/* 主表滚动区内隐藏操作列（由右侧 fixed-columns-right 展示，避免双列） */
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-header th[data-field="tpOperate"],
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-body td[data-field="tpOperate"] {
			padding: 0 !important;
			border-left: 0 !important;
			border-right: 0 !important;
			font-size: 0;
			line-height: 0;
			color: transparent;
			overflow: hidden;
		}
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-header th[data-field="tpOperate"] > *,
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-body td[data-field="tpOperate"] > * {
			display: none;
		}
		/* 右侧冻结操作列 */
		.query-table-wrap.tp-query-table .fixed-columns-right {
			z-index: 5;
			box-shadow: -4px 0 8px rgba(0, 0, 0, 0.08);
		}
		.query-table-wrap.tp-query-table .fixed-columns-right .fixed-table-header th,
		.query-table-wrap.tp-query-table .fixed-columns-right .fixed-table-body td {
			background-color: #fff;
			vertical-align: middle;
			white-space: nowrap;
			box-sizing: border-box;
		}
		.query-table-wrap.tp-query-table .fixed-columns-right .fixed-table-header th[data-field="tpOperate"] {
			background-color: #f5f5f5;
			min-width: 200px;
			width: 200px;
		}
		.query-table-wrap.tp-query-table .fixed-columns-right .fixed-table-body td[data-field="tpOperate"] {
			min-width: 200px;
			width: 200px;
			padding: 8px 14px;
		}
		.query-table-wrap.tp-query-table.table-striped .fixed-columns-right .fixed-table-body tbody tr:nth-of-type(odd) td {
			background-color: #f9f9f9;
		}
		.query-table-wrap.tp-query-table .fixed-columns-right .fixed-table-body {
			overflow-x: hidden !important;
			overflow-y: hidden !important;
		}
		/* 主表明细单行，避免行高不一致导致冻结列错位 */
		.query-table-wrap.tp-query-table .fixed-table-container > .fixed-table-body tbody td {
			white-space: nowrap !important;
			overflow: hidden;
			text-overflow: ellipsis;
			vertical-align: middle;
		}
		#tp-query-form .select-time label {
			white-space: nowrap;
		}
	</style>
</head>
<body class="gray-bg tp-query-body">
	<div class="container-div tp-query-page">
		<div class="row" style="margin: 0; display: flex; flex-direction: column; flex: 1; min-height: 0; height: 100%;">
			<div class="col-sm-12 search-collapse">
				<form id="tp-query-form">
					<div class="select-list">
						<ul>
							<li>
								订单编号：<input type="text" name="dh" placeholder="模糊"/>
							</li>
							<li>
								医院：<input type="text" name="hospitalKeyword" placeholder="编码/名称/首拼简码"/>
							</li>
							<li>
								供应商：<input type="text" name="supplierKeyword" placeholder="编码/名称/首拼简码"/>
							</li>
							<li>
								确认状态：<select name="params[tpConfirmStatus]">
									<option value="">全部</option>
									<option value="0">未确认</option>
									<option value="1">已确认</option>
								</select>
							</li>
							<li>
								作废状态：<select name="params[tpVoidStatus]">
									<option value="">全部</option>
									<option value="0">正常</option>
									<option value="1">已作废</option>
								</select>
							</li>
							<li>
								配送进度：<select name="params[deliveryFilter]">
									<option value="">全部</option>
									<option value="none">未配送</option>
									<option value="partial">部分配送</option>
									<option value="done">已配送</option>
								</select>
							</li>
							<li class="select-time">
								<label>日期：</label>
								<input type="text" class="time-input" id="startTime" placeholder="开始日期" name="params[pushBegin]" autocomplete="off"/>
								<span>-</span>
								<input type="text" class="time-input" id="endTime" placeholder="结束日期" name="params[pushEnd]" autocomplete="off"/>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()" style="display: none;"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="resetPre()" style="display: none;"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>

	        <div class="btn-group-sm" id="toolbar" role="group">
	            <a class="btn btn-primary" onclick="$.table.search()">
		            <i class="fa fa-search"></i> 搜索
		        </a>
	            <a class="btn btn-warning" onclick="resetPre()">
		            <i class="fa fa-refresh"></i> 重置
		        </a>
				<a class="btn btn-success multiple disabled" onclick="tpBatchConfirm()" shiro:hasPermission="order:tpOrder:confirm" th:if="${tpQuerySupplierCtx}">
					<i class="fa fa-check"></i> 确认
				</a>
				<a class="btn btn-danger multiple disabled" onclick="tpBatchVoid()" shiro:hasPermission="order:tpOrder:void" th:if="${tpQueryHospitalCtx}">
					<i class="fa fa-ban"></i> 作废
				</a>
	        </div>

	        <div class="col-sm-12 select-table table-striped query-table-wrap tp-query-table">
			    <table id="bootstrap-table"></table>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-js" />
	<script th:inline="javascript">
		var detailFlag = [[${@permission.hasPermi('order:tpOrder:detail')}]];
		var confirmPerm = [[${@permission.hasPermi('order:tpOrder:confirm')}]];
		var voidPerm = [[${@permission.hasPermi('order:tpOrder:void')}]];
		var tpQuerySupplierCtx = [[${tpQuerySupplierCtx}]];
		var tpQueryHospitalCtx = [[${tpQueryHospitalCtx}]];
		var prefix = ctx + "order/tpQuery";
		var tableId = "bootstrap-table";

		/** 日期选择器提交时补全为当天起止时分秒，供后端范围查询 */
		function normalizePushRangeParams(obj) {
			if (!obj || typeof obj !== 'object') {
				return;
			}
			var beginKey = 'params[pushBegin]';
			var endKey = 'params[pushEnd]';
			function fix(key, endOfDay) {
				var v = obj[key];
				if (v == null || v === '') {
					return;
				}
				var s = String(v).replace(/^\s+|\s+$/g, '');
				if (!s) {
					return;
				}
				if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
					obj[key] = endOfDay ? (s + ' 23:59:59') : (s + ' 00:00:00');
				}
			}
			fix(beginKey, false);
			fix(endKey, true);
		}

		/** 明细框外包层高度：与配送信息查询-配送明细表 layoutDeliveryQueryWrapHeights 一致 */
		function layoutTpQueryWrapHeight() {
			var $page = $('.tp-query-page.container-div');
			if (!$page.length) {
				return;
			}
			var $wrap = $page.find('.query-table-wrap');
			if (!$wrap.length) {
				return;
			}
			var el = $wrap[0];
			var pageBottom = $page[0].getBoundingClientRect().bottom;
			var top = el.getBoundingClientRect().top;
			var base = Math.floor(pageBottom - top - 6);
			var docEl = document.documentElement;
			var viewH = (docEl && docEl.clientHeight) ? docEl.clientHeight : (window.innerHeight || 0);
			var maxByViewport = Math.floor(viewH - top - 10);
			var boosted = Math.min(base + 56, maxByViewport);
			var h = Math.max(base, boosted);
			if (h < 260) {
				h = 260;
			}
			el.style.setProperty('flex', '0 0 auto', 'important');
			el.style.setProperty('height', h + 'px', 'important');
			el.style.setProperty('min-height', h + 'px', 'important');
			el.style.removeProperty('max-height');
			el.style.setProperty('box-sizing', 'border-box', 'important');
		}

		function calculateTableHeight() {
			var $table = $('#' + tableId);
			var $wrap = $table.closest('.query-table-wrap');
			if ($wrap.length === 0) {
				return 600;
			}
			var el = $wrap[0];
			var h = el ? el.clientHeight : Math.floor($wrap.innerHeight());
			if (!h || h < 1) {
				h = Math.floor($wrap.innerHeight());
			}
			h = Math.floor(h - 12);
			return Math.max(h, 280);
		}

		function adjustTableHeight() {
			var $table = $('#' + tableId);
			if ($table.length > 0 && $table.bootstrapTable('getOptions')) {
				$table.bootstrapTable('resetView', { height: calculateTableHeight() });
			}
		}

		function relayoutTpQueryTable() {
			layoutTpQueryWrapHeight();
			adjustTableHeight();
			setTimeout(function () {
				adjustTableHeight();
				refreshTpTableLayout();
			}, 80);
		}

		var tpColCss = {
			padding: '8px 14px',
			whiteSpace: 'nowrap',
			overflow: 'hidden',
			textOverflow: 'ellipsis',
			boxSizing: 'border-box'
		};

		/** 个别列加大左右内边距，拉开与相邻列距离 */
		var tpColStyleOverrides = {
			supplierCode: { padding: '8px 14px 8px 12px' },
			supplierName: { padding: '8px 14px' },
			supno: { padding: '8px 14px 8px 12px' },
			sup: { padding: '8px 14px' },
			ksbh: { padding: '8px 12px 8px 14px' }
		};

		function tpColStyleFor(field) {
			return $.extend({}, tpColCss, tpColStyleOverrides[field] || {});
		}

		function tpHeaderStyleFor(field) {
			return function () {
				return { css: tpColStyleFor(field) };
			};
		}

		function tpCellStyleFor(field) {
			return function () {
				return { css: tpColStyleFor(field) };
			};
		}

		/** 为各列统一表头/单元格样式（与列宽一起由 bootstrap-table 计算，避免表头表体错位） */
		function applyTpColumnSpacing(columns) {
			return $.map(columns, function (col) {
				var c = $.extend(true, {}, col);
				if (!c.checkbox && c.field) {
					c.headerStyle = tpHeaderStyleFor(c.field);
					c.cellStyle = tpCellStyleFor(c.field);
				}
				return c;
			});
		}

		/** 主表区域：有纵向滚动条时表头补偿宽度，防止列从中间开始错位 */
		function fixTpTableHeaderAlign() {
			var $bt = $('#' + tableId).closest('.bootstrap-table');
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			if ($mainBody.length && $mainBody[0] && $mainHeader.length) {
				var scrollW = $mainBody[0].offsetWidth - $mainBody[0].clientWidth;
				$mainHeader.css('margin-right', scrollW > 0 ? (scrollW + 'px') : '');
			}
		}

		function bindTpMainHorizontalScroll() {
			var $bt = $('#' + tableId).closest('.bootstrap-table');
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			$mainBody.off('scroll.tpMainH').on('scroll.tpMainH', function () {
				var sl = $mainBody.scrollLeft();
				$mainHeader.scrollLeft(sl);
				var $bar = $bt.children('.tp-detail-hscroll');
				if ($bar.length && $bar.scrollLeft() !== sl) {
					$bar.scrollLeft(sl);
				}
			});
		}

		/** 明细框底部横向滚动条 */
		function ensureTpDetailHScrollBar() {
			var $bt = $('#' + tableId).closest('.bootstrap-table');
			if ($bt.length === 0) {
				return $();
			}
			var $bar = $bt.children('.tp-detail-hscroll');
			if ($bar.length === 0) {
				$bar = $('<div class="tp-detail-hscroll"><div class="tp-detail-hscroll-inner"></div></div>');
				var $pag = $bt.children('.fixed-table-pagination');
				if ($pag.length) {
					$bar.insertBefore($pag);
				} else {
					$bt.append($bar);
				}
			}
			return $bar;
		}

		function syncTpDetailHScrollSize() {
			var $bt = $('#' + tableId).closest('.bootstrap-table');
			var $bar = ensureTpDetailHScrollBar();
			if ($bar.length === 0) {
				return;
			}
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $table = $mainBody.find('table').first();
			if ($table.length === 0 || !$mainBody[0]) {
				$bar.hide();
				return;
			}
			var scrollW = $table[0].scrollWidth;
			var clientW = $mainBody[0].clientWidth;
			$bar.find('.tp-detail-hscroll-inner').width(Math.max(scrollW, clientW + 1));
			var $right = $bt.find('.fixed-columns-right');
			var rightW = ($right.length && $right.is(':visible')) ? Math.ceil($right.outerWidth()) : 0;
			$bar.css({ marginRight: rightW + 'px', display: 'block' });
			if (scrollW <= clientW + 2) {
				$bar.css('overflow-x', 'hidden');
			} else {
				$bar.css('overflow-x', 'auto');
			}
			$bar.scrollLeft($mainBody.scrollLeft());
		}

		function bindTpDetailHScroll() {
			var $bt = $('#' + tableId).closest('.bootstrap-table');
			var $bar = ensureTpDetailHScrollBar();
			if ($bar.length === 0) {
				return;
			}
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			$bar.off('scroll.tpDetailH').on('scroll.tpDetailH', function () {
				var sl = this.scrollLeft;
				$mainBody.scrollLeft(sl);
				$mainHeader.scrollLeft(sl);
			});
		}

		var tpDhColWidth = '175px';

		/** 主表滚动区订单编号列宽（按列索引 + colgroup，覆盖 fitHeader） */
		function applyTpDhColumnWidth() {
			var $container = $('#' + tableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $th = $mainHeader.find('th[data-field="dh"]');
			if ($th.length === 0) {
				return;
			}
			var colIdx = $th[0].cellIndex;
			var setW = function (el) {
				el.style.setProperty('width', tpDhColWidth, 'important');
				el.style.setProperty('min-width', tpDhColWidth, 'important');
				el.style.setProperty('max-width', tpDhColWidth, 'important');
			};
			$th.each(function () { setW(this); });
			$mainBody.find('table tbody tr').each(function () {
				var cell = this.cells[colIdx];
				if (cell) {
					setW(cell);
				}
			});
			$mainHeader.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
			$mainBody.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
			var opt = $('#' + tableId).bootstrapTable('getOptions');
			if (opt && opt.columns && opt.columns[0] && opt.columns[0][colIdx]) {
				opt.columns[0][colIdx].width = 175;
			}
		}

		function scheduleTpDhColumnWidth() {
			applyTpDhColumnWidth();
			requestAnimationFrame(applyTpDhColumnWidth);
		}

		var tpIndexColWidth = 80;
		var tpHospitalCodeColWidth = 160;
		var tpSupplierCodeColWidth = 160;
		var tpSupplierNameColWidth = 220;

		/** 按字段强制列宽（覆盖 fitHeader / table-layout） */
		function applyTpFieldColumnWidth(field, widthPx) {
			var w = widthPx + 'px';
			var $container = $('#' + tableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $th = $mainHeader.find('th[data-field="' + field + '"]');
			if ($th.length === 0) {
				return;
			}
			var colIdx = $th[0].cellIndex;
			var setW = function (el) {
				el.style.setProperty('width', w, 'important');
				el.style.setProperty('min-width', w, 'important');
				el.style.setProperty('max-width', w, 'important');
			};
			$th.each(function () { setW(this); });
			$mainBody.find('table tbody tr').each(function () {
				var cell = this.cells[colIdx];
				if (cell) {
					setW(cell);
				}
			});
			$mainHeader.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
			$mainBody.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
			var opt = $('#' + tableId).bootstrapTable('getOptions');
			if (opt && opt.columns && opt.columns[0] && opt.columns[0][colIdx]) {
				opt.columns[0][colIdx].width = widthPx;
			}
		}

		function scheduleTpFixedColumnWidths() {
			scheduleTpDhColumnWidth();
			applyTpFieldColumnWidth('index', tpIndexColWidth);
			applyTpFieldColumnWidth('hospitalCode', tpHospitalCodeColWidth);
			applyTpFieldColumnWidth('supplierCode', tpSupplierCodeColWidth);
			applyTpFieldColumnWidth('supplierName', tpSupplierNameColWidth);
			applyTpFieldColumnWidth('sup', tpSupplierNameColWidth);
			requestAnimationFrame(function () {
				applyTpFieldColumnWidth('index', tpIndexColWidth);
				applyTpFieldColumnWidth('hospitalCode', tpHospitalCodeColWidth);
				applyTpFieldColumnWidth('supplierCode', tpSupplierCodeColWidth);
				applyTpFieldColumnWidth('supplierName', tpSupplierNameColWidth);
				applyTpFieldColumnWidth('sup', tpSupplierNameColWidth);
			});
		}

		/** 仅主表设置最小总宽，避免误改 fixed-columns-right 导致表头列错位 */
		function applyTpMainTableMinWidth() {
			var sum = 0;
			var opt = $('#' + tableId).bootstrapTable('getOptions');
			if (opt && opt.columns && opt.columns[0]) {
				$.each(opt.columns[0], function (_, col) {
					if (col && col.width) {
						sum += parseInt(col.width, 10) || 0;
					} else if (col && col.checkbox) {
						sum += 40;
					}
				});
			}
			if (sum < 2400) {
				sum = 2400;
			}
			var $container = $('#' + tableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			$container.children('.fixed-table-header').find('table').css('min-width', sum + 'px');
			$container.children('.fixed-table-body').children('table').css('min-width', sum + 'px');
		}

		/** 主表与右侧冻结操作列：纵向滚动联动 */
		function syncTpOperateColumnScroll() {
			var $bt = $('#' + tableId).closest('.bootstrap-table');
			var $rightBody = $bt.find('.fixed-columns-right .fixed-table-body');
			if ($rightBody.length === 0) {
				return;
			}
			var $mainBody = $bt.find('.fixed-table-container').children('.fixed-table-body');
			$mainBody.off('scroll.tpOperateSync').on('scroll.tpOperateSync', function () {
				$rightBody.scrollTop($mainBody.scrollTop());
			});
		}

		/** 逐行同步主表与冻结操作列行高，保证按钮与明细在同一水平线 */
		function syncTpOperateRowHeights() {
			var $bt = $('#' + tableId).closest('.bootstrap-table');
			var $right = $bt.find('.fixed-columns-right');
			if ($right.length === 0) {
				return;
			}
			var $mainRows = $bt.find('.fixed-table-container').children('.fixed-table-body').find('table tbody tr');
			var $rightRows = $right.find('.fixed-table-body table tbody tr');
			var len = Math.min($mainRows.length, $rightRows.length);
			$mainRows.add($rightRows).css({ height: '', minHeight: '' });
			for (var i = 0; i < len; i++) {
				var mainEl = $mainRows[i];
				var rightEl = $rightRows[i];
				var h = Math.max(mainEl.offsetHeight, rightEl.offsetHeight);
				if (h > 0) {
					var hs = h + 'px';
					mainEl.style.height = hs;
					mainEl.style.minHeight = hs;
					rightEl.style.height = hs;
					rightEl.style.minHeight = hs;
				}
			}
			var $mainHead = $bt.find('.fixed-table-container > .fixed-table-header table thead tr');
			var $rightHead = $right.find('.fixed-table-header table thead tr');
			if ($mainHead.length && $rightHead.length) {
				var hh = Math.max($mainHead[0].offsetHeight, $rightHead[0].offsetHeight);
				if (hh > 0) {
					var hhs = hh + 'px';
					$mainHead.css({ height: hhs, minHeight: hhs });
					$rightHead.css({ height: hhs, minHeight: hhs });
				}
			}
		}

		function scheduleTpOperateRowSync() {
			syncTpOperateRowHeights();
			requestAnimationFrame(syncTpOperateRowHeights);
		}

		function refreshTpTableLayout() {
			fixTpTableHeaderAlign();
			bindTpMainHorizontalScroll();
			applyTpMainTableMinWidth();
			syncTpOperateColumnScroll();
			scheduleTpFixedColumnWidths();
			scheduleTpOperateRowSync();
			syncTpDetailHScrollSize();
			bindTpDetailHScroll();
		}

		$(function() {
		    layoutTpQueryWrapHeight();
		    queryList();
		    $(window).on('resize', relayoutTpQueryTable);
		    setTimeout(relayoutTpQueryTable, 300);
		});

		function tpQueryParams(params) {
			table.set(tableId);
			var formParams = $.common.formToJSON("tp-query-form");
			normalizePushRangeParams(formParams);
			return $.extend({}, formParams, {
				pageNum: Math.floor(params.offset / params.limit) + 1,
				pageSize: params.limit,
				orderByColumn: params.sort,
				isAsc: params.order,
				searchValue: params.search
			});
		}

		function fmtDeliveryProgress(p) {
			if (p === 'partial') {
				return '部分配送';
			}
			if (p === 'done') {
				return '已配送';
			}
			return '未配送';
		}

		function fmtConfirmStatus(v) {
			return (v === '1' || v === 1) ? '已确认' : '未确认';
		}

		function fmtVoidStatus(v) {
			return (v === '1' || v === 1) ? '已作废' : '正常';
		}

		function fmtPushTime(v) {
			if (v == null || v === '') {
				return '-';
			}
			if (typeof v === 'string') {
				return v.length >= 19 ? v.substring(0, 19) : v;
			}
			return v;
		}

		function queryList() {
		    var options = {
		        id: tableId,
		        formId: "tp-query-form",
		        url: prefix + "/list",
		        queryParams: tpQueryParams,
		        modalName: "第三方订单",
		        uniqueId: "id",
		        rememberSelected: true,
		        maintainSelected: true,
		        mobileResponsive: false,
		        fixedColumns: true,
		        fixedNumber: 0,
		        fixedRightNumber: 1,
		        height: calculateTableHeight(),
		        onLoadSuccess: function() {
		            setTimeout(relayoutTpQueryTable, 0);
		            setTimeout(function() {
		                refreshTpTableLayout();
		            }, 200);
		            setTimeout(function () {
		                scheduleTpFixedColumnWidths();
		                scheduleTpOperateRowSync();
		            }, 450);
		        },
		        onPostBody: function() {
		            refreshTpTableLayout();
		        },
		        columns: applyTpColumnSpacing([{
		            checkbox: true,
		            width: 40
		        },
		        {
		            field: 'index',
		            title: '序号',
		            align: 'center',
		            width: 80,
		            formatter: function(value, row, index) {
		                var opt = $("#" + tableId).bootstrapTable("getOptions");
		                var pn = opt.pageNumber || 1;
		                var ps = opt.pageSize || 10;
		                return (pn - 1) * ps + index + 1;
		            }
		        },
		        {
		            field: 'dh',
		            title: '订单编号',
		            width: 175,
		            formatter: function (value, row) {
		                var v = value || '';
		                if (detailFlag !== 'hidden') {
		                    return '<a href="javascript:void(0)" onclick="viewDetail(\'' + row.id + '\')">' + v + '</a>';
		                }
		                return v;
		            }
		        },
		        {
		            field: 'hospitalCode',
		            title: '平台医院编码',
		            width: 160,
		            formatter: function (value) { return value || '-'; }
		        },
		        {
		            field: 'hospitalName',
		            title: '平台医院名称',
		            width: 180,
		            formatter: function (value) { return value || '-'; }
		        },
		        {
		            field: 'supplierCode',
		            title: '平台供应商编码',
		            width: 160,
		            formatter: function (value) { return value || '-'; }
		        },
		        {
		            field: 'supplierName',
		            title: '平台供应商名称',
		            width: 220,
		            formatter: function (value) { return value || '-'; }
		        },
		        {
		            field: 'ckno',
		            title: '订单仓库编码',
		            width: 116,
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'ck',
		            title: '订单仓库名称',
		            width: 130,
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'supno',
		            title: '订单供应商编码',
		            width: 116,
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'sup',
		            title: '订单供应商名称',
		            width: 220,
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'ksbh',
		            title: '订单科室编码',
		            width: 96,
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'ksmc',
		            title: '订单科室名称',
		            width: 96,
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'createTime',
		            title: '推送时间',
		            width: 168,
		            formatter: function (v) { return fmtPushTime(v); }
		        },
		        {
		            field: 'confirmStatus',
		            title: '确认状态',
		            width: 96,
		            formatter: function (v) { return fmtConfirmStatus(v); }
		        },
		        {
		            field: 'confirmByDisplay',
		            title: '确认人',
		            width: 108,
		            formatter: function (v, row) { return v || row.confirmBy || '-'; }
		        },
		        {
		            field: 'confirmTime',
		            title: '确认时间',
		            width: 168,
		            formatter: function (v) { return fmtPushTime(v); }
		        },
		        {
		            field: 'voidStatus',
		            title: '作废状态',
		            width: 96,
		            formatter: function (v) { return fmtVoidStatus(v); }
		        },
		        {
		            field: 'voidByDisplay',
		            title: '作废人',
		            width: 108,
		            formatter: function (v, row) { return v || row.voidBy || '-'; }
		        },
		        {
		            field: 'voidTime',
		            title: '作废时间',
		            width: 168,
		            formatter: function (v) { return fmtPushTime(v); }
		        },
		        {
		            field: 'deliveryProgress',
		            title: '配送进度',
		            width: 100,
		            formatter: function (v) { return fmtDeliveryProgress(v); }
		        },
		        {
		            field: 'tpOperate',
		            title: '操作',
		            align: 'center',
		            width: 200,
		            formatter: function(value, row) {
		                var btns = [];
		                if (detailFlag !== 'hidden') {
		                    btns.push('<a class="btn btn-info btn-xs" href="javascript:void(0)" onclick="viewDetail(\'' + row.id + '\')"><i class="fa fa-eye"></i>详情</a>');
		                }
		                if (confirmPerm !== 'hidden' && tpQuerySupplierCtx === true && row.voidStatus !== '1' && row.confirmStatus !== '1') {
		                    btns.push('<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="tpConfirmOrder(\'' + row.id + '\')"><i class="fa fa-check"></i>确认</a>');
		                }
		                if (voidPerm !== 'hidden' && tpQueryHospitalCtx === true && row.voidStatus !== '1') {
		                    btns.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="tpVoidOrder(\'' + row.id + '\')"><i class="fa fa-ban"></i>作废</a>');
		                }
		                return btns.join(' ');
		            }
		        }])
		    };
		    $.table.init(options);
		}

		function resetPre() {
			if (typeof resetDate === 'function') {
				resetDate();
			}
			$("#tp-query-form")[0].reset();
			$.table.search();
		}

		function viewDetail(zsOrderId) {
		    var url = prefix + '/detail/' + zsOrderId;
		    $.modal.openTab("第三方订单详情", url);
		}

		function tpConfirmOrder(id) {
			$.modal.confirm("确认该第三方订单？确认后将记录确认人与确认时间。", function() {
				$.operate.post(prefix + "/confirm/" + id, {}, function() {
					$.table.refresh();
				});
			});
		}

		function tpVoidOrder(id) {
			$.modal.confirm("确认作废该第三方订单？作废后不可再引用生成配送单。", function() {
				$.operate.post(prefix + "/void/" + id, {}, function() {
					$.table.refresh();
				});
			});
		}

		function tpBatchConfirm() {
			var rows = $("#" + tableId).bootstrapTable("getSelections");
			if (!rows || rows.length === 0) {
				$.modal.alertWarning("请至少选择一条订单");
				return;
			}
			for (var i = 0; i < rows.length; i++) {
				if (rows[i].voidStatus === '1' || rows[i].confirmStatus === '1') {
					$.modal.alertWarning("所选记录中包含已确认或已作废的订单，请重新选择");
					return;
				}
			}
			var ids = [];
			for (var j = 0; j < rows.length; j++) {
				ids.push(rows[j].id);
			}
			$.modal.confirm("确认选中的 " + ids.length + " 条第三方订单？确认后将记录确认人与确认时间。", function() {
				$.operate.post(prefix + "/confirmBatch", { ids: ids.join(",") }, function() {
					$.table.refresh();
				});
			});
		}

		function tpBatchVoid() {
			var rows = $("#" + tableId).bootstrapTable("getSelections");
			if (!rows || rows.length === 0) {
				$.modal.alertWarning("请至少选择一条订单");
				return;
			}
			for (var i = 0; i < rows.length; i++) {
				if (rows[i].voidStatus === '1') {
					$.modal.alertWarning("所选记录中包含已作废的订单，请重新选择");
					return;
				}
			}
			var ids = [];
			for (var j = 0; j < rows.length; j++) {
				ids.push(rows[j].id);
			}
			$.modal.confirm("确认作废选中的 " + ids.length + " 条第三方订单？作废后不可再引用生成配送单。", function() {
				$.operate.post(prefix + "/voidBatch", { ids: ids.join(",") }, function() {
					$.table.refresh();
				});
			});
		}
	</script>
</body>
