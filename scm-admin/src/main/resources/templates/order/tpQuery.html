<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('第三方订单查询')" />
	<th:block th:include="include :: layout-latest-css" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-css" />
	<style>
		.tp-query-table-wrap {
			min-height: 0;
			position: relative;
			padding-bottom: 0;
			overflow: hidden;
			display: flex;
			flex-direction: column;
		}

		.tp-query-table-wrap > .bootstrap-table {
			flex: 1 1 auto;
			min-height: 0;
		}

		.tp-query-table-wrap .bootstrap-table {
			display: flex;
			flex-direction: column;
			height: 100%;
			padding-bottom: 0;
		}

		.tp-query-table-wrap .fixed-table-container {
			flex: 1 1 auto;
			min-height: 0;
			padding-bottom: 0;
		}

		.tp-query-table-wrap .fixed-table-body {
			overflow-x: auto !important;
			overflow-y: auto !important;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-columns-right {
			z-index: 5;
			box-shadow: -4px 0 8px rgba(0, 0, 0, 0.08);
		}

		.tp-query-table-wrap .fixed-table-body .fixed-table-border {
			display: none !important;
			height: 0 !important;
		}

		.tp-query-table-wrap .fixed-table-pagination {
			position: relative;
			flex-shrink: 0;
			left: auto;
			right: auto;
			bottom: auto;
			background: #fff;
			z-index: 3;
			border-top: 1px solid #eee;
			margin: 0 !important;
			padding: 4px 10px 2px;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-table-pagination .pagination {
			margin-right: 172px;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-header th .th-inner,
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-header th .sortable {
			text-align: center !important;
			justify-content: center;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-header th[data-field="rowIndex"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="rowIndex"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-header th[data-field="sheetJe"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="sheetJe"] {
			text-align: center !important;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-table-header {
			position: relative;
			top: auto;
			z-index: 2;
			background: #fff;
			overflow: hidden;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-header table,
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body > table {
			table-layout: fixed;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-header th,
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body tbody td {
			box-sizing: border-box;
			vertical-align: middle;
		}

		/* 主表滚动区隐藏操作列内容，由右侧 fixed-columns-right 展示（与配送单据申请一致） */
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-header th[data-field="tpOperate"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="tpOperate"] {
			padding: 0 !important;
			border-left: 0 !important;
			border-right: 0 !important;
			font-size: 0;
			line-height: 0;
			color: transparent;
			overflow: hidden;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-header th[data-field="tpOperate"] > *,
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="tpOperate"] > * {
			display: none;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-columns-right .fixed-table-header th,
		.tp-query-table-wrap.tp-query-list-table .fixed-columns-right .fixed-table-body td {
			background-color: #fff;
			vertical-align: middle;
			white-space: nowrap;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-columns-right .fixed-table-header th[data-field="tpOperate"] {
			background-color: #f5f5f5;
			min-width: 160px;
			width: 160px;
			text-align: center;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-columns-right .fixed-table-header th[data-field="tpOperate"] .th-inner {
			text-align: center;
			justify-content: center;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-columns-right .fixed-table-body td[data-field="tpOperate"] {
			min-width: 160px;
			width: 160px;
			padding: 6px 8px;
			text-align: center;
		}

		.tp-query-table-wrap.tp-query-list-table.table-striped .fixed-columns-right .fixed-table-body tbody tr:nth-of-type(odd) td {
			background-color: #f9f9f9;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-columns-right .fixed-table-body {
			overflow-x: hidden !important;
			overflow-y: hidden !important;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-table-body tbody td {
			white-space: nowrap;
			vertical-align: middle !important;
		}

		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="dh"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="hospitalName"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="supplierCode"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="supplierName"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="ck"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="sup"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="ksbh"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="ksmc"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="createTime"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="confirmByDisplay"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="confirmTime"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="voidByDisplay"],
		.tp-query-table-wrap.tp-query-list-table .fixed-table-container > .fixed-table-body td[data-field="voidTime"] {
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.tp-query-table-wrap.tp-query-list-table .tp-cell-ellipsis {
			display: block;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			max-width: 100%;
		}

		#tp-query-form .select-time label {
			white-space: nowrap;
		}

		/* 搜索区：与配送单据申请一致 */
		.container-div > .row > .search-collapse {
			padding-top: 10px !important;
			padding-bottom: 10px !important;
		}

		.container-div .search-collapse .select-list ul {
			margin-bottom: 0;
			overflow: hidden;
		}

		.container-div .search-collapse .tp-query-search-rows > ul {
			display: block;
			width: 100%;
			overflow: hidden;
		}

		.container-div .search-collapse .select-list li {
			margin: 4px 15px 4px 0;
		}

		.container-div .search-collapse .select-list li.select-time label {
			margin-top: 4px;
			margin-bottom: 4px;
		}
	</style>
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="tp-query-form">
					<div class="select-list tp-query-search-rows">
						<ul>
							<li>
								订单编号：<input type="text" name="dh" placeholder="模糊"/>
							</li>
							<li>
								医院：<input type="text" name="hospitalKeyword" placeholder="编码/名称/首拼简码"/>
							</li>
							<li>
								供应商：<input type="text" name="supplierKeyword" placeholder="编码/名称/首拼简码"/>
							</li>
							<li>
								确认状态：<select name="params[tpConfirmStatus]">
									<option value="">全部</option>
									<option value="0">未确认</option>
									<option value="1">已确认</option>
								</select>
							</li>
							<li>
								作废状态：<select name="params[tpVoidStatus]">
									<option value="">全部</option>
									<option value="0">正常</option>
									<option value="1">已作废</option>
								</select>
							</li>
							<li class="select-time">
								<label>日期：</label>
								<input type="text" class="time-input" id="startTime" placeholder="开始日期" name="params[pushBegin]" autocomplete="off"/>
								<span>-</span>
								<input type="text" class="time-input" id="endTime" placeholder="结束日期" name="params[pushEnd]" autocomplete="off"/>
							</li>
							<li>
								配送进度：<select name="params[deliveryFilter]">
									<option value="">全部</option>
									<option value="none">未配送</option>
									<option value="partial">部分配送</option>
									<option value="done">已配送</option>
								</select>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()" style="display: none;"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="resetPre()" style="display: none;"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>

	        <div class="btn-group-sm" id="toolbar" role="group">
	            <a class="btn btn-primary" onclick="$.table.search()">
		            <i class="fa fa-search"></i> 搜索
		        </a>
	            <a class="btn btn-warning" onclick="resetPre()">
		            <i class="fa fa-refresh"></i> 重置
		        </a>
				<a class="btn btn-success multiple disabled" onclick="tpBatchConfirm()" shiro:hasPermission="order:tpOrder:confirm" th:if="${tpQuerySupplierCtx}">
					<i class="fa fa-check"></i> 确认
				</a>
				<a class="btn btn-danger multiple disabled" onclick="tpBatchVoid()" shiro:hasPermission="order:tpOrder:void" th:if="${tpQueryHospitalCtx}">
					<i class="fa fa-ban"></i> 作废
				</a>
				<a class="btn btn-info" onclick="tpRepairDeliveryLink()" shiro:hasPermission="order:tpOrder:repair">
					<i class="fa fa-wrench"></i> 修复配送关联
				</a>
	        </div>

	        <div class="col-sm-12 select-table table-striped tp-query-table-wrap tp-query-list-table">
			    <table id="bootstrap-table"></table>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-js" />
	<script th:inline="javascript">
		var detailFlag = [[${@permission.hasPermi('order:tpOrder:detail')}]];
		var confirmPerm = [[${@permission.hasPermi('order:tpOrder:confirm')}]];
		var voidPerm = [[${@permission.hasPermi('order:tpOrder:void')}]];
		var tpQuerySupplierCtx = [[${tpQuerySupplierCtx}]];
		var tpQueryHospitalCtx = [[${tpQueryHospitalCtx}]];
		var prefix = ctx + "order/tpQuery";
		var tpQueryTableId = 'bootstrap-table';

		var tpColWidths = {
			rowIndex: 60,
			dh: 175,
			hospitalName: 180,
			supplierCode: 160,
			supplierName: 220,
			sheetJe: 120,
			ck: 130,
			sup: 220,
			ksbh: 96,
			ksmc: 96,
			createTime: 168,
			confirmStatus: 96,
			confirmByDisplay: 108,
			confirmTime: 168,
			voidStatus: 96,
			voidByDisplay: 108,
			voidTime: 168,
			deliveryProgress: 100,
			tpOperate: 160
		};

		$(function() {
		    initDefaultTpPushDateRange();
		    layoutTpQueryTableWrapHeight();
		    queryTpList();
		    $(window).resize(function() {
		    	layoutTpQueryTableWrapHeight();
		    	adjustTableHeight();
		    	setTimeout(refreshTpTableLayout, 100);
		    });
		});

		function formatTpPushDate(date) {
			var y = date.getFullYear();
			var m = String(date.getMonth() + 1).padStart(2, '0');
			var d = String(date.getDate()).padStart(2, '0');
			return y + '-' + m + '-' + d;
		}

		/** 默认：结束日期为当天，开始日期为当天往前 5 天 */
		function initDefaultTpPushDateRange() {
			var end = new Date();
			var start = new Date();
			start.setDate(end.getDate() - 5);
			$('#endTime').val(formatTpPushDate(end));
			$('#startTime').val(formatTpPushDate(start));
		}

		function normalizePushRangeParams(obj) {
			if (!obj || typeof obj !== 'object') {
				return;
			}
			var beginKey = 'params[pushBegin]';
			var endKey = 'params[pushEnd]';
			function fix(key, endOfDay) {
				var v = obj[key];
				if (v == null || v === '') {
					return;
				}
				var s = String(v).replace(/^\s+|\s+$/g, '');
				if (!s) {
					return;
				}
				if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
					obj[key] = endOfDay ? (s + ' 23:59:59') : (s + ' 00:00:00');
				}
			}
			fix(beginKey, false);
			fix(endKey, true);
		}

		function layoutTpQueryTableWrapHeight() {
			var $wrap = $('.tp-query-table-wrap');
			if (!$wrap.length) {
				return;
			}
			var top = $wrap[0].getBoundingClientRect().top;
			var h = Math.floor(window.innerHeight - top - 14);
			h = Math.min(Math.max(h, 400), 580);
			$wrap[0].style.height = h + 'px';
			$wrap[0].style.minHeight = h + 'px';
		}

		function calculateTableHeight() {
			layoutTpQueryTableWrapHeight();
			var $wrap = $('.tp-query-table-wrap');
			if ($wrap.length === 0) {
				return 440;
			}
			var $bt = $wrap.find('.bootstrap-table');
			var wrapH = $wrap[0].clientHeight || $wrap.innerHeight() || 0;
			var toolbarH = $bt.find('.fixed-table-toolbar').outerHeight(true) || 0;
			var pagH = $bt.find('.fixed-table-pagination').outerHeight(true) || 46;
			var containerH = Math.floor(wrapH - toolbarH - pagH - 2);
			return Math.max(containerH, 240);
		}

		function adjustTableHeight() {
			var $table = $('#' + tpQueryTableId);
			if ($table.length > 0 && $table.bootstrapTable('getOptions')) {
				$table.bootstrapTable('resetView', { height: calculateTableHeight() });
			}
		}

		function escTpCellAttr(s) {
			return String(s == null ? '' : s)
				.replace(/&/g, '&amp;')
				.replace(/"/g, '&quot;')
				.replace(/'/g, '&#39;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;');
		}

		/** 文本省略显示，鼠标悬停 title 显示完整内容，移开自动隐藏 */
		function tpCellEllipsis(value) {
			var s = (value == null || value === '') ? '-' : String(value);
			if (s === '-') {
				return s;
			}
			return '<span class="tp-cell-ellipsis" title="' + escTpCellAttr(s) + '">' + escTpCellAttr(s) + '</span>';
		}

		function fmtDeliveryProgress(p) {
			if (p === 'partial') {
				return '部分配送';
			}
			if (p === 'done') {
				return '已配送';
			}
			return '未配送';
		}

		function fmtConfirmStatus(v) {
			return (v === '1' || v === 1) ? '已确认' : '未确认';
		}

		function fmtVoidStatus(v) {
			return (v === '1' || v === 1) ? '已作废' : '正常';
		}

		function fmtPushTime(v) {
			if (v == null || v === '') {
				return '-';
			}
			if (typeof v === 'string') {
				return v.length >= 19 ? v.substring(0, 19) : v;
			}
			return v;
		}

		function fmtTpAmount(v) {
			if (v == null || v === '') {
				return '-';
			}
			var n = parseFloat(v);
			if (isNaN(n)) {
				return tpCellEllipsis(v);
			}
			return n.toFixed(2);
		}

		function getTpTableTotalWidth() {
			var sum = 0;
			var opt = $('#' + tpQueryTableId).bootstrapTable('getOptions');
			if (opt && opt.columns && opt.columns[0]) {
				$.each(opt.columns[0], function (_, col) {
					if (!col || col.visible === false) {
						return;
					}
					if (col.checkbox) {
						sum += 42;
					} else if (col.field && tpColWidths[col.field] != null) {
						sum += tpColWidths[col.field];
					} else if (col.width) {
						sum += parseInt(col.width, 10) || 0;
					} else {
						sum += 100;
					}
				});
			}
			return Math.max(sum, 2400);
		}

		function applyTpFieldColumnWidth(field, widthPx) {
			var w = widthPx + 'px';
			var $container = $('#' + tpQueryTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $th = $mainHeader.find('th[data-field="' + field + '"]');
			if ($th.length === 0) {
				return;
			}
			var colIdx = $th[0].cellIndex;
			var setW = function (el) {
				el.style.setProperty('width', w, 'important');
				el.style.setProperty('min-width', w, 'important');
				el.style.setProperty('max-width', w, 'important');
			};
			$th.each(function () { setW(this); });
			$mainBody.find('table tbody tr').each(function () {
				var cell = this.cells[colIdx];
				if (cell) {
					setW(cell);
				}
			});
			$mainHeader.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
			$mainBody.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
		}

		function applyTpCheckboxColumnWidth() {
			var w = '42px';
			var $container = $('#' + tpQueryTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $th = $mainHeader.find('th.bs-checkbox');
			if ($th.length === 0) {
				return;
			}
			var colIdx = $th[0].cellIndex;
			var setW = function (el) {
				el.style.setProperty('width', w, 'important');
				el.style.setProperty('min-width', w, 'important');
				el.style.setProperty('max-width', w, 'important');
			};
			$th.each(function () { setW(this); });
			$mainBody.find('table tbody tr').each(function () {
				var cell = this.cells[colIdx];
				if (cell) {
					setW(cell);
				}
			});
			$mainHeader.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
			$mainBody.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
		}

		function syncTpHeaderBodyColumnWidths() {
			var $container = $('#' + tpQueryTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $headerThs = $mainHeader.find('thead tr').first().children('th');
			var $firstRow = $mainBody.find('tbody tr').first();
			if ($firstRow.length === 0) {
				return;
			}
			var setW = function (el, widthVal) {
				el.style.setProperty('width', widthVal, 'important');
				el.style.setProperty('min-width', widthVal, 'important');
				el.style.setProperty('max-width', widthVal, 'important');
			};
			$headerThs.each(function (i) {
				var bodyCell = $firstRow[0].cells[i];
				if (!bodyCell) {
					return;
				}
				var w = bodyCell.style.width;
				if (!w) {
					w = window.getComputedStyle(bodyCell).width;
				}
				if (w) {
					setW(this, w);
					$mainHeader.find('colgroup col').eq(i).each(function () { setW(this, w); });
					$mainBody.find('colgroup col').eq(i).each(function () { setW(this, w); });
				}
			});
		}

		function scheduleTpColumnWidths() {
			applyTpCheckboxColumnWidth();
			$.each(tpColWidths, function (field, width) {
				applyTpFieldColumnWidth(field, width);
			});
			syncTpHeaderBodyColumnWidths();
			requestAnimationFrame(function () {
				applyTpCheckboxColumnWidth();
				$.each(tpColWidths, function (field, width) {
					applyTpFieldColumnWidth(field, width);
				});
				syncTpHeaderBodyColumnWidths();
			});
		}

		function fixTpTableHeaderAlign() {
			var $bt = $('#' + tpQueryTableId).closest('.bootstrap-table');
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			if (!$mainBody.length || !$mainHeader.length) {
				return;
			}
			var scrollW = $mainBody[0].offsetWidth - $mainBody[0].clientWidth;
			$mainHeader.css('margin-right', scrollW > 0 ? (scrollW + 'px') : '');
		}

		function syncTpHeaderBodyScrollLeft() {
			var $container = $('#' + tpQueryTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			if ($mainBody.length && $mainHeader.length) {
				$mainHeader.scrollLeft($mainBody[0].scrollLeft);
			}
		}

		function bindTpMainHorizontalScroll() {
			var $bt = $('#' + tpQueryTableId).closest('.bootstrap-table');
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			$mainBody.off('scroll.tpMainH').on('scroll.tpMainH', function () {
				$mainHeader.scrollLeft($mainBody.scrollLeft());
			});
		}

		function applyTpMainTableMinWidth() {
			var sum = getTpTableTotalWidth();
			var w = sum + 'px';
			var $container = $('#' + tpQueryTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $headerTable = $container.children('.fixed-table-header').find('table');
			var $bodyTable = $container.children('.fixed-table-body').children('table');
			$headerTable.css({ width: w, minWidth: w, maxWidth: w });
			$bodyTable.css({ width: w, minWidth: w, maxWidth: w });
		}

		function syncTpOperateColumnScroll() {
			var $bt = $('#' + tpQueryTableId).closest('.bootstrap-table');
			var $rightBody = $bt.find('.fixed-columns-right .fixed-table-body');
			if ($rightBody.length === 0) {
				return;
			}
			var $mainBody = $bt.find('.fixed-table-container').children('.fixed-table-body');
			$mainBody.off('scroll.tpOperateSync').on('scroll.tpOperateSync', function () {
				$rightBody.scrollTop($mainBody.scrollTop());
			});
		}

		function refreshTpTableLayout() {
			fixTpTableHeaderAlign();
			scheduleTpColumnWidths();
			applyTpMainTableMinWidth();
			syncTpHeaderBodyScrollLeft();
			bindTpMainHorizontalScroll();
			syncTpOperateColumnScroll();
		}

		function tpQueryParams(params) {
			table.set(tpQueryTableId);
			var formParams = $.common.formToJSON("tp-query-form");
			normalizePushRangeParams(formParams);
			return $.extend({}, formParams, {
				pageNum: Math.floor(params.offset / params.limit) + 1,
				pageSize: params.limit,
				orderByColumn: params.sort,
				isAsc: params.order,
				searchValue: params.search
			});
		}

		function buildTpOperateHtml(row) {
			var btns = [];
			if (detailFlag !== 'hidden') {
				btns.push('<a class="btn btn-info btn-xs" href="javascript:void(0)" onclick="viewDetail(\'' + row.id + '\')"><i class="fa fa-eye"></i>详情</a> ');
			}
			if (confirmPerm !== 'hidden' && tpQuerySupplierCtx === true && row.voidStatus !== '1' && row.confirmStatus !== '1') {
				btns.push('<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="tpConfirmOrder(\'' + row.id + '\')"><i class="fa fa-check"></i>确认</a> ');
			}
			if (voidPerm !== 'hidden' && tpQueryHospitalCtx === true && row.voidStatus !== '1') {
				btns.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="tpVoidOrder(\'' + row.id + '\')"><i class="fa fa-ban"></i>作废</a> ');
			}
			return btns.length ? btns.join('') : '-';
		}

		function queryTpList() {
		    var options = {
		        id: tpQueryTableId,
		        formId: "tp-query-form",
		        url: prefix + "/list",
		        queryParams: tpQueryParams,
		        modalName: "第三方订单",
		        uniqueId: "id",
		        rememberSelected: true,
		        maintainSelected: true,
		        mobileResponsive: false,
		        fixedColumns: true,
		        fixedNumber: 0,
		        fixedRightNumber: 1,
		        pageList: [10, 25, 50],
		        height: calculateTableHeight(),
		        onLoadSuccess: function () {
		            layoutTpQueryTableWrapHeight();
		            setTimeout(function () {
		                adjustTableHeight();
		                refreshTpTableLayout();
		            }, 50);
		            setTimeout(function () {
		                var $t = $('#' + tpQueryTableId);
		                if ($t.bootstrapTable('getOptions')) {
		                    $t.bootstrapTable('resetView', { height: calculateTableHeight() });
		                }
		                refreshTpTableLayout();
		            }, 200);
		            setTimeout(refreshTpTableLayout, 450);
		        },
		        onPostBody: function () {
		            refreshTpTableLayout();
		        },
		        columns: [{
		            checkbox: true
		        },
		        {
		            field: 'rowIndex',
		            title: '序号',
		            align: 'center',
		            width: 60,
		            formatter: function (value, row, index) {
		                return $.table.serialNumber(index);
		            }
		        },
		        {
		            field: 'dh',
		            title: '订单编号',
		            width: 175,
		            formatter: function (value, row) {
		                var v = value || '-';
		                if (v === '-' || detailFlag === 'hidden') {
		                    return tpCellEllipsis(v === '-' ? null : v);
		                }
		                return '<a href="javascript:void(0)" onclick="viewDetail(\'' + row.id + '\')" title="' + escTpCellAttr(v) + '">' + escTpCellAttr(v) + '</a>';
		            }
		        },
		        {
		            field: 'hospitalCode',
		            title: '平台医院编码',
		            visible: false,
		            width: 160
		        },
		        {
		            field: 'hospitalName',
		            title: '平台医院名称',
		            width: 180,
		            formatter: function (value) {
		                return tpCellEllipsis(value);
		            }
		        },
		        {
		            field: 'supplierCode',
		            title: '平台供应商编码',
		            width: 160,
		            formatter: function (value) {
		                return tpCellEllipsis(value);
		            }
		        },
		        {
		            field: 'supplierName',
		            title: '平台供应商名称',
		            width: 220,
		            formatter: function (value) {
		                return tpCellEllipsis(value);
		            }
		        },
		        {
		            field: 'ckno',
		            title: '订单仓库编码',
		            visible: false,
		            width: 116
		        },
		        {
		            field: 'sheetJe',
		            title: '金额',
		            align: 'center',
		            width: 120,
		            formatter: function (v) {
		                return fmtTpAmount(v);
		            }
		        },
		        {
		            field: 'ck',
		            title: '订单仓库名称',
		            width: 130,
		            formatter: function (v) {
		                return tpCellEllipsis(v);
		            }
		        },
		        {
		            field: 'supno',
		            title: '订单供应商编码',
		            visible: false,
		            width: 116
		        },
		        {
		            field: 'sup',
		            title: '订单供应商名称',
		            width: 220,
		            formatter: function (v) {
		                return tpCellEllipsis(v);
		            }
		        },
		        {
		            field: 'ksbh',
		            title: '订单科室编码',
		            width: 96,
		            formatter: function (v) {
		                return tpCellEllipsis(v);
		            }
		        },
		        {
		            field: 'ksmc',
		            title: '订单科室名称',
		            width: 96,
		            formatter: function (v) {
		                return tpCellEllipsis(v);
		            }
		        },
		        {
		            field: 'createTime',
		            title: '推送时间',
		            width: 168,
		            formatter: function (v) {
		                return tpCellEllipsis(fmtPushTime(v));
		            }
		        },
		        {
		            field: 'confirmStatus',
		            title: '确认状态',
		            width: 96,
		            formatter: function (v) {
		                return fmtConfirmStatus(v);
		            }
		        },
		        {
		            field: 'confirmByDisplay',
		            title: '确认人',
		            width: 108,
		            formatter: function (v, row) {
		                return tpCellEllipsis(v || row.confirmBy);
		            }
		        },
		        {
		            field: 'confirmTime',
		            title: '确认时间',
		            width: 168,
		            formatter: function (v) {
		                return tpCellEllipsis(fmtPushTime(v));
		            }
		        },
		        {
		            field: 'voidStatus',
		            title: '作废状态',
		            width: 96,
		            formatter: function (v) {
		                return fmtVoidStatus(v);
		            }
		        },
		        {
		            field: 'voidByDisplay',
		            title: '作废人',
		            width: 108,
		            formatter: function (v, row) {
		                return tpCellEllipsis(v || row.voidBy);
		            }
		        },
		        {
		            field: 'voidTime',
		            title: '作废时间',
		            width: 168,
		            formatter: function (v) {
		                return tpCellEllipsis(fmtPushTime(v));
		            }
		        },
		        {
		            field: 'deliveryProgress',
		            title: '配送进度',
		            width: 100,
		            formatter: function (v) {
		                return fmtDeliveryProgress(v);
		            }
		        },
		        {
		            field: 'tpOperate',
		            title: '操作',
		            align: 'center',
		            width: 160,
		            formatter: function (value, row) {
		                return buildTpOperateHtml(row);
		            }
		        }]
		    };
		    $.table.init(options);
		}

		function resetPre() {
			if (typeof resetDate === 'function') {
				resetDate();
			}
			$("#tp-query-form")[0].reset();
			initDefaultTpPushDateRange();
			$.table.search();
		}

		function viewDetail(zsOrderId) {
		    var url = prefix + '/detail/' + zsOrderId;
		    $.modal.openTab("第三方订单详情", url);
		}

		function tpConfirmOrder(id) {
			$.modal.confirm("确认该第三方订单？确认后将记录确认人与确认时间。", function() {
				$.operate.post(prefix + "/confirm/" + id, {}, function() {
					$.table.refresh();
				});
			});
		}

		function tpVoidOrder(id) {
			$.modal.confirm("确认作废该第三方订单？作废后不可再引用生成配送单。", function() {
				$.operate.post(prefix + "/void/" + id, {}, function() {
					$.table.refresh();
				});
			});
		}

		function tpBatchConfirm() {
			var rows = $("#" + tpQueryTableId).bootstrapTable("getSelections");
			if (!rows || rows.length === 0) {
				$.modal.alertWarning("请至少选择一条订单");
				return;
			}
			for (var i = 0; i < rows.length; i++) {
				if (rows[i].voidStatus === '1' || rows[i].confirmStatus === '1') {
					$.modal.alertWarning("所选记录中包含已确认或已作废的订单，请重新选择");
					return;
				}
			}
			var ids = [];
			for (var j = 0; j < rows.length; j++) {
				ids.push(rows[j].id);
			}
			$.modal.confirm("确认选中的 " + ids.length + " 条第三方订单？确认后将记录确认人与确认时间。", function() {
				$.operate.post(prefix + "/confirmBatch", { ids: ids.join(",") }, function() {
					$.table.refresh();
				});
			});
		}

		function tpRepairDeliveryLink() {
			$.modal.confirm("将按配送明细回填配送单主表上的订单关联（含第三方与第一方），并补写缺失的明细关联记录。是否继续？", function() {
				$.operate.post(prefix + "/repairDeliveryLink", {}, function(res) {
					var msg = (res && res.msg) ? res.msg : "修复完成";
					if (res && res.data && res.data.anomalyDoneWithoutDelivery > 0) {
						$.modal.alertWarning(msg);
					} else {
						$.modal.alertSuccess(msg);
					}
					$.table.refresh();
				});
			});
		}

		function tpBatchVoid() {
			var rows = $("#" + tpQueryTableId).bootstrapTable("getSelections");
			if (!rows || rows.length === 0) {
				$.modal.alertWarning("请至少选择一条订单");
				return;
			}
			for (var i = 0; i < rows.length; i++) {
				if (rows[i].voidStatus === '1') {
					$.modal.alertWarning("所选记录中包含已作废的订单，请重新选择");
					return;
				}
			}
			var ids = [];
			for (var j = 0; j < rows.length; j++) {
				ids.push(rows[j].id);
			}
			$.modal.confirm("确认作废选中的 " + ids.length + " 条第三方订单？作废后不可再引用生成配送单。", function() {
				$.operate.post(prefix + "/voidBatch", { ids: ids.join(",") }, function() {
					$.table.refresh();
				});
			});
		}
	</script>
</body>
</html>
