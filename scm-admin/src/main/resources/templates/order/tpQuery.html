<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('第三方订单查询')" />
	<th:block th:include="include :: layout-latest-css" />
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="tp-query-form">
					<div class="select-list">
						<ul>
							<li>
								订单编号：<input type="text" name="dh"/>
							</li>
							<li>
								医院名称：<input type="text" name="hospitalName"/>
							</li>
							<li>
								供应商名称：<input type="text" name="supplierName"/>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()" style="display: none;"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="resetPre()" style="display: none;"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>

	        <div class="btn-group-sm" id="toolbar" role="group">
	            <a class="btn btn-primary" onclick="$.table.search()">
		            <i class="fa fa-search"></i> 搜索
		        </a>
	            <a class="btn btn-warning" onclick="resetPre()">
		            <i class="fa fa-refresh"></i> 重置
		        </a>
	        </div>

	        <div class="col-sm-12 select-table table-striped">
			    <table id="bootstrap-table"></table>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:inline="javascript">
		var detailFlag = [[${@permission.hasPermi('order:tpOrder:detail')}]];
		var prefix = ctx + "order/tpQuery";

		$(function() {
		    queryList();
		});

		function queryList() {
		    var options = {
		        url: prefix + "/list",
		        sortName: "createTime",
		        sortOrder: "desc",
		        modalName: "第三方订单",
		        uniqueId: "id",
		        columns: [{
		            field: 'index',
		            title: '序号',
		            align: 'center',
		            width: 60,
		            formatter: function(value, row, index) {
		                return index + 1;
		            }
		        },
		        {
		            field: 'dh',
		            title: '订单编号',
		            sortable: true,
		            formatter: function (value, row) {
		                var v = value || '';
		                if (detailFlag !== 'hidden') {
		                    return '<a href="javascript:void(0)" onclick="viewDetail(\'' + row.id + '\')">' + v + '</a>';
		                }
		                return v;
		            }
		        },
		        {
		            field: 'hospitalCode',
		            title: '医院编码',
		            formatter: function (value) { return value || '-'; }
		        },
		        {
		            field: 'hospitalName',
		            title: '医院名称',
		            formatter: function (value) { return value || '-'; }
		        },
		        {
		            field: 'supplierCode',
		            title: '供应商编码',
		            formatter: function (value) { return value || '-'; }
		        },
		        {
		            field: 'supplierName',
		            title: '供应商名称',
		            formatter: function (value) { return value || '-'; }
		        },
		        {
		            field: 'supno',
		            title: '订单供应商编码',
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'sup',
		            title: '订单供应商名称',
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'ckno',
		            title: '订单仓库编码',
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            field: 'ck',
		            title: '订单仓库名称',
		            formatter: function (v) { return v || '-'; }
		        },
		        {
		            title: '操作',
		            align: 'center',
		            width: 100,
		            formatter: function(value, row) {
		                if (detailFlag === 'hidden') {
		                    return '';
		                }
		                return '<a class="btn btn-info btn-xs" href="javascript:void(0)" onclick="viewDetail(\'' + row.id + '\')"><i class="fa fa-eye"></i>详情</a>';
		            }
		        }]
		    };
		    $.table.init(options);
		}

		function resetPre() {
			$("#tp-query-form")[0].reset();
			$.table.search();
		}

		function viewDetail(zsOrderId) {
		    var url = prefix + '/detail/' + zsOrderId;
		    $.modal.openTab("第三方订单详情", url);
		}
	</script>
</body>
</html>
