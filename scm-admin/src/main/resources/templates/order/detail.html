<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('订单明细')" />
	<th:block th:include="include :: layout-latest-css" />
	<style>
		body.order-detail-page {
			height: 100%;
			overflow: hidden;
		}
		.order-detail-page .main-content {
			display: flex;
			flex-direction: column;
			height: 100%;
			min-height: 480px;
			overflow: hidden;
			box-sizing: border-box;
			padding: 4px 10px 8px 10px !important;
		}
		.order-detail-basic {
			flex-shrink: 0;
		}
		.order-info-box.search-collapse {
			margin: 0 0 0 0 !important;
			padding: 6px 8px 0 !important;
			box-shadow: none !important;
			border-radius: 0 !important;
		}
		.order-basic-header-row {
			margin: 2px 0 6px 0 !important;
			padding-bottom: 4px !important;
		}
		.order-detail-table-section {
			flex: 1;
			min-height: 0;
			display: flex;
			flex-direction: column;
			margin-top: 0 !important;
			padding: 0 !important;
			overflow: hidden;
		}
		.order-detail-table-section > .form-header.h4 {
			flex-shrink: 0;
			margin: 2px 0 4px 0 !important;
			padding: 0 0 4px 0 !important;
			border-bottom: 1px solid #ddd;
		}
		.order-detail-table-wrap.select-table {
			margin-top: 0 !important;
			padding-top: 0 !important;
			padding-bottom: 0 !important;
			box-shadow: none !important;
			border-radius: 0 !important;
		}
		.order-detail-table-wrap {
			flex: 1;
			min-height: 0;
			position: relative;
			overflow: hidden;
			display: flex;
			flex-direction: column;
		}
		.order-detail-table-wrap > .bootstrap-table {
			flex: 1 1 auto;
			min-height: 0;
			height: 100%;
			display: flex;
			flex-direction: column;
		}
		.order-detail-table-wrap .fixed-table-container {
			flex: 1;
			min-height: 0;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}
		.order-detail-table-wrap .fixed-table-body {
			flex: 1;
			min-height: 0;
			overflow-x: auto !important;
			overflow-y: auto !important;
		}
		.order-detail-table-wrap .fixed-table-header {
			background: #fff;
		}
		.order-detail-table-wrap .fixed-table-header th {
			font-size: 15px !important;
			font-weight: 600;
		}
		/* 明细行固定行高，避免仅一条数据时被撑满整块区域 */
		.order-detail-table-wrap .fixed-table-container > .fixed-table-header thead tr {
			height: 42px !important;
		}
		.order-detail-table-wrap .fixed-table-container > .fixed-table-header thead th {
			height: 42px !important;
			padding: 6px 10px !important;
			line-height: 1.35;
			vertical-align: middle !important;
		}
		.order-detail-table-wrap .fixed-table-container > .fixed-table-body tbody tr {
			height: 42px !important;
			min-height: 42px !important;
			max-height: 42px !important;
		}
		.order-detail-table-wrap .fixed-table-container > .fixed-table-body tbody td {
			height: 42px !important;
			max-height: 42px !important;
			padding: 6px 10px !important;
			line-height: 1.35;
			vertical-align: middle !important;
		}
		.order-detail-table-wrap .fixed-table-body table,
		.order-detail-table-wrap .fixed-table-body tbody {
			height: auto !important;
		}
		#bootstrap-table.order-detail-fixed-table {
			table-layout: fixed !important;
		}
		.order-detail-table-wrap .fixed-table-header th,
		.order-detail-table-wrap .fixed-table-body td {
			box-sizing: border-box !important;
			white-space: nowrap !important;
			word-break: keep-all !important;
			overflow: hidden;
			text-overflow: ellipsis;
		}
		/* 订单信息：每行五列 */
		.order-info-box .row {
			margin-left: -8px;
			margin-right: -8px;
		}
		.order-info-box .row::after {
			content: "";
			display: table;
			clear: both;
		}
		.order-info-box .col-order-5 {
			position: relative;
			min-height: 1px;
			padding-left: 8px;
			padding-right: 8px;
		}
		@media (min-width: 992px) {
			.order-info-box .col-order-5 { width: 20%; float: left; }
		}
		@media (max-width: 991px) {
			.order-info-box .col-order-5 { width: 50%; float: left; }
		}
		.order-info-box .form-group {
			margin-bottom: 8px;
		}
		.order-info-box .form-control[readonly] {
			background-color: #fff !important;
			background-image: none !important;
			border-color: #e5e6e7;
			color: #333;
			cursor: default;
		}
		.order-detail-table-wrap .order-detail-cell-text {
			display: block;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}
		.order-detail-table-wrap .fixed-table-body td[title],
		.order-detail-table-wrap .order-detail-cell-text[title] {
			cursor: help;
		}
	</style>
</head>
<body class="gray-bg order-detail-page">
    <div class="main-content">
        <div class="order-detail-basic">
        <form class="form-horizontal">
            <div class="order-basic-header-row" style="display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #ddd;">
                <h4 class="form-header h4" style="margin:0;border:0;padding:0;">订单信息</h4>
                <div style="display:flex;align-items:center;gap:8px;">
                    <a class="btn btn-info btn-sm" href="javascript:void(0)" onclick="openOrderDeliveries()"><i class="fa fa-truck"></i> 关联配送单</a>
                    <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i> 关 闭</button>
                </div>
            </div>
            <div class="search-collapse order-info-box">
            <div class="row">
            	<div class="col-order-5">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">订单编号：</label>
                        <div class="col-sm-7">
                            <input class="form-control" type="text" th:value="${order.orderNo}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-order-5">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">医院：</label>
                        <div class="col-sm-7">
                            <input class="form-control" type="text" th:value="${order.hospitalName}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-order-5">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">订单金额：</label>
                        <div class="col-sm-7">
                            <input class="form-control" type="text" th:value="${order.orderAmount}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-order-5">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">供应商：</label>
                        <div class="col-sm-7">
                            <input class="form-control" type="text" th:value="${order.supplierName}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-order-5">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">要货仓库：</label>
                        <div class="col-sm-7">
                            <input class="form-control" type="text" th:value="${order.warehouse}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-order-5">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">订单日期：</label>
                        <div class="col-sm-7">
                            <input class="form-control" type="text" th:value="${order.orderDate != null ? #dates.format(order.orderDate, 'yyyy-MM-dd') : ''}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-order-5">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">订单状态：</label>
                        <div class="col-sm-7">
                            <input class="form-control" type="text" th:value="${order.orderStatus == '0' ? '待接收' : (order.orderStatus == '1' ? '已接收' : (order.orderStatus == '2' ? '配送中' : (order.orderStatus == '3' ? '已完成' : (order.orderStatus == '4' ? '已取消' : ''))))}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-order-5">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">申请科室：</label>
                        <div class="col-sm-7">
                            <input class="form-control" type="text" th:value="${order.department}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-order-5">
                    <div class="form-group">
                        <label class="col-sm-5 control-label">备注：</label>
                        <div class="col-sm-7">
                            <input class="form-control" type="text" th:value="${order.remark}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            </div>
        </form>
        </div>
        <div class="order-detail-table-section">
            <h4 class="form-header h4">订单明细</h4>
            <div class="order-detail-table-wrap select-table table-striped">
                <table id="bootstrap-table" class="order-detail-fixed-table"></table>
            </div>
        </div>
    </div>
	
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:inline="javascript">
		var orderId = [[${order.orderId}]];
		var prefix = ctx + "order/order";

		function calculateOrderDetailTableHeight() {
		    var $wrap = $('.order-detail-table-wrap');
		    if ($wrap.length === 0) {
		        return 400;
		    }
		    var h = $wrap[0].clientHeight || $wrap.innerHeight();
		    h = Math.floor(h - 8);
		    return Math.max(h, 200);
		}

		function layoutOrderDetailTableWrap() {
		    var $section = $('.order-detail-table-section');
		    var $page = $('.order-detail-page .main-content');
		    if ($section.length === 0 || $page.length === 0) {
		        return;
		    }
		    var bottom = $page[0].getBoundingClientRect().bottom;
		    var $tc = $section.closest('.tab-content');
		    if ($tc.length) {
		        bottom = Math.min(bottom, $tc[0].getBoundingClientRect().bottom - 4);
		    }
		    var $pane = $section.closest('.tab-pane');
		    if ($pane.length && $pane.is(':visible')) {
		        bottom = Math.min(bottom, $pane[0].getBoundingClientRect().bottom - 4);
		    }
		    var top = $section[0].getBoundingClientRect().top;
		    var $wrap = $section.find('.order-detail-table-wrap');
		    var h = Math.floor(bottom - top - 28);
		    if (h < 200) {
		        h = 200;
		    }
		    $wrap.css({ height: h + 'px', minHeight: h + 'px', flex: '0 0 auto' });
		}

		function resetOrderDetailTableHeight() {
		    var $table = $('#bootstrap-table');
		    if ($table.length > 0 && $table.bootstrapTable('getOptions')) {
		        $table.bootstrapTable('resetView', { height: calculateOrderDetailTableHeight() });
		    }
		}

		function relayoutOrderDetailTable() {
		    layoutOrderDetailTableWrap();
		    resetOrderDetailTableHeight();
		}

		/** 单元格文字被截断时，悬停显示完整内容 */
		function bindOrderDetailCellTitles() {
		    $('.order-detail-table-wrap .fixed-table-body tbody td').each(function() {
		        var $td = $(this);
		        if ($td.find('a.btn, .btn').length) {
		            $td.removeAttr('title');
		            return;
		        }
		        var text = $.trim($td.text());
		        if (!text) {
		            $td.removeAttr('title');
		            return;
		        }
		        var el = this;
		        if (el.scrollWidth > el.clientWidth + 1) {
		            $td.attr('title', text);
		        } else {
		            $td.removeAttr('title');
		        }
		    });
		}

		$(function() {
		    layoutOrderDetailTableWrap();
		    queryOrderDetailList();
		    $(window).on('resize', function() {
		        relayoutOrderDetailTable();
		        bindOrderDetailCellTitles();
		    });
		    setTimeout(relayoutOrderDetailTable, 0);
		    setTimeout(relayoutOrderDetailTable, 200);
		});

		function queryOrderDetailList() {
		    var options = {
		        url: prefix + "/detailList",
		        queryParams: { orderId: orderId },
		        sortName: "detailId",
		        sortOrder: "asc",
		        sidePagination: 'client',
		        pagination: false,
		        search: false,
		        showSearch: false,
		        showRefresh: false,
		        showToggle: false,
		        showColumns: false,
		        striped: true,
		        mobileResponsive: false,
		        height: calculateOrderDetailTableHeight(),
		        onPostBody: function() {
		            setTimeout(function() {
		                relayoutOrderDetailTable();
		                bindOrderDetailCellTitles();
		            }, 0);
		        },
		        columns: [{
		            field: 'index',
		            title: '序号',
		            align: 'center',
		            width: 60,
		            formatter: function(value, row, index) {
		                return index + 1;
		            }
		        },
		        {
		            field: 'materialCode',
		            title: '产品编码',
		            align: 'center',
		            width: 130,
		            sortable: true,
		            formatter: fmtOrderDetailText
		        },
		        {
		            field: 'materialName',
		            title: '产品名称',
		            align: 'left',
		            width: 200,
		            sortable: true,
		            formatter: fmtOrderDetailText
		        },
		        {
		            field: 'specification',
		            title: '规格',
		            align: 'center',
		            width: 120,
		            sortable: true,
		            formatter: fmtOrderDetailText
		        },
		        {
		            field: 'model',
		            title: '型号',
		            align: 'center',
		            width: 100,
		            sortable: true,
		            formatter: fmtOrderDetailText
		        },
		        {
		            field: 'unit',
		            title: '单位',
		            align: 'center',
		            width: 80,
		            sortable: true
		        },
		        {
		            field: 'orderQuantity',
		            title: '订货数量',
		            align: 'right',
		            width: 100,
		            sortable: true,
		            formatter: function(value, row, index) {
		                if (value) {
		                    return parseFloat(value).toFixed(2);
		                }
		                return '0.00';
		            }
		        },
		        {
		            field: 'purchasePrice',
		            title: '单价',
		            align: 'right',
		            width: 100,
		            sortable: true,
		            formatter: function(value, row, index) {
		                if (value) {
		                    return '¥' + parseFloat(value).toFixed(2);
		                }
		                return '¥0.00';
		            }
		        },
		        {
		            field: 'amount',
		            title: '金额',
		            align: 'right',
		            width: 120,
		            sortable: true,
		            formatter: function(value, row, index) {
		                if (value) {
		                    return '¥' + parseFloat(value).toFixed(2);
		                }
		                return '¥0.00';
		            }
		        },
		        {
		            field: 'remainingQuantity',
		            title: '剩余待配送数',
		            align: 'right',
		            width: 120,
		            formatter: function(value, row, index) {
		                if (value) {
		                    return parseFloat(value).toFixed(2);
		                }
		                return '0.00';
		            }
		        },
		        {
		            field: 'deliveredAuditedQty',
		            title: '已配送(已审核)',
		            align: 'right',
		            width: 110,
		            formatter: fmtQty2
		        },
		        {
		            field: 'deliveredPendingAuditQty',
		            title: '待审核配送',
		            align: 'right',
		            width: 100,
		            formatter: fmtQty2
		        },
		        {
		            field: 'undeliveredQty',
		            title: '未配送',
		            align: 'right',
		            width: 90,
		            formatter: fmtQty2
		        },
		        {
		            title: '配送明细',
		            align: 'center',
		            width: 100,
		            formatter: function(value, row) {
		                return '<a class="btn btn-primary btn-xs" href="javascript:void(0)" onclick="openLineTraces(' + row.detailId + ')"><i class="fa fa-link"></i> 查看</a>';
		            }
		        }]
		    };
		    $.table.init(options);
		}

		function fmtQty2(value) {
		    if (value != null && value !== '') {
		        return parseFloat(value).toFixed(2);
		    }
		    return '0.00';
		}

		function escOrderDetailAttr(s) {
		    return String(s == null ? '' : s)
		        .replace(/&/g, '&amp;')
		        .replace(/"/g, '&quot;')
		        .replace(/'/g, '&#39;')
		        .replace(/</g, '&lt;')
		        .replace(/>/g, '&gt;');
		}

		function fmtOrderDetailText(value) {
		    if (value == null || value === '') {
		        return '-';
		    }
		    var s = String(value);
		    return '<span class="order-detail-cell-text" title="' + escOrderDetailAttr(s) + '">' + escOrderDetailAttr(s) + '</span>';
		}

		function openOrderDeliveries() {
		    var tid = 'bootstrap-table-order-del2';
		    layer.open({
		        type: 1,
		        area: ['920px', '440px'],
		        title: '关联配送单',
		        content: '<table id="' + tid + '"></table>',
		        success: function() {
		            $('#' + tid).bootstrapTable({
		                url: prefix + '/deliveriesByOrder/' + orderId,
		                method: 'post',
		                contentType: "application/x-www-form-urlencoded",
		                pagination: false,
		                sidePagination: 'server',
		                responseHandler: ruoyiTableData,
		                columns: [
		                    { field: 'deliveryNo', title: '配送单号' },
		                    { field: 'auditStatus', title: '审核状态', formatter: function(v) {
		                        var m = { '0': '待审核', '1': '已审核', '2': '已拒绝' };
		                        return m[v] || (v == null ? '' : v);
		                    }},
		                    { field: 'deliveryStatus', title: '单据状态', formatter: function(v) {
		                        var m = { '0': '未审核', '1': '已审核', '2': '已配送', '3': '已入库' };
		                        return m[v] || (v == null ? '' : v);
		                    }},
		                    { field: 'deliveryAmount', title: '配送金额' },
		                    { title: '操作', formatter: function(v, row) {
		                        return '<a href="javascript:void(0)" onclick="$.modal.openTab(\'配送单详情\',\'' + ctx + 'delivery/delivery/detail/' + row.deliveryId + '\')">查看</a>';
		                    }}
		                ]
		            });
		        }
		    });
		}

		function openLineTraces(detailId) {
		    var tid = 'bootstrap-table-line-tr';
		    layer.open({
		        type: 1,
		        area: ['920px', '420px'],
		        title: '本行关联的配送明细',
		        content: '<table id="' + tid + '"></table>',
		        success: function() {
		            $('#' + tid).bootstrapTable({
		                url: prefix + '/detailDeliveryTraces',
		                method: 'post',
		                contentType: "application/x-www-form-urlencoded",
		                queryParams: { orderDetailId: detailId },
		                pagination: false,
		                sidePagination: 'server',
		                responseHandler: ruoyiTableData,
		                columns: [
		                    { field: 'deliveryNo', title: '配送单号' },
		                    { field: 'deliveryQuantity', title: '本行配送数量', formatter: fmtQty2 },
		                    { field: 'auditStatus', title: '审核状态', formatter: function(v) {
		                        var m = { '0': '待审核', '1': '已审核', '2': '已拒绝' };
		                        return m[v] || (v == null ? '' : v);
		                    }},
		                    { field: 'deliveryStatus', title: '单据状态', formatter: function(v) {
		                        var m = { '0': '未审核', '1': '已审核', '2': '已配送', '3': '已入库' };
		                        return m[v] || (v == null ? '' : v);
		                    }},
		                    { title: '操作', formatter: function(v, row) {
		                        return '<a href="javascript:void(0)" onclick="$.modal.openTab(\'配送单详情\',\'' + ctx + 'delivery/delivery/detail/' + row.deliveryId + '\')">配送单</a>';
		                    }}
		                ]
		            });
		        }
		    });
		}
	</script>
</body>
</html>
