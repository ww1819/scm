<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('订单列表')" />
	<th:block th:include="include :: layout-latest-css" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-css" />
	<style>
		.order-table-wrap {
			min-height: 0;
			position: relative;
			padding-bottom: 0;
			overflow: hidden;
			display: flex;
			flex-direction: column;
		}

		.order-table-wrap > .bootstrap-table {
			flex: 1 1 auto;
			min-height: 0;
		}

		.order-table-wrap .bootstrap-table {
			display: flex;
			flex-direction: column;
			height: 100%;
			padding-bottom: 0;
		}

		.order-table-wrap .fixed-table-container {
			flex: 1 1 auto;
			min-height: 0;
			padding-bottom: 0;
		}

		.order-table-wrap .fixed-table-body {
			overflow-x: auto !important;
			overflow-y: auto !important;
		}

		.order-table-wrap.order-list-table .fixed-columns-right {
			z-index: 5;
			box-shadow: -4px 0 8px rgba(0, 0, 0, 0.08);
		}

		.order-table-wrap .fixed-table-body .fixed-table-border {
			display: none !important;
			height: 0 !important;
		}

		.order-table-wrap .fixed-table-pagination {
			position: relative;
			flex-shrink: 0;
			left: auto;
			right: auto;
			bottom: auto;
			background: #fff;
			z-index: 3;
			border-top: 1px solid #eee;
			margin: 0 !important;
			padding: 4px 10px 2px;
		}

		.order-table-wrap.order-list-table .fixed-table-pagination .pagination {
			margin-right: 172px;
		}

		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-header th .th-inner,
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-header th .sortable {
			text-align: center !important;
			justify-content: center;
		}

		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-header th[data-field="rowIndex"],
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-body td[data-field="rowIndex"],
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-header th[data-field="orderAmount"],
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-body td[data-field="orderAmount"],
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-header th[data-field="orderStatus"],
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-body td[data-field="orderStatus"] {
			text-align: center !important;
		}

		.order-table-wrap.order-list-table .fixed-table-header {
			position: relative;
			top: auto;
			z-index: 2;
			background: #fff;
			overflow: hidden;
		}

		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-header table,
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-body > table {
			table-layout: fixed;
		}

		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-header th,
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-body tbody td {
			box-sizing: border-box;
			vertical-align: middle;
		}

		/* 主表滚动区隐藏操作列内容，由右侧 fixed-columns-right 展示（与配送单据申请一致） */
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-header th[data-field="orderOperate"],
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-body td[data-field="orderOperate"] {
			padding: 0 !important;
			border-left: 0 !important;
			border-right: 0 !important;
			font-size: 0;
			line-height: 0;
			color: transparent;
			overflow: hidden;
		}

		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-header th[data-field="orderOperate"] > *,
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-body td[data-field="orderOperate"] > * {
			display: none;
		}

		.order-table-wrap.order-list-table .fixed-columns-right .fixed-table-header th,
		.order-table-wrap.order-list-table .fixed-columns-right .fixed-table-body td {
			background-color: #fff;
			vertical-align: middle;
			white-space: nowrap;
		}

		.order-table-wrap.order-list-table .fixed-columns-right .fixed-table-header th[data-field="orderOperate"] {
			background-color: #f5f5f5;
			min-width: 160px;
			width: 160px;
			text-align: center;
		}

		.order-table-wrap.order-list-table .fixed-columns-right .fixed-table-header th[data-field="orderOperate"] .th-inner {
			text-align: center;
			justify-content: center;
		}

		.order-table-wrap.order-list-table .fixed-columns-right .fixed-table-body td[data-field="orderOperate"] {
			min-width: 160px;
			width: 160px;
			padding: 6px 8px;
			text-align: center;
		}

		.order-table-wrap.order-list-table.table-striped .fixed-columns-right .fixed-table-body tbody tr:nth-of-type(odd) td {
			background-color: #f9f9f9;
		}

		.order-table-wrap.order-list-table .fixed-columns-right .fixed-table-body {
			overflow-x: hidden !important;
			overflow-y: hidden !important;
		}

		.order-table-wrap.order-list-table .fixed-table-body tbody td {
			white-space: nowrap;
			vertical-align: middle !important;
		}

		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-body td[data-field="orderNo"],
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-body td[data-field="hospitalName"],
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-body td[data-field="supplierName"],
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-body td[data-field="warehouse"],
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-body td[data-field="orderDate"],
		.order-table-wrap.order-list-table .fixed-table-container > .fixed-table-body td[data-field="department"] {
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.order-table-wrap.order-list-table .order-cell-ellipsis {
			display: block;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			max-width: 100%;
		}

		/* 搜索区：与配送单据申请一致 */
		.container-div > .row > .search-collapse {
			padding-top: 10px !important;
			padding-bottom: 10px !important;
		}

		.container-div .search-collapse .select-list ul {
			margin-bottom: 0;
			overflow: hidden;
		}

		.container-div .search-collapse .order-search-rows > ul {
			display: block;
			width: 100%;
			overflow: hidden;
		}

		.container-div .search-collapse .order-search-rows > ul + ul {
			margin-top: 2px;
		}

		.container-div .search-collapse .select-list li {
			margin: 4px 15px 4px 0;
		}

		.container-div .search-collapse .select-list li.select-time label {
			margin-top: 4px;
			margin-bottom: 4px;
		}

		#toolbar .order-receive-multiple.disabled {
			pointer-events: none;
			cursor: not-allowed;
			opacity: 1;
			background-color: #e0e0e0 !important;
			border-color: #ccc !important;
			color: #999 !important;
		}
	</style>
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="order-form">
					<div class="select-list order-search-rows">
						<ul>
							<li>
								订单编号：<input type="text" name="orderNo"/>
							</li>
							<li>
								医院名称：<input type="text" name="hospitalName"/>
							</li>
							<li>
								供应商名称：<input type="text" name="supplierName"/>
							</li>
							<li>
								订单状态：<select name="orderStatus">
									<option value="">所有</option>
									<option value="0">待接收</option>
									<option value="1">已接收</option>
									<option value="2">配送中</option>
									<option value="3">已完成</option>
									<option value="4">已作废</option>
								</select>
							</li>
						</ul>
						<ul>
							<li class="select-time">
								<label>订单日期：</label>
								<input type="text" class="time-input" id="startTime" placeholder="开始时间" name="params[beginTime]"/>
								<span>-</span>
								<input type="text" class="time-input" id="endTime" placeholder="结束时间" name="params[endTime]"/>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()" style="display: none;"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="resetPre()" style="display: none;"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>

	        <div class="btn-group-sm" id="toolbar" role="group">
	            <a class="btn btn-info order-receive-multiple disabled" onclick="receiveOrder()" shiro:hasPermission="order:order:receive">
	                <i class="fa fa-check"></i> 接收订单
	            </a>
	            <a class="btn btn-danger multiple disabled" onclick="voidOrders()" shiro:hasPermission="order:order:void">
	                <i class="fa fa-ban"></i> 作废
	            </a>
	            <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="order:order:export">
		            <i class="fa fa-download"></i> 导出
		        </a>
	            <a class="btn btn-primary" onclick="$.table.search()">
		            <i class="fa fa-search"></i> 搜索
		        </a>
	            <a class="btn btn-warning" onclick="resetPre()">
		            <i class="fa fa-refresh"></i> 重置
		        </a>
	        </div>

	        <div class="col-sm-12 select-table table-striped order-table-wrap order-list-table">
			    <table id="bootstrap-table"></table>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-js" />
	<script th:inline="javascript">
		var detailFlag = [[${@permission.hasPermi('order:order:detail')}]];
		var receiveFlag = [[${@permission.hasPermi('order:order:receive')}]];
		var voidFlag = [[${@permission.hasPermi('order:order:void')}]];
		var prefix = ctx + "order/order";
		var orderTableId = 'bootstrap-table';

		var orderColWidths = {
			rowIndex: 60,
			orderNo: 150,
			hospitalName: 180,
			supplierName: 180,
			orderAmount: 100,
			warehouse: 100,
			orderDate: 110,
			orderStatus: 100,
			department: 120,
			orderOperate: 160
		};

		$(function() {
		    layoutOrderTableWrapHeight();
		    queryOrderList();
		    $(window).resize(function() {
		    	layoutOrderTableWrapHeight();
		    	adjustTableHeight();
		    	setTimeout(refreshOrderTableLayout, 100);
		    });
		});

		function layoutOrderTableWrapHeight() {
			var $wrap = $('.order-table-wrap');
			if (!$wrap.length) {
				return;
			}
			var top = $wrap[0].getBoundingClientRect().top;
			var h = Math.floor(window.innerHeight - top - 14);
			h = Math.min(Math.max(h, 400), 580);
			$wrap[0].style.height = h + 'px';
			$wrap[0].style.minHeight = h + 'px';
		}

		function calculateTableHeight() {
			layoutOrderTableWrapHeight();
			var $wrap = $('.order-table-wrap');
			if (!$wrap.length) {
				return 440;
			}
			var $bt = $wrap.find('.bootstrap-table');
			var wrapH = $wrap[0].clientHeight || $wrap.innerHeight() || 0;
			var toolbarH = $bt.find('.fixed-table-toolbar').outerHeight(true) || 0;
			var pagH = $bt.find('.fixed-table-pagination').outerHeight(true) || 46;
			var containerH = Math.floor(wrapH - toolbarH - pagH - 2);
			return Math.max(containerH, 240);
		}

		function adjustTableHeight() {
			var $table = $('#' + orderTableId);
			if ($table.length > 0 && $table.bootstrapTable('getOptions')) {
				$table.bootstrapTable('resetView', { height: calculateTableHeight() });
			}
		}

		function escOrderCellAttr(s) {
			return String(s == null ? '' : s)
				.replace(/&/g, '&amp;')
				.replace(/"/g, '&quot;')
				.replace(/'/g, '&#39;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;');
		}

		/** 文本省略显示，鼠标悬停 title 显示完整内容，移开自动隐藏 */
		function orderCellEllipsis(value) {
			var s = (value == null || value === '') ? '-' : String(value);
			if (s === '-') {
				return s;
			}
			return '<span class="order-cell-ellipsis" title="' + escOrderCellAttr(s) + '">' + escOrderCellAttr(s) + '</span>';
		}

		function getOrderTableTotalWidth() {
			var sum = 0;
			var opt = $('#' + orderTableId).bootstrapTable('getOptions');
			if (opt && opt.columns && opt.columns[0]) {
				$.each(opt.columns[0], function (_, col) {
					if (!col || col.visible === false) {
						return;
					}
					if (col.checkbox) {
						sum += 42;
					} else if (col.field && orderColWidths[col.field] != null) {
						sum += orderColWidths[col.field];
					} else if (col.width) {
						sum += parseInt(col.width, 10) || 0;
					} else {
						sum += 100;
					}
				});
			}
			return Math.max(sum, 1200);
		}

		function applyOrderFieldColumnWidth(field, widthPx) {
			var w = widthPx + 'px';
			var $container = $('#' + orderTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $th = $mainHeader.find('th[data-field="' + field + '"]');
			if ($th.length === 0) {
				return;
			}
			var colIdx = $th[0].cellIndex;
			var setW = function (el) {
				el.style.setProperty('width', w, 'important');
				el.style.setProperty('min-width', w, 'important');
				el.style.setProperty('max-width', w, 'important');
			};
			$th.each(function () { setW(this); });
			$mainBody.find('table tbody tr').each(function () {
				var cell = this.cells[colIdx];
				if (cell) {
					setW(cell);
				}
			});
			$mainHeader.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
			$mainBody.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
		}

		function applyOrderCheckboxColumnWidth() {
			var w = '42px';
			var $container = $('#' + orderTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $th = $mainHeader.find('th.bs-checkbox');
			if ($th.length === 0) {
				return;
			}
			var colIdx = $th[0].cellIndex;
			var setW = function (el) {
				el.style.setProperty('width', w, 'important');
				el.style.setProperty('min-width', w, 'important');
				el.style.setProperty('max-width', w, 'important');
			};
			$th.each(function () { setW(this); });
			$mainBody.find('table tbody tr').each(function () {
				var cell = this.cells[colIdx];
				if (cell) {
					setW(cell);
				}
			});
			$mainHeader.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
			$mainBody.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
		}

		function syncOrderHeaderBodyColumnWidths() {
			var $container = $('#' + orderTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $headerThs = $mainHeader.find('thead tr').first().children('th');
			var $firstRow = $mainBody.find('tbody tr').first();
			if ($firstRow.length === 0) {
				return;
			}
			var setW = function (el, widthVal) {
				el.style.setProperty('width', widthVal, 'important');
				el.style.setProperty('min-width', widthVal, 'important');
				el.style.setProperty('max-width', widthVal, 'important');
			};
			$headerThs.each(function (i) {
				var bodyCell = $firstRow[0].cells[i];
				if (!bodyCell) {
					return;
				}
				var w = bodyCell.style.width;
				if (!w) {
					w = window.getComputedStyle(bodyCell).width;
				}
				if (w) {
					setW(this, w);
					$mainHeader.find('colgroup col').eq(i).each(function () { setW(this, w); });
					$mainBody.find('colgroup col').eq(i).each(function () { setW(this, w); });
				}
			});
		}

		function scheduleOrderColumnWidths() {
			applyOrderCheckboxColumnWidth();
			$.each(orderColWidths, function (field, width) {
				applyOrderFieldColumnWidth(field, width);
			});
			syncOrderHeaderBodyColumnWidths();
			requestAnimationFrame(function () {
				applyOrderCheckboxColumnWidth();
				$.each(orderColWidths, function (field, width) {
					applyOrderFieldColumnWidth(field, width);
				});
				syncOrderHeaderBodyColumnWidths();
			});
		}

		function fixOrderTableHeaderAlign() {
			var $bt = $('#' + orderTableId).closest('.bootstrap-table');
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			if (!$mainBody.length || !$mainHeader.length) {
				return;
			}
			var scrollW = $mainBody[0].offsetWidth - $mainBody[0].clientWidth;
			$mainHeader.css('margin-right', scrollW > 0 ? (scrollW + 'px') : '');
		}

		function syncOrderHeaderBodyScrollLeft() {
			var $container = $('#' + orderTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			if ($mainBody.length && $mainHeader.length) {
				$mainHeader.scrollLeft($mainBody[0].scrollLeft);
			}
		}

		function bindOrderMainHorizontalScroll() {
			var $bt = $('#' + orderTableId).closest('.bootstrap-table');
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			$mainBody.off('scroll.orderMainH').on('scroll.orderMainH', function () {
				$mainHeader.scrollLeft($mainBody.scrollLeft());
			});
		}

		function applyOrderMainTableMinWidth() {
			var sum = getOrderTableTotalWidth();
			var w = sum + 'px';
			var $container = $('#' + orderTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $headerTable = $container.children('.fixed-table-header').find('table');
			var $bodyTable = $container.children('.fixed-table-body').children('table');
			$headerTable.css({ width: w, minWidth: w, maxWidth: w });
			$bodyTable.css({ width: w, minWidth: w, maxWidth: w });
		}

		function syncOrderOperateColumnScroll() {
			var $bt = $('#' + orderTableId).closest('.bootstrap-table');
			var $rightBody = $bt.find('.fixed-columns-right .fixed-table-body');
			if ($rightBody.length === 0) {
				return;
			}
			var $mainBody = $bt.find('.fixed-table-container').children('.fixed-table-body');
			$mainBody.off('scroll.orderOperateSync').on('scroll.orderOperateSync', function () {
				$rightBody.scrollTop($mainBody.scrollTop());
			});
		}

		function refreshOrderTableLayout() {
			fixOrderTableHeaderAlign();
			scheduleOrderColumnWidths();
			applyOrderMainTableMinWidth();
			syncOrderHeaderBodyScrollLeft();
			bindOrderMainHorizontalScroll();
			syncOrderOperateColumnScroll();
		}

		function buildOrderOperateHtml(row) {
			var actions = [];
			actions.push('<a class="btn btn-info btn-xs ' + detailFlag + '" href="javascript:void(0)" onclick="viewDetail(\'' + row.orderId + '\')"><i class="fa fa-eye"></i>详情</a> ');
			if (row.orderStatus == '0' && receiveFlag != 'hidden') {
				actions.push('<a class="btn btn-primary btn-xs" href="javascript:void(0)" onclick="receiveSingleOrder(\'' + row.orderId + '\')"><i class="fa fa-check"></i>接收</a> ');
			}
			if ((row.orderStatus == '0' || row.orderStatus == '1') && voidFlag != 'hidden') {
				actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="voidSingleOrder(\'' + row.orderId + '\')"><i class="fa fa-ban"></i>作废</a> ');
			}
			return actions.join('');
		}

		function queryOrderList() {
		    var options = {
		        url: prefix + "/list",
		        exportUrl: prefix + "/export",
		        sortName: "orderDate",
		        sortOrder: "desc",
		        modalName: "订单",
		        uniqueId: "orderId",
		        rememberSelected: true,
		        maintainSelected: true,
		        mobileResponsive: false,
		        fixedColumns: true,
		        fixedNumber: 0,
		        fixedRightNumber: 1,
		        pageList: [10, 25, 50],
		        height: calculateTableHeight(),
		        onLoadSuccess: function () {
		            layoutOrderTableWrapHeight();
		            setTimeout(function () {
		                adjustTableHeight();
		                refreshOrderTableLayout();
		                updateOrderReceiveButton();
		            }, 50);
		            setTimeout(function () {
		                var $t = $('#' + orderTableId);
		                if ($t.bootstrapTable('getOptions')) {
		                    $t.bootstrapTable('resetView', { height: calculateTableHeight() });
		                }
		                refreshOrderTableLayout();
		                updateOrderReceiveButton();
		            }, 200);
		            setTimeout(function () {
		                refreshOrderTableLayout();
		                updateOrderReceiveButton();
		            }, 450);
		        },
		        onPostBody: function () {
		            refreshOrderTableLayout();
		        },
		        columns: [{
		            checkbox: true
		        },
		        {
		            field: 'orderId',
		            title: '订单ID',
		            visible: false
		        },
		        {
		            field: 'rowIndex',
		            title: '序号',
		            align: 'center',
		            width: 60,
		            formatter: function (value, row, index) {
		                return $.table.serialNumber(index);
		            }
		        },
		        {
		            field: 'orderNo',
		            title: '订单编号',
		            sortable: true,
		            width: 150,
		            formatter: function (value, row) {
		                if (!value) {
		                    return '-';
		                }
		                return '<a href="javascript:void(0)" onclick="viewDetail(\'' + row.orderId + '\')" title="' + escOrderCellAttr(value) + '">' + escOrderCellAttr(value) + '</a>';
		            }
		        },
		        {
		            field: 'hospitalName',
		            title: '医院名称',
		            width: 180,
		            formatter: function (value) {
		                return orderCellEllipsis(value);
		            }
		        },
		        {
		            field: 'supplierName',
		            title: '供应商名称',
		            width: 180,
		            formatter: function (value) {
		                return orderCellEllipsis(value);
		            }
		        },
		        {
		            field: 'orderAmount',
		            title: '订单金额',
		            align: 'center',
		            width: 100,
		            formatter: function (value) {
		                if (value != null && value !== '') {
		                    return '¥' + parseFloat(value).toFixed(2);
		                }
		                return '¥0.00';
		            }
		        },
		        {
		            field: 'warehouse',
		            title: '要货仓库',
		            width: 100,
		            formatter: function (value) {
		                return orderCellEllipsis(value);
		            }
		        },
		        {
		            field: 'orderDate',
		            title: '订单日期',
		            sortable: true,
		            width: 110,
		            formatter: function (value) {
		                return orderCellEllipsis(value);
		            }
		        },
		        {
		        	field: 'orderStatus',
		        	title: '订单状态',
		        	align: 'center',
		        	width: 100,
		        	formatter: function (value, row) {
		        		var statusMap = {
		        			'0': '<span class="label label-warning">待接收</span>',
		        			'1': '<span class="label label-info">已接收</span>',
		        			'2': '<span class="label label-primary">配送中</span>',
		        			'3': '<span class="label label-success">已完成</span>',
		        			'4': '<span class="label label-danger">已作废</span>'
		        		};
		        		return statusMap[row.orderStatus] || '';
		        	}
		        },
		        {
		            field: 'department',
		            title: '申请科室',
		            width: 120,
		            formatter: function (value) {
		                return orderCellEllipsis(value);
		            }
		        },
		        {
		            field: 'orderOperate',
		            title: '操作',
		            align: 'center',
		            width: 160,
		            formatter: function (value, row) {
		                return buildOrderOperateHtml(row);
		            }
		        }]
		    };
		    $.table.init(options);
		    $('#' + orderTableId).on('check.bs.table uncheck.bs.table check-all.bs.table uncheck-all.bs.table load-success.bs.table', function () {
		        setTimeout(updateOrderReceiveButton, 0);
		    });
		}

		function getSelectedOrderRows() {
		    var rows = $('#' + orderTableId).bootstrapTable('getSelections') || [];
		    if (table.options && table.options.rememberSelected) {
		        var remembered = table.rememberSelecteds[orderTableId];
		        if (remembered && remembered.length) {
		            rows = remembered;
		        }
		    }
		    return rows;
		}

		function canReceiveSelectedOrders(rows) {
		    if (!rows || rows.length === 0) {
		        return false;
		    }
		    for (var i = 0; i < rows.length; i++) {
		        if (rows[i].orderStatus !== '0') {
		            return false;
		        }
		    }
		    return true;
		}

		function updateOrderReceiveButton() {
		    var enable = canReceiveSelectedOrders(getSelectedOrderRows());
		    $('#toolbar .order-receive-multiple').toggleClass('disabled', !enable);
		}

		function resetPre() {
			resetDate();
			$("#order-form")[0].reset();
			$.table.search();
		}

		function viewDetail(orderId) {
		    var url = prefix + '/detail/' + orderId;
		    $.modal.openTab("订单详情", url);
		}

		function receiveOrder() {
			var rows = getSelectedOrderRows();
			if (!rows || rows.length === 0) {
				$.modal.msgWarning("请选择要接收的订单");
				return;
			}
			if (!canReceiveSelectedOrders(rows)) {
				$.modal.msgWarning("所选订单中包含已接收或其他不可接收的订单，请仅选择「待接收」订单");
				return;
			}
			var ids = [];
			for (var i = 0; i < rows.length; i++) {
				ids.push(rows[i].orderId);
			}
			$.modal.confirm("确认要接收选中的订单吗？", function() {
				$.operate.post(prefix + "/receive", { "ids": ids.join(",") });
		    });
		}

		function receiveSingleOrder(orderId) {
			$.modal.confirm("确认要接收该订单吗？", function() {
				$.operate.post(prefix + "/receive", { "ids": orderId });
		    });
		}

		function voidOrders() {
			var rows = $('#' + orderTableId).bootstrapTable('getSelections');
			if (!rows || rows.length === 0) {
				$.modal.msgWarning("请至少选择一条记录");
				return;
			}
			for (var i = 0; i < rows.length; i++) {
				var st = rows[i].orderStatus;
				if (st !== '0' && st !== '1') {
					$.modal.msgWarning("所选记录中包含不可作废的订单（仅待接收/已接收可作废），请重新选择");
					return;
				}
			}
			var ids = [];
			for (var j = 0; j < rows.length; j++) {
				ids.push(rows[j].orderId);
			}
			$.modal.confirm("确认作废选中的 " + ids.length + " 条订单？作废后不可再引用生成配送单。", function() {
				$.operate.submit(prefix + "/void", "post", "json", { ids: ids.join() });
			});
		}

		function voidSingleOrder(orderId) {
			$.modal.confirm("确认作废该订单？作废后不可再引用生成配送单。", function() {
				$.operate.submit(prefix + "/void", "post", "json", { ids: orderId });
			});
		}
	</script>
</body>
</html>
