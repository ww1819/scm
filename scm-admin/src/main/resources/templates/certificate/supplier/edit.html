<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('淇敼渚涘簲鍟嗚瘉浠?)" />
	<th:block th:include="include :: bootstrap-fileinput-css" />
</head>
<body>
    <div class="main-content">
        <form id="form-supplier-certificate-edit" class="form-horizontal" enctype="multipart/form-data">
            <input name="certificateId" type="hidden" th:value="${supplierCertificate.certificateId}"/>
            <div id="cert-files-data" th:attr="data-file-ids=${supplierCertificate.certificateFileIds},data-file-urls=${supplierCertificate.certificateFile}" style="display:none"></div>
            <h4 class="form-header h4">鍩烘湰淇℃伅</h4>
            <div class="row">
            	<div class="col-sm-6" th:if="${supplierSelfService}">
                    <div class="form-group">
                        <label class="col-sm-4 control-label is-required">褰撳墠渚涘簲鍟嗭細</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" readonly th:value="${bindSupplierCompanyName}"/>
                            <input type="hidden" name="supplierId" th:value="${bindSupplierId}"/>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6" th:unless="${supplierSelfService}">
                    <div class="form-group">
                        <label class="col-sm-4 control-label is-required">渚涘簲鍟嗭細</label>
                        <div class="col-sm-8">
                            <select name="supplierId" class="form-control" required>
                                <option value="">璇烽€夋嫨渚涘簲鍟?/option>
                                <option th:each="supplier : ${supplierList}"
                                        th:value="${supplier.supplierId}"
                                        th:selected="${supplier.supplierId == supplierCertificate.supplierId}"
                                        th:text="${supplier.companyName}">
                                </option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label is-required">璇佷欢绫诲瀷锛?/label>
                        <div class="col-sm-8">
                            <select name="certificateType" id="certificateType" class="form-control" required>
                                <option value="">璇烽€夋嫨璇佷欢绫诲瀷</option>
                                <option th:each="certType : ${certificateTypeList}"
                                        th:value="${certType.typeName}"
                                        th:selected="${supplierCertificate.certificateType == certType.typeName}"
                                        th:text="${certType.typeName}">
                                </option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">鏄惁闀挎湡锛?/label>
                        <div class="col-sm-8">
                            <select name="certificateName" id="certificateName" class="form-control">
                                <option value="鍚? th:selected="${supplierCertificate.certificateName == null or supplierCertificate.certificateName == '' or supplierCertificate.certificateName == '鍚?}">鍚?/option>
                                <option value="鏄? th:selected="${supplierCertificate.certificateName == '鏄?}">鏄?/option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">璇佷欢缂栧彿锛?/label>
                        <div class="col-sm-8">
                            <input name="certificateNo" placeholder="璇疯緭鍏ヨ瘉浠剁紪鍙? class="form-control" type="text" maxlength="100" th:value="${supplierCertificate.certificateNo}">
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">鍙戣瘉鏃ユ湡锛?/label>
                        <div class="col-sm-8">
                            <input name="issueDate" placeholder="璇疯緭鍏ュ彂璇佹棩鏈? class="form-control" type="date" th:value="${#dates.format(supplierCertificate.issueDate, 'yyyy-MM-dd')}">
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">鏈夋晥鏈熻嚦锛?/label>
                        <div class="col-sm-8">
                            <input name="expireDate" placeholder="璇疯緭鍏ユ湁鏁堟湡鑷? class="form-control" type="date" th:value="${#dates.format(supplierCertificate.expireDate, 'yyyy-MM-dd')}">
                        </div>
                    </div>
                </div>
            </div>
            <h4 class="form-header h4">璇佷欢鍥剧墖</h4>
            <div class="row">
                <div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label">璇佷欢鍥剧墖锛?/label>
                        <div class="col-xs-10">
                            <div class="file-loading">
                                <input id="certificateFile" name="certificateFile" type="file" accept="image/*">
                            </div>
                            <input type="hidden" name="certificateFileIds" id="certificateFileIds" th:value="${supplierCertificate.certificateFileIds}">
                            <input type="hidden" name="certificateFile" id="certificateFileUrl" th:value="${supplierCertificate.certificateFile}">
                            <div th:if="${supplierCertificate.certificateFile != null and supplierCertificate.certificateFile != ''}" style="margin-top: 10px;">
                                <a th:href="${supplierCertificate.certificateFile}" target="_blank" class="btn btn-xs btn-info">
                                    <i class="fa fa-image"></i> 鏌ョ湅褰撳墠鍥剧墖
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <h4 class="form-header h4">鍏朵粬淇℃伅</h4>
            <div class="row">
                <div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label">澶囨敞锛?/label>
                        <div class="col-xs-10">
                            <textarea name="remark" maxlength="500" class="form-control" rows="3" th:text="${supplierCertificate.remark}"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
      
    <div class="row" style="position: fixed; bottom: 0; left: 0; right: 0; background-color: #fff; padding: 15px 20px; border-top: 1px solid #ddd; z-index: 1000; box-shadow: 0 -2px 8px rgba(0,0,0,0.1);">
        <div class="col-sm-offset-5 col-sm-10">
            <button type="button" class="btn btn-sm btn-primary" onclick="submitHandler()"><i class="fa fa-check"></i>淇?瀛?/button>&nbsp;
            <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i>鍏?闂?/button>
        </div>
    </div>
    <div style="height: 70px;"></div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: bootstrap-fileinput-js" />
	<script th:src="@{/js/common/scmCosDownload.js}"></script>
	<script th:src="@{/js/certificate/supplierCertCosUpload.js}"></script>
	<script th:inline="javascript">
	    var prefix = ctx + "certificate/supplier";
	    var certFileHelper;

	    $(function() {
	        $("#certificateName").on('change', function() {
	            var isLongTerm = $(this).val();
	            var $expireDateInput = $("input[name='expireDate']");
	            if (isLongTerm === '鏄?) {
	                $expireDateInput.val('').prop('disabled', true);
	            } else {
	                $expireDateInput.prop('disabled', false);
	            }
	        });
	        var currentIsLongTerm = $("#certificateName").val();
	        if (currentIsLongTerm === '鏄?) {
	            $("input[name='expireDate']").val('').prop('disabled', true);
	        }
	        certFileHelper = initSupplierCertCosUpload({
	            certEditable: true,
	            initialFiles: readCertInitialFilesFromDom('cert-files-data'),
	            legacyFileCsv: (document.getElementById('cert-files-data') || {}).getAttribute('data-file-urls') || ''
	        });
	    });

        $("#form-supplier-certificate-edit").validate({
        	onkeyup: false,
        	rules:{
        		supplierId:{ required: true },
        		certificateType:{ required: true, maxlength: 50 }
        	},
            focusCleanup: true
        });

        function doSubmit() {
	        certFileHelper.updateFileState();
	        var formData = $("#form-supplier-certificate-edit").serializeArray();
	        formData = formData.filter(function(item) {
	            return item.name !== 'certificateFile';
	        });
	        $.operate.saveTab(prefix + "/edit", formData);
	    }

	    function submitHandler() {
	        if ($.validate.form()) {
	            var isLongTerm = $("#certificateName").val();
	            var expireDate = $("input[name='expireDate']").val();
	            if (isLongTerm === '鏄?) {
	                $("input[name='expireDate']").val('');
	            } else if (isLongTerm === '鍚? && (!expireDate || expireDate.trim() === '')) {
	                $.modal.alertWarning("閫夋嫨銆屽惁銆嶆椂锛屽繀椤诲～鍐欐湁鏁堟湡鑷?);
	                return;
	            }
	            certFileHelper.updateFileState();
	            var $fileInput = $("#certificateFile");
	            var filesCount = $fileInput.fileinput('getFilesCount') || 0;
	            if (filesCount > 0 && !$("#certificateFileIds").val()) {
	                setTimeout(function() {
	                    certFileHelper.updateFileState();
	                    if (!$("#certificateFileIds").val()) {
	                        $.modal.alertWarning("璇风瓑寰呭浘鐗囦笂浼犲畬鎴愬悗鍐嶄繚瀛?);
	                        return;
	                    }
	                    doSubmit();
	                }, 500);
	                return;
	            }
	            doSubmit();
	        }
	    }
    </script>
</body>
</html>
