<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" class="cert-upload-root">
<head>
	<th:block th:include="include :: header('上传证照图片')" />
	<th:block th:include="include :: bootstrap-fileinput-css" />
	<style>
		html.cert-upload-root,
		html.cert-upload-root body.cert-upload-body {
			height: 100%;
			margin: 0;
			overflow: hidden;
			box-sizing: border-box;
		}
		body.cert-upload-body {
			display: flex;
			flex-direction: column;
			min-height: 0;
		}
		.cert-upload-body .main-content {
			flex: 1 1 0%;
			min-height: 0;
			overflow: hidden;
			padding-bottom: 0 !important;
			display: flex;
			flex-direction: column;
		}
		#form-cert-upload {
			flex: 1 1 0%;
			min-height: 0;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}
		#form-cert-upload > .form-header.h4 {
			margin-bottom: 6px;
		}
		.cert-section-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			flex-shrink: 0;
			margin: 0 15px 6px;
		}
		.cert-section-header .form-header.h4 {
			margin: 0;
		}
		.cert-section-actions {
			flex-shrink: 0;
			white-space: nowrap;
		}
		.cert-info-panel {
			margin: 0 15px 12px;
			padding: 10px 15px 8px;
			background: #fff;
			border: 1px solid #e7eaec;
			border-radius: 4px;
			flex-shrink: 0;
		}
		.cert-readonly-form .cert-inline-field {
			display: flex;
			align-items: center;
			margin-bottom: 8px;
		}
		.cert-readonly-form .cert-inline-field > label {
			flex-shrink: 0;
			width: 68px;
			text-align: right;
			margin: 0 6px 0 0;
			font-size: 12px;
			font-weight: normal;
			color: #666;
			white-space: nowrap;
		}
		.cert-readonly-form .cert-inline-field > .form-control {
			flex: 0 0 auto;
			width: 118px;
			height: 28px;
			padding: 2px 6px;
			font-size: 12px;
			background-color: #fff;
			border-color: #e5e6e7;
		}
		.cert-readonly-form .cert-inline-field > .form-control.input-wide {
			width: 168px;
		}
		.cert-readonly-form .cert-inline-field > select.form-control {
			flex: 0 0 auto;
			width: 118px;
			height: 28px;
			padding: 2px 6px;
			font-size: 12px;
		}
		.cert-readonly-form .cert-inline-field > select.form-control.input-wide {
			width: 168px;
		}
		.cert-readonly-form .cert-inline-field > .form-control[readonly],
		.cert-readonly-form .cert-inline-field > .form-control:disabled,
		.cert-readonly-form .cert-inline-field > select.form-control:disabled {
			background-color: #fff;
		}
		.cert-audited-tip {
			margin: 0 15px 8px;
			flex-shrink: 0;
		}
		.cert-image-header {
			display: flex;
			align-items: center;
			flex-wrap: wrap;
			gap: 10px;
			margin-bottom: 10px;
			flex-shrink: 0;
		}
		.cert-image-header .cert-image-tip {
			font-size: 12px;
			font-weight: normal;
			color: #e74c3c;
			line-height: 1.4;
		}
		.cert-upload-area .file-preview .fileinput-remove {
			display: none !important;
		}
		.cert-upload-body #scroll-up {
			display: none !important;
		}
		#form-cert-upload > .row {
			flex: 1 1 0%;
			min-height: 0;
			overflow: hidden;
			margin-left: 0;
			margin-right: 0;
		}
		.cert-upload-area {
			padding: 0 15px;
			height: 100%;
			overflow: hidden;
		}
		#form-cert-upload > .row > .col-sm-12 {
			height: 100%;
			padding-left: 0;
			padding-right: 0;
		}
		.cert-upload-area .file-input {
			height: 100%;
		}
		.cert-upload-area .file-preview {
			overflow: hidden;
		}
		.cert-upload-area .file-drop-zone {
			min-height: 120px;
			margin: 0;
			padding: 6px 8px;
		}
		.cert-upload-area .krajee-default.file-preview-frame {
			margin: 4px;
		}
		.cert-upload-area .krajee-default.file-preview-frame .kv-file-content {
			width: 160px;
			height: 100px;
		}
		.cert-upload-area .krajee-default.file-preview-frame .file-thumbnail-footer {
			height: 56px;
		}
		.cert-upload-area .file-preview-image {
			max-height: 100px;
		}
	</style>
</head>
<body class="cert-upload-body">
    <div class="main-content">
        <div th:if="${uploadLoadError != null}" class="alert alert-warning" style="margin: 15px;">
            <i class="fa fa-warning"></i> [[${uploadLoadError}]]
        </div>

        <form id="form-cert-upload" class="form-horizontal" enctype="multipart/form-data" th:if="${supplierCertificate != null}">
            <input type="hidden" name="certificateId" id="certificateId" th:value="${supplierCertificate.certificateId}"/>
            <!-- 用 data 传递图片路径，避免内联 JS 字符串被路径中的引号/反斜杠截断导致整页脚本失效 -->
            <div id="cert-files-data" th:attr="data-file-ids=${supplierCertificate.certificateFileIds},data-file-urls=${supplierCertificate.certificateFile}" style="display:none"></div>

            <div class="cert-section-header" th:if="${supplierCertificate != null}">
                <h4 class="form-header h4">证照信息</h4>
                <div class="cert-section-actions">
                    <button type="button" class="btn btn-sm btn-primary" th:if="${certEditable}" onclick="submitUpload()"><i class="fa fa-check"></i> 保 存</button>
                    <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i> 关 闭</button>
                </div>
            </div>
            <h4 class="form-header h4" th:if="${supplierCertificate == null}">证照信息</h4>
            <div class="alert alert-info cert-audited-tip" th:if="${supplierCertificate != null and !certEditable}">
                <i class="fa fa-info-circle"></i> 该证件已审核，不可修改。
            </div>

            <div class="cert-info-panel cert-readonly-form">
            <div class="row">
                <div class="col-sm-3">
                    <div class="cert-inline-field">
                        <label>供应商</label>
                        <input type="text" class="form-control input-wide" readonly
                               th:title="${(supplierCertificate.supplierName != null and !#strings.isEmpty(supplierCertificate.supplierName)) ? (supplierCertificate.supplierName + '（' + (supplierCertificate.supplierCode != null ? supplierCertificate.supplierCode : '-') + '）') : '-'}"
                               th:value="${(supplierCertificate.supplierName != null and !#strings.isEmpty(supplierCertificate.supplierName)) ? (supplierCertificate.supplierName + '（' + (supplierCertificate.supplierCode != null ? supplierCertificate.supplierCode : '-') + '）') : '-'}">
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="cert-inline-field">
                        <label>证件类型</label>
                        <input type="text" class="form-control input-wide" readonly
                               th:title="${supplierCertificate.certificateType != null ? supplierCertificate.certificateType : '-'}"
                               th:value="${supplierCertificate.certificateType != null ? supplierCertificate.certificateType : '-'}">
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="cert-inline-field">
                        <label>证件编号</label>
                        <input name="certificateNo" id="certificateNo" type="text" class="form-control" maxlength="100"
                               th:readonly="${!certEditable}"
                               th:value="${supplierCertificate.certificateNo != null ? supplierCertificate.certificateNo : ''}">
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="cert-inline-field">
                        <label>长期</label>
                        <select name="certificateName" id="certificateName" class="form-control"
                                th:disabled="${!certEditable}">
                            <option value="否" th:selected="${supplierCertificate.certificateName == null or supplierCertificate.certificateName == '' or supplierCertificate.certificateName == '否'}">否</option>
                            <option value="是" th:selected="${supplierCertificate.certificateName == '是' or supplierCertificate.certificateName == '1'}">是</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-3">
                    <div class="cert-inline-field">
                        <label>审核状态</label>
                        <input type="text" class="form-control" readonly
                               th:value="${supplierCertificate.auditStatus == '1' ? '已审核' : (supplierCertificate.auditStatus == '2' ? '已拒绝' : '待审核')}">
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="cert-inline-field">
                        <label>发证日期</label>
                        <input name="issueDate" type="date" class="form-control"
                               th:readonly="${!certEditable}"
                               th:value="${supplierCertificate.issueDate != null ? #dates.format(supplierCertificate.issueDate, 'yyyy-MM-dd') : ''}">
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="cert-inline-field">
                        <label>有效期至</label>
                        <input name="expireDate" id="expireDate" type="date" class="form-control"
                               th:readonly="${!certEditable}"
                               th:value="${supplierCertificate.expireDate != null ? #dates.format(supplierCertificate.expireDate, 'yyyy-MM-dd') : ''}">
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="cert-inline-field">
                        <label>创建人</label>
                        <input type="text" class="form-control" readonly th:value="${supplierCertificate.createBy != null ? supplierCertificate.createBy : '-'}">
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-3">
                    <div class="cert-inline-field">
                        <label>创建时间</label>
                        <input type="text" class="form-control input-wide" readonly
                               th:value="${supplierCertificate.createTime != null ? #dates.format(supplierCertificate.createTime, 'yyyy-MM-dd HH:mm:ss') : '-'}">
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="cert-inline-field">
                        <label>备注</label>
                        <input name="remark" id="remark" type="text" class="form-control input-wide" maxlength="500"
                               th:readonly="${!certEditable}"
                               th:value="${supplierCertificate.remark != null ? supplierCertificate.remark : ''}">
                    </div>
                </div>
            </div>
            </div>

            <h4 class="form-header h4 cert-image-header">
                证照图片
                <span class="cert-image-tip">单张图片不超过500KB；上传或删除图片后将自动保存；修改证件编号、日期等信息后请点击保存。</span>
            </h4>
            <div class="row">
                <div class="col-sm-12 cert-upload-area">
                    <div class="file-loading">
                        <input id="certificateFile" name="certificateFile" type="file" accept="image/*">
                    </div>
                    <input type="hidden" name="certificateFileIds" id="certificateFileIds" th:value="${supplierCertificate.certificateFileIds}">
                    <input type="hidden" name="certificateFile" id="certificateFileUrl" th:value="${supplierCertificate.certificateFile}">
                </div>
            </div>
        </form>
    </div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: bootstrap-fileinput-js" />
	<script th:src="@{/js/common/scmCosDownload.js}"></script>
	<script th:src="@{/js/certificate/supplierCertCosUpload.js}"></script>
	<script th:inline="javascript" th:if="${supplierCertificate != null}">
	    var prefix = ctx + "certificate/supplier";
	    var certEditable = /*[[${certEditable}]]*/ true;
	    var certFileHelper;
	    var autoSaveInFlight = false;

	    function refreshSiblingListTables() {
	        try {
	            $(window.parent.document).find('iframe.Scm_iframe').each(function () {
	                var w = this.contentWindow;
	                if (w && w.$ && w.$.table && w.table && w.table.options) {
	                    w.$.table.refresh();
	                }
	            });
	        } catch (e) {
	        }
	    }

	    function autoSaveCertFiles() {
	        if (!certEditable || autoSaveInFlight) {
	            return;
	        }
	        certFileHelper.updateFileState();
	        autoSaveInFlight = true;
	        var data = {
	            certificateId: $("#certificateId").val(),
	            certificateFileIds: $("#certificateFileIds").val() || '',
	            certificateFile: $("#certificateFileUrl").val() || '',
	            certificateNo: $("#certificateNo").val() || '',
	            certificateName: $("#certificateName").val() || '否',
	            issueDate: $("input[name='issueDate']").val() || '',
	            expireDate: $("#expireDate").val() || '',
	            remark: $("#remark").val() || ''
	        };
	        $.ajax({
	            url: prefix + "/updateUpload",
	            type: "post",
	            dataType: "json",
	            data: data,
	            beforeSend: function (xhr) {
	                var csrftoken = $('meta[name=csrf-token]').attr('content');
	                if (csrftoken) {
	                    xhr.setRequestHeader("X-CSRF-Token", csrftoken);
	                }
	            },
	            success: function (result) {
	                if (result.code == web_status.SUCCESS) {
	                    refreshSiblingListTables();
	                } else if (result.code == web_status.WARNING) {
	                    $.modal.alertWarning(result.msg);
	                } else {
	                    $.modal.alertError(result.msg || '保存失败');
	                }
	            },
	            complete: function () {
	                autoSaveInFlight = false;
	            }
	        });
	    }

	    $(function() {
	        if (certEditable) {
	            $("#certificateName").on('change', function() {
	                var isLongTerm = $(this).val();
	                var $expireDateInput = $("#expireDate");
	                if (isLongTerm === '是') {
	                    $expireDateInput.val('').prop('readonly', true);
	                } else {
	                    $expireDateInput.prop('readonly', false);
	                }
	            });
	            if ($("#certificateName").val() === '是') {
	                $("#expireDate").val('').prop('readonly', true);
	            }
	        }
	        certFileHelper = initSupplierCertCosUpload({
	            certEditable: certEditable,
	            initialFiles: readCertInitialFilesFromDom('cert-files-data'),
	            legacyFileCsv: (document.getElementById('cert-files-data') || {}).getAttribute('data-file-urls') || '',
	            autoSaveOnChange: autoSaveCertFiles
	        });
	    });

	    function submitUpload() {
	        if (!certEditable) {
	            $.modal.alertWarning("该证件已审核，不可修改");
	            return;
	        }
	        certFileHelper.updateFileState();
	        var $fileInput = $("#certificateFile");
	        var filesCount = $fileInput.fileinput('getFilesCount') || 0;
	        if (filesCount > 0 && !$("#certificateFileIds").val()) {
	            setTimeout(function() {
	                certFileHelper.updateFileState();
	                if (!$("#certificateFileIds").val()) {
	                    $.modal.alertWarning("请等待图片上传完成后再保存");
	                    return;
	                }
	                doPost();
	            }, 500);
	            return;
	        }
	        doPost();
	    }

	    function doPost() {
	        certFileHelper.updateFileState();
	        var data = {
	            certificateId: $("#certificateId").val(),
	            certificateFileIds: $("#certificateFileIds").val() || '',
	            certificateFile: $("#certificateFileUrl").val() || '',
	            certificateNo: $("#certificateNo").val() || '',
	            certificateName: $("#certificateName").val() || '否',
	            issueDate: $("input[name='issueDate']").val() || '',
	            expireDate: $("#expireDate").val() || '',
	            remark: $("#remark").val() || ''
	        };
	        $.operate.saveTab(prefix + "/updateUpload", data);
	    }
	</script>
</body>
</html>
