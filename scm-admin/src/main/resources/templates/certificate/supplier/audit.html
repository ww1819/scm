<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('供应商资质审核')" />
	<th:block th:include="include :: layout-latest-css" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-css" />
	<style>
		/* 左侧供应商表格列不换行（右侧主表样式见 .audit-list-table） */
		#bootstrap-table-supplier td,
		#bootstrap-table-supplier th {
			white-space: nowrap !important;
			overflow: hidden;
			text-overflow: ellipsis;
		}
		
		/* 页面整体布局：顶部搜索 + 下方左右分栏 */
		.audit-page-wrap.container-div {
			--audit-page-gap: 10px;
			height: 100%;
			overflow: hidden;
			padding: 0 var(--audit-page-gap);
			display: flex;
			flex-direction: column;
			box-sizing: border-box;
		}

		body.gray-bg:has(.audit-page-wrap) {
			height: 100%;
			overflow: hidden;
		}

		/* 整个搜索白底容器：与下方分栏同宽 */
		.audit-page-wrap > .audit-search-area.search-collapse {
			flex: 0 0 auto;
			width: 100%;
			max-width: 100%;
			margin: var(--audit-page-gap) 0 0;
			padding: 10px 15px 13px;
			box-sizing: border-box;
			border-radius: 6px;
			float: none;
		}

		.audit-page-row {
			display: flex;
			flex-direction: column;
			flex: 1 1 auto;
			min-height: 0;
			height: auto;
			margin: 0;
			width: 100%;
		}

		.audit-page-row > .audit-split-area {
			padding-left: 0;
			padding-right: 0;
			float: none;
			width: 100%;
		}

		.audit-split-area {
			flex: 1;
			display: flex;
			min-height: 0;
			overflow: hidden;
			margin-top: var(--audit-page-gap);
			padding: 0 0 var(--audit-page-gap);
			width: 100%;
			box-sizing: border-box;
		}

		.audit-left-panel {
			width: 25%;
			flex-shrink: 0;
			border-right: 1px solid #e7eaec;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			background: #fff;
			border-radius: 6px;
			box-shadow: 1px 1px 3px rgba(0,0,0,.2);
			margin-right: 10px;
		}

		.audit-left-panel .audit-left-panel-heading {
			background-color: #3c8dbc;
			border-color: #3c8dbc;
			color: #fff;
			padding: 6px 10px;
			flex-shrink: 0;
			border-radius: 6px 6px 0 0;
		}

		.audit-left-panel .audit-left-panel-heading .panel-title {
			color: #fff;
		}

		.audit-left-panel .audit-left-panel-body {
			padding: 0 5px 5px;
			flex: 1;
			overflow: hidden;
			display: flex;
			flex-direction: column;
			min-height: 0;
		}

		.audit-left-panel .audit-left-table-wrap {
			flex: 1;
			overflow: hidden;
			min-height: 0;
			width: 100%;
			margin-top: 0 !important;
			box-shadow: none;
			border-radius: 0;
			padding-top: 0;
		}

		.audit-left-panel .fixed-table-header {
			position: sticky !important;
			top: 0 !important;
			z-index: 2;
			background: #fff;
		}

		.audit-left-panel .fixed-table-header thead th {
			background-color: #f5f5f5 !important;
			border-bottom: 1px solid #e7eaec !important;
			padding-top: 6px !important;
			padding-bottom: 6px !important;
		}

		.audit-left-panel .fixed-table-container {
			padding-top: 0 !important;
		}

		/* 右侧主表：外层不滚动，仅表格体内部滚动 */
		.audit-right-area {
			--audit-inner-padding: 10px;
			flex: 1;
			min-width: 0;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			min-height: 0;
		}

		.audit-right-area #toolbar {
			flex-shrink: 0;
			padding: 0 var(--audit-inner-padding) 5px;
			margin-bottom: 0;
		}

		.audit-right-area .audit-table-wrap {
			position: relative;
			flex: 1;
			min-height: 200px;
			overflow: hidden !important;
			padding: 0 var(--audit-inner-padding) var(--audit-inner-padding);
			margin-top: 0 !important;
			margin-bottom: 0;
			box-sizing: border-box;
			display: flex;
			flex-direction: column;
		}

		.audit-right-area .audit-table-wrap > .bootstrap-table {
			flex: 1 1 auto;
			min-height: 0;
		}

		.audit-right-area .audit-table-wrap .bootstrap-table {
			display: flex;
			flex-direction: column;
			height: 100%;
			padding-bottom: 0;
		}

		.audit-right-area .audit-table-wrap .fixed-table-toolbar {
			padding-right: 2px;
		}

		.audit-right-area .audit-table-wrap .fixed-table-toolbar .columns,
		.audit-right-area .audit-table-wrap .fixed-table-toolbar .pull-right {
			margin-right: 0;
		}

		.audit-right-area .audit-table-wrap .fixed-table-container {
			flex: 1 1 auto;
			min-height: 0;
			overflow: hidden !important;
			padding-bottom: 0;
		}

		.audit-right-area .audit-table-wrap .fixed-table-body {
			overflow-x: auto !important;
			overflow-y: auto !important;
		}

		.audit-right-area .audit-table-wrap .fixed-table-pagination {
			position: relative;
			flex-shrink: 0;
			left: auto;
			right: auto;
			bottom: auto;
			margin: 0 !important;
		}

		/* 分页栏：记录信息与页码同一行，避免 float 换行 */
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination {
			display: flex;
			flex-wrap: nowrap;
			align-items: center;
			justify-content: space-between;
			gap: 8px;
			padding: 4px 172px 4px 10px;
			border-top: 1px solid #eee;
			background: #fff;
			z-index: 3;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination::after {
			display: none;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination > .pagination-detail,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination > .pagination {
			float: none !important;
			margin-top: 0 !important;
			margin-bottom: 0 !important;
			flex: 0 0 auto;
			white-space: nowrap;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination > .pagination-detail {
			flex: 1 1 auto;
			min-width: 0;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		/* 右侧固定操作列（参考订单查询 / 医院关联审核） */
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-body .fixed-table-border {
			display: none !important;
			height: 0 !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-header {
			position: relative !important;
			top: auto !important;
			z-index: 2;
			background: #fff;
			overflow: hidden;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-columns-right {
			z-index: 5;
			box-shadow: -4px 0 8px rgba(0, 0, 0, 0.08);
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-columns-right .fixed-table-header {
			position: relative !important;
			top: auto !important;
			z-index: 6;
			background: #fff;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header th .th-inner,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header th .sortable {
			text-align: center !important;
			justify-content: center;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header th,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body tbody td {
			box-sizing: border-box;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header th[data-field="auditOperate"],
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="auditOperate"] {
			padding: 0 !important;
			border-left: 0 !important;
			border-right: 0 !important;
			font-size: 0;
			line-height: 0;
			color: transparent;
			overflow: hidden;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header th[data-field="auditOperate"] > *,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="auditOperate"] > * {
			display: none;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-columns-right .fixed-table-header th,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-columns-right .fixed-table-body td {
			background-color: #fff;
			vertical-align: middle;
			white-space: nowrap;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-columns-right .fixed-table-header th[data-field="auditOperate"] {
			background-color: #f5f5f5;
			min-width: 160px;
			width: 160px;
			text-align: center;
			font-size: 14px;
			line-height: normal;
			color: #333;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-columns-right .fixed-table-header th[data-field="auditOperate"] .th-inner {
			text-align: center;
			justify-content: center;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-columns-right .fixed-table-body td[data-field="auditOperate"] {
			min-width: 160px;
			width: 160px;
			padding: 6px 8px;
			text-align: center;
			font-size: 12px;
			line-height: 1.42857143;
			color: inherit;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-columns-right .fixed-table-body td[data-field="auditOperate"] .btn {
			display: inline-block !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-columns-right .fixed-table-body td[data-field="auditOperate"] > * {
			display: inline-block !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table.table-striped .fixed-columns-right .fixed-table-body tbody tr:nth-of-type(odd) td {
			background-color: #f9f9f9;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-columns-right .fixed-table-body {
			overflow-x: hidden !important;
			overflow-y: hidden !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header table,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body > table {
			table-layout: fixed;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-body tbody td {
			white-space: nowrap;
			vertical-align: middle !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="supplierCode"],
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="supplierName"],
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="certificateType"],
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="certificateNo"],
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="expireDate"],
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="contactPerson"],
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="address"] {
			overflow: hidden;
			text-overflow: ellipsis;
		}

		/* 原 audit-right-panel / audit-content-area 双层容器已移除，明细区直接使用 select-table */

		.audit-page-wrap > .audit-search-area.search-collapse {
			padding-top: 10px !important;
			padding-bottom: 10px !important;
		}

		.container-div .audit-search-area .select-list ul {
			margin-bottom: 0;
		}

		.container-div .audit-search-area .select-list li {
			margin: 4px 15px 4px 0;
		}
		
		/* 左侧供应商表格样式 */
		#bootstrap-table-supplier {
			visibility: visible !important;
		}

		#bootstrap-table-supplier + .fixed-table-container {
			visibility: visible !important;
			display: block !important;
		}
		.audit-left-panel .select-table {
			overflow: auto !important;
			visibility: visible !important;
		}

		.audit-left-panel .fixed-table-container {
			height: 100% !important;
			overflow: visible !important;
		}

		.audit-left-panel .fixed-table-body {
			overflow-y: auto !important;
			overflow-x: hidden !important;
		}
	</style>
</head>
<body class="gray-bg">
	<div class="container-div audit-page-wrap">
		<!-- 顶部搜索：整个白底容器独立占满宽度 -->
		<div class="search-collapse audit-search-area">
			<form id="supplier-certificate-form">
				<div class="select-list">
					<ul>
						<li>
							供应商名称：<input type="text" name="supplierName"/>
						</li>
						<li>
							证件类型：<input type="text" name="certificateType"/>
						</li>
						<li>
							状态：
							<select name="auditStatusFilter" id="auditStatusFilter" style="width: 120px; display: inline-block; height: 30px; padding: 5px 10px; border: 1px solid #ddd; border-radius: 4px;">
								<option value="">全部</option>
								<option value="1">已审核</option>
								<option value="0">待审核</option>
							</select>
						</li>
						<li>
							<a class="btn btn-primary btn-rounded btn-sm" onclick="searchAudit()"><i class="fa fa-search"></i>&nbsp;搜索</a>
							<a class="btn btn-warning btn-rounded btn-sm" onclick="resetPre()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
						</li>
					</ul>
				</div>
			</form>
		</div>

		<div class="row audit-page-row">
			<!-- 下方主体：左供应商 + 右明细 -->
			<div class="audit-split-area">
				<!-- 左侧：供应商列表 -->
				<div class="audit-left-panel">
					<div class="panel panel-default" style="margin-bottom: 0; display: flex; flex-direction: column; height: 100%; border: none; box-shadow: none;">
						<div class="panel-heading audit-left-panel-heading">
							<h5 class="panel-title" style="margin: 0; font-size: 14px;">
								<i class="fa fa-building"></i> 供应商
							</h5>
						</div>
						<div class="panel-body audit-left-panel-body">
							<div class="select-table table-striped audit-left-table-wrap">
								<table id="bootstrap-table-supplier" style="width: 100%;"></table>
							</div>
						</div>
					</div>
				</div>

				<!-- 右侧：供应商证件审核列表（工具栏 + 表格，单层 select-table 容器） -->
				<div class="audit-right-area">
			        <div class="btn-group-sm" id="toolbar" role="group">
			            <button type="button" class="btn btn-info single disabled" onclick="auditCertificate()" shiro:hasPermission="certificate:supplier:audit">
			                <i class="fa fa-check"></i> 审核
			            </button>
			        </div>
			        
			        <div class="select-table table-striped audit-table-wrap audit-list-table">
					    <table id="bootstrap-table"></table>
					</div>
					
					<!-- 证件详情（与主表功能重复，暂隐藏）
					<div id="detail-panel">...</div>
					-->
				</div>
				<!--
				原双层父容器（功能重复，已移除）：
				<div class="audit-right-panel">
					<div class="audit-content-area">...</div>
				</div>
				-->
			</div>
		</div>
	</div>
	
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-js" />
	<script th:inline="javascript">
		var prefix = ctx + "certificate/supplier";
		var supplierPrefix = ctx + "supplier/supplier";
		var editFlag = [[${@permission.hasPermi('certificate:supplier:edit')}]];
		var auditFlag = [[${@permission.hasPermi('certificate:supplier:audit')}]];
		var uploadFlag = (editFlag !== 'hidden' || auditFlag !== 'hidden') ? '' : 'hidden';
		var selectedSupplierId = null; // 当前选中的供应商ID
		var allSuppliers = []; // 左侧供应商全量数据（用于搜索过滤）
		var auditTableId = 'bootstrap-table';

		var auditColWidths = {
			auditStatus: 80,
			serialNumber: 60,
			supplierCode: 150,
			supplierName: 200,
			certificateType: 120,
			certificateNo: 150,
			expireDate: 110,
			contactPerson: 120,
			address: 260,
			auditOperate: 160
		};

		$(function() {
		    initLeftSupplierTable();
		    querySupplierCertificateAuditList();
		    
		    $(window).resize(function() {
		        adjustSupplierTableHeight();
		        setTimeout(refreshAuditTableLayout, 100);
		        var $supplierTable = $('#bootstrap-table-supplier');
		        if ($supplierTable.length && $supplierTable.bootstrapTable('getOptions')) {
		            $supplierTable.bootstrapTable('resetView', { height: calculateLeftSupplierTableHeight() });
		        }
		    });
		    
		    setTimeout(function() {
		        adjustSupplierTableHeight();
		    }, 300);
		});
		
		// 计算右侧主表高度（仅表格体滚动，外层容器不滚动）
		function calculateAuditTableHeight() {
		    var $wrap = $('.audit-right-area .audit-table-wrap');
		    if ($wrap.length === 0) {
		        return 400;
		    }
		    var wrapH = $wrap[0].clientHeight;
		    if (!wrapH) {
		        var $contentArea = $('.audit-right-area');
		        var outerToolbarH = $('#toolbar').outerHeight(true) || 40;
		        wrapH = $contentArea.height() - outerToolbarH - 10;
		    }
		    var $bt = $wrap.find('.bootstrap-table');
		    if ($bt.length === 0) {
		        return Math.max(wrapH - 50, 200);
		    }
		    var btToolbarH = $bt.find('.fixed-table-toolbar').outerHeight(true) || 0;
		    var pagH = $bt.find('.fixed-table-pagination').outerHeight(true) || 46;
		    return Math.max(Math.floor(wrapH - btToolbarH - pagH - 2), 200);
		}
		
		// 调整供应商证件表格高度
		function adjustSupplierTableHeight() {
		    var $table = $('#bootstrap-table');
		    if ($table.length === 0 || !$table.bootstrapTable('getOptions')) {
		        return;
		    }
		    $table.bootstrapTable('resetView', {
		        height: calculateAuditTableHeight()
		    });
		    refreshAuditTableLayout();
		}

		function syncAuditOperateColumnContent() {
		    var $bt = $('#' + auditTableId).closest('.bootstrap-table');
		    var $rightWrap = $bt.find('.fixed-columns-right');
		    if ($rightWrap.length === 0) {
		        return;
		    }
		    var $container = $bt.find('.fixed-table-container').first();
		    var $mainHeader = $container.children('.fixed-table-header');
		    var $mainBody = $container.children('.fixed-table-body');
		    var $rightHeader = $rightWrap.find('.fixed-table-header');
		    var $rightBody = $rightWrap.find('.fixed-table-body');
		    var $mainHeadInner = $mainHeader.find('th[data-field="auditOperate"] .th-inner');
		    var $rightHeadInner = $rightHeader.find('th[data-field="auditOperate"] .th-inner');
		    if ($mainHeadInner.length && $rightHeadInner.length) {
		        $rightHeadInner.html($mainHeadInner.html());
		    }
		    $mainBody.find('tbody tr').each(function (rowIdx) {
		        var html = $(this).find('td[data-field="auditOperate"]').html();
		        var $rightCell = $rightBody.find('tbody tr').eq(rowIdx).find('td[data-field="auditOperate"]');
		        if (html && $rightCell.length) {
		            $rightCell.html(html);
		        }
		    });
		}

		function syncAuditOperateColumnScroll() {
		    var $bt = $('#' + auditTableId).closest('.bootstrap-table');
		    var $rightBody = $bt.find('.fixed-columns-right .fixed-table-body');
		    if ($rightBody.length === 0) {
		        return;
		    }
		    var $mainBody = $bt.find('.fixed-table-container').children('.fixed-table-body');
		    $mainBody.off('scroll.auditOperateSync').on('scroll.auditOperateSync', function () {
		        $rightBody.scrollTop($mainBody.scrollTop());
		    });
		}

		function getAuditTableTotalWidth() {
		    var sum = 0;
		    var opt = $('#' + auditTableId).bootstrapTable('getOptions');
		    if (opt && opt.columns && opt.columns[0]) {
		        $.each(opt.columns[0], function (_, col) {
		            if (!col || col.visible === false) {
		                return;
		            }
		            if (col.checkbox) {
		                sum += 42;
		            } else if (col.field && auditColWidths[col.field] != null) {
		                sum += auditColWidths[col.field];
		            } else if (col.width) {
		                sum += parseInt(col.width, 10) || 0;
		            } else {
		                sum += 100;
		            }
		        });
		    }
		    return Math.max(sum, 1200);
		}

		function applyAuditFieldColumnWidth(field, widthPx) {
		    var w = widthPx + 'px';
		    var $container = $('#' + auditTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
		    var $mainHeader = $container.children('.fixed-table-header');
		    var $mainBody = $container.children('.fixed-table-body');
		    var $th = $mainHeader.find('th[data-field="' + field + '"]');
		    if ($th.length === 0) {
		        return;
		    }
		    var colIdx = $th[0].cellIndex;
		    var setW = function (el) {
		        el.style.setProperty('width', w, 'important');
		        el.style.setProperty('min-width', w, 'important');
		        el.style.setProperty('max-width', w, 'important');
		    };
		    $th.each(function () { setW(this); });
		    $mainBody.find('table tbody tr').each(function () {
		        var cell = this.cells[colIdx];
		        if (cell) {
		            setW(cell);
		        }
		    });
		    $mainHeader.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
		    $mainBody.find('table colgroup col').eq(colIdx).each(function () { setW(this); });
		}

		function syncAuditHeaderBodyColumnWidths() {
		    var $container = $('#' + auditTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
		    var $mainHeader = $container.children('.fixed-table-header');
		    var $mainBody = $container.children('.fixed-table-body');
		    var $headerThs = $mainHeader.find('thead tr').first().children('th');
		    var $firstRow = $mainBody.find('tbody tr').first();
		    if ($firstRow.length === 0) {
		        return;
		    }
		    var setW = function (el, widthVal) {
		        el.style.setProperty('width', widthVal, 'important');
		        el.style.setProperty('min-width', widthVal, 'important');
		        el.style.setProperty('max-width', widthVal, 'important');
		    };
		    $headerThs.each(function (i) {
		        var bodyCell = $firstRow[0].cells[i];
		        if (!bodyCell) {
		            return;
		        }
		        var w = bodyCell.style.width;
		        if (!w) {
		            w = window.getComputedStyle(bodyCell).width;
		        }
		        if (w) {
		            setW(this, w);
		            $mainHeader.find('colgroup col').eq(i).each(function () { setW(this, w); });
		            $mainBody.find('colgroup col').eq(i).each(function () { setW(this, w); });
		        }
		    });
		}

		    requestAnimationFrame(function () {

		// 预览证件图片（支持多图片切换）
		function previewCertificateImage(imageUrls) {
		    function escapeHtml(text) {
		        var map = {
		            '&': '&amp;',
		            '<': '&lt;',
		            '>': '&gt;',
		            '"': '&quot;',
		            "'": '&#039;'
		        };
		        return text.replace(/[&<>"']/g, function(m) { return map[m]; });
		    }
		    
		    var urlArray = [];
		    if (imageUrls && imageUrls.trim() !== '') {
		        var urls = imageUrls.split(',');
		        for (var i = 0; i < urls.length; i++) {
		            var url = urls[i].trim();
		            if (url) {
		                if (url.indexOf('http://') === 0 || url.indexOf('https://') === 0) {
		                    urlArray.push(url);
		                } else if (url.indexOf('/') === 0) {
		                    urlArray.push(ctx + url.substring(1));
		                } else {
		                    urlArray.push(ctx + url);
		                }
		            }
		        }
		    }
		    
		    if (urlArray.length === 0) {
		        $.modal.alertWarning("没有可预览的图片");
		        return;
		    }
		    
		    var currentIndex = 0;
		    
		    function buildPreviewContent() {
		        var currentUrl = escapeHtml(urlArray[currentIndex]);
		        var html = '<div style="text-align: center; padding: 20px; overflow: auto; height: 100%; position: relative;">';
		        if (urlArray.length > 1) {
		            html += '<div style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 5px 15px; border-radius: 15px; z-index: 1000; font-size: 14px;">';
		            html += '第 ' + (currentIndex + 1) + ' 张 / 共 ' + urlArray.length + ' 张';
		            html += '</div>';
		            if (currentIndex > 0) {
		                html += '<button id="prev-image-btn" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.7); color: white; border: none; padding: 15px 20px; border-radius: 5px; cursor: pointer; font-size: 18px; z-index: 1000;">‹</button>';
		            }
		            if (currentIndex < urlArray.length - 1) {
		                html += '<button id="next-image-btn" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.7); color: white; border: none; padding: 15px 20px; border-radius: 5px; cursor: pointer; font-size: 18px; z-index: 1000;">›</button>';
		            }
		        }
		        html += '<img id="preview-image" src="' + currentUrl + '" style="max-width: 100%; max-height: calc(100% - 40px); cursor: pointer; margin-top: 30px;" ';
		        html += 'onclick="var img = this; if(img.style.maxWidth === \'none\') { img.style.maxWidth=\'100%\'; img.style.maxHeight=\'calc(100% - 40px)\'; } else { img.style.maxWidth=\'none\'; img.style.maxHeight=\'none\'; }" ';
		        html += 'onerror="this.onerror=null; this.src=\'' + ctx + 'img/error.png\';" />';
		        html += '</div>';
		        return html;
		    }
		    
		    if (typeof layer !== 'undefined') {
		        layer.open({
		            type: 1,
		            title: '证件图片预览' + (urlArray.length > 1 ? '（' + urlArray.length + '张）' : ''),
		            shadeClose: true,
		            shade: 0.8,
		            area: ['90%', '90%'],
		            content: buildPreviewContent(),
		            success: function(layero, index) {
		                function updatePreview() {
		                    layero.find('.layui-layer-content').html(buildPreviewContent());
		                    bindButtonEvents();
		                }
		                function bindButtonEvents() {
		                    layero.find('#prev-image-btn').off('click').on('click', function() {
		                        if (currentIndex > 0) {
		                            currentIndex--;
		                            updatePreview();
		                        }
		                    });
		                    layero.find('#next-image-btn').off('click').on('click', function() {
		                        if (currentIndex < urlArray.length - 1) {
		                            currentIndex++;
		                            updatePreview();
		                        }
		                    });
		                }
		                if (urlArray.length > 1) {
		                    bindButtonEvents();
		                    $(document).on('keydown.preview', function(e) {
		                        if (e.keyCode === 37 && currentIndex > 0) {
		                            currentIndex--;
		                            updatePreview();
		                        } else if (e.keyCode === 39 && currentIndex < urlArray.length - 1) {
		                            currentIndex++;
		                            updatePreview();
		                        }
		                    });
		                }
		            },
		            end: function() {
		                $(document).off('keydown.preview');
		            }
		        });
		    } else {
		        window.open(urlArray[0], '_blank');
		    }
		}

			if (!keyword) {

			var lowerKeyword = keyword.toLowerCase();
			return (suppliers || []).filter(function(row) {
				var code = (row.supplierCode || '').toLowerCase();
				var name = (row.companyName || '').toLowerCase();
				return code.indexOf(lowerKeyword) !== -1 || name.indexOf(lowerKeyword) !== -1;
			});
		}

		            });
		            
		            if (checkedIndexes.length > 0) {
		                selections = allData.filter(function(row, idx) {
		                    return checkedIndexes.indexOf(idx) !== -1;
		                });
		                console.log("通过索引找到的选中行:", selections);
		            }
		        }
		    }
		    
		    if (!selections || selections.length === 0) {
		        $.modal.alertWarning("请选择一条记录");
		        return;
		    }
		    
		    if (selections.length > 1) {
		        $.modal.alertWarning("请只选择一条记录");
		        return;
		    }
		    
		    var row = selections[0];
		    var certificateId = row.certificateId;
		    console.log("证件ID:", certificateId);
		    
		    if (!certificateId) {
		        console.error("无法获取证件ID，行数据:", row);
		        $.modal.alertError("无法获取证件ID");
		        return;
		    }
		    
		    // 弹出审核对话框
		    showAuditDialog(certificateId, row);
		}
		
		// 显示审核对话框
		function showAuditDialog(certificateId, row) {
		    var supplierName = row.supplierName || '未知供应商';
		    
		    // 创建审核对话框HTML
		    var dialogHtml = '<div style="padding: 20px;">' +
		        '<div class="form-group">' +
		        '<label>供应商：</label>' +
		        '<input type="text" class="form-control" value="' + supplierName + '" readonly style="margin-bottom: 10px;">' +
		        '</div>' +
		        '<div class="form-group">' +
		        '<label>审核状态：<span style="color: red;">*</span></label>' +
		        '<select id="audit-status-select" class="form-control" style="margin-bottom: 10px;">' +
		        '<option value="1">已审核</option>' +
		        '<option value="2">已拒绝</option>' +
		        '</select>' +
		        '</div>' +
		        '<div class="form-group">' +
		        '<label>审核备注：</label>' +
		        '<textarea id="audit-remark-textarea" class="form-control" rows="3" placeholder="请输入审核备注（可选）" maxlength="500"></textarea>' +
		        '</div>' +
		        '</div>';
		    
		    layer.open({
		        type: 1,
		        title: '审核供应商证件',
		        area: ['500px', '350px'],
		        content: dialogHtml,
		        btn: ['确定', '取消'],
		        yes: function(index, layero) {
		            var auditStatus = $('#audit-status-select').val();
		            var auditRemark = $('#audit-remark-textarea').val();
		            
		            if (!auditStatus) {
		                $.modal.alertWarning("请选择审核状态");
		                return false; // 阻止关闭弹窗
		            }
		            
		            // 执行审核
		            doAudit(certificateId, auditStatus, auditRemark, index);
		        },
		        btn2: function(index) {
		            layer.close(index);
		        }
		    });
		}
		
		// 执行审核
		function doAudit(certificateId, auditStatus, auditRemark, layerIndex) {
		    console.log("执行审核，参数:", {
		        certificateId: certificateId,
		        auditStatus: auditStatus,
		        auditRemark: auditRemark
		    });
		    
		    $.ajax({
		        url: prefix + "/audit",
		        type: "POST",
		        data: {
		            certificateId: certificateId,
		            auditStatus: auditStatus,
		            auditRemark: auditRemark || ''
		        },
		        success: function(result) {
		            console.log("审核接口返回结果:", result);
		            if (result.code == 0) {
		                // 关闭弹窗
		                if (layerIndex !== undefined) {
		                    layer.close(layerIndex);
		                }
		                $.modal.msgSuccess("审核成功");
		                // 刷新表格（延迟一下，确保数据库已更新）
		                setTimeout(function() {
		                    $('#bootstrap-table').bootstrapTable('refresh');
		                }, 500);
		            } else {
		                $.modal.alertError(result.msg || "审核失败");
		            }
		        },
		        error: function(xhr, status, error) {
		            console.error("审核失败:", error, xhr.responseText);
		            var errorMsg = "审核失败";
		            if (xhr.responseJSON && xhr.responseJSON.msg) {
		                errorMsg = xhr.responseJSON.msg;
		            } else if (xhr.responseText) {
		                errorMsg = xhr.responseText;
		            }
		            $.modal.alertError(errorMsg);
		        }
		    });
		}
		
		// 更新工具栏状态
		function updateToolbarState() {
		    var $table = $('#bootstrap-table');
		    if ($table.length === 0) {
		        return;
		    }
		    
		    // 尝试多种方式获取选中行
		    var selections = $table.bootstrapTable('getSelections');
		    
		    // 如果getSelections为空，尝试通过复选框获取
		    if (!selections || selections.length === 0) {
		        var checkedCount = $table.find('tbody input[type="checkbox"]:checked').length;
		        console.log("通过复选框找到的选中数:", checkedCount);
		        
		        if (checkedCount === 1) {
		            // 如果只有一个复选框被选中，尝试从表格数据中获取
		            var allData = $table.bootstrapTable('getData');
		            var checkedIndex = $table.find('tbody input[type="checkbox"]:checked').closest('tr').first().data('index');
		            if (checkedIndex !== undefined && allData[checkedIndex]) {
		                selections = [allData[checkedIndex]];
		            }
		        }
		    }
		    
		    console.log("更新工具栏状态，选中行数:", selections ? selections.length : 0);
		    
		    var $auditBtn = $('.single');
		    if (selections && selections.length === 1) {
		        $auditBtn.removeClass('disabled').prop('disabled', false);
		        console.log("启用审核按钮");
		    } else {
		        $auditBtn.addClass('disabled').prop('disabled', true);
		        console.log("禁用审核按钮");
		    }
		}
		
	</script>
</body>
</html>
