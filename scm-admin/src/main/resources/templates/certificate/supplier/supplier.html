							<i class="fa fa-plus"></i> 新增

						<a class="btn btn-primary single disabled" onclick="handleEditCertificate()" shiro:hasPermission="certificate:supplier:edit">
							<i class="fa fa-edit"></i> 修改
						</a>

	<script th:inline="javascript">
		var editFlag = [[${@permission.hasPermi('certificate:supplier:edit')}]];
		var removeFlag = [[${@permission.hasPermi('certificate:supplier:remove')}]];
		var prefix = ctx + "certificate/supplier";
		var supplierSelfService = /*[[${supplierSelfService}]]*/ false;
		var bindSupplierId = /*[[${bindSupplierId}]]*/ null;
		var selectedHospitalId = null;
		var ensuredHospitalMap = {};
		var allHospitals = [];
		var certTableId = 'bootstrap-table';

		var regColWidths = {
			serialNumber: 60,
			supplierName: 190,
			certificateType: 160,
			certificateNo: 140,
			expireDate: 110,
			certificateName: 90,
			auditStatus: 90,
			createBy: 100,
			uploadedFlag: 70,
			certOperate: 160
		};

		$(function() {
			initLeftHospitalTable();
			querySupplierCertificateList();
			updateAddButtonState();

			$(window).resize(function() {
				adjustCertTableHeight();
				setTimeout(refreshCertTableLayout, 100);
				var $hospitalTable = $('#bootstrap-table-hospital');
				if ($hospitalTable.length && $hospitalTable.bootstrapTable('getOptions')) {
					$hospitalTable.bootstrapTable('resetView', { height: calculateLeftHospitalTableHeight() });
				}
			});

			setTimeout(function() {
				adjustCertTableHeight();
			}, 300);
		});

		function formatDate(value, format) {
			if (!value) return '-';
			if (typeof value === 'string') {
				if (value.indexOf('-') > -1) {
					if (format === 'yyyy-MM-dd HH:mm:ss') {
						return value.length <= 10 ? value + ' 00:00:00' : value;
					}
					return value.split(' ')[0];
				}
			}
			if (typeof $.common !== 'undefined' && typeof $.common.dateFormat === 'function') {
				var formatted = $.common.dateFormat(value, format || 'yyyy-MM-dd');
				return formatted || '-';
			}
			try {
				var date = new Date(value);
				if (isNaN(date.getTime())) return '-';
				var year = date.getFullYear();
				var month = String(date.getMonth() + 1).padStart(2, '0');
				var day = String(date.getDate()).padStart(2, '0');
				if (format === 'yyyy-MM-dd HH:mm:ss') {
					var hours = String(date.getHours()).padStart(2, '0');
					var minutes = String(date.getMinutes()).padStart(2, '0');
					var seconds = String(date.getSeconds()).padStart(2, '0');
					return year + '-' + month + '-' + day + ' ' + hours + ':' + minutes + ':' + seconds;
				}
				return year + '-' + month + '-' + day;
			} catch (e) {
				return '-';
			}
		}

		function calculateCertTableHeight() {
			var $wrap = $('.audit-right-area .audit-table-wrap');
			if ($wrap.length === 0) {
				return 400;
			}
			var wrapH = $wrap[0].clientHeight;
			if (!wrapH) {
				var outerToolbarH = $('#toolbar').outerHeight(true) || 40;
				wrapH = $('.audit-right-area').height() - outerToolbarH - 10;
			}
			var $bt = $wrap.find('.bootstrap-table');
			if ($bt.length === 0) {
				return Math.max(wrapH - 50, 200);
			}
			var btToolbarH = $bt.find('.fixed-table-toolbar').outerHeight(true) || 0;
			var pagH = $bt.find('.fixed-table-pagination').outerHeight(true) || 46;
			return Math.max(Math.floor(wrapH - btToolbarH - pagH - 2), 200);
		}

		function adjustCertTableHeight() {
			var $table = $('#' + certTableId);
			if ($table.length === 0 || !$table.bootstrapTable('getOptions')) {
				return;
			}
			$table.bootstrapTable('resetView', { height: calculateCertTableHeight() });
			refreshCertTableLayout();
		}

		function calculateLeftHospitalTableHeight() {
			var $leftPanel = $('.audit-left-panel');
			if ($leftPanel.length === 0) {
				return 400;
			}
			var panelHeaderHeight = $leftPanel.find('.audit-left-panel-heading').outerHeight(true) || 35;
			var bodyPadding = 10;
			var height = $leftPanel.height() - panelHeaderHeight - bodyPadding - 20;
			return height > 100 ? height : 100;
		}

		function syncCertOperateColumnContent() {
			var $bt = $('#' + certTableId).closest('.bootstrap-table');
			var $rightWrap = $bt.find('.fixed-columns-right');
			if ($rightWrap.length === 0) {
				return;
			}
			var $container = $bt.find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $rightHeader = $rightWrap.find('.fixed-table-header');
			var $rightBody = $rightWrap.find('.fixed-table-body');
			var $mainHeadInner = $mainHeader.find('th[data-field="certOperate"] .th-inner');
			var $rightHeadInner = $rightHeader.find('th[data-field="certOperate"] .th-inner');
			if ($mainHeadInner.length && $rightHeadInner.length) {
				$rightHeadInner.html($mainHeadInner.html());
			}
			$mainBody.find('tbody tr').each(function(rowIdx) {
				var html = $(this).find('td[data-field="certOperate"]').html();
				var $rightCell = $rightBody.find('tbody tr').eq(rowIdx).find('td[data-field="certOperate"]');
				if (html && $rightCell.length) {
					$rightCell.html(html);
				}
			});
		}

		function syncCertOperateColumnScroll() {
			var $bt = $('#' + certTableId).closest('.bootstrap-table');
			var $rightBody = $bt.find('.fixed-columns-right .fixed-table-body');
			if ($rightBody.length === 0) {
				return;
			}
			var $mainBody = $bt.find('.fixed-table-container').children('.fixed-table-body');
			$mainBody.off('scroll.certOperateSync').on('scroll.certOperateSync', function() {
				$rightBody.scrollTop($mainBody.scrollTop());
			});
		}

		function getCertTableTotalWidth() {
			var sum = 0;
			var opt = $('#' + certTableId).bootstrapTable('getOptions');
			if (opt && opt.columns && opt.columns[0]) {
				$.each(opt.columns[0], function(_, col) {
					if (!col || col.visible === false) {
						return;
					}
					if (col.checkbox) {
						sum += 42;
					} else if (col.field && regColWidths[col.field] != null) {
						sum += regColWidths[col.field];
					} else if (col.width) {
						sum += parseInt(col.width, 10) || 0;
					} else {
						sum += 100;
					}
				});
			}
			return Math.max(sum, 1000);
		}

		function applyCertFieldColumnWidth(field, widthPx) {
			var w = widthPx + 'px';
			var $container = $('#' + certTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $th = $mainHeader.find('th[data-field="' + field + '"]');
			if ($th.length === 0) {
				return;
			}
			var colIdx = $th[0].cellIndex;
			var setW = function(el) {
				el.style.setProperty('width', w, 'important');
				el.style.setProperty('min-width', w, 'important');
				el.style.setProperty('max-width', w, 'important');
			};
			$th.each(function() { setW(this); });
			$mainBody.find('table tbody tr').each(function() {
				var cell = this.cells[colIdx];
				if (cell) {
					setW(cell);
				}
			});
			$mainHeader.find('table colgroup col').eq(colIdx).each(function() { setW(this); });
			$mainBody.find('table colgroup col').eq(colIdx).each(function() { setW(this); });
		}

		function syncCertHeaderBodyColumnWidths() {
			var $container = $('#' + certTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainHeader = $container.children('.fixed-table-header');
			var $mainBody = $container.children('.fixed-table-body');
			var $headerThs = $mainHeader.find('thead tr').first().children('th');
			var $firstRow = $mainBody.find('tbody tr').first();
			if ($firstRow.length === 0) {
				return;
			}
			var setW = function(el, widthVal) {
				el.style.setProperty('width', widthVal, 'important');
				el.style.setProperty('min-width', widthVal, 'important');
				el.style.setProperty('max-width', widthVal, 'important');
			};
			$headerThs.each(function(i) {
				var bodyCell = $firstRow[0].cells[i];
				if (!bodyCell) {
					return;
				}
				var w = bodyCell.style.width;
				if (!w) {
					w = window.getComputedStyle(bodyCell).width;
				}
				if (w) {
					setW(this, w);
					$mainHeader.find('colgroup col').eq(i).each(function() { setW(this, w); });
					$mainBody.find('colgroup col').eq(i).each(function() { setW(this, w); });
				}
			});
		}

		function scheduleCertColumnWidths() {
			$.each(regColWidths, function(field, width) {
				applyCertFieldColumnWidth(field, width);
			});
			syncCertHeaderBodyColumnWidths();
			requestAnimationFrame(function() {
				$.each(regColWidths, function(field, width) {
					applyCertFieldColumnWidth(field, width);
				});
				syncCertHeaderBodyColumnWidths();
			});
		}

		function fixCertTableHeaderAlign() {
			var $bt = $('#' + certTableId).closest('.bootstrap-table');
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			if (!$mainBody.length || !$mainHeader.length) {
				return;
			}
			var scrollW = $mainBody[0].offsetWidth - $mainBody[0].clientWidth;
			$mainHeader.css('margin-right', scrollW > 0 ? (scrollW + 'px') : '');
		}

		function syncCertHeaderBodyScrollLeft() {
			var $container = $('#' + certTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			if ($mainBody.length && $mainHeader.length) {
				$mainHeader.scrollLeft($mainBody[0].scrollLeft);
			}
		}

		function bindCertMainHorizontalScroll() {
			var $bt = $('#' + certTableId).closest('.bootstrap-table');
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			$mainBody.off('scroll.certMainH').on('scroll.certMainH', function() {
				$mainHeader.scrollLeft($mainBody.scrollLeft());
			});
		}

		function applyCertMainTableMinWidth() {
			var sum = getCertTableTotalWidth();
			var w = sum + 'px';
			var $container = $('#' + certTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $headerTable = $container.children('.fixed-table-header').find('table');
			var $bodyTable = $container.children('.fixed-table-body').children('table');
			$headerTable.css({ width: w, minWidth: w, maxWidth: w });
			$bodyTable.css({ width: w, minWidth: w, maxWidth: w });
		}

		function refreshCertTableLayout() {
			fixCertTableHeaderAlign();
			scheduleCertColumnWidths();
			applyCertMainTableMinWidth();
			syncCertHeaderBodyScrollLeft();
			bindCertMainHorizontalScroll();
			syncCertOperateColumnScroll();
			syncCertOperateColumnContent();
		}

		function buildCertOperateHtml(row) {
			var actions = [];
			var cid = row.certificateId;
			cacheCertRowFiles(cid, row.certificateFile || '', row.certificateFileIds || '');
			var hasFile = (row.certificateFile && row.certificateFile.trim() !== '')
				|| (row.certificateFileIds && row.certificateFileIds.trim() !== '');
			if (hasFile) {
				actions.push('<a class="btn btn-info btn-xs" href="javascript:void(0)" onclick="previewCertById(' + cid + ')" title="预览证件图片"><i class="fa fa-eye"></i> 预览</a>');
			}
			if (editFlag !== 'hidden') {
				actions.push(' <a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="openUploadImagesTab(' + cid + ')" title="上传或删除证照图片"><i class="fa fa-cloud-upload"></i> 上传</a>');
			}
			return actions.join('');
		}

		function querySupplierCertificateList() {
			var options = {
				url: prefix + "/list",
				formId: "supplier-certificate-form",
				createUrl: prefix + "/add",
				updateUrl: prefix + "/edit/{id}",
				removeUrl: prefix + "/remove",
				exportUrl: prefix + "/export",
				sortName: "expireDate",
				sortOrder: "asc",
				modalName: "供应商证件",
				uniqueId: "certificateId",
				rememberSelected: true,
				maintainSelected: true,
				firstLoad: false,
				pageSize: 10,
				pageList: [10, 25, 50, 100],
				height: calculateCertTableHeight(),
				mobileResponsive: false,
				fixedColumns: true,
				fixedNumber: 0,
				fixedRightNumber: 1,
				queryParams: function(params) {
					var curParams = $.table.queryParams(params);
					if (supplierSelfService && bindSupplierId != null) {
						curParams.supplierIds = String(bindSupplierId);
					}
					var supplierName = $.common.trim(curParams.supplierName || '');
					if (selectedHospitalId) {
						curParams.hospitalId = selectedHospitalId;
						if (!supplierName && !ensuredHospitalMap[selectedHospitalId]) {
							curParams.ensureMissing = '1';
						}
					}
					return curParams;
				},
				onLoadSuccess: function() {
					if (selectedHospitalId) {
						ensuredHospitalMap[selectedHospitalId] = true;
					}
					setTimeout(function() {
						adjustCertTableHeight();
						refreshCertTableLayout();
					}, 50);
					setTimeout(function() {
						adjustCertTableHeight();
						refreshCertTableLayout();
					}, 200);
					setTimeout(refreshCertTableLayout, 450);
				},
				onPostBody: function() {
					refreshCertTableLayout();
				},
				onLoadError: function() {
				},
				columns: [{
					checkbox: true
				},
				{
					field: 'uploadedFlag',
					title: '上传',
					align: 'center',
					width: 70,
					formatter: function(value, row, index) {
						if ((row.certificateFile && row.certificateFile.trim() !== '')
							|| (row.certificateFileIds && row.certificateFileIds.trim() !== '')) {
							return '<span class="label label-success">是</span>';
						}
						return '<span class="label label-default">否</span>';
					}
				},
				{
					field: 'serialNumber',
					title: '序号',
					align: 'center',
					width: 60,
					formatter: function(value, row, index) {
						return $.table.serialNumber(index);
					}
				},
				{
					field: 'certificateId',
					title: '证件ID',
					visible: false
				},
				{
					field: 'supplierId',
					title: '供应商ID',
					visible: false
				},
				{
					field: 'supplierName',
					title: '供应商',
					align: 'left',
					width: 190,
					sortable: true,
					formatter: function(value, row, index) {
						if (!value) {
							return '-';
						}
						var cid = row.certificateId;
						var text = value.length > 12 ? value.substring(0, 12) + '...' : value;
						var title = (value || '').replace(/"/g, '&quot;');
						return '<span class="cert-supplier-dblview" style="cursor:pointer;color:#337ab7;" '
							+ 'ondblclick="viewCertDetail(' + cid + ');return false;" '
							+ 'title="' + title + '（双击查看明细）">' + text + '</span>';
					}
				},
				{
					field: 'certificateType',
					title: '证件类型',
					align: 'left',
					width: 160,
					sortable: true,
					formatter: function(value, row, index) {
						if (!value) {
							return '-';
						}
						return $.table.tooltip(value, 10);
					}
				},
				{
					field: 'certificateNo',
					title: '证件编码',
					align: 'left',
					width: 140,
					sortable: true,
					formatter: function(value, row, index) {
						if (!value) {
							return '-';
						}
						return $.table.tooltip(value, 12);
					}
				},
				{
					field: 'expireDate',
					title: '有效期',
					align: 'center',
					width: 110,
					sortable: true,
					formatter: function(value, row, index) {
						return formatDate(value, 'yyyy-MM-dd');
					}
				},
				{
					field: 'certificateName',
					title: '长期',
					align: 'center',
					width: 90,
					formatter: function(value, row, index) {
						if (value === '是' || value === '1') {
							return '<span class="label label-info">是</span>';
						}
						return '<span class="label label-default">否</span>';
					}
				},
				{
					field: 'auditStatus',
					title: '审核状态',
					align: 'center',
					width: 90,
					formatter: function(value, row, index) {
						if (row.auditStatus == '1') {
							return '<span class="label label-success">已审核</span>';
						}
						return '<span class="label label-warning">未审核</span>';
					}
				},
				{
					field: 'createBy',
					title: '创建人',
					align: 'center',
					width: 100,
					formatter: function(value, row, index) {
						return value || '-';
					}
				},
				{
					field: 'certOperate',
					title: '操作',
					align: 'center',
					width: 160,
					formatter: function(value, row, index) {
						return buildCertOperateHtml(row);
					}
				}]
			};
			$.table.init(options);
			setTimeout(function() {
				adjustCertTableHeight();
				refreshCertTableLayout();
			}, 500);
		}

		function updateAddButtonState() {
			var $btn = $('#btn-cert-add');
			if ($btn.length === 0) {
				return;
			}
			if (selectedHospitalId && allHospitals.length > 0) {
				$btn.removeClass('disabled');
			} else {
				$btn.addClass('disabled');
			}
		}

		function resetPre() {
			$("#supplier-certificate-form")[0].reset();
			selectedHospitalId = null;
			ensuredHospitalMap = {};
			updateHospitalTable(allHospitals);
			$('#' + certTableId).bootstrapTable('removeAll');
			updateAddButtonState();
		}

		function searchCertList() {
			$.table.search('supplier-certificate-form', certTableId);
		}

		/** 表格初始化完成后触发首次加载（供应商自助且无关联医院时需主动查一次） */
		function triggerInitialCertLoad() {
			var $t = $('#' + certTableId);
			if ($t.length === 0 || !$t.bootstrapTable('getOptions')) {
				setTimeout(triggerInitialCertLoad, 100);
				return;
			}
			if (selectedHospitalId) {
				$t.bootstrapTable('refresh');
			} else if (supplierSelfService && bindSupplierId != null) {
				searchCertList();
			}
		}

		function initLeftHospitalTable() {
			var $table = $('#bootstrap-table-hospital');
			if ($table.length === 0) {
				setTimeout(initLeftHospitalTable, 300);
				return;
			}
			var tableHeight = calculateLeftHospitalTableHeight();
			try {
				$table.bootstrapTable({
					data: [],
					pagination: false,
					search: false,
					showRefresh: false,
					showColumns: false,
					showToggle: false,
					height: tableHeight,
					striped: true,
					classes: 'table table-condensed',
					locale: 'zh-CN',
					showHeader: true,
					showEmptyRows: false,
					columns: [{
						field: 'serialNumber',
						title: '序号',
						align: 'center',
						width: 50,
						cellStyle: {fontSize: '12px', padding: '4px'},
						formatter: function(value, row, index) {
							return index + 1;
						}
					},
					{
						field: 'hospitalCode',
						title: '编码',
						sortable: true,
						width: 80,
						cellStyle: {fontSize: '12px', padding: '4px'},
						formatter: function(value, row, index) {
							return value || '-';
						}
					},
					{
						field: 'hospitalName',
						title: '医院名称',
						cellStyle: {fontSize: '12px', padding: '4px'},
						formatter: function(value, row, index) {
							if (!value) return '-';
							var name = value.length > 15 ? value.substring(0, 15) + '...' : value;
							var hospitalId = row.hospitalId || '';
							return '<a href="javascript:void(0)" onclick="selectHospital(\'' + hospitalId + '\')" title="' + value + '" style="font-size: 12px; cursor: pointer;">' + name + '</a>';
						}
					}],
					onClickRow: function(row, $element) {
						if (row.hospitalId) {
							selectHospital(row.hospitalId);
						}
					},
					rowStyle: function(row, index) {
						if (selectedHospitalId && row.hospitalId == selectedHospitalId) {
							return {classes: 'info'};
						}
						return {};
					}
				});
				queryHospitalList();
			} catch (e) {
				console.error("初始化医院表格失败:", e);
			}
		}

		function queryHospitalList() {
			$.ajax({
				url: prefix + "/linkedHospitals",
				type: "GET",
				dataType: "json",
				cache: false,
				success: function(result) {
					if (result && result.code == 0) {
						allHospitals = result.data || [];
						updateHospitalTable(allHospitals);
						if (allHospitals.length > 0 && !selectedHospitalId) {
							selectHospital(allHospitals[0].hospitalId);
						} else {
							updateAddButtonState();
							triggerInitialCertLoad();
						}
					} else {
						allHospitals = [];
						updateHospitalTable([]);
						updateAddButtonState();
						triggerInitialCertLoad();
					}
				},
				error: function() {
					allHospitals = [];
					updateHospitalTable([]);
					updateAddButtonState();
					triggerInitialCertLoad();
				}
			});
		}

		function updateHospitalTable(hospitals) {
			var $table = $('#bootstrap-table-hospital');
			if ($table.length === 0) {
				setTimeout(function() { updateHospitalTable(hospitals); }, 300);
				return;
			}
			try {
				var tableOptions = $table.bootstrapTable('getOptions');
				if (tableOptions) {
					$table.bootstrapTable('load', hospitals || []);
					setTimeout(function() {
						if (selectedHospitalId) {
							$table.find('tbody tr').each(function() {
								var rowData = $table.bootstrapTable('getData');
								var rowIndex = $(this).index();
								if (rowIndex >= 0 && rowIndex < rowData.length && rowData[rowIndex].hospitalId == selectedHospitalId) {
									$(this).addClass('info');
								}
							});
						}
					}, 100);
				} else {
					initLeftHospitalTable();
					setTimeout(function() {
						if ($table.bootstrapTable('getOptions')) {
							$table.bootstrapTable('load', hospitals || []);
						}
					}, 500);
				}
			} catch (e) {
				console.error("更新医院表格失败:", e);
			}
		}

		function selectHospital(hospitalId) {
			if (!hospitalId) {
				selectedHospitalId = null;
				updateHospitalTable(allHospitals);
				$('#' + certTableId).bootstrapTable('removeAll');
				updateAddButtonState();
				return;
			}
			if (selectedHospitalId == hospitalId) {
				return;
			}
			selectedHospitalId = hospitalId;
			updateHospitalTable(allHospitals);
			updateAddButtonState();
			$('#' + certTableId).bootstrapTable('refresh');
		}

		function checkExpired() {
			$.modal.confirm("确认要检查证件过期状态吗？", function() {
				$.operate.post(prefix + "/checkExpired", {});
			});
		}

		function handleAdd() {
			if (!selectedHospitalId || allHospitals.length === 0) {
				$.modal.alertWarning('请先在左侧选择一家关联医院后再新增证件');
				return;
			}
			var addUrl = prefix + "/add";
			$.modal.openTab("新增供应商证件", addUrl);
		}

		function handleEditCertificate() {
			table.set();
			var certId = $.table.selectColumns('certificateId');
			if ($.common.isEmpty(certId)) {
				$.modal.alertWarning("请至少选择一条记录");
				return;
			}
			$.modal.openTab("修改供应商证件", prefix + "/upload/" + certId);
		}

		function openUploadImagesTab(certificateId) {
			if (certificateId == null || certificateId === "") {
				$.modal.alertWarning("无法打开上传页：缺少证件ID");
				return;
			}
			$.modal.openTab("上传证照", prefix + "/upload/" + certificateId);
		}

		function viewCertDetail(certificateId) {
			if (certificateId == null || certificateId === '') {
				$.modal.alertWarning('无法查看：缺少证件ID');
				return;
			}
			$.modal.openTab('查看供应商证件', prefix + '/upload/' + certificateId);
		}
	</script>
</body>
</html>
