<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('新增关联医院')" />
</head>
<body>
    <div class="main-content">
        <form id="form-supplier-certificate-add" class="form-horizontal" enctype="multipart/form-data">
            <h4 class="form-header h4">基本信息</h4>
            <div class="row">
            	<div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label is-required">供应商：</label>
                        <div class="col-sm-8">
                            <input type="hidden" name="supplierId" id="supplierId"/>
                            <input type="hidden" name="certificateNo" id="certificateNo"/>
                            <input type="text" id="supplierNameDisplay" class="form-control" readonly placeholder="未选择供应商"/>
                            <select id="supplierDataSource" style="display:none;">
                                <option th:each="supplier : ${supplierList}"
                                        th:value="${supplier.supplierId}"
                                        th:text="${supplier.companyName}"></option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label is-required">医院：</label>
                        <div class="col-sm-8">
                            <select name="certificateType" id="certificateType" class="form-control" required>
                                <option value="">请选择医院</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <h4 class="form-header h4">其他信息</h4>
            <div class="row">
                <div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label">备注：</label>
                        <div class="col-xs-10">
                            <textarea name="remark" maxlength="500" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
      
    <div class="row" style="position: fixed; bottom: 0; left: 0; right: 0; background-color: #fff; padding: 15px 20px; border-top: 1px solid #ddd; z-index: 1000; box-shadow: 0 -2px 8px rgba(0,0,0,0.1);">
        <div class="col-sm-offset-5 col-sm-10">
            <button type="button" class="btn btn-sm btn-primary" onclick="submitHandler()"><i class="fa fa-check"></i>保 存</button>&nbsp;
            <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i>关 闭</button>
        </div>
    </div>
    <div style="height: 70px;"></div>
	<th:block th:include="include :: footer" />
	<script th:inline="javascript">
	    var prefix = ctx + "certificate/supplier";
	    var supplierPrefix = ctx + "supplier/supplier";
	    var hospitalPrefix = ctx + "hospital/hospital";

	    $(function() {
	        var urlParams = new URLSearchParams(window.location.search);
	        var supplierId = urlParams.get('supplierId');
	        if (!supplierId) {
	            try {
	                supplierId = sessionStorage.getItem("supplierCertificateSelectedSupplierId");
	            } catch (e) {
	                supplierId = null;
	            }
	        }
	        // 兜底：如果只有一个供应商，默认选中
	        if (!supplierId) {
	            var $options = $("#supplierDataSource option");
	            if ($options.length === 1) {
	                supplierId = $options.first().val();
	            }
	        }
	        if (supplierId) {
	            setCurrentSupplier(supplierId);
	        } else {
	            $("#supplierNameDisplay").val("未选择供应商");
	            $("#certificateType").empty().append('<option value="">请选择医院</option>');
	        }
	    });

	    function setCurrentSupplier(supplierId) {
	        $("#supplierId").val(supplierId);
	        var supplierName = $("#supplierDataSource option[value='" + supplierId + "']").text();
	        if (supplierName) {
	            $("#supplierNameDisplay").val(supplierName);
	            loadAllHospitals();
	            return;
	        }
	        try {
	            var cachedName = sessionStorage.getItem("supplierCertificateSelectedSupplierName");
	            if (cachedName) {
	                $("#supplierNameDisplay").val(cachedName);
	                loadAllHospitals();
	                return;
	            }
	        } catch (e) {
	            // 忽略缓存异常
	        }

	        // 兜底：若页面supplierList里没有，再请求一次接口
	        $.ajax({
	            url: supplierPrefix + "/all",
	            type: "GET",
	            dataType: "json",
	            success: function(result) {
	                if (result && result.code == 0 && result.data) {
	                    var suppliers = result.data;
	                    for (var i = 0; i < suppliers.length; i++) {
	                        if (String(suppliers[i].supplierId) === String(supplierId)) {
	                            $("#supplierNameDisplay").val(suppliers[i].companyName || '');
	                            loadAllHospitals();
	                            return;
	                        }
	                    }
	                }
	                $("#supplierNameDisplay").val("未匹配到供应商");
	                $("#certificateType").empty().append('<option value="">未加载到医院</option>');
	            },
	            error: function() {
	                $("#supplierNameDisplay").val("加载供应商失败");
	                $("#certificateType").empty().append('<option value="">加载医院失败</option>');
	            }
	        });
	    }

	    function loadAllHospitals() {
	        $.ajax({
	            url: hospitalPrefix + "/all",
	            type: "GET",
	            dataType: "json",
	            success: function(result) {
	                var $select = $("#certificateType");
	                $select.empty();
	                $select.append('<option value="">请选择医院</option>');
	                if (result && result.code == 0 && result.data) {
	                    var hospitals = result.data;
	                    for (var i = 0; i < hospitals.length; i++) {
	                        var hospital = hospitals[i];
	                        var displayText = (hospital.hospitalCode || '-') + ' / ' + (hospital.hospitalName || '');
	                        var option = '<option value="' + (hospital.hospitalName || '') + '" data-hospital-code="' + (hospital.hospitalCode || '') + '">' + displayText + '</option>';
	                        $select.append(option);
	                    }
	                    if (hospitals.length === 0) {
	                        $select.append('<option value="">医院维护暂无数据</option>');
	                    }
	                } else {
	                    $select.append('<option value="">未加载到医院</option>');
	                }
	            },
	            error: function() {
	                var $select = $("#certificateType");
	                $select.empty();
	                $select.append('<option value="">加载医院失败</option>');
	            }
	        });
	    }

	    // 选择医院时，同步保存医院编码到对照码字段（隐藏提交）
	    $(document).on('change', '#certificateType', function() {
	        var selectedCode = $(this).find('option:selected').attr('data-hospital-code') || '';
	        $('#certificateNo').val(selectedCode);
	    });
	
        $("#form-supplier-certificate-add").validate({
        	onkeyup: false,
        	rules:{
        		supplierId:{
        			required: true
        		},
        		certificateType:{
        			required: true,
        			maxlength: 50
        		}
        	},
            focusCleanup: true
        });
        
        function submitHandler() {
	        if ($.validate.form()) {
	            var supplierId = $("#supplierId").val();
	            if (!supplierId) {
	                $.modal.alertWarning("未识别到供应商，请从列表页重新进入新增页面");
	                return;
	            }
	            $.operate.saveTab(prefix + "/add", $('#form-supplier-certificate-add').serialize());
	        }
	    }
    </script>
</body>
</html>
