<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" class="cert-upload-root">
<head>
	<th:block th:include="include :: header('新增供应商证件')" />
	<th:block th:include="include :: bootstrap-fileinput-css" />
	<style>
		html.cert-upload-root,
		html.cert-upload-root body.cert-upload-body {
			height: 100%;
			margin: 0;
			overflow: hidden;
			box-sizing: border-box;
		}
		body.cert-upload-body {
			display: flex;
			flex-direction: column;
			min-height: 0;
		}
		.cert-upload-body .main-content {
			flex: 1 1 0%;
			min-height: 0;
			overflow: hidden;
			padding-bottom: 0 !important;
			display: flex;
			flex-direction: column;
		}
		#form-supplier-certificate-add {
			flex: 1 1 0%;
			min-height: 0;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}
		#form-supplier-certificate-add > .form-header.h4 {
			margin-bottom: 6px;
		}
		.cert-section-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			flex-shrink: 0;
			margin: 0 15px 6px;
		}
		.cert-section-header .form-header.h4 {
			margin: 0;
		}
		.cert-section-actions {
			flex-shrink: 0;
			white-space: nowrap;
		}
		.cert-info-panel {
			margin: 0 15px 12px;
			padding: 10px 15px 8px;
			background: #fff;
			border: 1px solid #e7eaec;
			border-radius: 4px;
			flex-shrink: 0;
		}
		.cert-readonly-form .cert-inline-field {
			display: flex;
			align-items: center;
			margin-bottom: 8px;
		}
		.cert-readonly-form .cert-inline-field > label {
			flex-shrink: 0;
			width: 68px;
			text-align: right;
			margin: 0 6px 0 0;
			font-size: 12px;
			font-weight: normal;
			color: #666;
			white-space: nowrap;
		}
		.cert-readonly-form .cert-inline-field > .form-control {
			flex: 0 0 auto;
			width: 118px;
			height: 28px;
			padding: 2px 6px;
			font-size: 12px;
			background-color: #fff;
			border-color: #e5e6e7;
		}
		.cert-readonly-form .cert-inline-field > .form-control.input-wide {
			width: 168px;
		}
		.cert-readonly-form .cert-inline-field > select.form-control {
			flex: 0 0 auto;
			width: 118px;
			height: 28px;
			padding: 2px 6px;
			font-size: 12px;
		}
		.cert-readonly-form .cert-inline-field > select.form-control.input-wide {
			width: 168px;
		}
		.cert-readonly-form .cert-inline-field > .form-control[readonly],
		.cert-readonly-form .cert-inline-field > .form-control:disabled,
		.cert-readonly-form .cert-inline-field > select.form-control:disabled {
			background-color: #fff;
		}
		.cert-image-header {
			display: flex;
			align-items: center;
			flex-wrap: wrap;
			gap: 10px;
			margin-bottom: 10px;
			flex-shrink: 0;
		}
		.cert-image-header .cert-image-tip {
			font-size: 12px;
			font-weight: normal;
			color: #e74c3c;
			line-height: 1.4;
		}
		.cert-upload-area .file-preview .fileinput-remove {
			display: none !important;
		}
		.cert-upload-body #scroll-up {
			display: none !important;
		}
		#form-supplier-certificate-add > .row {
			flex: 1 1 0%;
			min-height: 0;
			overflow: hidden;
			margin-left: 0;
			margin-right: 0;
		}
		.cert-upload-area {
			padding: 0 15px;
			height: 100%;
			overflow: hidden;
		}
		#form-supplier-certificate-add > .row > .col-sm-12 {
			height: 100%;
			padding-left: 0;
			padding-right: 0;
		}
		.cert-upload-area .file-input {
			height: 100%;
		}
		.cert-upload-area .file-preview {
			overflow: hidden;
		}
		.cert-upload-area .file-drop-zone {
			min-height: 120px;
			margin: 0;
			padding: 6px 8px;
		}
		.cert-upload-area .krajee-default.file-preview-frame {
			margin: 4px;
		}
		.cert-upload-area .krajee-default.file-preview-frame .kv-file-content {
			width: 160px;
			height: 100px;
		}
		.cert-upload-area .krajee-default.file-preview-frame .file-thumbnail-footer {
			height: 56px;
		}
		.cert-upload-area .file-preview-image {
			max-height: 100px;
		}
	</style>
</head>
<body class="cert-upload-body">
    <div class="main-content">
        <form id="form-supplier-certificate-add" class="form-horizontal" enctype="multipart/form-data">
            <div class="cert-section-header">
                <h4 class="form-header h4">证照信息</h4>
                <div class="cert-section-actions">
                    <button type="button" class="btn btn-sm btn-primary" onclick="submitHandler()"><i class="fa fa-check"></i> 保 存</button>
                    <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i> 关 闭</button>
                </div>
            </div>

            <div class="cert-info-panel cert-readonly-form">
                <div class="row">
                    <div class="col-sm-3" th:if="${supplierSelfService}">
                        <input type="hidden" name="supplierId" id="supplierId" th:value="${bindSupplierId}"/>
                        <div class="cert-inline-field">
                            <label>供应商</label>
                            <input type="text" class="form-control input-wide" readonly th:value="${bindSupplierCompanyName}"/>
                        </div>
                    </div>
                    <div class="col-sm-3" th:unless="${supplierSelfService}">
                        <div class="cert-inline-field">
                            <label>供应商</label>
                            <select name="supplierId" id="supplierId" class="form-control input-wide" required>
                                <option value="">请选择供应商</option>
                                <option th:each="supplier : ${supplierList}"
                                        th:value="${supplier.supplierId}"
                                        th:selected="${preSupplierId != null and supplier.supplierId == preSupplierId}"
                                        th:text="${supplier.companyName}">
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>证件类型</label>
                            <select name="certificateType" id="certificateType" class="form-control input-wide" required>
                                <option value="">请选择证件类型</option>
                                <option th:each="certType : ${certificateTypeList}"
                                        th:value="${certType.typeName}"
                                        th:text="${certType.typeName}">
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>证件编号</label>
                            <input name="certificateNo" id="certificateNo" type="text" class="form-control" maxlength="100" placeholder="">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>长期</label>
                            <select name="certificateName" id="certificateName" class="form-control">
                                <option value="否" selected>否</option>
                                <option value="是">是</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>审核状态</label>
                            <input type="text" class="form-control" readonly value="待审核">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>发证日期</label>
                            <input name="issueDate" type="date" class="form-control">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>有效期至</label>
                            <input name="expireDate" id="expireDate" type="date" class="form-control">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>创建人</label>
                            <input type="text" class="form-control" readonly value="-">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>创建时间</label>
                            <input type="text" class="form-control input-wide" readonly value="-">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>备注</label>
                            <input name="remark" id="remark" type="text" class="form-control input-wide" maxlength="500">
                        </div>
                    </div>
                </div>
            </div>

            <h4 class="form-header h4 cert-image-header">
                证照图片
                <span class="cert-image-tip">单张图片不超过500KB；上传或删除图片后将自动保存；修改证件编号、日期等信息后请点击保存。</span>
            </h4>
            <div class="row">
                <div class="col-sm-12 cert-upload-area">
                    <div class="file-loading">
                        <input id="certificateFile" name="certificateFile" type="file" accept="image/*">
                    </div>
                    <input type="hidden" name="certificateFileIds" id="certificateFileIds" value="">
                    <input type="hidden" name="certificateFile" id="certificateFileUrl" value="">
                </div>
            </div>
        </form>
    </div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: bootstrap-fileinput-js" />
	<script th:src="@{/js/common/scmCosDownload.js}"></script>
	<script th:src="@{/js/certificate/supplierCertCosUpload.js}"></script>
	<script th:inline="javascript">
	    var prefix = ctx + "certificate/supplier";
	    var certFileHelper;

	    $(function() {
	        $("#certificateName").on('change', function() {
	            var isLongTerm = $(this).val();
	            var $expireDateInput = $("#expireDate");
	            if (isLongTerm === '是') {
	                $expireDateInput.val('').prop('readonly', true);
	            } else {
	                $expireDateInput.prop('readonly', false);
	            }
	        });
	        certFileHelper = initSupplierCertCosUpload({ certEditable: true });
	    });

        $("#form-supplier-certificate-add").validate({
        	onkeyup: false,
        	rules:{
        		supplierId:{ required: true },
        		certificateType:{ required: true, maxlength: 50 }
        	},
            focusCleanup: true
        });

        function doSubmit() {
	        certFileHelper.updateFileState();
	        var formData = $("#form-supplier-certificate-add").serializeArray();
	        formData = formData.filter(function(item) {
	            return item.name !== 'certificateFile';
	        });
	        $.operate.saveTab(prefix + "/add", formData);
	    }

	    function submitHandler() {
	        if ($.validate.form()) {
	            var supplierId = $("#supplierId").val();
	            if (!supplierId) {
	                $.modal.alertWarning("请选择供应商");
	                return;
	            }
	            var isLongTerm = $("#certificateName").val();
	            var expireDate = $("#expireDate").val();
	            if (isLongTerm === '是') {
	                $("#expireDate").val('');
	            } else if (isLongTerm === '否' && (!expireDate || expireDate.trim() === '')) {
	                $.modal.alertWarning("选择「否」时，必须填写有效期至");
	                return;
	            }
	            certFileHelper.updateFileState();
	            var $fileInput = $("#certificateFile");
	            var filesCount = $fileInput.fileinput('getFilesCount') || 0;
	            if (filesCount > 0 && !$("#certificateFileIds").val()) {
	                setTimeout(function() {
	                    certFileHelper.updateFileState();
	                    if (!$("#certificateFileIds").val()) {
	                        $.modal.alertWarning("请等待图片上传完成后再保存");
	                        return;
	                    }
	                    doSubmit();
	                }, 500);
	                return;
	            }
	            doSubmit();
	        }
	    }
    </script>
</body>
</html>
