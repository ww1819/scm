<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('产品证件登记')" />
	<th:block th:include="include :: layout-latest-css" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-css" />
	<style>
		#bootstrap-table-hospital td,
		#bootstrap-table-hospital th {
			white-space: nowrap !important;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.audit-page-wrap.container-div {
			--audit-page-gap: 10px;
			height: 100%;
			overflow: hidden;
			padding: 0 var(--audit-page-gap);
			display: flex;
			flex-direction: column;
			box-sizing: border-box;
		}

		body.gray-bg:has(.audit-page-wrap) {
			height: 100%;
			overflow: hidden;
		}

		.audit-page-wrap > .audit-search-area.search-collapse {
			flex: 0 0 auto;
			width: 100%;
			max-width: 100%;
			margin: var(--audit-page-gap) 0 0;
			padding: 10px 15px 13px;
			box-sizing: border-box;
			border-radius: 6px;
			float: none;
		}

		.audit-page-row {
			display: flex;
			flex-direction: column;
			flex: 1 1 auto;
			min-height: 0;
			height: auto;
			margin: 0;
			width: 100%;
		}

		.audit-page-row > .audit-split-area {
			padding-left: 0;
			padding-right: 0;
			float: none;
			width: 100%;
		}

		.audit-split-area {
			flex: 1;
			display: flex;
			min-height: 0;
			overflow: hidden;
			margin-top: var(--audit-page-gap);
			padding: 0 0 var(--audit-page-gap);
			width: 100%;
			box-sizing: border-box;
		}

		.audit-left-panel {
			width: 25%;
			flex-shrink: 0;
			border-right: 1px solid #e7eaec;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			background: #fff;
			border-radius: 6px;
			box-shadow: 1px 1px 3px rgba(0,0,0,.2);
			margin-right: 10px;
		}

		.audit-left-panel .audit-left-panel-heading {
			background-color: #3c8dbc;
			border-color: #3c8dbc;
			color: #fff;
			padding: 6px 10px;
			flex-shrink: 0;
			border-radius: 6px 6px 0 0;
		}

		.audit-left-panel .audit-left-panel-heading .panel-title {
			color: #fff;
		}

		.audit-left-panel .audit-left-panel-body {
			padding: 0 5px 5px;
			flex: 1;
			overflow: hidden;
			display: flex;
			flex-direction: column;
			min-height: 0;
		}

		.audit-left-panel .audit-left-table-wrap {
			flex: 1;
			overflow: hidden;
			min-height: 0;
			width: 100%;
			margin-top: 0 !important;
			box-shadow: none;
			border-radius: 0;
			padding-top: 0;
		}

		.audit-left-panel .fixed-table-header {
			position: sticky !important;
			top: 0 !important;
			z-index: 2;
			background: #fff;
		}

		.audit-left-panel .fixed-table-header thead th {
			background-color: #f5f5f5 !important;
			border-bottom: 1px solid #e7eaec !important;
			padding-top: 6px !important;
			padding-bottom: 6px !important;
		}

		.audit-left-panel .fixed-table-container {
			padding-top: 0 !important;
		}

		.audit-right-area {
			--audit-inner-padding: 10px;
			flex: 1;
			min-width: 0;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			min-height: 0;
		}

		.audit-right-area #toolbar {
			flex-shrink: 0;
			padding: 0 var(--audit-inner-padding) 5px;
			margin-bottom: 0;
		}

		.audit-right-area .audit-table-wrap {
			position: relative;
			flex: 1;
			min-height: 200px;
			overflow: hidden !important;
			padding: 0 var(--audit-inner-padding) var(--audit-inner-padding);
			margin-top: 0 !important;
			margin-bottom: 0;
			box-sizing: border-box;
			display: flex;
			flex-direction: column;
		}

		.audit-right-area .audit-table-wrap > .bootstrap-table {
			flex: 1 1 auto;
			min-height: 0;
		}

		.audit-right-area .audit-table-wrap .bootstrap-table {
			display: flex;
			flex-direction: column;
			height: 100%;
			padding-bottom: 0;
		}

		.audit-right-area .audit-table-wrap .fixed-table-toolbar {
			padding-right: 2px;
		}

		.audit-right-area .audit-table-wrap .fixed-table-toolbar .columns,
		.audit-right-area .audit-table-wrap .fixed-table-toolbar .pull-right {
			margin-right: 0;
		}

		.audit-right-area .audit-table-wrap .fixed-table-container {
			flex: 1 1 auto;
			min-height: 0;
			overflow: hidden !important;
			padding-bottom: 0;
		}

		.audit-right-area .audit-table-wrap .fixed-table-body {
			overflow-x: auto !important;
			overflow-y: auto !important;
		}

		.audit-right-area .audit-table-wrap .fixed-table-pagination {
			position: relative;
			flex-shrink: 0;
			left: auto;
			right: auto;
			bottom: auto;
			margin: 0 !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination {
			display: flex;
			flex-wrap: nowrap;
			align-items: center;
			justify-content: space-between;
			gap: 8px;
			padding: 4px 172px 4px 10px;
			border-top: 1px solid #eee;
			background: #fff;
			z-index: 3;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination::after {
			display: none;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination > .pagination-detail,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination > .pagination {
			float: none !important;
			margin-top: 0 !important;
			margin-bottom: 0 !important;
			flex: 0 0 auto;
			white-space: nowrap;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination > .pagination-detail {
			flex: 1 1 auto;
			min-width: 0;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-body .fixed-table-border {
			display: none !important;
			height: 0 !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-header {
			position: relative !important;
			top: auto !important;
			z-index: 2;
			background: #fff;
			overflow: hidden;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header th .th-inner,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header th .sortable {
			text-align: center !important;
			justify-content: center;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header th,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body tbody td {
			box-sizing: border-box;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-body tbody td {
			white-space: nowrap;
			vertical-align: middle !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="materialName"],
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="supplierName"],
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="manufacturerName"] {
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="materialName"] .tooltip-show {
			display: inline-block;
			max-width: 100%;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			vertical-align: middle;
		}

		.audit-page-wrap > .audit-search-area.search-collapse {
			padding-top: 10px !important;
			padding-bottom: 10px !important;
		}

		.container-div .audit-search-area .select-list ul {
			margin-bottom: 0;
		}

		.container-div .audit-search-area .select-list li {
			margin: 4px 15px 4px 0;
		}

		#bootstrap-table-hospital {
			visibility: visible !important;
		}

		#bootstrap-table-hospital + .fixed-table-container {
			visibility: visible !important;
			display: block !important;
		}

		.audit-left-panel .select-table {
			overflow: auto !important;
			visibility: visible !important;
		}

		.audit-left-panel .fixed-table-container {
			height: 100% !important;
			overflow: visible !important;
		}

		.audit-left-panel .fixed-table-body {
			overflow-y: auto !important;
			overflow-x: hidden !important;
		}
	</style>
</head>
<body class="gray-bg">
	<div class="container-div audit-page-wrap">
		<div class="search-collapse audit-search-area">
			<form id="product-certificate-form">
				<input type="hidden" name="hospitalCode" id="productFilterHospitalCode" value=""/>
				<input type="hidden" name="hospitalId" id="productFilterHospitalId" value=""/>
				<div class="select-list">
					<ul>
						<li>
							产品名称：<input type="text" name="materialName"/>
						</li>
						<li>
							注册证号：<input type="text" name="registerNo"/>
						</li>
						<li>
							状态：
							<select name="status" style="width: 120px; display: inline-block; height: 30px; padding: 5px 10px; border: 1px solid #ddd; border-radius: 4px;">
								<option value="">所有</option>
								<option value="0">正常</option>
								<option value="1">过期</option>
							</select>
						</li>
						<li>
							<a class="btn btn-primary btn-rounded btn-sm" onclick="searchProductList()"><i class="fa fa-search"></i>&nbsp;搜索</a>
							<a class="btn btn-warning btn-rounded btn-sm" onclick="resetPre()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
						</li>
					</ul>
				</div>
			</form>
		</div>

		<div class="row audit-page-row">
			<div class="audit-split-area">
				<div class="audit-left-panel">
					<div class="panel panel-default" style="margin-bottom: 0; display: flex; flex-direction: column; height: 100%; border: none; box-shadow: none;">
						<div class="panel-heading audit-left-panel-heading">
							<h5 class="panel-title" style="margin: 0; font-size: 14px;">
								<i class="fa fa-hospital-o"></i> 医院
							</h5>
						</div>
						<div class="panel-body audit-left-panel-body">
							<div class="select-table table-striped audit-left-table-wrap">
								<table id="bootstrap-table-hospital" style="width: 100%;"></table>
							</div>
						</div>
					</div>
				</div>

				<div class="audit-right-area">
					<div class="btn-group-sm" id="toolbar" role="group">
						<a class="btn btn-success" onclick="openAddProductInfoTab()" shiro:hasPermission="certificate:product:add">
							<i class="fa fa-plus"></i> 新增
						</a>
						<a class="btn btn-primary single disabled" onclick="$.operate.editTab()" shiro:hasPermission="certificate:product:edit">
							<i class="fa fa-edit"></i> 修改
						</a>
						<a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="certificate:product:remove">
							<i class="fa fa-remove"></i> 删除
						</a>
						<a class="btn btn-info" onclick="checkExpired()" shiro:hasPermission="certificate:product:edit">
							<i class="fa fa-check"></i> 检查过期
						</a>
						<a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="certificate:product:export">
							<i class="fa fa-download"></i> 导出
						</a>
					</div>

					<div class="select-table table-striped audit-table-wrap audit-list-table">
						<table id="bootstrap-table"></table>
					</div>
				</div>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-js" />
	<script th:inline="javascript">
		var prefix = ctx + "certificate/product";
		var supplierSelfService = /*[[${supplierSelfService}]]*/ false;
		var bindSupplierId = /*[[${bindSupplierId}]]*/ null;
		var selectedHospitalId = null;
		var allHospitals = [];
		var productTableId = 'bootstrap-table';

		$(function() {
			initLeftHospitalTable();
			queryProductCertificateList();

			$(window).resize(function() {
				adjustProductTableHeight();
				setTimeout(refreshProductTableLayout, 100);
				var $hospitalTable = $('#bootstrap-table-hospital');
				if ($hospitalTable.length && $hospitalTable.bootstrapTable('getOptions')) {
					$hospitalTable.bootstrapTable('resetView', { height: calculateLeftHospitalTableHeight() });
				}
			});

			setTimeout(function() {
				adjustProductTableHeight();
			}, 300);
		});

		function calculateProductTableHeight() {
			var $wrap = $('.audit-right-area .audit-table-wrap');
			if ($wrap.length === 0) {
				return 400;
			}
			var wrapH = $wrap[0].clientHeight;
			if (!wrapH) {
				var outerToolbarH = $('#toolbar').outerHeight(true) || 40;
				wrapH = $('.audit-right-area').height() - outerToolbarH - 10;
			}
			var $bt = $wrap.find('.bootstrap-table');
			if ($bt.length === 0) {
				return Math.max(wrapH - 50, 200);
			}
			var btToolbarH = $bt.find('.fixed-table-toolbar').outerHeight(true) || 0;
			var pagH = $bt.find('.fixed-table-pagination').outerHeight(true) || 46;
			return Math.max(Math.floor(wrapH - btToolbarH - pagH - 2), 200);
		}

		function adjustProductTableHeight() {
			var $table = $('#' + productTableId);
			if ($table.length === 0 || !$table.bootstrapTable('getOptions')) {
				return;
			}
			$table.bootstrapTable('resetView', { height: calculateProductTableHeight() });
			refreshProductTableLayout();
		}

		function fixProductTableHeaderAlign() {
			var $bt = $('#' + productTableId).closest('.bootstrap-table');
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			if (!$mainBody.length || !$mainHeader.length) {
				return;
			}
			var scrollW = $mainBody[0].offsetWidth - $mainBody[0].clientWidth;
			$mainHeader.css('margin-right', scrollW > 0 ? (scrollW + 'px') : '');
		}

		function bindProductMainHorizontalScroll() {
			var $container = $('#' + productTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			$mainBody.off('scroll.productMainH').on('scroll.productMainH', function() {
				$mainHeader.scrollLeft($mainBody.scrollLeft());
			});
		}

		function refreshProductTableLayout() {
			fixProductTableHeaderAlign();
			bindProductMainHorizontalScroll();
		}

		function calculateLeftHospitalTableHeight() {
			var $leftPanel = $('.audit-left-panel');
			if ($leftPanel.length === 0) {
				return 400;
			}
			var panelHeaderHeight = $leftPanel.find('.audit-left-panel-heading').outerHeight(true) || 35;
			var bodyPadding = 10;
			var height = $leftPanel.height() - panelHeaderHeight - bodyPadding - 20;
			return height > 100 ? height : 100;
		}

		function findHospitalRow(hospitalId) {
			for (var i = 0; i < allHospitals.length; i++) {
				if (allHospitals[i].hospitalId == hospitalId) {
					return allHospitals[i];
				}
			}
			return null;
		}

		function applyHospitalFilterToForm(hospitalId) {
			if (!hospitalId) {
				$("#productFilterHospitalCode").val("");
				$("#productFilterHospitalId").val("");
				return;
			}
			var row = findHospitalRow(hospitalId);
			$("#productFilterHospitalId").val(String(hospitalId));
			$("#productFilterHospitalCode").val(row && row.hospitalCode ? row.hospitalCode : "");
		}

		function initLeftHospitalTable() {
			var $table = $('#bootstrap-table-hospital');
			if ($table.length === 0) {
				setTimeout(initLeftHospitalTable, 300);
				return;
			}
			var tableHeight = calculateLeftHospitalTableHeight();
			try {
				$table.bootstrapTable({
					data: [],
					pagination: false,
					search: false,
					showRefresh: false,
					showColumns: false,
					showToggle: false,
					height: tableHeight,
					striped: true,
					classes: 'table table-condensed',
					locale: 'zh-CN',
					showHeader: true,
					showEmptyRows: false,
					columns: [{
						field: 'serialNumber',
						title: '序号',
						align: 'center',
						width: 50,
						cellStyle: {fontSize: '12px', padding: '4px'},
						formatter: function(value, row, index) {
							return index + 1;
						}
					},
					{
						field: 'hospitalCode',
						title: '编码',
						sortable: true,
						width: 80,
						cellStyle: {fontSize: '12px', padding: '4px'},
						formatter: function(value, row, index) {
							return value || '-';
						}
					},
					{
						field: 'hospitalName',
						title: '医院名称',
						cellStyle: {fontSize: '12px', padding: '4px'},
						formatter: function(value, row, index) {
							if (!value) return '-';
							var name = value.length > 15 ? value.substring(0, 15) + '...' : value;
							var hospitalId = row.hospitalId || '';
							return '<a href="javascript:void(0)" onclick="selectHospital(\'' + hospitalId + '\')" title="' + value + '" style="font-size: 12px; cursor: pointer;">' + name + '</a>';
						}
					}],
					onClickRow: function(row, $element) {
						if (row.hospitalId) {
							selectHospital(row.hospitalId);
						}
					},
					rowStyle: function(row, index) {
						if (selectedHospitalId && row.hospitalId == selectedHospitalId) {
							return {classes: 'info'};
						}
						return {};
					}
				});
				queryHospitalList();
			} catch (e) {
				console.error("初始化医院表格失败:", e);
			}
		}

		function queryHospitalList() {
			$.ajax({
				url: prefix + "/linkedHospitals",
				type: "GET",
				dataType: "json",
				cache: false,
				success: function(result) {
					if (result && result.code == 0) {
						allHospitals = result.data || [];
						updateHospitalTable(allHospitals);
						if (allHospitals.length > 0 && !selectedHospitalId) {
							selectHospital(allHospitals[0].hospitalId);
						}
					} else {
						allHospitals = [];
						updateHospitalTable([]);
					}
				},
				error: function() {
					allHospitals = [];
					updateHospitalTable([]);
				}
			});
		}

		function updateHospitalTable(hospitals) {
			var $table = $('#bootstrap-table-hospital');
			if ($table.length === 0) {
				setTimeout(function() { updateHospitalTable(hospitals); }, 300);
				return;
			}
			try {
				var tableOptions = $table.bootstrapTable('getOptions');
				if (tableOptions) {
					$table.bootstrapTable('load', hospitals || []);
					setTimeout(function() {
						if (selectedHospitalId) {
							$table.find('tbody tr').each(function() {
								var rowData = $table.bootstrapTable('getData');
								var rowIndex = $(this).index();
								if (rowIndex >= 0 && rowIndex < rowData.length && rowData[rowIndex].hospitalId == selectedHospitalId) {
									$(this).addClass('info');
								}
							});
						}
					}, 100);
				} else {
					initLeftHospitalTable();
				}
			} catch (e) {
				console.error("更新医院表格失败:", e);
			}
		}

		function selectHospital(hospitalId) {
			if (!hospitalId) {
				selectedHospitalId = null;
				applyHospitalFilterToForm(null);
				updateHospitalTable(allHospitals);
				$('#' + productTableId).bootstrapTable('refresh');
				return;
			}
			if (selectedHospitalId == hospitalId) {
				return;
			}
			selectedHospitalId = hospitalId;
			applyHospitalFilterToForm(hospitalId);
			updateHospitalTable(allHospitals);
			$('#' + productTableId).bootstrapTable('refresh');
		}

		function openAddProductInfoTab() {
			var url = prefix + "/add";
			var q = [];
			var hc = ($("#productFilterHospitalCode").val() || "").trim();
			var hid = ($("#productFilterHospitalId").val() || "").trim();
			if (hc) {
				q.push("hospitalCode=" + encodeURIComponent(hc));
			}
			if (hid) {
				q.push("hospitalId=" + encodeURIComponent(hid));
			}
			if (q.length) {
				url += "?" + q.join("&");
			}
			$.modal.openTab("新增产品信息", url);
		}

		function queryProductCertificateList() {
			var options = {
				formId: "product-certificate-form",
				url: prefix + "/list",
				createUrl: prefix + "/add",
				updateUrl: prefix + "/edit/{id}",
				removeUrl: prefix + "/remove",
				exportUrl: prefix + "/export",
				sortName: "expireDate",
				sortOrder: "asc",
				modalName: "产品信息",
				uniqueId: "certificateId",
				rememberSelected: true,
				maintainSelected: true,
				height: calculateProductTableHeight(),
				mobileResponsive: false,
				fixedColumns: false,
				queryParams: function(params) {
					var curParams = $.table.queryParams(params);
					if (selectedHospitalId) {
						curParams.hospitalId = selectedHospitalId;
						var row = findHospitalRow(selectedHospitalId);
						if (row && row.hospitalCode) {
							curParams.hospitalCode = row.hospitalCode;
						}
					}
					if (supplierSelfService && bindSupplierId != null) {
						curParams.supplierId = bindSupplierId;
					}
					return curParams;
				},
				onLoadSuccess: function() {
					$.modal.closeLoading();
					setTimeout(function() {
						adjustProductTableHeight();
						refreshProductTableLayout();
					}, 50);
					setTimeout(refreshProductTableLayout, 200);
				},
				onPostBody: function() {
					refreshProductTableLayout();
				},
				columns: [{
					checkbox: true
				},
				{
					field: 'serialNumber',
					title: '序号',
					align: 'center',
					width: 60,
					formatter: function(value, row, index) {
						return $.table.serialNumber(index);
					}
				},
				{
					field: 'certificateId',
					title: '证件ID',
					visible: false
				},
				{
					field: 'materialName',
					title: '产品名称',
					align: 'left',
					width: 160,
					formatter: function(value, row, index) {
						if (!value) {
							return '-';
						}
						return $.table.tooltip(value, 12);
					}
				},
				{
					field: 'supplierName',
					title: '供应商',
					align: 'left',
					width: 150,
					formatter: function(value, row, index) {
						if (!value) {
							return '-';
						}
						return $.table.tooltip(value, 10);
					}
				},
				{
					field: 'specification',
					title: '规格',
					align: 'left',
					width: 100,
					formatter: function(value, row, index) {
						return value || '-';
					}
				},
				{
					field: 'model',
					title: '型号',
					align: 'left',
					width: 100,
					formatter: function(value, row, index) {
						return value || '-';
					}
				},
				{
					field: 'manufacturerName',
					title: '生产厂家',
					align: 'left',
					width: 140,
					formatter: function(value, row, index) {
						if (!value) {
							return '-';
						}
						return $.table.tooltip(value, 10);
					}
				},
				{
					field: 'registerNo',
					title: '注册证号',
					align: 'left',
					width: 140,
					formatter: function(value, row, index) {
						return value || '-';
					}
				},
				{
					field: 'registerIssueDate',
					title: '发证日期',
					align: 'center',
					width: 110,
					sortable: true,
					formatter: function(value, row, index) {
						if (value) {
							if (typeof value === 'string' && value.indexOf('-') > -1) {
								return value.split(' ')[0];
							}
							if (value instanceof Date && typeof $.common !== 'undefined' && $.common.formatDate) {
								return $.common.formatDate(value, 'yyyy-MM-dd');
							}
						}
						return '-';
					}
				},
				{
					field: 'expireDate',
					title: '有效期至',
					align: 'center',
					width: 110,
					sortable: true,
					formatter: function(value, row, index) {
						if (!value) {
							return '-';
						}
						if (typeof value === 'string' && value.indexOf('-') > -1) {
							return value.split(' ')[0];
						}
						return value;
					}
				},
				{
					field: 'status',
					title: '状态',
					align: 'center',
					width: 80,
					formatter: function(value, row, index) {
						if (row.status == '0') {
							return '<span class="label label-success">正常</span>';
						}
						return '<span class="label label-danger">过期</span>';
					}
				},
				{
					field: 'createTime',
					title: '创建时间',
					align: 'center',
					width: 150,
					sortable: true
				}]
			};
			$.table.init(options);
			setTimeout(function() {
				adjustProductTableHeight();
				refreshProductTableLayout();
			}, 500);
		}

		function resetPre() {
			$("#product-certificate-form")[0].reset();
			selectedHospitalId = null;
			applyHospitalFilterToForm(null);
			updateHospitalTable(allHospitals);
			if (allHospitals.length > 0) {
				selectHospital(allHospitals[0].hospitalId);
			} else {
				$.table.search('product-certificate-form', productTableId);
			}
		}

		function searchProductList() {
			$.table.search('product-certificate-form', productTableId);
		}

		function checkExpired() {
			$.modal.confirm("确认要检查证件过期状态吗？", function() {
				$.operate.post(prefix + "/checkExpired", {});
			});
		}
	</script>
</body>
</html>
