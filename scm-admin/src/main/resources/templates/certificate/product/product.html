<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('产品证件列表')" />
	<th:block th:include="include :: layout-latest-css" />
	<th:block th:include="include :: ztree-css" />
	<style>
		/* 表格容器滚动条样式 */
		.select-table {
			overflow-x: auto !important;
			overflow-y: auto !important;
		}
		
		/* 自定义滚动条样式 */
		.select-table::-webkit-scrollbar {
			width: 8px;
			height: 8px;
		}
		
		.select-table::-webkit-scrollbar-track {
			background: #f1f1f1;
			border-radius: 4px;
		}
		
		.select-table::-webkit-scrollbar-thumb {
			background: #888;
			border-radius: 4px;
		}
		
		.select-table::-webkit-scrollbar-thumb:hover {
			background: #555;
		}
		
		/* 确保表格可以水平滚动 */
		#bootstrap-table {
			min-width: 100%;
		}
		
		/* 表格列内数据不换行 */
		#bootstrap-table th,
		#bootstrap-table td {
			white-space: nowrap !important;
			overflow: hidden !important;
			text-overflow: ellipsis !important;
		}
		.license-snap-img-box {
			display: flex;
			flex-wrap: wrap;
			align-items: flex-start;
			gap: 10px;
			max-width: 100%;
		}
		.license-snap-thumb {
			border: 1px solid #e7eaec;
			padding: 8px;
			border-radius: 4px;
			text-align: center;
			background: #fafafa;
			min-width: 100px;
		}
		.license-snap-thumb img {
			max-height: 120px;
			max-width: 160px;
			vertical-align: middle;
			cursor: pointer;
		}
	</style>
</head>
<body class="gray-bg">
	<div class="container-div" style="position: relative;">
		<div class="row">
			<!-- 供应商登录：左侧关联医院目录树，按医院筛选证件 -->
			<div class="col-sm-3" th:if="${supplierSelfService}" style="border-right: 1px solid #e7eaec; padding-right: 10px;">
				<div class="panel panel-default" style="margin-bottom: 0;">
					<div class="panel-heading" style="padding: 8px 10px;">
						<h5 class="panel-title" style="margin: 0; font-size: 14px;">
							<i class="fa fa-sitemap"></i> 关联医院
						</h5>
					</div>
					<div class="panel-body" style="padding: 8px; max-height: calc(100vh - 100px); overflow: auto;">
						<p class="text-muted" style="font-size: 12px; margin-bottom: 8px;">点击医院筛选该院相关产品证件</p>
						<div id="productHospitalTree" class="ztree"></div>
					</div>
				</div>
			</div>
			<!-- 产品证件列表 -->
			<div th:class="${supplierSelfService ? 'col-sm-9' : 'col-sm-12'}" style="display: flex; flex-direction: column; background: #fff;">
				<div class="col-sm-12 search-collapse" style="flex-shrink: 0;">
					<form id="product-certificate-form">
						<input type="hidden" name="hospitalCode" id="productFilterHospitalCode" value=""/>
						<input type="hidden" name="hospitalId" id="productFilterHospitalId" value=""/>
						<div class="select-list">
							<ul>
								<li>
									产品名称：<input type="text" name="materialName"/>
								</li>
								<li>
									注册证号：<input type="text" name="registerNo"/>
								</li>
								<li>
									状态：<select name="status">
										<option value="">所有</option>
										<option value="0">正常</option>
										<option value="1">过期</option>
									</select>
								</li>
								<li>
									<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
									<a class="btn btn-warning btn-rounded btn-sm" onclick="resetPre()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
								</li>
							</ul>
						</div>
					</form>
				</div>
				
		        <div class="btn-group-sm" id="toolbar" role="group" style="flex-shrink: 0; padding: 5px 10px;">
		        	<a class="btn btn-success" onclick="openAddProductInfoTab()" shiro:hasPermission="certificate:product:add">
	                <i class="fa fa-plus"></i> 新增
	            </a>
	             <a class="btn btn-primary single disabled" onclick="$.operate.editTab()" shiro:hasPermission="certificate:product:edit">
		            <i class="fa fa-edit"></i> 修改
		        </a>
	            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="certificate:product:remove">
	                <i class="fa fa-remove"></i> 删除
	            </a>
	            <a class="btn btn-info" onclick="checkExpired()" shiro:hasPermission="certificate:product:edit">
	                <i class="fa fa-check"></i> 检查过期
	            </a>
	            <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="certificate:product:export">
		            <i class="fa fa-download"></i> 导出
		        </a>
	        </div>
	        
	        <div class="col-sm-12" style="flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 0 10px 0 10px;">
				<div class="select-table table-striped" style="flex: 1; overflow-x: auto; overflow-y: auto; min-height: 120px; padding-bottom: 6px;">
					<table id="bootstrap-table"></table>
				</div>
				<div id="product-license-panel" class="panel panel-default" style="flex-shrink: 0; margin-bottom: 10px; border-color: #e7eaec;">
					<div class="panel-heading" style="padding: 6px 10px;">
						<strong>当前证件关联证照</strong>
						<span class="text-muted" style="font-weight: normal; font-size: 12px;">（列出 scm_certificate_type 中分类为 product 的全部启用类型；证件配置中的 product_certificate 仅影响排序靠前；点击上表一行加载）</span>
					</div>
					<div class="panel-body" id="product-license-panel-body" style="max-height: 360px; overflow: auto; padding: 8px 10px;">
						<p class="text-muted" id="product-license-empty-tip" style="margin: 0;">请在上方列表单击选择一条产品证件。</p>
						<div id="product-license-rows-wrap" style="display: none;"></div>
						<input type="file" id="licenseSnapUploadProxy" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" tabindex="-1" title=""
							style="position:fixed;left:-120px;top:0;width:1px;height:1px;opacity:0.01;"/>
					</div>
				</div>
			</div>
			</div>
		</div>
	</div>
	
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-js" />
	<th:block th:include="include :: layout-latest-js" />
	<th:block th:include="include :: ztree-js" />
	<script th:inline="javascript">
		var editFlag = [[${@permission.hasPermi('certificate:product:edit')}]];
		var removeFlag = [[${@permission.hasPermi('certificate:product:remove')}]];
		var prefix = ctx + "certificate/product";
		var supplierSelfService = /*[[${supplierSelfService}]]*/ false;

		$(function() {
		    initLicenseSnapImageUploadOnce();
		    queryProductCertificateList();
		    if (supplierSelfService) {
		        setTimeout(function () { initProductHospitalTree(); }, 0);
		    }
		});

		function openAddProductInfoTab() {
			var url = prefix + "/add";
			var q = [];
			var hc = ($("#productFilterHospitalCode").val() || "").trim();
			var hid = ($("#productFilterHospitalId").val() || "").trim();
			if (hc) {
				q.push("hospitalCode=" + encodeURIComponent(hc));
			}
			if (hid) {
				q.push("hospitalId=" + encodeURIComponent(hid));
			}
			if (q.length) {
				url += "?" + q.join("&");
			}
			$.modal.openTab("新增产品信息", url);
		}

		function initProductHospitalTree() {
		    var options = {
		        id: "productHospitalTree",
		        url: prefix + "/hospitalTreeData",
		        expandLevel: 1,
		        onClick: function (event, treeId, treeNode) {
		            if (!treeNode) {
		                return;
		            }
		            if (treeNode.id === 0 || treeNode.id === "0") {
		                $("#productFilterHospitalCode").val("");
		                $("#productFilterHospitalId").val("");
		            } else {
		                $("#productFilterHospitalCode").val(treeNode.hospitalCode || "");
		                var hid = treeNode.hospitalId != null && treeNode.hospitalId !== ""
		                    ? String(treeNode.hospitalId)
		                    : (treeNode.id != null ? String(treeNode.id) : "");
		                $("#productFilterHospitalId").val(hid);
		            }
		            $.table.search();
		        }
		    };
		    $.tree.init(options);
		}

		function escapeHtml(s) {
		    if (s == null || s === '') {
		        return '';
		    }
		    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
		}

		function formatDateVal(v) {
		    if (!v) {
		        return '';
		    }
		    if (typeof v === 'string' && v.indexOf(' ') > 0) {
		        return v.split(' ')[0];
		    }
		    if (typeof v === 'string' && v.indexOf('T') > 0) {
		        return v.split('T')[0];
		    }
		    return v;
		}

		function parseCertFileUrls(raw) {
		    if (!raw || typeof raw !== 'string') {
		        return [];
		    }
		    return raw.split(',').map(function (s) { return s.trim(); }).filter(function (s) { return s.length > 0; });
		}

		function toLicensePreviewUrl(fileUrl) {
		    if (!fileUrl) {
		        return '';
		    }
		    var u = String(fileUrl).trim();
		    if (u.indexOf('http://') === 0 || u.indexOf('https://') === 0) {
		        return u;
		    }
		    var ctxPath = (typeof ctx !== 'undefined' && ctx) ? ctx : '/';
		    if (ctxPath.endsWith('/')) {
		        ctxPath = ctxPath.substring(0, ctxPath.length - 1);
		    }
		    if (u.indexOf('/') === 0) {
		        return ctxPath + u;
		    }
		    return ctxPath + '/' + u;
		}

		function closeLicenseSnapImageModalIfOpen() {
		    if (window._licenseSnapModalLayerIdx != null) {
		        try {
		            top.layer.close(window._licenseSnapModalLayerIdx);
		        } catch (e0) {
		        }
		        window._licenseSnapModalLayerIdx = null;
		        window._licenseSnapModalLayero = null;
		        window._licenseSnapModalTr = null;
		    }
		}

		function refreshLicenseSnapModalList(layero) {
		    layero = $(layero);
		    var $list = layero.find('#lsmImgList');
		    if (!$list.length) {
		        return;
		    }
		    var tr = window._licenseSnapModalTr;
		    if (!tr || !tr.length) {
		        return;
		    }
		    var urls = parseCertFileUrls(tr.find('.fld-certificateFile').val());
		    var canSave = (editFlag !== 'hidden');
		    $list.empty();
		    for (var i = 0; i < urls.length; i++) {
		        var raw = urls[i];
		        var full = toLicensePreviewUrl(raw);
		        var enc = encodeURIComponent(raw);
		        var cap = raw.indexOf('/') >= 0 ? raw.substring(raw.lastIndexOf('/') + 1) : raw;
		        var $w = $('<div class="license-snap-thumb"/>');
		        var $aImg = $('<a target="_blank" rel="noopener" title="查看原图"></a>').attr('href', full);
		        $aImg.append($('<img alt=""/>').attr('src', full));
		        $w.append($aImg);
		        var $btns = $('<div style="margin-top:6px;white-space:nowrap;"></div>');
		        $btns.append($('<a class="btn btn-xs btn-default" target="_blank" rel="noopener">新窗口</a>').attr('href', full));
		        if (canSave) {
		            $btns.append(' ');
		            $btns.append($('<button type="button" class="btn btn-xs btn-danger ls-snap-modal-remove">删除</button>').attr('data-raw', enc));
		        }
		        $w.append($btns);
		        $w.append($('<div class="text-muted"/>').css({ fontSize: '11px', maxWidth: '150px', overflow: 'hidden', textOverflow: 'ellipsis' }).attr('title', cap).text(cap));
		        $list.append($w);
		    }
		    if (!urls.length) {
		        $list.append('<span class="text-muted" style="font-size:12px;">暂无图片</span>');
		    }
		}

		function openLicenseSnapImageLayer(tr, focusUpload) {
		    window._licenseSnapModalTr = tr;
		    var typeName = $.trim(tr.find('td').first().find('.label').text()) || '证照';
		    var canSave = (editFlag !== 'hidden');
		    var uploadArea = canSave
		        ? '<div class="form-group" style="margin:14px 0 0;border-top:1px solid #eee;padding-top:12px;">'
		        + '<label class="control-label" style="display:block;margin-bottom:6px;">添加图片</label>'
		        + '<button type="button" id="lsmBtnPick" class="btn btn-sm btn-success"><i class="fa fa-upload"></i> 选择并上传</button> '
		        + '<span class="text-muted" style="font-size:12px;">单张不超过 5MB，上传后自动保存</span></div>'
		        : '';
		    var uploadHint = (focusUpload && canSave)
		        ? '<p class="text-info" style="margin:0 0 8px;font-size:12px;"><i class="fa fa-info-circle"></i> 请在下方点击「选择并上传」添加图片。</p>'
		        : '';
		    var html = '<div style="padding:10px 14px 6px;">'
		        + uploadHint
		        + '<p class="text-muted" style="margin:0 0 10px;font-size:12px;">点击缩略图或「新窗口」查看原图。'
		        + (canSave ? '有编辑权限时可删除或上传；保存后下方列表会刷新，本弹窗保持打开。' : '') + '</p>'
		        + '<div id="lsmImgList" class="license-snap-img-box"></div>'
		        + uploadArea
		        + '</div>';
		    top.layer.open({
		        type: 1,
		        title: '证照图片 — ' + typeName,
		        area: ['700px', '540px'],
		        shadeClose: true,
		        maxmin: true,
		        content: html,
		        btn: ['关闭'],
		        yes: function (index) {
		            top.layer.close(index);
		        },
		        success: function (layero, index) {
		            window._licenseSnapModalLayerIdx = index;
		            window._licenseSnapModalLayero = $(layero);
		            refreshLicenseSnapModalList(window._licenseSnapModalLayero);
		            window._licenseSnapModalLayero.find('#lsmBtnPick').on('click', function () {
		                window._licenseSnapUploadTargetTr = window._licenseSnapModalTr;
		                $('#licenseSnapUploadProxy').val('');
		                var el = document.getElementById('licenseSnapUploadProxy');
		                if (el) {
		                    el.click();
		                }
		            });
		            window._licenseSnapModalLayero.on('click', '.ls-snap-modal-remove', function (e) {
		                e.preventDefault();
		                var rawEnc = $(this).attr('data-raw');
		                var raw = rawEnc ? decodeURIComponent(rawEnc) : '';
		                var tr2 = window._licenseSnapModalTr;
		                if (!tr2 || !tr2.length) {
		                    return;
		                }
		                var parts = parseCertFileUrls(tr2.find('.fld-certificateFile').val());
		                var next = parts.filter(function (u) { return u !== raw; });
		                tr2.find('.fld-certificateFile').val(next.join(','));
		                refreshLicenseSnapModalList(window._licenseSnapModalLayero);
		                $.modal.msgSuccess('已删除图片');
		                postLicenseSnapSave(tr2, true, true);
		            });
		        },
		        end: function () {
		            window._licenseSnapModalLayerIdx = null;
		            window._licenseSnapModalLayero = null;
		            window._licenseSnapModalTr = null;
		        }
		    });
		}

		function postLicenseSnapSave(tr, silent, keepImageModal) {
		    var licenseId = tr.data('license-id');
		    var certificateId = tr.data('certificate-id');
		    if (!licenseId) {
		        return;
		    }
		    var data = {
		        licenseId: licenseId,
		        licenseTitle: tr.find('.fld-licenseTitle').val(),
		        licenseNo: tr.find('.fld-licenseNo').val(),
		        issuingBodySnap: tr.find('.fld-issuingBodySnap').val(),
		        issueDate: tr.find('.fld-issueDate').val(),
		        expireDate: tr.find('.fld-expireDate').val(),
		        certificateFile: tr.find('.fld-certificateFile').val(),
		        remark: tr.find('.fld-remark').val()
		    };
		    $.post(prefix + '/licenseSnap/saveRow', data, function (res) {
		        if (res && res.code === 0) {
		            if (!silent) {
		                $.modal.msgSuccess('保存成功');
		            }
		            if (!keepImageModal) {
		                closeLicenseSnapImageModalIfOpen();
		            }
		            var afterRows = (keepImageModal && window._licenseSnapModalLayerIdx != null)
		                ? function () {
		                    if (!window._licenseSnapModalLayero || !window._licenseSnapModalLayero.length) {
		                        return;
		                    }
		                    var $newTr = $('#product-license-rows-wrap tr').filter(function () {
		                        return String($(this).attr('data-license-id')) === String(licenseId);
		                    }).first();
		                    if ($newTr.length) {
		                        window._licenseSnapModalTr = $newTr;
		                        refreshLicenseSnapModalList(window._licenseSnapModalLayero);
		                    }
		                }
		                : undefined;
		            loadProductLicenseDetail(certificateId, afterRows);
		        } else {
		            $.modal.msgError(res && res.msg ? res.msg : '保存失败');
		        }
		    });
		}

		function clearProductLicensePanel() {
		    $('#product-license-empty-tip').show();
		    $('#product-license-rows-wrap').hide().empty();
		}

		function loadProductLicenseDetail(certificateId, afterRenderCallback) {
		    if (!certificateId) {
		        clearProductLicensePanel();
		        return;
		    }
		    $('#product-license-empty-tip').hide();
		    $('#product-license-rows-wrap').show().html('<p class="text-muted" style="margin:0;">加载中…</p>');
		    $.post(prefix + '/licenseSnap/mergedRows', { certificateId: certificateId }, function (res) {
		        if (!res || res.code !== 0) {
		            $('#product-license-rows-wrap').html('<p class="text-danger">' + escapeHtml(res && res.msg ? res.msg : '加载失败') + '</p>');
		            return;
		        }
		        renderProductLicenseRows(certificateId, res.data || []);
		        if (typeof afterRenderCallback === 'function') {
		            afterRenderCallback();
		        }
		    });
		}

		function renderProductLicenseRows(certificateId, rows) {
		    var wrap = $('#product-license-rows-wrap').empty();
		    if (!rows.length) {
		        wrap.append('<p class="text-muted" style="margin:0;">当前未配置产品扩展证照类型。请在「资质证件管理 → 证件类型/证件配置」中维护 <code>product_certificate</code> 与 <code>scm_certificate_type</code>（分类 product）。</p>');
		        return;
		    }
		    var canSave = (editFlag !== 'hidden');
		    var sb = [];
		    sb.push('<table class="table table-bordered table-condensed" style="margin-bottom:0;font-size:12px;">');
		    sb.push('<thead><tr>');
		    sb.push('<th style="width:140px;">证照类型</th><th style="width:120px;">证号</th>');
		    sb.push('<th style="width:110px;">发证日期</th><th style="width:110px;">有效期至</th><th style="min-width:150px;">证照图片</th><th style="width:140px;">备注</th>');
		    if (canSave) {
		        sb.push('<th style="width:88px;">操作</th>');
		    }
		    sb.push('</tr></thead><tbody>');
		    for (var i = 0; i < rows.length; i++) {
		        var r = rows[i];
		        var lid = r.licenseId || '';
		        sb.push('<tr data-license-id="' + escapeHtml(lid) + '" data-certificate-id="' + certificateId + '">');
		        sb.push('<td><span class="label label-primary">' + escapeHtml(r.licenseKindName || '-') + '</span>');
		        sb.push('<input type="hidden" class="fld-licenseTitle" value="' + escapeHtml(r.licenseTitle || '') + '"/>');
		        sb.push('<input type="hidden" class="fld-issuingBodySnap" value="' + escapeHtml(r.issuingBodySnap || '') + '"/>');
		        sb.push('</td>');
		        sb.push('<td><input type="text" class="form-control input-sm fld-licenseNo" value="' + escapeHtml(r.licenseNo || '') + '" ' + (canSave ? '' : 'disabled') + '/></td>');
		        sb.push('<td><input type="date" class="form-control input-sm fld-issueDate" value="' + escapeHtml(formatDateVal(r.issueDate)) + '" ' + (canSave ? '' : 'disabled') + '/></td>');
		        sb.push('<td><input type="date" class="form-control input-sm fld-expireDate" value="' + escapeHtml(formatDateVal(r.expireDate)) + '" ' + (canSave ? '' : 'disabled') + '/></td>');
		        sb.push('<td style="white-space: nowrap !important;">');
		        sb.push('<input type="hidden" class="fld-certificateFile" value="' + escapeHtml(r.certificateFile || '') + '"/>');
		        sb.push('<button type="button" class="btn btn-xs btn-default ls-snap-open-view" title="查看/删除图片"><i class="fa fa-eye"></i> 查看</button> ');
		        if (canSave) {
		            sb.push('<button type="button" class="btn btn-xs btn-success ls-snap-open-upload" title="上传图片"><i class="fa fa-upload"></i> 上传</button>');
		        }
		        sb.push('</td>');
		        sb.push('<td><textarea class="form-control input-sm fld-remark" rows="3" ' + (canSave ? '' : 'disabled') + '>' + escapeHtml(r.remark || '') + '</textarea></td>');
		        if (canSave) {
		            sb.push('<td><a href="javascript:void(0)" class="btn btn-xs btn-primary" onclick="saveProductLicenseRow(this)">保存</a></td>');
		        }
		        sb.push('</tr>');
		    }
		    sb.push('</tbody></table>');
		    wrap.html(sb.join(''));
		}

		function saveProductLicenseRow(btn) {
		    var tr = $(btn).closest('tr');
		    postLicenseSnapSave(tr, false);
		}

		function initLicenseSnapImageUploadOnce() {
		    if (window._licenseSnapUploadInit) {
		        return;
		    }
		    window._licenseSnapUploadInit = true;
		    $('#licenseSnapUploadProxy').on('change', function () {
		        var file = this.files && this.files[0];
		        var tr = window._licenseSnapUploadTargetTr;
		        this.value = '';
		        if (!file || !tr || !tr.length) {
		            return;
		        }
		        if (file.size > 5 * 1024 * 1024) {
		            $.modal.msgWarning('单张图片请勿超过 5MB');
		            return;
		        }
		        var fd = new FormData();
		        fd.append('file', file);
		        $.ajax({
		            url: (typeof ctx !== 'undefined' ? ctx : '/') + 'common/upload',
		            type: 'POST',
		            data: fd,
		            processData: false,
		            contentType: false,
		            xhrFields: { withCredentials: true },
		            beforeSend: function (xhr) {
		                var tok = $('meta[name="csrf-token"]').attr('content');
		                if (tok) {
		                    xhr.setRequestHeader('X-CSRF-Token', tok);
		                }
		            },
		            success: function (rsp) {
		                if (typeof rsp === 'string') {
		                    try { rsp = JSON.parse(rsp); } catch (e1) { rsp = null; }
		                }
		                var ok = rsp && (rsp.code === 0 || rsp.code === '0' || rsp.code == 0);
		                var uploadedUrl = ok ? (rsp.url || rsp.fileName) : '';
		                if (ok && rsp.data) {
		                    if (typeof rsp.data === 'string') {
		                        uploadedUrl = rsp.data;
		                    } else if (rsp.data.url) {
		                        uploadedUrl = rsp.data.url;
		                    } else if (rsp.data.fileName) {
		                        uploadedUrl = rsp.data.fileName;
		                    }
		                }
		                if (!ok || !uploadedUrl) {
		                    $.modal.msgError(rsp && rsp.msg ? rsp.msg : '上传失败');
		                    return;
		                }
		                var $hid = tr.find('.fld-certificateFile');
		                var parts = parseCertFileUrls($hid.val());
		                if (parts.indexOf(uploadedUrl) === -1) {
		                    parts.push(uploadedUrl);
		                }
		                $hid.val(parts.join(','));
		                if (window._licenseSnapModalLayero && window._licenseSnapModalLayero.length) {
		                    refreshLicenseSnapModalList(window._licenseSnapModalLayero);
		                }
		                $.modal.msgSuccess('上传成功，已写入');
		                postLicenseSnapSave(tr, true, true);
		            },
		            error: function (xhr) {
		                $.modal.msgError(xhr && xhr.responseText ? '上传失败' : '上传失败');
		            }
		        });
		    });
		    $(document).on('click', '#product-license-rows-wrap .ls-snap-open-view', function (e) {
		        e.preventDefault();
		        openLicenseSnapImageLayer($(this).closest('tr'), false);
		    });
		    $(document).on('click', '#product-license-rows-wrap .ls-snap-open-upload', function (e) {
		        e.preventDefault();
		        openLicenseSnapImageLayer($(this).closest('tr'), true);
		    });
		}

		function queryProductCertificateList() {
		    var calculateTableHeight = function() {
		        var windowHeight = $(window).height();
		        var searchHeight = $('.search-collapse').outerHeight() || 60;
		        var toolbarHeight = $('#toolbar').outerHeight() || 40;
		        var licensePanel = 360;
		        var padding = 36;
		        return Math.max(windowHeight - searchHeight - toolbarHeight - licensePanel - padding, 200);
		    };
		    
		    var options = {
		        formId: "product-certificate-form",
		        url: prefix + "/list",
		        createUrl: prefix + "/add",
		        updateUrl: prefix + "/edit/{id}",
		        removeUrl: prefix + "/remove",
		        exportUrl: prefix + "/export",
		        sortName: "expireDate",
		        sortOrder: "asc",
		        modalName: "产品信息",
		        uniqueId: "certificateId",
		        height: calculateTableHeight(),
		        fixedColumns: false,
		        showRefresh: false,
		        showColumns: false,
		        showToggle: false,
		        onClickRow: function (row) {
		            if (row && row.certificateId) {
		                loadProductLicenseDetail(row.certificateId);
		            }
		        },
		        onLoadSuccess: function () {
		            clearProductLicensePanel();
		        },
		        columns: [{
		            checkbox: true
		        },
		        {
		            field: 'serialNumber',
		            title: '序号',
		            align: 'center',
		            formatter: function (value, row, index) {
		                return $.table.serialNumber(index);
		            }
		        },
		        {
		            field: 'certificateId',
		            title: '证件ID',
		            visible: false
		        },
		        {
		            field: 'materialName',
		            title: '产品名称',
		            formatter: function (value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'supplierName',
		            title: '供应商',
		            formatter: function (value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'specification',
		            title: '规格',
		            formatter: function (value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'model',
		            title: '型号',
		            formatter: function (value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'manufacturerName',
		            title: '生产厂家',
		            formatter: function (value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'registerNo',
		            title: '注册证号',
		            formatter: function (value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'registerIssueDate',
		            title: '发证日期',
		            sortable: true,
		            formatter: function (value, row, index) {
		                if (value) {
		                    // 如果value是日期字符串，直接返回
		                    if (typeof value === 'string' && value.indexOf('-') > -1) {
		                        return value.split(' ')[0]; // 只显示日期部分
		                    }
		                    // 如果是Date对象，格式化
		                    if (value instanceof Date) {
		                        return $.common.formatDate(value, 'yyyy-MM-dd');
		                    }
		                }
		                return '-';
		            }
		        },
		        {
		            field: 'expireDate',
		            title: '有效期至',
		            sortable: true
		        },
		        {
		        	title: '状态',
		        	align: 'center',
		        	formatter: function (value, row, index) {
		        		if (row.status == '0') {
		        			return '<span class="label label-success">正常</span>';
		        		} else {
		        			return '<span class="label label-danger">过期</span>';
		        		}
		        	}
		        },
		        {
		            field: 'createTime',
		            title: '创建时间',
		            sortable: true
		        }]
		    };
		    $.table.init(options);
		}
		
		function resetPre() {
			$("#product-certificate-form")[0].reset();
			$("#productFilterHospitalCode").val("");
			$("#productFilterHospitalId").val("");
			$.table.search();
		}

		function checkExpired() {
			$.modal.confirm("确认要检查证件过期状态吗？", function() {
				$.operate.post(prefix + "/checkExpired", {});
		    })
		}
	</script>
