<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('产品证件列表')" />
	<th:block th:include="include :: layout-latest-css" />
	<th:block th:include="include :: ztree-css" />
	<style>
		/* 表格容器滚动条样式 */
		.select-table {
			overflow-x: auto !important;
			overflow-y: auto !important;
		}
		
		/* 自定义滚动条样式 */
		.select-table::-webkit-scrollbar {
			width: 8px;
			height: 8px;
		}
		
		.select-table::-webkit-scrollbar-track {
			background: #f1f1f1;
			border-radius: 4px;
		}
		
		.select-table::-webkit-scrollbar-thumb {
			background: #888;
			border-radius: 4px;
		}
		
		.select-table::-webkit-scrollbar-thumb:hover {
			background: #555;
		}
		
		/* 确保表格可以水平滚动 */
		#bootstrap-table {
			min-width: 100%;
		}
		
		/* 表格列内数据不换行 */
		#bootstrap-table th,
		#bootstrap-table td {
			white-space: nowrap !important;
			overflow: hidden !important;
			text-overflow: ellipsis !important;
		}
	</style>
</head>
<body class="gray-bg">
	<div class="container-div" style="position: relative;">
		<div class="row">
			<!-- 供应商登录：左侧关联医院目录树，按医院筛选证件 -->
			<div class="col-sm-3" th:if="${supplierSelfService}" style="border-right: 1px solid #e7eaec; padding-right: 10px;">
				<div class="panel panel-default" style="margin-bottom: 0;">
					<div class="panel-heading" style="padding: 8px 10px;">
						<h5 class="panel-title" style="margin: 0; font-size: 14px;">
							<i class="fa fa-sitemap"></i> 关联医院
						</h5>
					</div>
					<div class="panel-body" style="padding: 8px; max-height: calc(100vh - 100px); overflow: auto;">
						<p class="text-muted" style="font-size: 12px; margin-bottom: 8px;">点击医院筛选该院相关产品证件</p>
						<div id="productHospitalTree" class="ztree"></div>
					</div>
				</div>
			</div>
			<!-- 产品证件列表 -->
			<div th:class="${supplierSelfService ? 'col-sm-9' : 'col-sm-12'}" style="display: flex; flex-direction: column; background: #fff;">
				<div class="col-sm-12 search-collapse" style="flex-shrink: 0;">
					<form id="product-certificate-form">
						<input type="hidden" name="hospitalCode" id="productFilterHospitalCode" value=""/>
						<input type="hidden" name="hospitalId" id="productFilterHospitalId" value=""/>
						<div class="select-list">
							<ul>
								<li>
									产品名称：<input type="text" name="materialName"/>
								</li>
								<li>
									注册证号：<input type="text" name="registerNo"/>
								</li>
								<li>
									状态：<select name="status">
										<option value="">所有</option>
										<option value="0">正常</option>
										<option value="1">过期</option>
									</select>
								</li>
								<li>
									<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
									<a class="btn btn-warning btn-rounded btn-sm" onclick="resetPre()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
								</li>
							</ul>
						</div>
					</form>
				</div>
				
		        <div class="btn-group-sm" id="toolbar" role="group" style="flex-shrink: 0; padding: 5px 10px;">
		        	<a class="btn btn-success" onclick="openAddProductInfoTab()" shiro:hasPermission="certificate:product:add">
	                <i class="fa fa-plus"></i> 新增
	            </a>
	             <a class="btn btn-primary single disabled" onclick="$.operate.editTab()" shiro:hasPermission="certificate:product:edit">
		            <i class="fa fa-edit"></i> 修改
		        </a>
	            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="certificate:product:remove">
	                <i class="fa fa-remove"></i> 删除
	            </a>
	            <a class="btn btn-info" onclick="checkExpired()" shiro:hasPermission="certificate:product:edit">
	                <i class="fa fa-check"></i> 检查过期
	            </a>
	            <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="certificate:product:export">
		            <i class="fa fa-download"></i> 导出
		        </a>
	        </div>
	        
	        <div class="col-sm-12" style="flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 0 10px 0 10px;">
				<div class="select-table table-striped" style="flex: 1; overflow-x: auto; overflow-y: auto; min-height: 120px; padding-bottom: 6px;">
					<table id="bootstrap-table"></table>
				</div>
				<div id="product-license-panel" class="panel panel-default" style="flex-shrink: 0; margin-bottom: 10px; border-color: #e7eaec;">
					<div class="panel-heading" style="padding: 6px 10px;">
						<strong>当前证件关联证照</strong>
						<span class="text-muted" style="font-weight: normal; font-size: 12px;">（类型来自「证件配置 product_certificate」与「证件类型」；点击上表一行加载）</span>
					</div>
					<div class="panel-body" id="product-license-panel-body" style="max-height: 280px; overflow: auto; padding: 8px 10px;">
						<p class="text-muted" id="product-license-empty-tip" style="margin: 0;">请在上方列表单击选择一条产品证件。</p>
						<div id="product-license-rows-wrap" style="display: none;"></div>
					</div>
				</div>
			</div>
			</div>
		</div>
	</div>
	
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: bootstrap-table-fixed-columns-js" />
	<th:block th:include="include :: layout-latest-js" />
	<th:block th:include="include :: ztree-js" />
	<script th:inline="javascript">
		var editFlag = [[${@permission.hasPermi('certificate:product:edit')}]];
		var removeFlag = [[${@permission.hasPermi('certificate:product:remove')}]];
		var prefix = ctx + "certificate/product";
		var supplierSelfService = /*[[${supplierSelfService}]]*/ false;

		$(function() {
		    queryProductCertificateList();
		    if (supplierSelfService) {
		        setTimeout(function () { initProductHospitalTree(); }, 0);
		    }
		});

		function openAddProductInfoTab() {
			var url = prefix + "/add";
			var q = [];
			var hc = ($("#productFilterHospitalCode").val() || "").trim();
			var hid = ($("#productFilterHospitalId").val() || "").trim();
			if (hc) {
				q.push("hospitalCode=" + encodeURIComponent(hc));
			}
			if (hid) {
				q.push("hospitalId=" + encodeURIComponent(hid));
			}
			if (q.length) {
				url += "?" + q.join("&");
			}
			$.modal.openTab("新增产品信息", url);
		}

		function initProductHospitalTree() {
		    var options = {
		        id: "productHospitalTree",
		        url: prefix + "/hospitalTreeData",
		        expandLevel: 1,
		        onClick: function (event, treeId, treeNode) {
		            if (!treeNode) {
		                return;
		            }
		            if (treeNode.id === 0 || treeNode.id === "0") {
		                $("#productFilterHospitalCode").val("");
		                $("#productFilterHospitalId").val("");
		            } else {
		                $("#productFilterHospitalCode").val(treeNode.hospitalCode || "");
		                var hid = treeNode.hospitalId != null && treeNode.hospitalId !== ""
		                    ? String(treeNode.hospitalId)
		                    : (treeNode.id != null ? String(treeNode.id) : "");
		                $("#productFilterHospitalId").val(hid);
		            }
		            $.table.search();
		        }
		    };
		    $.tree.init(options);
		}

		function escapeHtml(s) {
		    if (s == null || s === '') {
		        return '';
		    }
		    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
		}

		function formatDateVal(v) {
		    if (!v) {
		        return '';
		    }
		    if (typeof v === 'string' && v.indexOf(' ') > 0) {
		        return v.split(' ')[0];
		    }
		    if (typeof v === 'string' && v.indexOf('T') > 0) {
		        return v.split('T')[0];
		    }
		    return v;
		}

		function clearProductLicensePanel() {
		    $('#product-license-empty-tip').show();
		    $('#product-license-rows-wrap').hide().empty();
		}

		function loadProductLicenseDetail(certificateId) {
		    if (!certificateId) {
		        clearProductLicensePanel();
		        return;
		    }
		    $('#product-license-empty-tip').hide();
		    $('#product-license-rows-wrap').show().html('<p class="text-muted" style="margin:0;">加载中…</p>');
		    $.post(prefix + '/licenseSnap/mergedRows', { certificateId: certificateId }, function (res) {
		        if (!res || res.code !== 0) {
		            $('#product-license-rows-wrap').html('<p class="text-danger">' + escapeHtml(res && res.msg ? res.msg : '加载失败') + '</p>');
		            return;
		        }
		        renderProductLicenseRows(certificateId, res.data || []);
		    });
		}

		function renderProductLicenseRows(certificateId, rows) {
		    var wrap = $('#product-license-rows-wrap').empty();
		    if (!rows.length) {
		        wrap.append('<p class="text-muted" style="margin:0;">当前未配置产品扩展证照类型。请在「资质证件管理 → 证件类型/证件配置」中维护 <code>product_certificate</code> 与 <code>scm_certificate_type</code>（分类 product）。</p>');
		        return;
		    }
		    var canSave = (editFlag === true || editFlag === 'true');
		    var sb = [];
		    sb.push('<table class="table table-bordered table-condensed" style="margin-bottom:0;font-size:12px;">');
		    sb.push('<thead><tr>');
		    sb.push('<th style="width:160px;">证照类型</th><th style="width:120px;">标题</th><th style="width:140px;">证号</th><th style="width:120px;">发证机关</th>');
		    sb.push('<th style="width:110px;">发证日期</th><th style="width:110px;">有效期至</th><th>证照影像</th><th style="width:160px;">备注</th>');
		    if (canSave) {
		        sb.push('<th style="width:70px;">操作</th>');
		    }
		    sb.push('</tr></thead><tbody>');
		    for (var i = 0; i < rows.length; i++) {
		        var r = rows[i];
		        var lid = r.licenseId || '';
		        sb.push('<tr data-license-id="' + escapeHtml(lid) + '" data-certificate-id="' + certificateId + '">');
		        sb.push('<td><span class="label label-primary">' + escapeHtml(r.licenseKindName || '-') + '</span><br/><span class="text-muted">' + escapeHtml(r.licenseKindCode || '') + '</span></td>');
		        sb.push('<td><input type="text" class="form-control input-sm fld-licenseTitle" value="' + escapeHtml(r.licenseTitle || '') + '" ' + (canSave ? '' : 'disabled') + '/></td>');
		        sb.push('<td><input type="text" class="form-control input-sm fld-licenseNo" value="' + escapeHtml(r.licenseNo || '') + '" ' + (canSave ? '' : 'disabled') + '/></td>');
		        sb.push('<td><input type="text" class="form-control input-sm fld-issuingBodySnap" value="' + escapeHtml(r.issuingBodySnap || '') + '" ' + (canSave ? '' : 'disabled') + '/></td>');
		        sb.push('<td><input type="date" class="form-control input-sm fld-issueDate" value="' + escapeHtml(formatDateVal(r.issueDate)) + '" ' + (canSave ? '' : 'disabled') + '/></td>');
		        sb.push('<td><input type="date" class="form-control input-sm fld-expireDate" value="' + escapeHtml(formatDateVal(r.expireDate)) + '" ' + (canSave ? '' : 'disabled') + '/></td>');
		        sb.push('<td><textarea class="form-control input-sm fld-certificateFile" rows="2" ' + (canSave ? '' : 'disabled') + '>' + escapeHtml(r.certificateFile || '') + '</textarea></td>');
		        sb.push('<td><textarea class="form-control input-sm fld-remark" rows="2" ' + (canSave ? '' : 'disabled') + '>' + escapeHtml(r.remark || '') + '</textarea></td>');
		        if (canSave) {
		            sb.push('<td><a href="javascript:void(0)" class="btn btn-xs btn-primary" onclick="saveProductLicenseRow(this)">保存</a></td>');
		        }
		        sb.push('</tr>');
		    }
		    sb.push('</tbody></table>');
		    wrap.html(sb.join(''));
		}

		function saveProductLicenseRow(btn) {
		    var tr = $(btn).closest('tr');
		    var licenseId = tr.data('license-id');
		    if (!licenseId) {
		        $.modal.msgWarning('缺少证照行ID');
		        return;
		    }
		    var data = {
		        licenseId: licenseId,
		        licenseTitle: tr.find('.fld-licenseTitle').val(),
		        licenseNo: tr.find('.fld-licenseNo').val(),
		        issuingBodySnap: tr.find('.fld-issuingBodySnap').val(),
		        issueDate: tr.find('.fld-issueDate').val(),
		        expireDate: tr.find('.fld-expireDate').val(),
		        certificateFile: tr.find('.fld-certificateFile').val(),
		        remark: tr.find('.fld-remark').val()
		    };
		    $.post(prefix + '/licenseSnap/saveRow', data, function (res) {
		        if (res && res.code === 0) {
		            $.modal.msgSuccess('保存成功');
		            loadProductLicenseDetail(tr.data('certificate-id'));
		        } else {
		            $.modal.msgError(res && res.msg ? res.msg : '保存失败');
		        }
		    });
		}

		function queryProductCertificateList() {
		    var calculateTableHeight = function() {
		        var windowHeight = $(window).height();
		        var searchHeight = $('.search-collapse').outerHeight() || 60;
		        var toolbarHeight = $('#toolbar').outerHeight() || 40;
		        var licensePanel = 300;
		        var padding = 36;
		        return Math.max(windowHeight - searchHeight - toolbarHeight - licensePanel - padding, 200);
		    };
		    
		    var options = {
		        formId: "product-certificate-form",
		        url: prefix + "/list",
		        createUrl: prefix + "/add",
		        updateUrl: prefix + "/edit/{id}",
		        removeUrl: prefix + "/remove",
		        exportUrl: prefix + "/export",
		        sortName: "expireDate",
		        sortOrder: "asc",
		        modalName: "产品信息",
		        uniqueId: "certificateId",
		        height: calculateTableHeight(),
		        fixedColumns: false,
		        showRefresh: false,
		        showColumns: false,
		        showToggle: false,
		        onClickRow: function (row) {
		            if (row && row.certificateId) {
		                loadProductLicenseDetail(row.certificateId);
		            }
		        },
		        onLoadSuccess: function () {
		            clearProductLicensePanel();
		        },
		        columns: [{
		            checkbox: true
		        },
		        {
		            field: 'serialNumber',
		            title: '序号',
		            align: 'center',
		            formatter: function (value, row, index) {
		                return $.table.serialNumber(index);
		            }
		        },
		        {
		            field: 'certificateId',
		            title: '证件ID',
		            visible: false
		        },
		        {
		            field: 'materialName',
		            title: '产品名称',
		            formatter: function (value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'supplierName',
		            title: '供应商',
		            formatter: function (value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'specification',
		            title: '规格',
		            formatter: function (value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'model',
		            title: '型号',
		            formatter: function (value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'manufacturerName',
		            title: '生产厂家',
		            formatter: function (value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'registerNo',
		            title: '注册证号',
		            formatter: function (value, row, index) {
		                return value || '-';
		            }
		        },
		        {
		            field: 'registerIssueDate',
		            title: '发证日期',
		            sortable: true,
		            formatter: function (value, row, index) {
		                if (value) {
		                    // 如果value是日期字符串，直接返回
		                    if (typeof value === 'string' && value.indexOf('-') > -1) {
		                        return value.split(' ')[0]; // 只显示日期部分
		                    }
		                    // 如果是Date对象，格式化
		                    if (value instanceof Date) {
		                        return $.common.formatDate(value, 'yyyy-MM-dd');
		                    }
		                }
		                return '-';
		            }
		        },
		        {
		            field: 'expireDate',
		            title: '有效期至',
		            sortable: true
		        },
		        {
		        	title: '状态',
		        	align: 'center',
		        	formatter: function (value, row, index) {
		        		if (row.status == '0') {
		        			return '<span class="label label-success">正常</span>';
		        		} else {
		        			return '<span class="label label-danger">过期</span>';
		        		}
		        	}
		        },
		        {
		            field: 'createTime',
		            title: '创建时间',
		            sortable: true
		        }]
		    };
		    $.table.init(options);
		}
		
		function resetPre() {
			$("#product-certificate-form")[0].reset();
			$("#productFilterHospitalCode").val("");
			$("#productFilterHospitalId").val("");
			$.table.search();
		}

		function checkExpired() {
			$.modal.confirm("确认要检查证件过期状态吗？", function() {
				$.operate.post(prefix + "/checkExpired", {});
		    })
		}
	</script>
</body>
</html>
