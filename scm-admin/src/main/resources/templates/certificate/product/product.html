<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('产品证件登记')" />
	<th:block th:include="include :: layout-latest-css" />
	<style>
		#bootstrap-table-hospital td,
		#bootstrap-table-hospital th {
			white-space: nowrap !important;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.audit-page-wrap.container-div {
			--audit-page-gap: 10px;
			height: 100%;
			overflow: hidden;
			padding: 0 var(--audit-page-gap);
			display: flex;
			flex-direction: column;
			box-sizing: border-box;
		}

		body.gray-bg:has(.audit-page-wrap) {
			height: 100%;
			overflow: hidden;
		}

		.audit-page-wrap > .audit-search-area.search-collapse {
			flex: 0 0 auto;
			width: 100%;
			max-width: 100%;
			margin: var(--audit-page-gap) 0 0;
			padding: 10px 15px 13px;
			box-sizing: border-box;
			border-radius: 6px;
			float: none;
		}

		.audit-page-row {
			display: flex;
			flex-direction: column;
			flex: 1 1 auto;
			min-height: 0;
			height: auto;
			margin: 0;
			width: 100%;
		}

		.audit-page-row > .audit-split-area {
			padding-left: 0;
			padding-right: 0;
			float: none;
			width: 100%;
		}

		.audit-page-wrap > .audit-page-row {
			margin-top: var(--audit-page-gap);
		}

		.audit-split-area {
			flex: 1;
			display: flex;
			min-height: 0;
			overflow: hidden;
			margin-top: 0;
			padding: 0 0 var(--audit-page-gap);
			width: 100%;
			box-sizing: border-box;
		}

		.audit-left-panel {
			width: 25%;
			flex-shrink: 0;
			border-right: 1px solid #e7eaec;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			background: #fff;
			border-radius: 6px;
			box-shadow: 1px 1px 3px rgba(0,0,0,.2);
			margin-right: 10px;
		}

		.audit-left-panel .audit-left-panel-heading {
			background-color: #3c8dbc;
			border-color: #3c8dbc;
			color: #fff;
			padding: 6px 10px;
			flex-shrink: 0;
			border-radius: 6px 6px 0 0;
		}

		.audit-left-panel .audit-left-panel-heading .panel-title {
			color: #fff;
		}

		.audit-left-panel .audit-left-panel-body {
			padding: 0 5px 5px;
			flex: 1;
			overflow: hidden;
			display: flex;
			flex-direction: column;
			min-height: 0;
		}

		.audit-left-panel .audit-left-table-wrap {
			flex: 1;
			overflow: hidden;
			min-height: 0;
			width: 100%;
			margin-top: 0 !important;
			box-shadow: none;
			border-radius: 0;
			padding-top: 0;
		}

		.audit-left-panel .fixed-table-header {
			position: sticky !important;
			top: 0 !important;
			z-index: 2;
			background: #fff;
		}

		.audit-left-panel .fixed-table-header thead th {
			background-color: #f5f5f5 !important;
			border-bottom: 1px solid #e7eaec !important;
			padding-top: 6px !important;
			padding-bottom: 6px !important;
		}

		.audit-left-panel .fixed-table-container {
			padding-top: 0 !important;
		}

		.audit-right-area {
			--audit-inner-padding: 10px;
			flex: 1;
			min-width: 0;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			min-height: 0;
		}

		.audit-right-area #toolbar {
			flex-shrink: 0;
			padding: 0 var(--audit-inner-padding) 5px;
			margin-bottom: 0;
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			gap: 8px;
		}

		.audit-right-area #toolbar .toolbar-filter-item {
			display: inline-flex;
			align-items: center;
			margin: 0;
			font-weight: normal;
		}

		.audit-right-area #toolbar .toolbar-filter-label {
			margin-right: 6px;
			white-space: nowrap;
			font-size: 13px;
		}

		.audit-right-area #toolbar .toolbar-filter-input {
			width: 140px;
			height: 30px;
		}

		.audit-right-area #toolbar .toolbar-filter-select {
			width: 120px;
			height: 30px;
			padding: 5px 10px;
		}

		.audit-right-area #toolbar .dropdown-menu > li > a {
			padding: 6px 16px;
		}

		.audit-right-area #toolbar .dropdown-menu > li > a.disabled {
			color: #bbb;
			cursor: not-allowed;
			pointer-events: none;
		}

		.audit-right-area .audit-table-wrap.audit-list-table {
			flex: 1 1 57%;
			min-height: 160px;
			padding-bottom: 4px;
		}

		.audit-right-area .audit-cert-detail-wrap {
			flex: 1 1 43%;
			min-height: 170px;
			margin: 0;
			padding: 0 var(--audit-inner-padding) 0;
			overflow: hidden;
			display: flex;
			flex-direction: column;
			box-sizing: border-box;
		}

		.audit-right-area .audit-cert-detail-wrap > .bootstrap-table {
			flex: 1 1 auto;
			min-height: 0;
		}

		.audit-right-area .audit-cert-detail-wrap .bootstrap-table {
			display: flex;
			flex-direction: column;
			height: 100%;
		}

		.audit-right-area .audit-cert-detail-wrap .fixed-table-container {
			flex: 1 1 auto;
			min-height: 0;
			overflow: hidden !important;
		}

		.audit-right-area .audit-cert-detail-wrap .fixed-table-body {
			overflow-x: auto !important;
			overflow-y: auto !important;
		}

		.audit-right-area .audit-table-wrap {
			position: relative;
			flex: 1;
			min-height: 200px;
			overflow: hidden !important;
			padding: 0 var(--audit-inner-padding) var(--audit-inner-padding);
			margin-top: 0 !important;
			margin-bottom: 0;
			box-sizing: border-box;
			display: flex;
			flex-direction: column;
		}

		.audit-right-area .audit-table-wrap > .bootstrap-table {
			flex: 1 1 auto;
			min-height: 0;
		}

		.audit-right-area .audit-table-wrap .bootstrap-table {
			display: flex;
			flex-direction: column;
			height: 100%;
			padding-bottom: 0;
		}

		.audit-right-area .audit-table-wrap .fixed-table-toolbar {
			padding-right: 2px;
		}

		.audit-right-area .audit-table-wrap .fixed-table-toolbar .columns,
		.audit-right-area .audit-table-wrap .fixed-table-toolbar .pull-right {
			margin-right: 0;
		}

		.audit-right-area .audit-table-wrap .fixed-table-container {
			flex: 1 1 auto;
			min-height: 0;
			overflow: hidden !important;
			padding-bottom: 0;
		}

		.audit-right-area .audit-table-wrap .fixed-table-body {
			overflow-x: auto !important;
			overflow-y: auto !important;
		}

		.audit-right-area .audit-table-wrap .fixed-table-pagination {
			position: relative;
			flex-shrink: 0;
			left: auto;
			right: auto;
			bottom: auto;
			margin: 0 !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination {
			display: flex;
			flex-wrap: nowrap;
			align-items: center;
			justify-content: space-between;
			gap: 8px;
			padding: 4px 10px;
			border-top: 1px solid #eee;
			background: #fff;
			z-index: 3;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination::after {
			display: none;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination > .pagination-detail,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination > .pagination {
			float: none !important;
			margin-top: 0 !important;
			margin-bottom: 0 !important;
			flex: 0 0 auto;
			white-space: nowrap;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination > .pagination-detail {
			flex: 1 1 auto;
			min-width: 0;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination .page-list select {
			display: none !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination .page-list::after {
			content: '10';
			display: inline-block;
			min-width: 18px;
			text-align: center;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-body .fixed-table-border {
			display: none !important;
			height: 0 !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-header {
			position: relative !important;
			top: auto !important;
			z-index: 2;
			background: #fff;
			overflow: hidden;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header th .th-inner,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header th .sortable {
			text-align: center !important;
			justify-content: center;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header th,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body tbody td {
			box-sizing: border-box;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-body tbody td {
			white-space: nowrap;
			vertical-align: middle !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="materialName"],
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="supplierName"],
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="manufacturerName"] {
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="materialName"] .tooltip-show {
			display: inline-block;
			max-width: 100%;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			vertical-align: middle;
		}

		.audit-right-area .audit-cert-detail-wrap .fixed-table-header {
			position: relative !important;
			top: auto !important;
			z-index: 2;
			background: #fff;
			overflow: hidden;
		}

		.audit-page-wrap > .audit-search-area.search-collapse {
			padding-top: 10px !important;
			padding-bottom: 10px !important;
		}

		.container-div .audit-search-area .select-list ul {
			margin-bottom: 0;
		}

		.container-div .audit-search-area .select-list li {
			margin: 4px 15px 4px 0;
		}

		#bootstrap-table-hospital {
			visibility: visible !important;
		}

		#bootstrap-table-hospital + .fixed-table-container {
			visibility: visible !important;
			display: block !important;
		}

		.audit-left-panel .select-table {
			overflow: auto !important;
			visibility: visible !important;
		}

		.audit-left-panel .fixed-table-container {
			height: 100% !important;
			overflow: visible !important;
		}

		.audit-left-panel .fixed-table-body {
			overflow-y: auto !important;
			overflow-x: hidden !important;
		}
	</style>
</head>
<body class="gray-bg">
	<div class="container-div audit-page-wrap">
		<div class="row audit-page-row">
			<div class="audit-split-area">
				<div class="audit-left-panel">
					<div class="panel panel-default" style="margin-bottom: 0; display: flex; flex-direction: column; height: 100%; border: none; box-shadow: none;">
						<div class="panel-heading audit-left-panel-heading">
							<h5 class="panel-title" style="margin: 0; font-size: 14px;">
								<i class="fa fa-hospital-o"></i> 医院
							</h5>
						</div>
						<div class="panel-body audit-left-panel-body">
							<div class="select-table table-striped audit-left-table-wrap">
								<table id="bootstrap-table-hospital" style="width: 100%;"></table>
							</div>
						</div>
					</div>
				</div>

				<div class="audit-right-area">
					<form id="product-certificate-form">
						<input type="hidden" name="hospitalCode" id="productFilterHospitalCode" value=""/>
						<input type="hidden" name="hospitalId" id="productFilterHospitalId" value=""/>
						<div class="btn-group-sm" id="toolbar" role="group">
							<label class="toolbar-filter-item">
								<span class="toolbar-filter-label">产品名称</span>
								<input type="text" name="materialName" class="form-control input-sm toolbar-filter-input"/>
							</label>
							<label class="toolbar-filter-item">
								<span class="toolbar-filter-label">状态</span>
								<select name="status" class="form-control input-sm toolbar-filter-select">
									<option value="">所有</option>
									<option value="0">正常</option>
									<option value="1">过期</option>
								</select>
							</label>
							<a class="btn btn-primary btn-sm" onclick="searchProductList()"><i class="fa fa-search"></i>&nbsp;搜索</a>
							<a class="btn btn-success" onclick="openAddProductInfoTab()" shiro:hasPermission="certificate:product:add">
								<i class="fa fa-plus"></i> 新增
							</a>
							<div class="btn-group">
								<button type="button" class="btn btn-default dropdown-toggle" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
									<i class="fa fa-bars"></i> 更多操作 <span class="caret"></span>
								</button>
								<ul class="dropdown-menu" role="menu">
									<li>
										<a href="javascript:void(0)" class="single disabled btn-product-edit" onclick="editProductTabGuard()" shiro:hasPermission="certificate:product:edit">
											<i class="fa fa-edit"></i> 修改
										</a>
									</li>
									<li>
										<a href="javascript:void(0)" class="multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="certificate:product:remove">
											<i class="fa fa-remove"></i> 删除
										</a>
									</li>
									<li>
										<a href="javascript:void(0)" onclick="checkExpired()" shiro:hasPermission="certificate:product:edit">
											<i class="fa fa-check"></i> 检查过期
										</a>
									</li>
									<li>
										<a href="javascript:void(0)" onclick="$.table.exportExcel()" shiro:hasPermission="certificate:product:export">
											<i class="fa fa-download"></i> 导出
										</a>
									</li>
									<li>
										<a href="javascript:void(0)" onclick="$.table.importTemplate()" shiro:hasPermission="certificate:product:add">
											<i class="fa fa-file-excel-o"></i> 下载模板
										</a>
									</li>
									<li>
										<a href="javascript:void(0)" onclick="importProductCatalog()" shiro:hasPermission="certificate:product:add">
											<i class="fa fa-upload"></i> 导入目录
										</a>
									</li>
									<li>
										<a href="javascript:void(0)" onclick="syncOrderCatalog()" shiro:hasPermission="certificate:product:add">
											<i class="fa fa-file-text-o"></i> 下载订单目录
										</a>
									</li>
								</ul>
							</div>
						</div>
					</form>

					<div class="select-table table-striped audit-table-wrap audit-list-table">
						<table id="bootstrap-table"></table>
					</div>

					<div class="select-table table-striped audit-cert-detail-wrap">
						<table id="bootstrap-table-cert-detail"></table>
					</div>
				</div>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:src="@{/js/common/scmCosDownload.js}"></script>
	<script th:src="@{/js/certificate/certCosPreview.js}"></script>
	<script th:inline="javascript">
		var prefix = ctx + "certificate/product";
		var supplierSelfService = /*[[${supplierSelfService}]]*/ false;
		var bindSupplierId = /*[[${bindSupplierId}]]*/ null;
		var selectedHospitalId = null;
		var allHospitals = [];
		var productTableId = 'bootstrap-table';
		var certDetailTableId = 'bootstrap-table-cert-detail';
		var selectedCertificateId = null;
		var selectedProductRow = null;

		$(function() {
			initLeftHospitalTable();
			initCertDetailTable();
			queryProductCertificateList();

			$(window).resize(function() {
				adjustProductTableHeight();
				adjustCertDetailTableHeight();
				setTimeout(refreshProductTableLayout, 100);
				var $hospitalTable = $('#bootstrap-table-hospital');
				if ($hospitalTable.length && $hospitalTable.bootstrapTable('getOptions')) {
					$hospitalTable.bootstrapTable('resetView', { height: calculateLeftHospitalTableHeight() });
				}
			});

			setTimeout(function() {
				adjustProductTableHeight();
				adjustCertDetailTableHeight();
			}, 300);
		});

		function formatCertDate(value) {
			if (!value) {
				return '-';
			}
			if (typeof value === 'string' && value.indexOf('-') > -1) {
				return value.split(' ')[0];
			}
			if (value instanceof Date && typeof $.common !== 'undefined' && $.common.formatDate) {
				return $.common.formatDate(value, 'yyyy-MM-dd');
			}
			return value;
		}

		function calculateCertDetailTableHeight() {
			var $wrap = $('.audit-cert-detail-wrap');
			if ($wrap.length === 0) {
				return 180;
			}
			return Math.max($wrap.innerHeight() - 2, 120);
		}

		function adjustCertDetailTableHeight() {
			var $table = $('#' + certDetailTableId);
			if ($table.length === 0 || !$table.bootstrapTable('getOptions')) {
				return;
			}
			$table.bootstrapTable('resetView', { height: calculateCertDetailTableHeight() });
		}

		function initCertDetailTable() {
			$('#' + certDetailTableId).bootstrapTable({
				locale: 'zh-CN',
				striped: true,
				cache: false,
				pagination: false,
				showRefresh: false,
				showColumns: false,
				showToggle: false,
				search: false,
				sortable: true,
				sortName: 'licenseNo',
				sortOrder: 'asc',
				height: calculateCertDetailTableHeight(),
				data: [],
				columns: [{
					field: 'serialNumber',
					title: '序号',
					align: 'center',
					width: 60,
					formatter: function(value, row, index) {
						return index + 1;
					}
				},
				{
					field: 'licenseKindCode',
					title: '证件编号',
					align: 'left',
					sortable: true,
					formatter: function(value, row) {
						return value || row.licenseKindCode || '-';
					}
				},
				{
					field: 'licenseKindName',
					title: '证件类型',
					align: 'left',
					sortable: true,
					formatter: function(value, row) {
						return value || row.licenseKindCode || '-';
					}
				},
				{
					field: 'licenseNo',
					title: '证件编码',
					align: 'left',
					sortable: true,
					formatter: function(value) {
						return value || '-';
					}
				},
				{
					field: 'expireDate',
					title: '证件有效期',
					align: 'center',
					width: 120,
					sortable: true,
					formatter: function(value) {
						return formatCertDate(value);
					}
				},
				(function() {
					var previewCol = getCertSnapPreviewColumn();
					previewCol.sortable = true;
					return previewCol;
				})(),
				{
					field: 'snapUploadAction',
					title: '上传',
					align: 'center',
					width: 72,
					formatter: function() {
						return '<a class="btn btn-success btn-xs cert-detail-upload-btn" href="javascript:void(0)" title="上传证照"><i class="fa fa-upload"></i></a>';
					},
					events: {
						'click .cert-detail-upload-btn': function(e, value, row) {
							e.preventDefault();
							e.stopPropagation();
							openCertDetailUploadTab(row);
						}
					}
				},
				{
					field: 'createBy',
					title: '上传人',
					align: 'center',
					width: 100,
					formatter: function(value) {
						return value || '-';
					}
				},
				{
					field: 'createTime',
					title: '上传日期',
					align: 'center',
					width: 120,
					formatter: function(value) {
						return formatCertDate(value);
					}
				}]
			});
		}

		function findProductRowByCertificateId(certificateId) {
			if (!certificateId) {
				return null;
			}
			var data = $('#' + productTableId).bootstrapTable('getData') || [];
			for (var i = 0; i < data.length; i++) {
				if (data[i] && data[i].certificateId == certificateId) {
					return data[i];
				}
			}
			return selectedProductRow;
		}

		function openCertDetailUploadTab(row) {
			if (!selectedCertificateId) {
				$.modal.alertWarning('请先选择一条产品记录');
				return;
			}
			if (!row || !row.licenseId) {
				$.modal.alertWarning('证照记录无效');
				return;
			}
			var productRow = findProductRowByCertificateId(selectedCertificateId);
			if (productRow && isProductAudited(productRow)) {
				$.modal.msgWarning('已审核的产品不能修改');
				return;
			}
			$.modal.openTab('修改产品信息', prefix + '/edit/' + selectedCertificateId);
		}
		window.openCertDetailUploadTab = openCertDetailUploadTab;

		function loadCertDetailRows(certificateId) {
			selectedCertificateId = certificateId || null;
			var $detail = $('#' + certDetailTableId);
			if (!$detail.bootstrapTable('getOptions')) {
				return;
			}

		function calculateProductTableHeight() {
			var $wrap = $('.audit-right-area .audit-list-table');
			if ($wrap.length === 0) {
				return 400;
			}
			var wrapH = $wrap[0].clientHeight;
			if (!wrapH) {
				var outerToolbarH = $('#toolbar').outerHeight(true) || 40;
				var detailH = $('.audit-cert-detail-wrap').outerHeight(true) || 200;
				wrapH = $('.audit-right-area').height() - outerToolbarH - detailH - 10;
			}
			var $bt = $wrap.find('.bootstrap-table');
			if ($bt.length === 0) {
				return Math.max(wrapH - 50, 200);
			}
			var btToolbarH = $bt.find('.fixed-table-toolbar').outerHeight(true) || 0;
			var pagH = $bt.find('.fixed-table-pagination').outerHeight(true) || 46;
			return Math.max(Math.floor(wrapH - btToolbarH - pagH - 2), 200);
		}

		function renderImportValidateResult(layero, result) {
			var $box = layero.find('#importValidateResult');
			if (!result) {
				$box.html('<div class="text-danger">校验请求失败</div>');
				return;
			}
			if (result.code == web_status.SUCCESS && result.data) {
				var d = result.data;
				var html = '<div class="text-success"><i class="fa fa-check-circle"></i> ' + (result.msg || '校验通过') + '</div>';
				html += '<div class="text-muted" style="margin-top:4px;">有效 ' + (d.validCount || 0) + ' 条';
				if (d.willInsertCount > 0) {
					html += '，新增 ' + d.willInsertCount + ' 条';
				}
				if (d.willUpdateCount > 0) {
					html += '，更新 ' + d.willUpdateCount + ' 条';
				}
				html += '</div>';
				$box.html(html);
				return;
			}
			var html = '<div class="text-danger"><i class="fa fa-exclamation-circle"></i> ' + (result.msg || '校验未通过') + '</div>';
			if (result.data && result.data.errors && result.data.errors.length) {
				html += '<ul class="list-unstyled" style="margin:8px 0 0;padding-left:0;max-height:160px;overflow:auto;">';
				$.each(result.data.errors, function(i, err) {
					html += '<li style="margin-bottom:4px;line-height:1.5;">';
					if (err.rowNum > 0) {
						html += '<strong>第' + err.rowNum + '行</strong> ';
					}
					if (err.materialName) {
						html += '「' + escapeImportHtml(err.materialName) + '」';
					}
					html += escapeImportHtml(err.message || '');
					html += '</li>';
				});
				html += '</ul>';
			}
			$box.html(html);
		}

		function requestImportCatalogValidate(layero, callback) {
			var file = layero.find('#file').val();
			if (file == '' || (!$.common.endWith(file, '.xls') && !$.common.endWith(file, '.xlsx'))) {
				$.modal.msgWarning("请选择后缀为 “xls”或“xlsx”的文件。");
				if (callback) {
					callback(false, null);
				}
				return;
			}
			layero.find('#importValidateResult').html('<div class="text-muted"><i class="fa fa-spinner fa-spin"></i> 正在解析并校验文件...</div>');
			$.ajax({
				url: prefix + "/validateImportCatalog",
				data: buildImportValidateFormData(layero),
				cache: false,
				contentType: false,
				processData: false,
				type: 'POST',
				success: function(result) {
					renderImportValidateResult(layero, result);
					layero.data('importValidatePassed', result.code == web_status.SUCCESS);
					if (callback) {
						callback(result.code == web_status.SUCCESS, result);
					}
				},
				error: function() {
					layero.find('#importValidateResult').html('<div class="text-danger">文件校验失败，请稍后重试</div>');
					if (callback) {
						callback(false, null);
					}
				}
			});
		}

				cache: false,
				contentType: false,
				processData: false,
				type: 'POST',
				success: function(result) {
					if (result.code == web_status.SUCCESS) {
						$.modal.close(loadIdx);
						$.modal.closeAll();
						$.modal.alertSuccess(result.msg);
						$('#' + productTableId).bootstrapTable('refresh');
					} else if (result.code == web_status.WARNING) {
						$.modal.close(loadIdx);
						$.modal.enable();
						$.modal.alertWarning(result.msg);
					} else {
						$.modal.close(loadIdx);
						$.modal.enable();
						renderImportValidateResult(layero, result);
						$.modal.alertError(result.msg);
					}
				},
				error: function() {
					$.modal.close(loadIdx);
					$.modal.enable();
					$.modal.alertError('导入失败');
				},
				complete: function() {
					layero.find('#file').val('');
					layero.find('#importValidateResult').empty();
				}
			});
		}

		function importProductCatalog() {
			if (!requireSelectedHospital()) {
				return;
			}
			var _width = "520";
			var _height = "380";
			top.layer.open({
				type: 1,
				area: [_width + 'px', _height + 'px'],
				fix: false,
				maxmin: true,
				shade: 0.3,
				title: '导入产品目录',
				content: $('#productCatalogImportTpl').html(),
				btn: ['<i class="fa fa-check"></i> 导入', '<i class="fa fa-remove"></i> 取消'],
				shadeClose: true,
				success: function(layero) {
					layero.find('#file').on('change', function() {
						layero.data('importValidatePassed', false);
						if (!$(this).val()) {
							layero.find('#importValidateResult').empty();
							return;
						}
						requestImportCatalogValidate(layero);
					});
					layero.find('#updateSupport').on('change', function() {
						layero.data('importValidatePassed', false);
						if (layero.find('#file').val()) {
							requestImportCatalogValidate(layero);
						}
					});
				},
				btn1: function(index, layero) {
					var loadIdx = top.layer.load(2, { shade: false });
					$.modal.disable();
					if (layero.data('importValidatePassed') && layero.find('#file').val()) {
						doImportProductCatalog(layero, loadIdx);
						return false;
					}
					requestImportCatalogValidate(layero, function(passed) {
						if (!passed) {
							$.modal.close(loadIdx);
							$.modal.enable();
							$.modal.msgWarning("文件校验未通过，请根据下方提示修正后重试");
							return;
						}
						doImportProductCatalog(layero, loadIdx);
					});
					return false;
				}
			});
		}

		function syncOrderCatalog() {
			if (!requireSelectedHospital()) {
				return;
			}
			$.modal.confirm("确认从订单同步产品目录到当前医院吗？<br/>以<strong>耗材编码</strong>为唯一标识：已存在的将更新信息（如注册证号），不存在的将新增。", function() {
				var postData = {
					hospitalId: selectedHospitalId,
					hospitalCode: ($('#productFilterHospitalCode').val() || '').trim()
				};
				if (supplierSelfService && bindSupplierId != null) {
					postData.supplierId = bindSupplierId;
				}
				$.modal.loading("正在同步订单目录，请稍候...");
				$.ajax({
					url: prefix + "/syncOrderCatalog",
					type: "post",
					dataType: "json",
					data: postData,
					beforeSend: function(xhr) {
						var csrftoken = $('meta[name=csrf-token]').attr('content');
						if ($.common.isNotEmpty(csrftoken)) {
							xhr.setRequestHeader("X-CSRF-Token", csrftoken);
						}
					},
					success: function(result) {
						if (result.code == web_status.SUCCESS) {
							$.modal.msgSuccess(result.msg);
							$('#' + productTableId).bootstrapTable('refresh');
							loadCertDetailRows(null);
						} else if (result.code == web_status.WARNING) {
							$.modal.alertWarning(result.msg);
						} else {
							$.modal.alertError(result.msg || '同步失败');
						}
					},
					error: function() {
						$.modal.alertError('同步失败，请稍后重试');
					},
					complete: function() {
						$.modal.closeLoading();
					}
				});
			});
		}

		function downloadOrderCatalog() {
			if (!requireSelectedHospital()) {
				return;
			}
			$.modal.confirm("确定导出当前医院的订单目录 Excel 吗？", function() {
				var dataParam = $("#product-certificate-form").serializeArray();
				dataParam.push({ name: "hospitalId", value: selectedHospitalId });
				if (supplierSelfService && bindSupplierId != null) {
					dataParam.push({ name: "supplierId", value: bindSupplierId });
				}
				$.modal.loading("正在导出数据，请稍候...");
				var body = new URLSearchParams();
				$.each(dataParam, function(i, item) {
					body.append(item.name, item.value == null ? '' : item.value);
				});
				var headers = {};
				var csrftoken = $('meta[name=csrf-token]').attr('content');
				if ($.common.isNotEmpty(csrftoken)) {
					headers['X-CSRF-Token'] = csrftoken;
				}
				fetch(prefix + "/exportOrderCatalog", {
					method: 'POST',
					headers: headers,
					body: body,
					credentials: 'same-origin'
				}).then(function(response) {
					var ctype = (response.headers.get('Content-Type') || '').toLowerCase();
					if (ctype.indexOf('application/json') !== -1) {
						return response.json().then(function(result) {
							$.modal.closeLoading();
							if (result.code == web_status.SUCCESS && result.msg) {
								window.location.href = ctx + "common/download?fileName=" + encodeURIComponent(result.msg) + "&delete=" + true;
							} else if (result.code == web_status.WARNING) {
								$.modal.alertWarning(result.msg);
							} else {
								$.modal.alertError(result.msg || '导出失败');
							}
						});
					}
					if (!response.ok) {
						$.modal.closeLoading();
						$.modal.alertError('导出失败（HTTP ' + response.status + '）');
						return;
					}
					return response.blob().then(function(blob) {
						$.modal.closeLoading();
						var fileName = '订单目录.xlsx';
						var cd = response.headers.get('Content-Disposition');
						if ($.common.isNotEmpty(cd)) {
							var m = cd.match(/filename\*=utf-8''([^;]+)/i);
							if (m && m[1]) {
								try { fileName = decodeURIComponent(m[1].trim()); } catch (e3) {}
							}
						}
						var url = window.URL.createObjectURL(blob);
						var a = document.createElement('a');
						a.href = url;
						a.download = fileName;
						a.style.display = 'none';
						document.body.appendChild(a);
						a.click();
						document.body.removeChild(a);
						window.URL.revokeObjectURL(url);
					});
				}).catch(function() {
					$.modal.closeLoading();
					$.modal.alertError('导出失败');
				});
			});
		}
	</script>
</body>
<script id="productCatalogImportTpl" type="text/template">
<form enctype="multipart/form-data" class="mt20 mb10">
	<div class="col-xs-offset-1">
		<input type="file" id="file" name="file"/>
		<div class="mt10 pt5">
			<input type="checkbox" id="updateSupport" name="updateSupport" title="若数据已存在则更新"> 是否更新已存在的数据
			 &nbsp;	<a onclick="$.table.importTemplate()" class="btn btn-default btn-xs"><i class="fa fa-file-excel-o"></i> 下载模板</a>
		</div>
		<div id="importValidateResult" class="pull-left mt10" style="width:100%;"></div>
		<font color="red" class="pull-left mt10">
			提示：选择文件后将自动解析校验；仅允许导入“xls”或“xlsx”格式，导入前请先在左侧选择医院。
		</font>
	</div>
</form>
</script>
</html>
