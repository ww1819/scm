<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" class="cert-edit-root">
<head>
	<th:block th:if="${viewMode != null && viewMode}" th:include="include :: header('查看产品信息')" />
	<th:block th:unless="${viewMode != null && viewMode}" th:include="include :: header('修改产品信息')" />
	<link rel="stylesheet" href="../../../static/layui/css/layui.css">
	<style>
		html.cert-edit-root,
		html.cert-edit-root body.cert-edit-body {
			height: 100%;
			margin: 0;
			overflow: hidden;
			box-sizing: border-box;
		}

		body.cert-edit-body {
			display: flex;
			flex-direction: column;
			min-height: 0;
		}

		body.cert-edit-body .main-content {
			flex: 1 1 0%;
			min-height: 0;
			overflow: hidden;
			padding-bottom: 0 !important;
			display: flex;
			flex-direction: column;
		}

		#form-product-certificate-edit {
			flex: 1 1 0%;
			min-height: 0;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.form-header-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			flex-shrink: 0;
			margin: 8px 10px 12px 10px;
			padding-bottom: 5px;
			border-bottom: 1px solid #ddd;
		}

		.form-header-row .form-header {
			margin: 0;
			padding-bottom: 0;
			border-bottom: none;
		}

		.form-header-actions {
			flex-shrink: 0;
		}

		.cert-basic-grid {
			flex-shrink: 0;
			margin: 0 10px 8px;
		}

		.cert-basic-grid .cert-inline-field {
			display: flex;
			align-items: center;
			margin-bottom: 8px;
		}

		.cert-basic-grid .cert-inline-field > label {
			flex-shrink: 0;
			width: 96px;
			text-align: right;
			margin: 0 8px 0 0;
			font-size: 12px;
			font-weight: normal;
			color: #666;
			white-space: nowrap;
		}

		.cert-basic-grid .cert-inline-field > .form-control,
		.cert-basic-grid .cert-inline-field > select.form-control,
		.cert-basic-grid .cert-inline-field > textarea.form-control {
			flex: 1;
			min-width: 0;
			height: 30px;
			padding: 4px 8px;
			font-size: 12px;
		}

		.cert-basic-grid .cert-inline-field > textarea.form-control {
			height: 30px;
			min-height: 30px;
			resize: none;
			overflow: hidden;
		}

		.cert-basic-grid .cert-inline-field > .form-control[readonly] {
			background-color: #fff;
		}

		.cert-qual-section {
			flex: 1 1 0%;
			min-height: 0;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			margin: 0 10px 10px;
		}

		.cert-qual-section .form-header {
			flex-shrink: 0;
			margin: 0 0 8px;
		}

		.cert-qual-table-wrap {
			flex: 1 1 0%;
			min-height: 0;
			overflow: hidden;
		}

		body.cert-edit-body #scroll-up {
			display: none !important;
		}
	</style>
</head>
<body class="cert-edit-body">
    <div class="main-content">
        <form id="form-product-certificate-edit" class="form-horizontal">
            <input name="certificateId" type="hidden" th:value="${productCertificate.certificateId}"/>
            <input type="hidden" name="materialId" id="materialId" th:value="${productCertificate.materialId}">

            <div class="form-header-row">
                <h4 class="form-header h4">基本信息</h4>
                <div class="form-header-actions">
                    <button type="button" class="btn btn-sm btn-primary" th:if="${viewMode == null || !viewMode}" onclick="submitHandler()"><i class="fa fa-check"></i>保 存</button>&nbsp;
                    <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i>关 闭</button>
                </div>
            </div>

            <div class="cert-basic-grid">
                <div class="row">
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>产品编码</label>
                            <input type="text" class="form-control" readonly th:value="${materialDict != null ? materialDict.materialCode : ''}"/>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label class="is-required">产品名称</label>
                            <input name="materialName" id="materialName" placeholder="请输入产品名称" class="form-control" type="text" maxlength="200" th:value="${productCertificate.materialName}" required>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>单位</label>
                            <input name="unit" placeholder="请输入单位" class="form-control" type="text" maxlength="20" th:value="${materialDict != null ? materialDict.unit : ''}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>单价</label>
                            <input name="bidPrice" placeholder="请输入单价" class="form-control" type="number" step="0.01" th:value="${productCertificate.bidPrice}">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>规格</label>
                            <input name="specification" placeholder="请输入规格" class="form-control" type="text" maxlength="200" th:value="${materialDict != null ? materialDict.specification : ''}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>型号</label>
                            <input name="model" placeholder="请输入型号" class="form-control" type="text" maxlength="200" th:value="${materialDict != null ? materialDict.model : ''}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>注册证名称</label>
                            <input name="registerName" placeholder="请输入注册证名称" class="form-control" type="text" maxlength="200" th:value="${productCertificate.registerName}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label class="is-required">注册证号</label>
                            <input name="registerNo" placeholder="请输入注册证号" class="form-control" type="text" maxlength="100" th:value="${productCertificate.registerNo}" required>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>注册有效期</label>
                            <input name="registerValidDate" id="registerValidDate" placeholder="年/月/日" class="form-control" type="text" th:value="${productCertificate.registerValidDate != null ? #dates.format(productCertificate.registerValidDate, 'yyyy-MM-dd') : ''}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>有效期至</label>
                            <input name="expireDate" id="expireDate" placeholder="年/月/日" class="form-control" type="text" th:value="${productCertificate.expireDate != null ? #dates.format(productCertificate.expireDate, 'yyyy-MM-dd') : ''}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>拼音简码</label>
                            <input name="pinyinCode" placeholder="请输入拼音简码" class="form-control" type="text" maxlength="50" th:value="${productCertificate.pinyinCode}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>发证日期</label>
                            <input name="registerIssueDate" id="registerIssueDate" placeholder="年/月/日" class="form-control" type="text" th:value="${productCertificate.registerIssueDate != null ? #dates.format(productCertificate.registerIssueDate, 'yyyy-MM-dd') : ''}">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-3" th:if="${supplierSelfService}">
                        <div class="cert-inline-field">
                            <label>供应商</label>
                            <input type="hidden" name="supplierId" id="supplierId" th:value="${productCertificate.supplierId}"/>
                            <input type="text" class="form-control" readonly th:value="${bindSupplierCompanyName}"/>
                        </div>
                    </div>
                    <div class="col-sm-3" th:unless="${supplierSelfService}">
                        <div class="cert-inline-field">
                            <label>供应商</label>
                            <select name="supplierId" id="supplierId" class="form-control">
                                <option value="">请选择（选填）</option>
                                <option th:each="supplier : ${supplierList}"
                                        th:value="${supplier.supplierId}"
                                        th:text="${supplier.companyName}"
                                        th:selected="${productCertificate.supplierId != null && productCertificate.supplierId == supplier.supplierId}">
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>条码号(UDI)</label>
                            <input name="udiCode" placeholder="请输入条码号" class="form-control" type="text" maxlength="100" th:value="${productCertificate.udiCode}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>生产厂家</label>
                            <input name="manufacturerName" placeholder="请输入生产厂家" class="form-control" type="text" maxlength="200" th:value="${materialDict != null ? materialDict.manufacturerName : ''}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>采购价格</label>
                            <input name="purchasePrice" placeholder="请输入采购价格" class="form-control" type="number" step="0.01" th:value="${materialDict != null ? materialDict.purchasePrice : ''}">
                        </div>
                    </div>
                </div>
                <div class="row" th:if="${supplierSelfService}">
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>销售价格</label>
                            <input name="salePrice" placeholder="请输入销售价格" class="form-control" type="number" step="0.01" th:value="${productCertificate.salePrice}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>状态</label>
                            <select name="status" class="form-control">
                                <option value="0" th:selected="${productCertificate.status == '0'}">启用</option>
                                <option value="1" th:selected="${productCertificate.status == '1'}">停用</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>医院名称</label>
                            <input type="text" class="form-control" readonly th:value="${hospitalReadonlyLabel != null ? hospitalReadonlyLabel : '—'}"/>
                            <input type="hidden" name="hospitalCode" th:value="${productCertificate.hospitalCode}"/>
                            <input type="hidden" name="hospitalId" th:value="${productCertificate.hospitalId}"/>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>销售客户</label>
                            <input name="saleCustomer" placeholder="请输入销售客户" class="form-control" type="text" maxlength="200" th:value="${productCertificate.saleCustomer}">
                        </div>
                    </div>
                </div>
                <div class="row" th:unless="${supplierSelfService}">
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>销售价格</label>
                            <input name="salePrice" placeholder="请输入销售价格" class="form-control" type="number" step="0.01" th:value="${productCertificate.salePrice}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>状态</label>
                            <select name="status" class="form-control">
                                <option value="0" th:selected="${productCertificate.status == '0'}">启用</option>
                                <option value="1" th:selected="${productCertificate.status == '1'}">停用</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>医院编码</label>
                            <input name="hospitalCode" id="hospitalCodePlatform" class="form-control" type="text" maxlength="50" readonly th:value="${productCertificate.hospitalCode}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>医院名称</label>
                            <input type="text" class="form-control" readonly th:value="${hospitalReadonlyLabel != null ? hospitalReadonlyLabel : '—'}"/>
                            <input type="hidden" name="hospitalId" th:value="${productCertificate.hospitalId}"/>
                        </div>
                    </div>
                </div>
                <div class="row" th:unless="${supplierSelfService}">
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>销售客户</label>
                            <input name="saleCustomer" placeholder="请输入销售客户" class="form-control" type="text" maxlength="200" th:value="${productCertificate.saleCustomer}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>产品类别</label>
                            <select name="productCategory" class="form-control">
                                <option value="高值" th:selected="${productCertificate.productCategory == '高值'}">高值</option>
                                <option value="低值" th:selected="${productCertificate.productCategory == '低值' or productCertificate.productCategory == null or #strings.isEmpty(productCertificate.productCategory)}">低值</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>备注</label>
                            <textarea name="remark" maxlength="500" class="form-control" rows="2" th:text="${productCertificate.remark}"></textarea>
                        </div>
                    </div>
                </div>
                <div class="row" th:if="${supplierSelfService}">
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>产品类别</label>
                            <select name="productCategory" class="form-control">
                                <option value="高值" th:selected="${productCertificate.productCategory == '高值'}">高值</option>
                                <option value="低值" th:selected="${productCertificate.productCategory == '低值' or productCertificate.productCategory == null or #strings.isEmpty(productCertificate.productCategory)}">低值</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="cert-inline-field">
                            <label>备注</label>
                            <textarea name="remark" maxlength="500" class="form-control" rows="2" th:text="${productCertificate.remark}"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="cert-qual-section">
                <h4 class="form-header h4">资质证件信息</h4>
                <div class="select-table table-striped cert-qual-table-wrap">
                    <table id="bootstrap-table-cert-detail" class="cert-detail-table"></table>
                </div>
            </div>
        </form>
    </div>

	<th:block th:include="include :: footer" />
	<script src="../../../static/layui/layui.js"></script>
	<script th:src="@{/js/common/scmCosDownload.js}"></script>
	<script th:src="@{/js/certificate/certCosPreview.js}"></script>
	<script th:src="@{/js/certificate/certDetailSnapInlineEdit.js}"></script>
	<script th:src="@{/js/certificate/certDetailSnapUpload.js}"></script>
	<script th:inline="javascript">
	    var prefix = ctx + "certificate/product";
	    var certificateId = /*[[${productCertificate.certificateId}]]*/ null;
	    var certDetailTableId = 'bootstrap-table-cert-detail';
	    var viewMode = /*[[${viewMode != null && viewMode}]]*/ false;
	    var certSnapUpload;
	    var certSnapInlineEdit;
	    var laydate;

	    layui.use('laydate', function(){
	        laydate = layui.laydate;
	        laydate.render({ elem: '#registerIssueDate', type: 'date' });
	        laydate.render({ elem: '#registerValidDate', type: 'date' });
	        laydate.render({ elem: '#expireDate', type: 'date' });
	    });

        function formatCertDate(value) {
            if (!value) {
                return '-';
            }
            if (typeof value === 'string' && value.indexOf('-') > -1) {
                return value.split(' ')[0];
            }
            if (value instanceof Date && typeof $.common !== 'undefined' && $.common.formatDate) {
                return $.common.formatDate(value, 'yyyy-MM-dd');
            }
            return value;
        }

        function calculateCertDetailTableHeight() {
            var $section = $('.cert-qual-section');
            if ($section.length === 0) {
                return 180;
            }
            var headerH = $section.find('.form-header').outerHeight(true) || 0;
            return Math.max($section.innerHeight() - headerH - 4, 120);
        }

        function adjustCertDetailTableHeight() {
            var $table = $('#' + certDetailTableId);
            if ($table.length === 0 || !$table.bootstrapTable('getOptions')) {
                return;
            }
            $table.bootstrapTable('resetView', { height: calculateCertDetailTableHeight() });
        }

        function initCertDetailTable() {
            certSnapInlineEdit = initCertDetailSnapInlineEdit({
                prefix: prefix,
                tableId: certDetailTableId,
                editable: !viewMode,
                laydate: laydate,
                getCertificateId: function() { return certificateId; }
            });
            certSnapUpload = initCertDetailSnapUpload({
                prefix: prefix,
                editable: !viewMode,
                getCertificateId: function() { return certificateId; },
                onUploaded: loadCertDetailRows
            });
            var columns = [{
                    field: 'serialNumber',
                    title: '序号',
                    align: 'center',
                    width: 60,
                    formatter: function(value, row, index) {
                        return index + 1;
                    }
                },
                {
                    field: 'licenseKindName',
                    title: '证件类型',
                    align: 'left',
                    formatter: function(value, row) {
                        return value || row.licenseKindCode || '-';
                    }
                },
                certSnapInlineEdit.getLicenseNoColumn(),
                certSnapInlineEdit.getExpireDateColumn(),
                getCertSnapPreviewColumn()];
            var uploadCol = certSnapUpload.getUploadColumn();
            if (uploadCol) {
                columns.push(uploadCol);
            }
            columns.push({
                    field: 'createBy',
                    title: '上传人',
                    align: 'center',
                    width: 100,
                    formatter: function(value) {
                        return value || '-';
                    }
                },
                {
                    field: 'createTime',
                    title: '上传日期',
                    align: 'center',
                    width: 150,
                    formatter: function(value) {
                        return formatCertDate(value);
                    }
                });
            $('#' + certDetailTableId).bootstrapTable({
                locale: 'zh-CN',
                striped: true,
                cache: false,
                pagination: false,
                showRefresh: false,
                showColumns: false,
                showToggle: false,
                search: false,
                height: calculateCertDetailTableHeight(),
                data: [],
                columns: columns
            });
        }

        function loadCertDetailRows() {
            var $detail = $('#' + certDetailTableId);
            if (!$detail.bootstrapTable('getOptions')) {
                return;
            }
            if (!certificateId) {
                $detail.bootstrapTable('load', []);
                return;
            }
            $.post(prefix + '/licenseSnap/mergedRows', { certificateId: certificateId }, function(res) {
                if (res.code === 0) {
                    $detail.bootstrapTable('load', res.data || []);
                } else {
                    $detail.bootstrapTable('load', []);
                }
                if (certSnapInlineEdit) {
                    certSnapInlineEdit.bindAfterLoad();
                }
                setTimeout(adjustCertDetailTableHeight, 0);
            });
        }

        $(function() {
            if (viewMode) {
                $('#form-product-certificate-edit').find('input,select,textarea').not('[type=hidden]').each(function() {
                    var $el = $(this);
                    if ($el.is('select')) {
                        $el.prop('disabled', true);
                    } else {
                        $el.prop('readonly', true);
                    }
                });
            }
            initCertDetailTable();
            loadCertDetailRows();
            setTimeout(adjustCertDetailTableHeight, 50);
            setTimeout(adjustCertDetailTableHeight, 200);
            $(window).resize(function() {
                adjustCertDetailTableHeight();
            });
        });

        $("#form-product-certificate-edit").validate({
        	onkeyup: false,
        	rules:{
        		materialName:{ required: true },
        		registerNo:{ required: true, maxlength: 100 }
        	},
            focusCleanup: true
        });

        function submitHandler() {
	        if (!$.validate.form()) {
	        	return;
	        }
	        $.modal.loading("正在处理中，请稍候...");
	        $.ajax({
	        	url: prefix + "/edit",
	        	type: "post",
	        	dataType: "json",
	        	data: $("#form-product-certificate-edit").serializeArray(),
	        	beforeSend: function(xhr) {
	        		var csrftoken = $('meta[name=csrf-token]').attr('content');
	        		if (csrftoken) {
	        			xhr.setRequestHeader("X-CSRF-Token", csrftoken);
	        		}
	        	},
	        	success: function(result) {
	        		if (result.code == web_status.SUCCESS) {
	        			$.modal.msgSuccess(result.msg);
	        			loadCertDetailRows();
	        			refreshProductListTab();
	        		} else if (result.code == web_status.WARNING) {
	        			$.modal.alertWarning(result.msg);
	        		} else {
	        			$.modal.alertError(result.msg);
	        		}
	        	},
	        	complete: function() {
	        		$.modal.closeLoading();
	        	}
	        });
	    }

	    function refreshProductListTab() {
	    	try {
	    		if (!window.parent || window.parent === window) {
	    			return;
	    		}
	    		var topDoc = window.parent.document;
	    		$('.Scm_iframe', topDoc).each(function() {
	    			var win = this.contentWindow;
	    			if (!win || !win.$) {
	    				return;
	    			}
	    			var $table = win.$('#bootstrap-table');
	    			if ($table.length && $table.bootstrapTable('getOptions')) {
	    				$table.bootstrapTable('refresh');
	    			}
	    		});
	    	} catch (e) {}
	    }

	    function closeItem() {
	        if (window.parent && window.parent !== window) {
	            try {
	                if (window.parent.layer && window.name) {
	                    var layerIdx = window.parent.layer.getFrameIndex(window.name);
	                    if (layerIdx) {
	                        window.parent.layer.close(layerIdx);
	                        return;
	                    }
	                }
	            } catch (e) {}
	            try {
	                if (typeof window.parent.closeItem === 'function') {
	                    window.parent.closeItem();
	                    return;
	                }
	            } catch(e) {}

	            try {
	                var topWindow = $(window.parent.document);
	                var panelUrl = window.frameElement ? window.frameElement.getAttribute('data-panel') : null;
	                var closeBtn = $('.page-tabs-content .active i', topWindow);
	                if (closeBtn.length > 0) {
	                    closeBtn.click();
	                    return;
	                }
	                if (panelUrl) {
	                    $('.menuTab[data-id="' + panelUrl + '"]', topWindow).remove();
	                    $('.mainContent .Scm_iframe[data-id="' + panelUrl + '"]', topWindow).remove();
	                    var prevTab = $('.menuTab', topWindow).last();
	                    if (prevTab.length > 0) {
	                        var prevId = prevTab.data('id');
	                        prevTab.addClass('active');
	                        $('.mainContent .Scm_iframe[data-id="' + prevId + '"]', topWindow).show();
	                    }
	                    return;
	                }
	            } catch(e) {}
	        }
	        try {
	            if (typeof $.modal !== 'undefined' && typeof $.modal.closeTab === 'function') {
	                $.modal.closeTab();
	            }
	        } catch(e) {}
	    }
    </script>
