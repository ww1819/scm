<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('医院产品档案')" />
	<th:block th:include="include :: layout-latest-css" />
	<th:block th:include="include :: ztree-css" />
	<style>
		#hospitalTree { min-height: 280px; }
		.archive-split { border-top: 1px solid #e7eaec; margin-top: 12px; padding-top: 12px; }
	</style>
</head>
<body class="gray-bg">
	<div class="container-div" style="position: relative;">
		<div class="row">
			<div class="col-sm-3" style="border-right: 1px solid #e7eaec; padding-right: 10px;">
				<div class="panel panel-default">
					<div class="panel-heading">
						<h5 class="panel-title"><i class="fa fa-sitemap"></i> 关联医院</h5>
					</div>
					<div class="panel-body" style="max-height: calc(100vh - 120px); overflow: auto;">
						<div id="hospitalTree" class="ztree"></div>
					</div>
				</div>
			</div>
			<div class="col-sm-9">
				<div class="alert alert-info" th:if="${!supplierSelfService}">
					<i class="fa fa-info-circle"></i> 本功能面向<strong>供应商登录账号</strong>：左侧展示与贵司已建立有效关联的医院；平台账号登录时仅可打开本页预览布局，树与数据为空。
				</div>
				<div class="alert alert-warning" id="tip-select-hospital" th:if="${supplierSelfService}">
					<i class="fa fa-hand-o-right"></i> 请先在左侧选择一家医院，再查看该院下的产品档案与证件。
				</div>

				<form id="form-material-archive" class="hide">
					<input type="hidden" name="hospitalCode" id="archiveHospitalCode">
					<input type="hidden" name="hospitalId" id="archiveHospitalId">
				</form>
				<div class="btn-group-sm" id="toolbar-material" role="group" style="margin-bottom: 8px;">
					<a class="btn btn-success" onclick="handleAddProductCert()" shiro:hasPermission="certificate:product:add">
						<i class="fa fa-plus"></i> 新增证件
					</a>
				</div>
				<div class="select-table table-striped">
					<table id="bootstrap-table-material"></table>
				</div>

				<div class="archive-split">
					<h5 style="margin: 0 0 10px 0;"><i class="fa fa-file-text-o"></i> 选中产品下的证件</h5>
					<form id="form-cert-sub" class="hide">
						<input type="hidden" name="hospitalCode" id="subHospitalCode">
						<input type="hidden" name="materialId" id="subMaterialId">
					</form>
					<div class="btn-group-sm" id="toolbar-cert" role="group" style="margin-bottom: 8px;">
						<a class="btn btn-success" onclick="handleAddProductCert()" shiro:hasPermission="certificate:product:add">
							<i class="fa fa-plus"></i> 新增证件
						</a>
						<a class="btn btn-primary single disabled" onclick="$.operate.editTab()" shiro:hasPermission="certificate:product:edit">
							<i class="fa fa-edit"></i> 修改
						</a>
						<a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="certificate:product:remove">
							<i class="fa fa-remove"></i> 删除
						</a>
						<a class="btn btn-info" onclick="checkExpired()" shiro:hasPermission="certificate:product:edit">
							<i class="fa fa-check"></i> 检查过期
						</a>
					</div>
					<div class="select-table table-striped">
						<table id="bootstrap-table-cert"></table>
					</div>
				</div>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<th:block th:include="include :: ztree-js" />
	<script th:inline="javascript">
		var editFlag = [[${@permission.hasPermi('certificate:product:edit')}]];
		var removeFlag = [[${@permission.hasPermi('certificate:product:remove')}]];
		var prefix = ctx + "certificate/product";
		var supplierSelfService = /*[[${supplierSelfService}]]*/ false;

		function checkExpired() {
			$.modal.confirm("确认要检查证件过期状态吗？", function() {
				$.operate.post(prefix + "/checkExpired", {});
			});
		}

		function handleAddProductCert() {
			var hc = ($("#archiveHospitalCode").val() || "").trim();
			var hid = ($("#archiveHospitalId").val() || "").trim();
			if (!hc && !hid) {
				$.modal.alertWarning("请先选择医院");
				return;
			}
			var mid = $("#subMaterialId").val();
			var q = [];
			if (hc) {
				q.push("hospitalCode=" + encodeURIComponent(hc));
			}
			if (hid) {
				q.push("hospitalId=" + encodeURIComponent(hid));
			}
			if (mid) {
				q.push("materialId=" + encodeURIComponent(mid));
			}
			var url = prefix + "/add" + (q.length ? "?" + q.join("&") : "");
			$.modal.openTab("新增产品信息", url);
		}

		function openProductUploadTab(certificateId) {
			if (certificateId == null || certificateId === "") {
				$.modal.alertWarning("无法打开上传页：缺少证件ID");
				return;
			}
			$.modal.openTab("上传产品证照", prefix + "/upload/" + certificateId);
		}

		function previewCertificateImage(imageUrls) {
			function escapeHtml(text) {
				var map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
				return text.replace(/[&<>"']/g, function(m) { return map[m]; });
			}
			var urlArray = [];
			if (imageUrls && imageUrls.trim() !== '') {
				var urls = imageUrls.split(',');
				for (var i = 0; i < urls.length; i++) {
					var url = urls[i].trim();
					if (url) {
						if (url.indexOf('http://') === 0 || url.indexOf('https://') === 0) {
							urlArray.push(url);
						} else if (url.indexOf('/') === 0) {
							urlArray.push(ctx + url.substring(1));
						} else {
							urlArray.push(ctx + url);
						}
					}
				}
			}
			if (urlArray.length === 0) {
				$.modal.alertWarning("没有可预览的图片");
				return;
			}
			var currentIndex = 0;
			function buildPreviewContent() {
				var currentUrl = escapeHtml(urlArray[currentIndex]);
				var html = '<div style="text-align: center; padding: 20px; overflow: auto; height: 100%; position: relative;">';
				if (urlArray.length > 1) {
					html += '<div style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 5px 15px; border-radius: 15px; z-index: 1000; font-size: 14px;">';
					html += '第 ' + (currentIndex + 1) + ' 张 / 共 ' + urlArray.length + ' 张</div>';
					if (currentIndex > 0) {
						html += '<button id="prev-image-btn" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.7); color: white; border: none; padding: 15px 20px; border-radius: 5px; cursor: pointer; font-size: 18px; z-index: 1000;">‹</button>';
					}
					if (currentIndex < urlArray.length - 1) {
						html += '<button id="next-image-btn" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.7); color: white; border: none; padding: 15px 20px; border-radius: 5px; cursor: pointer; font-size: 18px; z-index: 1000;">›</button>';
					}
				}
				html += '<img id="preview-image" src="' + currentUrl + '" style="max-width: 100%; max-height: calc(100% - 40px); margin-top: 30px;" onerror="this.onerror=null;this.src=\'' + ctx + 'img/error.png\';" />';
				html += '</div>';
				return html;
			}
			if (typeof layer !== 'undefined') {
				var layerIndex = layer.open({
					type: 1,
					title: '证照图片预览' + (urlArray.length > 1 ? '（' + urlArray.length + '张）' : ''),
					shadeClose: true,
					shade: 0.8,
					area: ['90%', '90%'],
					content: buildPreviewContent(),
					success: function(layero) {
						function updatePreview() {
							layero.find('.layui-layer-content').html(buildPreviewContent());
							bind(layero);
						}
						function bind(layero) {
							layero.find('#prev-image-btn').off('click').on('click', function() {
								if (currentIndex > 0) { currentIndex--; updatePreview(); }
							});
							layero.find('#next-image-btn').off('click').on('click', function() {
								if (currentIndex < urlArray.length - 1) { currentIndex++; updatePreview(); }
							});
						}
						if (urlArray.length > 1) { bind(layero); }
					}
				});
			} else {
				window.open(urlArray[0], '_blank');
			}
		}

		function initHospitalTree() {
			var options = {
				id: "hospitalTree",
				url: prefix + "/hospitalTreeData",
				expandLevel: 1,
				onClick: function (event, treeId, treeNode) {
					if (!treeNode || treeNode.id === 0) {
						return;
					}
					var hc = treeNode.hospitalCode || '';
					var hid = treeNode.hospitalId != null && treeNode.hospitalId !== ''
						? String(treeNode.hospitalId)
						: (treeNode.id != null ? String(treeNode.id) : '');
					$("#archiveHospitalCode").val(hc);
					$("#archiveHospitalId").val(hid);
					$("#subHospitalCode").val(hc);
					$("#subMaterialId").val('');
					$("#tip-select-hospital").hide();
					$.table.refresh("bootstrap-table-material", 1);
					$.table.refresh("bootstrap-table-cert", 1);
				}
			};
			$.tree.init(options);
		}

		function initMaterialTable() {
			var h = Math.max(260, Math.floor($(window).height() * 0.28));
			var opt = {
				id: "bootstrap-table-material",
				formId: "form-material-archive",
				toolbar: "toolbar-material",
				url: prefix + "/materialArchiveList",
				pagination: true,
				pageSize: 10,
				pageList: [10, 25, 50],
				modalName: "产品档案",
				uniqueId: "materialId",
				height: h,
				columns: [{
					field: 'materialName',
					title: '产品名称'
				},
				{
					field: 'materialCode',
					title: '产品编码',
					formatter: function(v) { return v || '-'; }
				},
				{
					field: 'certCount',
					title: '证件条数',
					align: 'center',
					width: 100
				}],
				onClickRow: function (row) {
					if (!row || !row.materialId) {
						return;
					}
					$("#subMaterialId").val(row.materialId);
					$("#subHospitalCode").val($("#archiveHospitalCode").val());
					$.table.refresh("bootstrap-table-cert", 1);
				}
			};
			$.table.init(opt);
		}

		function initCertTable() {
			var h = Math.max(280, Math.floor($(window).height() * 0.36));
			var opt = {
				id: "bootstrap-table-cert",
				formId: "form-cert-sub",
				toolbar: "toolbar-cert",
				url: prefix + "/listForSelectedArchive",
				createUrl: prefix + "/add",
				updateUrl: prefix + "/edit/{id}",
				removeUrl: prefix + "/remove",
				modalName: "产品信息",
				uniqueId: "certificateId",
				height: h,
				columns: [{
					checkbox: true
				},
				{
					field: 'certificateId',
					title: '证件ID',
					visible: false
				},
				{
					field: 'materialName',
					title: '产品名称',
					formatter: function(v) { return v || '-'; }
				},
				{
					field: 'certificateType',
					title: '证件类型',
					formatter: function(v) { return v || '-'; }
				},
				{
					field: 'registerNo',
					title: '注册证号',
					formatter: function(v) { return v || '-'; }
				},
				{
					field: 'expireDate',
					title: '有效期至',
					sortable: true
				},
				{
					title: '是否上传',
					align: 'center',
					width: 90,
					formatter: function (value, row) {
						if (row.certificateFile && row.certificateFile.trim() !== '') {
							return '<span class="label label-success">是</span>';
						}
						return '<span class="label label-default">否</span>';
					}
				},
				{
					title: '查看',
					align: 'center',
					width: 80,
					formatter: function (value, row) {
						if (row.certificateFile && row.certificateFile.trim() !== '') {
							var fileUrls = row.certificateFile.trim().replace(/'/g, "\\'");
							return '<a class="btn btn-default btn-xs" href="javascript:void(0)" onclick="previewCertificateImage(\'' + fileUrls + '\')"><i class="fa fa-eye"></i> 查看</a>';
						}
						return '<span class="text-muted">-</span>';
					}
				},
				{
					title: '上传',
					align: 'center',
					width: 90,
					formatter: function (value, row) {
						if (editFlag === 'hidden') {
							return '<span class="text-muted">-</span>';
						}
						return '<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="openProductUploadTab(' + row.certificateId + ')"><i class="fa fa-cloud-upload"></i> 上传</a>';
					}
				}]
			};
			$.table.init(opt);
		}

		$(function () {
			initHospitalTree();
			initMaterialTable();
			initCertTable();
		});
	</script>
</body>
</html>
