<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('产品证件审核')" />
	<th:block th:include="include :: layout-latest-css" />
	<style>
		#bootstrap-table-supplier td,
		#bootstrap-table-supplier th {
			white-space: nowrap !important;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.audit-page-wrap.container-div {
			--audit-page-gap: 10px;
			height: 100%;
			overflow: hidden;
			padding: 0 var(--audit-page-gap);
			display: flex;
			flex-direction: column;
			box-sizing: border-box;
		}

		body.gray-bg:has(.audit-page-wrap) {
			height: 100%;
			overflow: hidden;
		}

		.audit-page-wrap > .audit-search-area.search-collapse {
			flex: 0 0 auto;
			width: 100%;
			max-width: 100%;
			margin: var(--audit-page-gap) 0 0;
			padding: 10px 15px 13px;
			box-sizing: border-box;
			border-radius: 6px;
			float: none;
		}

		.audit-page-row {
			display: flex;
			flex-direction: column;
			flex: 1 1 auto;
			min-height: 0;
			height: auto;
			margin: 0;
			width: 100%;
		}

		.audit-page-row > .audit-split-area {
			padding-left: 0;
			padding-right: 0;
			float: none;
			width: 100%;
		}

		.audit-page-wrap > .audit-page-row {
			margin-top: var(--audit-page-gap);
		}

		.audit-split-area {
			flex: 1;
			display: flex;
			min-height: 0;
			overflow: hidden;
			margin-top: 0;
			padding: 0 0 var(--audit-page-gap);
			width: 100%;
			box-sizing: border-box;
		}

		.audit-left-panel {
			width: 25%;
			flex-shrink: 0;
			border-right: 1px solid #e7eaec;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			background: #fff;
			border-radius: 6px;
			box-shadow: 1px 1px 3px rgba(0,0,0,.2);
			margin-right: 10px;
		}

		.audit-left-panel .audit-left-panel-heading {
			background-color: #3c8dbc;
			border-color: #3c8dbc;
			color: #fff;
			padding: 6px 10px;
			flex-shrink: 0;
			border-radius: 6px 6px 0 0;
		}

		.audit-left-panel .audit-left-panel-heading .panel-title {
			color: #fff;
		}

		.audit-left-panel .audit-left-panel-body {
			padding: 0 5px 5px;
			flex: 1;
			overflow: hidden;
			display: flex;
			flex-direction: column;
			min-height: 0;
		}

		.audit-left-panel .audit-left-table-wrap {
			flex: 1;
			overflow: hidden;
			min-height: 0;
			width: 100%;
			margin-top: 0 !important;
			box-shadow: none;
			border-radius: 0;
			padding-top: 0;
		}

		.audit-left-panel .fixed-table-header {
			position: sticky !important;
			top: 0 !important;
			z-index: 2;
			background: #fff;
		}

		.audit-left-panel .fixed-table-header thead th {
			background-color: #f5f5f5 !important;
			border-bottom: 1px solid #e7eaec !important;
			padding-top: 6px !important;
			padding-bottom: 6px !important;
		}

		.audit-left-panel .fixed-table-container {
			padding-top: 0 !important;
		}

		.audit-right-area {
			--audit-inner-padding: 10px;
			flex: 1;
			min-width: 0;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			min-height: 0;
		}

		.audit-right-area #toolbar {
			flex-shrink: 0;
			padding: 0 var(--audit-inner-padding) 5px;
			margin-bottom: 0;
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			gap: 8px;
		}

		.audit-right-area #toolbar .toolbar-filter-item {
			display: inline-flex;
			align-items: center;
			margin: 0;
			font-weight: normal;
		}

		.audit-right-area #toolbar .toolbar-filter-label {
			margin-right: 6px;
			white-space: nowrap;
			font-size: 13px;
		}

		.audit-right-area #toolbar .toolbar-filter-input {
			width: 140px;
			height: 30px;
		}

		.audit-right-area #toolbar .toolbar-filter-select {
			width: 120px;
			height: 30px;
			padding: 5px 10px;
		}

		.audit-right-area .audit-list-table .fixed-table-toolbar {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			gap: 8px;
			padding: 0 2px 5px;
		}

		.audit-right-area .audit-list-table .fixed-table-toolbar #toolbar {
			order: 2;
			flex: 0 0 100%;
			width: 100%;
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			gap: 8px;
			padding: 0;
			margin: 0;
		}

		.audit-right-area .audit-list-table .fixed-table-toolbar .columns,
		.audit-right-area .audit-list-table .fixed-table-toolbar .pull-right {
			order: 1;
			margin-left: auto;
		}

		.audit-right-area .audit-table-wrap.audit-list-table {
			flex: 1 1 57%;
			min-height: 160px;
			padding-bottom: 4px;
		}

		.audit-right-area .audit-cert-detail-wrap {
			flex: 1 1 43%;
			min-height: 170px;
			margin: 0;
			padding: 0 var(--audit-inner-padding) 0;
			overflow: hidden;
			display: flex;
			flex-direction: column;
			box-sizing: border-box;
		}

		.audit-right-area .audit-cert-detail-wrap > .bootstrap-table {
			flex: 1 1 auto;
			min-height: 0;
		}

		.audit-right-area .audit-cert-detail-wrap .bootstrap-table {
			display: flex;
			flex-direction: column;
			height: 100%;
		}

		.audit-right-area .audit-cert-detail-wrap .fixed-table-container {
			flex: 1 1 auto;
			min-height: 0;
			overflow: hidden !important;
		}

		.audit-right-area .audit-cert-detail-wrap .fixed-table-body {
			overflow-x: auto !important;
			overflow-y: auto !important;
		}

		.audit-right-area .audit-table-wrap {
			position: relative;
			flex: 1;
			min-height: 200px;
			overflow: hidden !important;
			padding: 0 var(--audit-inner-padding) var(--audit-inner-padding);
			margin-top: 0 !important;
			margin-bottom: 0;
			box-sizing: border-box;
			display: flex;
			flex-direction: column;
		}

		.audit-right-area .audit-table-wrap > .bootstrap-table {
			flex: 1 1 auto;
			min-height: 0;
		}

		.audit-right-area .audit-table-wrap .bootstrap-table {
			display: flex;
			flex-direction: column;
			height: 100%;
			padding-bottom: 0;
		}

		.audit-right-area .audit-table-wrap .fixed-table-toolbar {
			padding-right: 2px;
		}

		.audit-right-area .audit-table-wrap .fixed-table-toolbar .columns,
		.audit-right-area .audit-table-wrap .fixed-table-toolbar .pull-right {
			margin-right: 0;
		}

		.audit-right-area .audit-table-wrap .fixed-table-container {
			flex: 1 1 auto;
			min-height: 0;
			overflow: hidden !important;
			padding-bottom: 0;
		}

		.audit-right-area .audit-table-wrap .fixed-table-body {
			overflow-x: auto !important;
			overflow-y: auto !important;
		}

		.audit-right-area .audit-table-wrap .fixed-table-pagination {
			position: relative;
			flex-shrink: 0;
			left: auto;
			right: auto;
			bottom: auto;
			margin: 0 !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination {
			display: flex;
			flex-wrap: nowrap;
			align-items: center;
			justify-content: space-between;
			gap: 8px;
			padding: 4px 10px;
			border-top: 1px solid #eee;
			background: #fff;
			z-index: 3;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination::after {
			display: none;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination > .pagination-detail,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination > .pagination {
			float: none !important;
			margin-top: 0 !important;
			margin-bottom: 0 !important;
			flex: 0 0 auto;
			white-space: nowrap;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination > .pagination-detail {
			flex: 1 1 auto;
			min-width: 0;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination .page-list select {
			display: none !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-pagination .page-list::after {
			content: '10';
			display: inline-block;
			min-width: 18px;
			text-align: center;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-body .fixed-table-border {
			display: none !important;
			height: 0 !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-header {
			position: relative !important;
			top: auto !important;
			z-index: 2;
			background: #fff;
			overflow: hidden;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header th .th-inner,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header th .sortable {
			text-align: center !important;
			justify-content: center;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-header th,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body tbody td {
			box-sizing: border-box;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-body tbody td {
			white-space: nowrap;
			vertical-align: middle !important;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="materialName"],
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="supplierName"],
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="manufacturerName"],
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="registerNo"] {
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="materialName"] .tooltip-show,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="supplierName"] .tooltip-show,
		.audit-right-area .audit-table-wrap.audit-list-table .fixed-table-container > .fixed-table-body td[data-field="manufacturerName"] .tooltip-show {
			display: inline-block;
			max-width: 100%;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			vertical-align: middle;
		}

		.audit-right-area .audit-cert-detail-wrap .fixed-table-header {
			position: relative !important;
			top: auto !important;
			z-index: 2;
			background: #fff;
			overflow: hidden;
		}

		#bootstrap-table-supplier {
			visibility: visible !important;
		}

		#bootstrap-table-supplier + .fixed-table-container {
			visibility: visible !important;
			display: block !important;
		}

		.audit-left-panel .select-table {
			overflow: auto !important;
			visibility: visible !important;
		}

		.audit-left-panel .fixed-table-container {
			height: 100% !important;
			overflow: visible !important;
		}

		.audit-left-panel .fixed-table-body {
			overflow-y: auto !important;
			overflow-x: hidden !important;
		}
	</style>
</head>
<body class="gray-bg">
	<div class="container-div audit-page-wrap">
		<div class="row audit-page-row">
			<div class="audit-split-area">
				<div class="audit-left-panel">
					<div class="panel panel-default" style="margin-bottom: 0; display: flex; flex-direction: column; height: 100%; border: none; box-shadow: none;">
						<div class="panel-heading audit-left-panel-heading">
							<h5 class="panel-title" style="margin: 0; font-size: 14px;">
								<i class="fa fa-building"></i> 供应商
							</h5>
						</div>
						<div class="panel-body audit-left-panel-body">
							<div class="select-table table-striped audit-left-table-wrap">
								<table id="bootstrap-table-supplier" style="width: 100%;"></table>
							</div>
						</div>
					</div>
				</div>

				<div class="audit-right-area">
					<form id="product-certificate-form">
						<div class="btn-group-sm" id="toolbar" role="group">
							<label class="toolbar-filter-item">
								<span class="toolbar-filter-label">供应商名称</span>
								<input type="text" name="supplierName" class="form-control input-sm toolbar-filter-input"/>
							</label>
							<label class="toolbar-filter-item">
								<span class="toolbar-filter-label">产品名称</span>
								<input type="text" name="materialName" class="form-control input-sm toolbar-filter-input"/>
							</label>
							<label class="toolbar-filter-item">
								<span class="toolbar-filter-label">状态</span>
								<select name="auditStatusFilter" id="auditStatusFilter" class="form-control input-sm toolbar-filter-select">
									<option value="">全部</option>
									<option value="1">已审核</option>
									<option value="0">待审核</option>
								</select>
							</label>
							<a class="btn btn-primary btn-sm" onclick="searchAudit()"><i class="fa fa-search"></i>&nbsp;搜索</a>
							<a class="btn btn-info single disabled btn-product-audit" onclick="auditCertificate()" shiro:hasPermission="certificate:product:audit">
								<i class="fa fa-check"></i> 审核
							</a>
						</div>
					</form>

					<div class="select-table table-striped audit-table-wrap audit-list-table">
						<table id="bootstrap-table"></table>
					</div>

					<div class="select-table table-striped audit-cert-detail-wrap">
						<table id="bootstrap-table-cert-detail"></table>
					</div>
				</div>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:src="@{/js/common/scmCosDownload.js}"></script>
	<script th:src="@{/js/certificate/certCosPreview.js}"></script>
	<script th:inline="javascript">
		var prefix = ctx + "certificate/product";
		var supplierPrefix = ctx + "supplier/supplier";
		var auditFlag = [[${@permission.hasPermi('certificate:product:audit')}]];
		var selectedSupplierId = null;
		var allSuppliers = [];
		var auditTableId = 'bootstrap-table';
		var certDetailTableId = 'bootstrap-table-cert-detail';
		var selectedCertificateId = null;

		$(function() {
			initLeftSupplierTable();
			initCertDetailTable();
			queryProductCertificateAuditList();

			$(window).resize(function() {
				adjustAuditTableHeight();
				adjustCertDetailTableHeight();
				setTimeout(refreshAuditTableLayout, 100);
				var $supplierTable = $('#bootstrap-table-supplier');
				if ($supplierTable.length && $supplierTable.bootstrapTable('getOptions')) {
					$supplierTable.bootstrapTable('resetView', { height: calculateLeftSupplierTableHeight() });
				}
			});

			setTimeout(function() {
				adjustAuditTableHeight();
				adjustCertDetailTableHeight();
			}, 300);
		});

		function formatCertDate(value) {
			if (!value) {
				return '-';
			}
			if (typeof value === 'string' && value.indexOf('-') > -1) {
				return value.split(' ')[0];
			}
			if (value instanceof Date && typeof $.common !== 'undefined' && $.common.formatDate) {
				return $.common.formatDate(value, 'yyyy-MM-dd');
			}
			return value;
		}

		function calculateCertDetailTableHeight() {
			var $wrap = $('.audit-cert-detail-wrap');
			if ($wrap.length === 0) {
				return 180;
			}
			return Math.max($wrap.innerHeight() - 2, 120);
		}

		function adjustCertDetailTableHeight() {
			var $table = $('#' + certDetailTableId);
			if ($table.length === 0 || !$table.bootstrapTable('getOptions')) {
				return;
			}
			$table.bootstrapTable('resetView', { height: calculateCertDetailTableHeight() });
		}

		function initCertDetailTable() {
			$('#' + certDetailTableId).bootstrapTable({
				locale: 'zh-CN',
				striped: true,
				cache: false,
				pagination: false,
				showRefresh: false,
				showColumns: false,
				showToggle: false,
				search: false,
				sortable: true,
				sortName: 'licenseNo',
				sortOrder: 'asc',
				height: calculateCertDetailTableHeight(),
				data: [],
				columns: [{
					field: 'serialNumber',
					title: '序号',
					align: 'center',
					width: 60,
					formatter: function(value, row, index) {
						return index + 1;
					}
				},
				{
					field: 'licenseKindCode',
					title: '证件编号',
					align: 'left',
					sortable: true,
					formatter: function(value, row) {
						return value || row.licenseKindCode || '-';
					}
				},
				{
					field: 'licenseKindName',
					title: '证件类型',
					align: 'left',
					sortable: true,
					formatter: function(value, row) {
						return value || row.licenseKindCode || '-';
					}
				},
				{
					field: 'licenseNo',
					title: '证件编码',
					align: 'left',
					sortable: true,
					formatter: function(value) {
						return value || '-';
					}
				},
				{
					field: 'expireDate',
					title: '证件有效期',
					align: 'center',
					width: 120,
					sortable: true,
					formatter: function(value) {
						return formatCertDate(value);
					}
				},
				(function() {
					var previewCol = getCertSnapPreviewColumn();
					previewCol.sortable = true;
					return previewCol;
				})(),
				{
					field: 'createBy',
					title: '上传人',
					align: 'center',
					width: 100,
					formatter: function(value) {
						return value || '-';
					}
				},
				{
					field: 'createTime',
					title: '上传日期',
					align: 'center',
					width: 120,
					formatter: function(value) {
						return formatCertDate(value);
					}
				}]
			});
		}

		function loadCertDetailRows(certificateId) {
			selectedCertificateId = certificateId || null;
			var $detail = $('#' + certDetailTableId);
			if (!$detail.bootstrapTable('getOptions')) {
				return;
			}
			if (!certificateId) {
				$detail.bootstrapTable('load', []);
				return;
			}
			$.post(prefix + '/licenseSnap/mergedRows', { certificateId: certificateId }, function(res) {
				if (res.code === 0) {
					$detail.bootstrapTable('load', res.data || []);
					$detail.bootstrapTable('sort', 'licenseNo', 'asc');
				} else {
					$detail.bootstrapTable('load', []);
					if (res.msg) {
						$.modal.msgWarning(res.msg);
					}
				}
				setTimeout(adjustCertDetailTableHeight, 0);
			});
		}

		function calculateAuditTableHeight() {
			var $wrap = $('.audit-right-area .audit-list-table');
			if ($wrap.length === 0) {
				return 400;
			}
			var wrapH = $wrap[0].clientHeight;
			if (!wrapH) {
				var outerToolbarH = $('#toolbar').outerHeight(true) || 40;
				var detailH = $('.audit-cert-detail-wrap').outerHeight(true) || 200;
				wrapH = $('.audit-right-area').height() - outerToolbarH - detailH - 10;
			}
			var $bt = $wrap.find('.bootstrap-table');
			if ($bt.length === 0) {
				return Math.max(wrapH - 50, 200);
			}
			var btToolbarH = $bt.find('.fixed-table-toolbar').outerHeight(true) || 0;
			var pagH = $bt.find('.fixed-table-pagination').outerHeight(true) || 46;
			return Math.max(Math.floor(wrapH - btToolbarH - pagH - 2), 200);
		}

		function adjustAuditTableHeight() {
			var $table = $('#' + auditTableId);
			if ($table.length === 0 || !$table.bootstrapTable('getOptions')) {
				return;
			}
			$table.bootstrapTable('resetView', { height: calculateAuditTableHeight() });
			refreshAuditTableLayout();
		}

		function fixAuditTableHeaderAlign() {
			var $bt = $('#' + auditTableId).closest('.bootstrap-table');
			var $container = $bt.find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			if (!$mainBody.length || !$mainHeader.length) {
				return;
			}
			var scrollW = $mainBody[0].offsetWidth - $mainBody[0].clientWidth;
			$mainHeader.css('margin-right', scrollW > 0 ? (scrollW + 'px') : '');
		}

		function bindAuditMainHorizontalScroll() {
			var $container = $('#' + auditTableId).closest('.bootstrap-table').find('.fixed-table-container').first();
			var $mainBody = $container.children('.fixed-table-body');
			var $mainHeader = $container.children('.fixed-table-header');
			$mainBody.off('scroll.auditMainH').on('scroll.auditMainH', function() {
				$mainHeader.scrollLeft($mainBody.scrollLeft());
			});
		}

		function refreshAuditTableLayout() {
			fixAuditTableHeaderAlign();
			bindAuditMainHorizontalScroll();
		}

		function viewProductDetail(certificateId) {
			if (certificateId == null || certificateId === '') {
				$.modal.alertWarning('无法查看：缺少证件ID');
				return;
			}
			$.modal.openTab('查看产品信息', prefix + '/detail/' + certificateId);
		}
		window.viewProductDetail = viewProductDetail;

		function calculateLeftSupplierTableHeight() {
			var $leftPanel = $('.audit-left-panel');
			if ($leftPanel.length === 0) {
				return 400;
			}
			var panelHeaderHeight = $leftPanel.find('.audit-left-panel-heading').outerHeight(true) || 35;
			var bodyPadding = 10;
			var height = $leftPanel.height() - panelHeaderHeight - bodyPadding - 20;
			return height > 100 ? height : 100;
		}

		function queryProductCertificateAuditList() {
			var options = {
				url: prefix + "/list",
				formId: "product-certificate-form",
				uniqueId: "certificateId",
				rememberSelected: true,
				maintainSelected: true,
				pageSize: 10,
				pageList: [10],
				queryParams: function(params) {
					var curParams = $.table.queryParams(params);
					var auditStatusFilter = $('#auditStatusFilter').val();
					if (auditStatusFilter !== '') {
						curParams.auditStatus = auditStatusFilter;
					}
					delete curParams.auditStatusFilter;
					if (selectedSupplierId) {
						curParams.supplierId = selectedSupplierId;
						delete curParams.supplierName;
					}
					return curParams;
				},
				sortName: "createTime",
				sortOrder: "desc",
				modalName: "产品证件",
				height: calculateAuditTableHeight(),
				mobileResponsive: false,
				fixedColumns: false,
				escape: false,
				onLoadSuccess: function() {
					setTimeout(function() {
						adjustAuditTableHeight();
						adjustCertDetailTableHeight();
						refreshAuditTableLayout();
						updateToolbarState();
						if (selectedCertificateId) {
							loadCertDetailRows(selectedCertificateId);
						}
					}, 50);
					setTimeout(refreshAuditTableLayout, 200);
				},
				onPostBody: function() {
					refreshAuditTableLayout();
					updateToolbarState();
				},
				onCheck: function() { updateToolbarState(); },
				onUncheck: function() { updateToolbarState(); },
				onCheckAll: function() { updateToolbarState(); },
				onUncheckAll: function() { updateToolbarState(); },
				onClickRow: function(row, $element) {
					$('#' + auditTableId + ' tbody tr').removeClass('selected');
					$element.addClass('selected');
					if (row && row.certificateId) {
						loadCertDetailRows(row.certificateId);
					}
				},
				onDblClickCell: function(field, value, row) {
					if (field === 'materialName' && row && row.certificateId) {
						viewProductDetail(row.certificateId);
					}
				},
				columns: [{
					checkbox: true
				},
				{
					field: 'auditStatus',
					title: '状态',
					align: 'center',
					width: 80,
					sortable: true,
					formatter: function(value, row, index) {
						if (row.auditStatus == '1') {
							return '<span class="label label-success">已审核</span>';
						} else if (row.auditStatus == '2') {
							return '<span class="label label-danger">否</span>';
						}
						return '<span class="label label-warning">待审核</span>';
					}
				},
				{
					field: 'serialNumber',
					title: '序号',
					align: 'center',
					width: 60,
					sortable: true,
					sortName: 'certificateId',
					formatter: function(value, row, index) {
						return $.table.serialNumber(index);
					}
				},
				{
					field: 'certificateId',
					title: '证件ID',
					visible: false
				},
				{
					field: 'materialName',
					title: '产品名称',
					align: 'left',
					width: 160,
					sortable: true,
					cellStyle: function() {
						return { css: { cursor: 'pointer' } };
					},
					formatter: function(value, row, index) {
						if (!value) {
							return '-';
						}
						var text = value.length > 12 ? value.substring(0, 12) + '...' : value;
						var title = (value || '').replace(/"/g, '&quot;');
						return '<span class="cert-product-name-dblview" style="color:#337ab7;" title="' + title + '（双击查看）">' + text + '</span>';
					},
					events: {
						'dblclick .cert-product-name-dblview': function(e, value, row) {
							e.preventDefault();
							e.stopPropagation();
							if (row && row.certificateId) {
								viewProductDetail(row.certificateId);
							}
						}
					}
				},
				{
					field: 'supplierName',
					title: '供应商',
					align: 'left',
					width: 150,
					sortable: true,
					formatter: function(value, row, index) {
						if (!value) {
							return '-';
						}
						return $.table.tooltip(value, 10);
					}
				},
				{
					field: 'specification',
					title: '规格',
					align: 'left',
					width: 100,
					sortable: true,
					formatter: function(value) { return value || '-'; }
				},
				{
					field: 'model',
					title: '型号',
					align: 'left',
					width: 100,
					sortable: true,
					formatter: function(value) { return value || '-'; }
				},
				{
					field: 'unit',
					title: '单位',
					align: 'center',
					width: 70,
					sortable: true,
					formatter: function(value) {
						return value || '-';
					}
				},
				{
					field: 'bidPrice',
					title: '单价',
					align: 'right',
					width: 90,
					sortable: true,
					formatter: function(value) {
						if (value === null || value === undefined || value === '') {
							return '-';
						}
						var num = parseFloat(value);
						if (isNaN(num)) {
							return value;
						}
						return num.toFixed(2);
					}
				},
				{
					field: 'manufacturerName',
					title: '生产厂家',
					align: 'left',
					width: 140,
					sortable: true,
					formatter: function(value, row, index) {
						if (!value) {
							return '-';
						}
						return $.table.tooltip(value, 10);
					}
				},
				{
					field: 'registerNo',
					title: '注册证号',
					align: 'left',
					width: 140,
					sortable: true,
					formatter: function(value) { return value || '-'; }
				},
				{
					field: 'registerIssueDate',
					title: '发证日期',
					align: 'center',
					width: 110,
					sortable: true,
					formatter: function(value) {
						if (value && typeof value === 'string' && value.indexOf('-') > -1) {
							return value.split(' ')[0];
						}
						return value || '-';
					}
				},
				{
					field: 'expireDate',
					title: '有效期至',
					align: 'center',
					width: 110,
					sortable: true,
					formatter: function(value) {
						if (!value) {
							return '-';
						}
						if (typeof value === 'string' && value.indexOf('-') > -1) {
							return value.split(' ')[0];
						}
						return value;
					}
				},
				{
					field: 'certStatus',
					title: '效期状态',
					align: 'center',
					width: 80,
					formatter: function(value, row) {
						if (row.status == '0') {
							return '<span class="label label-success">正常</span>';
						}
						return '<span class="label label-danger">过期</span>';
					}
				},
				{
					field: 'createTime',
					title: '创建时间',
					align: 'center',
					width: 150,
					sortable: true
				}]
			};
			$.table.init(options);
			setTimeout(function() {
				adjustAuditTableHeight();
				adjustCertDetailTableHeight();
				refreshAuditTableLayout();
			}, 500);
		}

		function searchAudit() {
			syncLeftSupplierOnSearch();
			loadCertDetailRows(null);
			$.table.search('product-certificate-form', auditTableId);
		}

		function getSupplierSearchKeyword() {
			return $.common.trim($('input[name="supplierName"]').val() || '');
		}

		function filterSuppliersByKeyword(suppliers, keyword) {
			if (!keyword) {
				return suppliers || [];
			}
			var lowerKeyword = keyword.toLowerCase();
			return (suppliers || []).filter(function(row) {
				var code = (row.supplierCode || '').toLowerCase();
				var name = (row.companyName || '').toLowerCase();
				return code.indexOf(lowerKeyword) !== -1 || name.indexOf(lowerKeyword) !== -1;
			});
		}

		function applyLeftSupplierFilter() {
			var keyword = getSupplierSearchKeyword();
			var filtered = filterSuppliersByKeyword(allSuppliers, keyword);
			updateSupplierTable(filtered);
		}

		function syncLeftSupplierOnSearch() {
			var keyword = getSupplierSearchKeyword();
			var filtered = filterSuppliersByKeyword(allSuppliers, keyword);
			updateSupplierTable(filtered);
			if (keyword) {
				selectedSupplierId = filtered.length > 0 ? filtered[0].supplierId : null;
			}
		}

		function initLeftSupplierTable() {
			var $table = $('#bootstrap-table-supplier');
			if ($table.length === 0) {
				setTimeout(initLeftSupplierTable, 300);
				return;
			}
			var tableHeight = calculateLeftSupplierTableHeight();
			try {
				$table.bootstrapTable({
					data: [],
					pagination: false,
					search: false,
					showRefresh: false,
					showColumns: false,
					showToggle: false,
					height: tableHeight,
					striped: true,
					classes: 'table table-condensed',
					locale: 'zh-CN',
					showHeader: true,
					showEmptyRows: false,
					columns: [{
						field: 'serialNumber',
						title: '序号',
						align: 'center',
						width: 50,
						cellStyle: {fontSize: '12px', padding: '4px'},
						formatter: function(value, row, index) {
							return index + 1;
						}
					},
					{
						field: 'supplierCode',
						title: '编码',
						sortable: true,
						width: 80,
						cellStyle: {fontSize: '12px', padding: '4px'},
						formatter: function(value) { return value || '-'; }
					},
					{
						field: 'companyName',
						title: '供应商名称',
						cellStyle: {fontSize: '12px', padding: '4px'},
						formatter: function(value, row) {
							if (!value) return '-';
							var name = value.length > 15 ? value.substring(0, 15) + '...' : value;
							var supplierId = row.supplierId || '';
							return '<a href="javascript:void(0)" onclick="selectSupplier(\'' + supplierId + '\')" title="' + value + '" style="font-size: 12px; cursor: pointer;">' + name + '</a>';
						}
					}],
					onClickRow: function(row) {
						if (row.supplierId) {
							selectSupplier(row.supplierId);
						}
					},
					rowStyle: function(row) {
						if (selectedSupplierId && row.supplierId == selectedSupplierId) {
							return {classes: 'info'};
						}
						return {};
					}
				});
				querySupplierList();
			} catch (e) {
				console.error("初始化供应商表格失败:", e);
			}
		}

		function querySupplierList() {
			$.ajax({
				url: supplierPrefix + "/all",
				type: "GET",
				dataType: "json",
				cache: false,
				success: function(result) {
					if (result && result.code == 0) {
						allSuppliers = result.data || [];
						applyLeftSupplierFilter();
					} else {
						allSuppliers = [];
						updateSupplierTable([]);
					}
				},
				error: function() {
					allSuppliers = [];
					updateSupplierTable([]);
				}
			});
		}

		function updateSupplierTable(suppliers) {
			var $table = $('#bootstrap-table-supplier');
			if ($table.length === 0) {
				setTimeout(function() { updateSupplierTable(suppliers); }, 300);
				return;
			}
			try {
				if ($table.bootstrapTable('getOptions')) {
					$table.bootstrapTable('load', suppliers || []);
					setTimeout(function() {
						if (selectedSupplierId) {
							$table.find('tbody tr').each(function() {
								var rowData = $table.bootstrapTable('getData');
								var rowIndex = $(this).index();
								if (rowIndex >= 0 && rowIndex < rowData.length && rowData[rowIndex].supplierId == selectedSupplierId) {
									$(this).addClass('info');
								}
							});
						}
					}, 100);
				} else {
					initLeftSupplierTable();
				}
			} catch (e) {
				console.error("更新供应商表格失败:", e);
			}
		}

		function selectSupplier(supplierId) {
			if (!supplierId) {
				selectedSupplierId = null;
				applyLeftSupplierFilter();
				loadCertDetailRows(null);
				$('#' + auditTableId).bootstrapTable('refresh');
				return;
			}
			selectedSupplierId = supplierId;
			applyLeftSupplierFilter();
			loadCertDetailRows(null);
			$('#' + auditTableId).bootstrapTable('refresh');
		}

		function isProductAudited(row) {
			return row && row.auditStatus == '1';
		}

		function auditCertificate() {
			var $table = $('#' + auditTableId);
			if ($table.length === 0) {
				$.modal.alertError("表格未初始化");
				return;
			}
			var selections = $table.bootstrapTable('getSelections');
			if (!selections || selections.length === 0) {
				var checkedRows = $table.find('tbody input[type="checkbox"]:checked').closest('tr');
				if (checkedRows.length > 0) {
					var allData = $table.bootstrapTable('getData');
					var checkedIndexes = [];
					checkedRows.each(function() {
						var index = $(this).data('index');
						if (index !== undefined) {
							checkedIndexes.push(index);
						}
					});
					if (checkedIndexes.length > 0) {
						selections = allData.filter(function(row, idx) {
							return checkedIndexes.indexOf(idx) !== -1;
						});
					}
				}
			}
			if (!selections || selections.length === 0) {
				$.modal.alertWarning("请选择一条记录");
				return;
			}
			if (selections.length > 1) {
				$.modal.alertWarning("请只选择一条记录");
				return;
			}
			var row = selections[0];
			if (!row.certificateId) {
				$.modal.alertError("无法获取证件ID");
				return;
			}
			if (isProductAudited(row)) {
				$.modal.msgWarning('该产品已审核，不能重复审核');
				return;
			}
			showAuditDialog(row.certificateId, row);
		}

		function showAuditDialog(certificateId, row) {
			var materialName = (row && row.materialName) ? row.materialName : '未知产品';
			var dialogHtml = '<div style="padding: 20px;">'
				+ '<div class="form-group"><label>产品名称：</label>'
				+ '<input type="text" class="form-control" value="' + materialName.replace(/"/g, '&quot;') + '" readonly style="margin-bottom: 10px;"></div>'
				+ '<div class="form-group"><label>审核状态：<span style="color: red;">*</span></label>'
				+ '<select id="audit-status-select" class="form-control" style="margin-bottom: 10px;">'
				+ '<option value="1">已审核</option><option value="2">已拒绝</option></select></div>'
				+ '<div class="form-group"><label>审核备注：</label>'
				+ '<textarea id="audit-remark-textarea" class="form-control" rows="3" placeholder="请输入审核备注（可选）" maxlength="500"></textarea></div>'
				+ '</div>';
			layer.open({
				type: 1,
				title: '审核产品证件',
				area: ['500px', '350px'],
				content: dialogHtml,
				btn: ['确定', '取消'],
				yes: function(index) {
					var auditStatus = $('#audit-status-select').val();
					var auditRemark = $('#audit-remark-textarea').val();
					if (!auditStatus) {
						$.modal.alertWarning("请选择审核状态");
						return false;
					}
					doAudit(certificateId, auditStatus, auditRemark, index);
				},
				btn2: function(index) {
					layer.close(index);
				}
			});
		}

		function doAudit(certificateId, auditStatus, auditRemark, layerIndex) {
			$.ajax({
				url: prefix + "/audit",
				type: "POST",
				data: {
					certificateId: certificateId,
					auditStatus: auditStatus,
					auditRemark: auditRemark || ''
				},
				success: function(result) {
					if (result.code == 0) {
						if (layerIndex !== undefined) {
							layer.close(layerIndex);
						}
						$.modal.msgSuccess("审核成功");
						setTimeout(function() {
							$('#' + auditTableId).bootstrapTable('refresh');
						}, 300);
					} else {
						$.modal.alertError(result.msg || "审核失败");
					}
				},
				error: function(xhr) {
					var errorMsg = "审核失败";
					if (xhr.responseJSON && xhr.responseJSON.msg) {
						errorMsg = xhr.responseJSON.msg;
					}
					$.modal.alertError(errorMsg);
				}
			});
		}

		function updateToolbarState() {
			var $table = $('#' + auditTableId);
			if ($table.length === 0) {
				return;
			}
			var selections = $table.bootstrapTable('getSelections');
			if (!selections || selections.length === 0) {
				var checkedCount = $table.find('tbody input[type="checkbox"]:checked').length;
				if (checkedCount === 1) {
					var allData = $table.bootstrapTable('getData');
					var checkedIndex = $table.find('tbody input[type="checkbox"]:checked').closest('tr').first().data('index');
					if (checkedIndex !== undefined && allData[checkedIndex]) {
						selections = [allData[checkedIndex]];
					}
				}
			}
			var $auditBtn = $('#toolbar .btn-product-audit');
			if (selections && selections.length === 1) {
				if (isProductAudited(selections[0])) {
					$auditBtn.addClass('disabled').prop('disabled', true);
				} else {
					$auditBtn.removeClass('disabled').prop('disabled', false);
				}
			} else {
				$auditBtn.addClass('disabled').prop('disabled', true);
			}
		}
	</script>
</body>
</html>
