<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('上传产品证照图片')" />
	<th:block th:include="include :: bootstrap-fileinput-css" />
</head>
<body>
    <div class="main-content" style="padding-bottom: 100px;">
        <div th:if="${uploadLoadError != null}" class="alert alert-warning" style="margin: 15px;">
            <i class="fa fa-warning"></i> [[${uploadLoadError}]]
        </div>

        <form id="form-cert-upload" class="form-horizontal" enctype="multipart/form-data" th:if="${productCertificate != null}">
            <input type="hidden" name="certificateId" id="certificateId" th:value="${productCertificate.certificateId}"/>
            <div id="cert-files-data" th:attr="data-file-ids=${productCertificate.certificateFileIds},data-file-urls=${productCertificate.certificateFile}" style="display:none"></div>

            <h4 class="form-header h4">证照信息（只读）</h4>
            <p class="text-muted" style="padding: 0 15px 10px;">以下信息仅供核对；请在下方维护证照图片（COS 存储）。</p>

            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">证件ID</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" readonly th:value="${productCertificate.certificateId}">
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">产品名称</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" readonly th:value="${productCertificate.materialName != null ? productCertificate.materialName : '-'}">
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">医院编码</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" readonly th:value="${productCertificate.hospitalCode != null ? productCertificate.hospitalCode : '-'}">
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">注册证号</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" readonly th:value="${productCertificate.registerNo != null ? productCertificate.registerNo : '-'}">
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">证件类型</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" readonly th:value="${productCertificate.certificateType != null ? productCertificate.certificateType : '-'}">
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">证件名称</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" readonly th:value="${productCertificate.certificateName != null ? productCertificate.certificateName : '-'}">
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">有效期至</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" readonly
                                   th:value="${productCertificate.expireDate != null ? #dates.format(productCertificate.expireDate, 'yyyy-MM-dd') : '-'}">
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">审核状态</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" readonly
                                   th:value="${productCertificate.auditStatus == '1' ? '已审核' : (productCertificate.auditStatus == '2' ? '已拒绝' : '待审核')}">
                        </div>
                    </div>
                </div>
            </div>

            <h4 class="form-header h4">证照图片（可维护）</h4>
            <p class="text-muted" style="padding: 0 15px 10px;">单张图片不超过500KB；上传或删除图片后将自动保存，无需再点保存。</p>
            <div class="row">
                <div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label">图片</label>
                        <div class="col-xs-10">
                            <div class="file-loading">
                                <input id="certificateFile" name="certificateFile" type="file" accept="image/*">
                            </div>
                            <input type="hidden" name="certificateFileIds" id="certificateFileIds" th:value="${productCertificate.certificateFileIds}">
                            <input type="hidden" name="certificateFile" id="certificateFileUrl" th:value="${productCertificate.certificateFile}">
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <div class="row" th:if="${productCertificate != null}" style="position: fixed; bottom: 0; left: 0; right: 0; background-color: #fff; padding: 15px 20px; border-top: 1px solid #ddd; z-index: 1000; box-shadow: 0 -2px 8px rgba(0,0,0,0.1);">
        <div class="col-sm-offset-5 col-sm-10">
            <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i> 关 闭</button>
        </div>
    </div>
    <div style="height: 70px;" th:if="${productCertificate != null}"></div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: bootstrap-fileinput-js" />
	<script th:src="@{/js/common/scmCosDownload.js}"></script>
	<script th:src="@{/js/certificate/productCertCosUpload.js}"></script>
	<script th:inline="javascript" th:if="${productCertificate != null}">
	    var prefix = ctx + "certificate/product";
	    var certFileHelper;
	    var autoSaveInFlight = false;

	    function refreshSiblingListTables() {
	        try {
	            $(window.parent.document).find('iframe.Scm_iframe').each(function () {
	                var w = this.contentWindow;
	                if (w && w.$ && w.$.table && w.table && w.table.options) {
	                    w.$.table.refresh();
	                }
	            });
	        } catch (e) {
	        }
	    }

	    function autoSaveCertFiles() {
	        if (autoSaveInFlight) {
	            return;
	        }
	        certFileHelper.updateFileState();
	        autoSaveInFlight = true;
	        var data = {
	            certificateId: $("#certificateId").val(),
	            certificateFileIds: $("#certificateFileIds").val() || '',
	            certificateFile: $("#certificateFileUrl").val() || ''
	        };
	        $.ajax({
	            url: prefix + "/updateCertificateFile",
	            type: "post",
	            dataType: "json",
	            data: data,
	            beforeSend: function (xhr) {
	                var csrftoken = $('meta[name=csrf-token]').attr('content');
	                if (csrftoken) {
	                    xhr.setRequestHeader("X-CSRF-Token", csrftoken);
	                }
	            },
	            success: function (result) {
	                if (result.code == web_status.SUCCESS) {
	                    refreshSiblingListTables();
	                } else if (result.code == web_status.WARNING) {
	                    $.modal.alertWarning(result.msg);
	                } else {
	                    $.modal.alertError(result.msg || '保存失败');
	                }
	            },
	            complete: function () {
	                autoSaveInFlight = false;
	            }
	        });
	    }

	    $(function () {
	        certFileHelper = initProductCertCosUpload({
	            certEditable: true,
	            initialFiles: readProductCertInitialFilesFromDom('cert-files-data'),
	            legacyFileCsv: (document.getElementById('cert-files-data') || {}).getAttribute('data-file-urls') || '',
	            autoSaveOnChange: autoSaveCertFiles
	        });
	    });

	    function closeItem() {
	        if (window.parent && window.parent !== window && typeof window.parent.closeItem === 'function') {
	            window.parent.closeItem();
	        }
	    }
	</script>
</body>
</html>
