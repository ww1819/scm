<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('新增医院关联')" />
	<th:block th:include="include :: layout-latest-css" />
	<style>
		.container-div.associate-page {
			padding: 0;
		}
		.container-div.associate-page > .row {
			margin-left: 0;
			margin-right: 0;
		}
		.container-div.associate-page > .row > .col-sm-12 {
			padding-left: 0;
			padding-right: 0;
		}
		.container-div.associate-page .associate-page-panel {
			margin-left: 10px;
			margin-right: 10px;
			margin-bottom: 0;
		}
		.associate-form-panel {
			margin-top: 10px;
		}
		.associate-list-section {
			margin-top: 10px;
		}
		.associate-page-panel > .panel-heading {
			display: flex;
			align-items: center;
			justify-content: space-between;
			box-sizing: border-box;
			height: 40px;
			min-height: 40px;
			max-height: 40px;
			padding: 0 15px;
			line-height: 20px;
			overflow: hidden;
		}
		.associate-form-panel > .panel-heading .panel-heading-meta {
			display: flex;
			align-items: center;
			flex: 1;
			min-width: 0;
			gap: 12px;
			overflow: hidden;
			white-space: nowrap;
		}
		.associate-form-panel > .panel-heading .panel-heading-meta > span:first-child {
			flex-shrink: 0;
		}
		.associate-form-panel > .panel-heading .panel-heading-meta .text-muted,
		.associate-form-panel > .panel-heading .panel-heading-meta .text-info {
			font-weight: normal;
			font-size: 13px;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}
		.associate-form-panel > .panel-heading .panel-heading-actions {
			display: flex;
			align-items: center;
			gap: 8px;
			flex-shrink: 0;
			margin-left: 12px;
		}
		.associate-form-panel > .panel-heading .panel-heading-actions .btn {
			height: 26px;
			padding: 2px 8px;
			font-size: 12px;
			line-height: 1.42857143;
		}
		#associate-form .associate-row {
			display: flex;
			flex-wrap: nowrap;
			gap: 12px;
			margin-bottom: 10px;
		}
		#associate-form .associate-row:last-child {
			margin-bottom: 0;
		}
		#associate-form .associate-field {
			flex: 0 0 calc((100% - 36px) / 4);
			min-width: 0;
			display: flex;
			align-items: center;
			gap: 6px;
		}
		#associate-form .associate-field label {
			flex-shrink: 0;
			margin: 0;
			font-weight: normal;
			color: #333;
			font-size: 13px;
			white-space: nowrap;
		}
		#associate-form .associate-field .form-control {
			flex: 1 1 0;
			min-width: 0;
		}
		.apply-list-panel {
			overflow: hidden;
		}
		.apply-list-panel > .panel-body {
			padding: 0;
		}
		.apply-list-panel .apply-table-wrap {
			margin: 0 -1px -1px !important;
			width: calc(100% + 2px);
			border-radius: 0 !important;
			box-shadow: none !important;
			padding: 0 !important;
			background: #fff;
			min-height: 0;
			overflow: hidden;
			display: flex;
			flex-direction: column;
		}
		.apply-list-panel .apply-table-wrap > .bootstrap-table {
			flex: 1 1 auto;
			min-height: 0;
			display: flex;
			flex-direction: column;
			height: 100%;
		}
		.apply-list-panel .apply-table-wrap .fixed-table-container {
			flex: 1 1 auto;
			min-height: 0;
			margin-top: 0;
		}
		.apply-list-panel .apply-table-wrap .fixed-table-body {
			overflow-x: auto !important;
			overflow-y: auto !important;
		}
		.apply-list-panel .apply-table-wrap .fixed-table-pagination {
			flex-shrink: 0;
			position: relative;
			margin: 0 !important;
			padding: 4px 10px;
			background: #fff;
			border-top: 1px solid #eee;
		}
		.apply-list-panel .apply-table-wrap .fixed-table-toolbar {
			padding: 0 10px;
			margin-top: 0;
			margin-bottom: 0;
			flex-shrink: 0;
		}
		#toolbar.apply-toolbar-row {
			display: flex;
			align-items: center;
			flex-wrap: nowrap;
			gap: 8px;
			width: 100%;
		}
		#toolbar .apply-search-form {
			display: flex;
			align-items: center;
			flex-wrap: nowrap;
			gap: 8px;
			margin: 0;
			flex: 1;
			min-width: 0;
		}
		#toolbar .apply-search-item {
			display: inline-flex;
			align-items: center;
			gap: 4px;
			margin: 0;
			white-space: nowrap;
			font-weight: normal;
			font-size: 13px;
		}
		#toolbar .apply-search-item select,
		#toolbar .apply-search-item input {
			width: 130px;
			min-width: 0;
			height: 30px;
			padding: 4px 8px;
			font-size: 13px;
		}
		.apply-table-wrap .fixed-table-toolbar {
			display: flex;
			align-items: center;
			flex-wrap: nowrap;
		}
		.apply-table-wrap .fixed-table-toolbar .columns,
		.apply-table-wrap .fixed-table-toolbar .pull-right,
		.apply-table-wrap .fixed-table-toolbar .bs-bars {
			float: none;
		}
		.apply-table-wrap .fixed-table-toolbar .bs-bars {
			flex: 1;
			min-width: 0;
			margin-right: 8px;
		}
		.apply-table-wrap .fixed-table-toolbar .columns {
			margin-left: auto;
			flex-shrink: 0;
		}
	</style>
</head>
<body class="gray-bg">
	<div class="container-div associate-page">
		<div class="row">
			<div class="col-sm-12">
				<div class="panel panel-default associate-page-panel associate-form-panel">
					<div class="panel-heading">
						<div class="panel-heading-meta">
							<span>新增医院关联</span>
							<span class="text-muted">供应商向医院发起关联申请，需填写供货合同起止日期，提交后等待医院审核。</span>
							<span class="text-info"><i class="fa fa-info-circle"></i> 若关联<strong>已审核通过</strong>后发现信息有误，请前往 <a href="javascript:void(0)" onclick="$.modal.openTab('关联关系修改', ctx + 'supplier/associate/modify')">关联关系修改</a> 发起修改申请。</span>
						</div>
						<div class="panel-heading-actions">
							<button type="submit" form="associate-form" class="btn btn-sm btn-primary" id="btnSubmit" shiro:hasPermission="supplier:associate:add">
								<i class="fa fa-check"></i> 提交关联申请
							</button>
							<button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i> 关 闭</button>
						</div>
					</div>
					<div class="panel-body">
						<form id="associate-form">
							<div class="associate-row">
								<div class="associate-field">
									<label>选择医院</label>
									<select name="hospitalId" id="hospitalId" class="form-control" required>
										<option value="">请选择医院</option>
									</select>
								</div>
								<div class="associate-field">
									<label>供货开始日期</label>
									<input type="date" class="form-control" id="supplyStartDate" name="supplyStartDate" required />
								</div>
								<div class="associate-field">
									<label>供货结束日期</label>
									<input type="date" class="form-control" id="supplyEndDate" name="supplyEndDate" required />
								</div>
								<div class="associate-field">
									<label>合同编号</label>
									<input type="text" class="form-control" id="contractNo" name="contractNo" placeholder="可选" />
								</div>
							</div>
							<div class="associate-row">
								<div class="associate-field">
									<label>联系人</label>
									<input type="text" class="form-control" id="contactPerson" name="contactPerson" placeholder="可选" />
								</div>
								<div class="associate-field">
									<label>联系电话</label>
									<input type="text" class="form-control" id="contactPhone" name="contactPhone" placeholder="可选" />
								</div>
								<div class="associate-field">
									<label>申请说明</label>
									<input type="text" class="form-control" id="applyReason" name="applyReason" placeholder="可选" />
								</div>
							</div>
						</form>
					</div>
				</div>
			</div>
			<div class="col-sm-12 associate-list-section">
				<div class="panel panel-default associate-page-panel apply-list-panel">
					<div class="panel-heading">我的关联申请</div>
					<div class="panel-body">
						<div class="table-striped apply-table-wrap">
							<div class="btn-group-sm apply-toolbar-row" id="toolbar" role="group">
								<form id="apply-search-form" class="apply-search-form">
									<label class="apply-search-item">审核状态：
										<select name="auditStatus" class="form-control input-sm">
											<option value="" selected>全部</option>
											<option value="0">待审核</option>
											<option value="1">已通过</option>
											<option value="2">已拒绝</option>
										</select>
									</label>
									<label class="apply-search-item">医院：
										<input type="text" name="hospitalKeyword" class="form-control input-sm" placeholder="编码/名称/拼音简码"/>
									</label>
									<label class="apply-search-item">供应商：
										<input type="text" name="supplierKeyword" class="form-control input-sm" placeholder="编码/名称/拼音简码"/>
									</label>
									<a class="btn btn-primary btn-sm" onclick="$.table.search('apply-search-form', 'apply-table')"><i class="fa fa-search"></i>&nbsp;搜索</a>
								</form>
								<a class="btn btn-danger btn-sm" onclick="withdrawApply()" shiro:hasPermission="supplier:associate:withdraw">
									<i class="fa fa-undo"></i> 撤回申请
								</a>
							</div>
							<table id="apply-table"></table>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:inline="javascript">
		var prefix = ctx + "supplier/associate";
		var withdrawFlag = [[${@permission.hasPermi('supplier:associate:withdraw')}]];
		var associateApplyTableId = "apply-table";

		function layoutAssociateTableWrapHeight() {
			var $wrap = $('.apply-list-panel .apply-table-wrap');
			if (!$wrap.length) {
				return;
			}
			var top = $wrap[0].getBoundingClientRect().top;
			var bottomGap = 10;
			var h = Math.floor(window.innerHeight - top - bottomGap);
			h = Math.max(h, 260);
			$wrap[0].style.height = h + 'px';
			$wrap[0].style.minHeight = h + 'px';
			$wrap[0].style.maxHeight = h + 'px';
		}

		function calculateAssociateTableHeight() {
			layoutAssociateTableWrapHeight();
			var $wrap = $('.apply-list-panel .apply-table-wrap');
			if (!$wrap.length) {
				return 240;
			}
			var $bt = $wrap.find('.bootstrap-table');
			var wrapH = $wrap[0].clientHeight || $wrap.innerHeight() || 0;
			var toolbarH = $bt.find('.fixed-table-toolbar').outerHeight(true) || 0;
			var pagH = $bt.find('.fixed-table-pagination').outerHeight(true) || 46;
			return Math.max(Math.floor(wrapH - toolbarH - pagH - 2), 160);
		}

		function adjustAssociateTableHeight() {
			var $table = $('#' + associateApplyTableId);
			if ($table.length && $table.bootstrapTable('getOptions')) {
				$table.bootstrapTable('resetView', { height: calculateAssociateTableHeight() });
			}
		}

		$(function() {
			layoutAssociateTableWrapHeight();
			loadHospitals();
			initMyApplyTable();
			$(window).resize(function() {
				layoutAssociateTableWrapHeight();
				adjustAssociateTableHeight();
			});
			$("#associate-form").on("submit", function(e) {
				e.preventDefault();
				var hospitalId = $("#hospitalId").val();
				var supplyStartDate = $("#supplyStartDate").val();
				var supplyEndDate = $("#supplyEndDate").val();
				var contractNo = $("#contractNo").val();
				var applyReason = $("#applyReason").val();
				var contactPerson = $("#contactPerson").val();
				var contactPhone = $("#contactPhone").val();
				if (!hospitalId) {
					$.modal.msgWarning("请选择医院");
					return;
				}
				if (!supplyStartDate || !supplyEndDate) {
					$.modal.msgWarning("请填写供货开始和结束日期");
					return;
				}
				if (supplyStartDate > supplyEndDate) {
					$.modal.msgWarning("供货开始日期不能晚于结束日期");
					return;
				}
				$("#btnSubmit").prop("disabled", true);
				$.ajax({
					url: prefix + "/submit",
					type: "post",
					data: {
						hospitalId: hospitalId,
						supplyStartDate: supplyStartDate,
						supplyEndDate: supplyEndDate,
						contractNo: contractNo,
						applyReason: applyReason,
						contactPerson: contactPerson,
						contactPhone: contactPhone
					},
					success: function(result) {
						if (result.code == 0) {
							$.modal.msgSuccess(result.msg);
							$("#hospitalId").val("");
							$.table.refresh('apply-table');
						} else {
							$.modal.msgError(result.msg);
						}
						$("#btnSubmit").prop("disabled", false);
					},
					error: function() {
						$.modal.msgError("提交失败，请稍后重试");
						$("#btnSubmit").prop("disabled", false);
					}
				});
			});
		});
		function loadHospitals() {
			$.get(prefix + "/listHospitals", function(result) {
				if (result.code == 0 && result.data && result.data.length) {
					var $sel = $("#hospitalId");
					$sel.find("option:not(:first)").remove();
					$.each(result.data, function(i, o) {
						$sel.append("<option value='" + o.hospitalId + "'>" + (o.hospitalName || o.hospitalId) + "</option>");
					});
				}
			});
		}

		function initMyApplyTable() {
			var options = {
				id: "apply-table",
				url: prefix + "/myList",
				formId: "apply-search-form",
				sortName: "createTime",
				sortOrder: "desc",
				modalName: "关联申请",
				showSearch: false,
				mobileResponsive: false,
				height: calculateAssociateTableHeight(),
				rememberSelected: true,
				maintainSelected: true,
				uniqueId: "applyId",
				onLoadSuccess: function() {
					layoutAssociateTableWrapHeight();
					setTimeout(adjustAssociateTableHeight, 50);
				},
				onPostBody: function() {
					adjustAssociateTableHeight();
				},
				queryParams: function(params) {
					var curParams = {
						pageSize: params.limit,
						pageNum: params.offset / params.limit + 1,
						searchValue: params.search,
						orderByColumn: params.sort,
						isAsc: params.order
					};
					return $.extend(curParams, $.common.formToJSON("apply-search-form"));
				},
				columns: [{
					checkbox: true
				}, {
					field: 'applyId',
					title: '申请ID',
					visible: false
				}, {
					title: '序号',
					align: 'center',
					formatter: function (value, row, index) { return $.table.serialNumber(index); }
				}, {
					field: 'hospitalCode',
					title: '医院编码'
				}, {
					field: 'hospitalName',
					title: '医院名称'
				}, {
					field: 'supplierCode',
					title: '供应商编码'
				}, {
					field: 'supplierName',
					title: '供应商名称'
				}, {
					field: 'supplyStartDate',
					title: '供货开始'
				}, {
					field: 'supplyEndDate',
					title: '供货结束'
				}, {
					field: 'auditStatus',
					title: '状态',
					formatter: function(v) {
						if (v == '0') return '<span class="label label-warning">待审核</span>';
						if (v == '1') return '<span class="label label-success">已通过</span>';
						if (v == '2') return '<span class="label label-danger">已拒绝</span>';
						return v || '-';
					}
				}, {
					field: 'auditRemark',
					title: '审核备注'
				}, {
					title: '操作',
					align: 'center',
					formatter: function(value, row) {
						if (row.auditStatus != '0') return '-';
						return '<a class="btn btn-danger btn-xs ' + withdrawFlag + '" href="javascript:void(0)" onclick="withdrawApply(\'' + row.applyId + '\')"><i class="fa fa-undo"></i>撤回</a>';
					}
				}]
			};
			$.table.init(options);
			setTimeout(function() {
				layoutAssociateTableWrapHeight();
				adjustAssociateTableHeight();
			}, 0);
		}

		function withdrawApply(applyId) {
			var targetId = applyId;
			if (!targetId) {
				var row = $.table.selectFirstColumns();
				if (!row || row.length === 0) {
					$.modal.msgWarning("请先选择一条待撤回申请");
					return;
				}
				targetId = row[0];
			}
			$.modal.confirm("确认撤回该申请吗？", function () {
				$.post(prefix + "/withdraw", { applyId: targetId }, function (res) {
					if (res.code == web_status.SUCCESS) {
						$.modal.msgSuccess(res.msg || "撤回成功");
						$.table.refresh('apply-table');
					} else {
						$.modal.msgError(res.msg || "撤回失败");
					}
				});
			});
		}
	</script>
</body>
</html>
