<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('修改供应商')" />
	<style>
		.form-header-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin: 8px 10px 12px;
			padding-bottom: 5px;
			border-bottom: 1px solid #ddd;
		}

		.form-header-row .form-header {
			margin: 0;
			padding-bottom: 0;
			border-bottom: none;
		}

		.form-header-actions {
			flex-shrink: 0;
		}

		.supplier-form-grid {
			margin: 0 10px 8px;
		}

		.supplier-form-grid .supplier-inline-field {
			display: flex;
			align-items: center;
			margin-bottom: 10px;
		}

		.supplier-form-grid .supplier-inline-field > label {
			flex-shrink: 0;
			width: 88px;
			text-align: right;
			margin: 0 8px 0 0;
			font-size: 12px;
			font-weight: normal;
			color: #666;
			white-space: nowrap;
		}

		.supplier-form-grid .supplier-inline-field > label.label-wide {
			width: 112px;
		}

		.supplier-form-grid .supplier-inline-field > .form-control,
		.supplier-form-grid .supplier-inline-field > select.form-control,
		.supplier-form-grid .supplier-inline-field > textarea.form-control,
		.supplier-form-grid .supplier-inline-field > .field-body {
			flex: 1;
			min-width: 0;
		}

		.supplier-form-grid .supplier-inline-field > .form-control,
		.supplier-form-grid .supplier-inline-field > select.form-control,
		.supplier-form-grid .supplier-inline-field > textarea.form-control {
			height: 32px;
			padding: 4px 8px;
			font-size: 12px;
		}

		.supplier-form-grid .supplier-inline-field > textarea.form-control {
			height: 32px;
			min-height: 32px;
			resize: vertical;
		}

		.supplier-form-grid .supplier-inline-field > .form-control[readonly] {
			background-color: #fff;
		}

		.supplier-form-grid .supplier-inline-field .radio-box {
			margin-right: 12px;
			font-weight: normal;
			font-size: 12px;
		}

		.supplier-form-grid .form-header.h4 {
			margin: 4px 0 10px;
			padding-bottom: 5px;
		}

		.supplier-hospital-section {
			margin: 0 10px 12px;
		}
	</style>
</head>
<body>
    <div class="main-content">
        <form id="form-supplier-edit" class="form-horizontal">
            <input name="supplierId" type="hidden" th:value="${supplier.supplierId}"/>

            <div class="form-header-row">
                <h4 class="form-header h4">基本信息</h4>
                <div class="form-header-actions">
                    <button type="button" class="btn btn-sm btn-primary" onclick="submitHandler()"><i class="fa fa-check"></i>保 存</button>&nbsp;
                    <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i>关 闭</button>
                </div>
            </div>

            <div class="supplier-form-grid">
                <input type="hidden" name="companyShortName" id="companyShortName" th:value="${supplier.companyShortName}"/>
                <div class="row">
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>供应商编码</label>
                            <input name="supplierCode" id="supplierCode" placeholder="系统自动生成" class="form-control" type="text" maxlength="50" th:value="${supplier.supplierCode}" readonly>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label class="is-required">公司名称</label>
                            <input name="companyName" id="companyName" placeholder="请输入公司名称" class="form-control" type="text" maxlength="200" th:value="${supplier.companyName}" required>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>首拼简码</label>
                            <input type="text" class="form-control" th:value="${supplier.pinyinCode}" readonly placeholder="保存时按公司名称自动生成">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>税号</label>
                            <input name="taxNumber" placeholder="请输入税号" class="form-control" type="text" maxlength="50" th:value="${supplier.taxNumber}">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>法人</label>
                            <input name="legalPerson" placeholder="请输入法人" class="form-control" type="text" maxlength="50" th:value="${supplier.legalPerson}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>资质有效期</label>
                            <input name="qualificationExpiryDate" placeholder="请选择资质有效期" class="form-control" type="text" id="qualificationExpiryDate" th:value="${supplier.qualificationExpiryDate != null ? #dates.format(supplier.qualificationExpiryDate, 'yyyy-MM-dd') : ''}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label class="label-wide">注册资金(万元)</label>
                            <input name="registeredCapital" placeholder="请输入注册资金" class="form-control" type="text" th:value="${supplier.registeredCapital}">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>启用状态</label>
                            <div class="field-body">
                                <label class="radio-box">
                                    <input type="radio" name="status" value="1" th:checked="${supplier.status == '1'}"> 启用
                                </label>
                                <label class="radio-box">
                                    <input type="radio" name="status" value="2" th:checked="${supplier.status == '2'}"> 停用
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>经营范围</label>
                            <textarea name="businessScope" maxlength="1000" class="form-control" rows="2" placeholder="请输入经营范围" th:text="${supplier.businessScope}"></textarea>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>备注</label>
                            <textarea name="remark" maxlength="500" class="form-control" rows="2" placeholder="请输入备注" th:text="${supplier.remark}"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="supplier-form-grid">
                <h4 class="form-header h4">联系信息</h4>
                <div class="row" id="address-select">
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>省份/直辖市</label>
                            <select name="province" id="selProvince" class="form-control" title="数据来自部门管理">
                                <option value="">请选择省份/直辖市</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>城市</label>
                            <select name="city" id="selCity" class="form-control">
                                <option value="">请选择城市</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>区县</label>
                            <select name="district" id="selDistrict" class="form-control">
                                <option value="">请选择区县</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>详细地址</label>
                            <input name="address" placeholder="请输入详细地址" class="form-control" type="text" maxlength="500" th:value="${supplier.address}">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>联系人</label>
                            <input name="contactPerson" placeholder="请输入联系人" class="form-control" type="text" maxlength="50" th:value="${supplier.contactPerson}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>联系电话</label>
                            <input name="contactPhone" placeholder="请输入联系电话" class="form-control" type="text" maxlength="20" th:value="${supplier.contactPhone}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>邮箱</label>
                            <input name="email" placeholder="请输入邮箱" class="form-control" type="text" maxlength="100" th:value="${supplier.email}">
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="supplier-inline-field">
                            <label>网址</label>
                            <input name="website" placeholder="请输入网址" class="form-control" type="text" maxlength="200" th:value="${supplier.website}">
                        </div>
                    </div>
                </div>
            </div>

            <div class="supplier-hospital-section">
                <h4 class="form-header h4">配送医院</h4>
                <div class="select-table table-striped">
                    <table id="bootstrap-table-association"></table>
                </div>
            </div>
        </form>
    </div>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:inline="javascript">
	    var prefix = ctx + "supplier/supplier";
	    var supplierId = /*[[${supplier.supplierId}]]*/ '';
	    var currentProvince = /*[[${supplier.province}]]*/ '';
	    var currentCity = /*[[${supplier.city}]]*/ '';
	    var currentDistrict = /*[[${supplier.district}]]*/ '';

	    function generateCompanyShortCode(companyName) {
	        if (!companyName || companyName.trim() === '') {
	            return '';
	        }
	        var name = companyName.trim();
	        name = name.replace(/(有限公司|股份有限公司|有限责任公司|股份公司|科技公司|科技有限公司|技术公司|信息技术公司|医疗科技公司|健康产业公司|产业有限公司|集团有限公司|集团股份有限公司)$/g, '');
	        var shortCode = '';
	        var nameWithoutBrackets = name.replace(/[（(][^）)]*[）)]/g, '').trim();
	        if (nameWithoutBrackets && nameWithoutBrackets.length > 0) {
	            name = nameWithoutBrackets;
	        }
	        if (name.length > 0) {
	            var firstChar = name.charAt(0);
	            if (/[a-zA-Z]/.test(firstChar)) {
	                shortCode = firstChar.toUpperCase();
	            } else {
	                shortCode = firstChar;
	            }
	        }
	        return shortCode;
	    }

	    $(document).ready(function() {
	        $('#companyName').on('input keyup change blur', function() {
	            var companyName = $(this).val();
	            if (companyName && companyName.trim() !== '') {
	                $('#companyShortName').val(generateCompanyShortCode(companyName));
	            } else {
	                $('#companyShortName').val('');
	            }
	        });
	        $(document).on('input keyup change blur', 'input[name="companyName"], #companyName', function() {
	            var companyName = $(this).val();
	            if (companyName && companyName.trim() !== '') {
	                $('#companyShortName').val(generateCompanyShortCode(companyName));
	            } else {
	                $('#companyShortName').val('');
	            }
	        });
	    });

	    $(function() {
	        bindDeptRegionChangeHandlers();
	        if (currentProvince) {
	            restoreSavedRegion();
	        } else {
	            loadRegionProvinces();
	        }

	        if (supplierId) {
	            loadSupplierAssociationApplies();
	        }

	        var companyName = $('input[name="companyName"]').val();
	        var companyShortName = $('#companyShortName').val();
	        if (companyName && !companyShortName) {
	            $('#companyShortName').val(generateCompanyShortCode(companyName));
	        }

	        layui.use('laydate', function() {
	            layui.laydate.render({
	                elem: '#qualificationExpiryDate',
	                type: 'date',
	                format: 'yyyy-MM-dd'
	            });
	        });
	    });

	    function fillRegionSelect($sel, list, firstLabel) {
	        $sel.empty();
	        $sel.append($('<option></option>').attr('value', '').text(firstLabel));
	        $.each(list || [], function(_, o) {
	            var id = o.deptId != null ? o.deptId : o.dept_id;
	            var nm = o.deptName != null ? o.deptName : o.dept_name;
	            $sel.append($('<option></option>').attr('value', nm).text(nm).attr('data-dept-id', id));
	        });
	    }

	    function loadRegionChildren(parentId, $sel, firstLabel, callback) {
	        if (!parentId) {
	            fillRegionSelect($sel, [], firstLabel);
	            if (callback) {
	                callback();
	            }
	            return;
	        }
	        $.get(prefix + '/deptRegionOptions', { parentId: parentId }, function(res) {
	            if (res && (res.code === 0 || res.code === web_status.SUCCESS)) {
	                fillRegionSelect($sel, res.data, firstLabel);
	            } else {
	                fillRegionSelect($sel, [], firstLabel);
	            }
	            if (callback) {
	                callback();
	            }
	        });
	    }

	    function selectRegionByName($sel, name) {
	        if (!name) {
	            return null;
	        }
	        var deptId = null;
	        $sel.find('option').each(function() {
	            if ($(this).val() === name) {
	                $sel.val(name);
	                deptId = $(this).attr('data-dept-id');
	                return false;
	            }
	        });
	        return deptId;
	    }

	    function loadRegionProvinces(callback) {
	        $.get(prefix + '/deptRegionOptions', function(res) {
	            if (res && (res.code === 0 || res.code === web_status.SUCCESS)) {
	                fillRegionSelect($('#selProvince'), res.data, '请选择省份/直辖市');
	            }
	            if (callback) {
	                callback();
	            }
	        });
	    }

	    function bindDeptRegionChangeHandlers() {
	        $('#selProvince').off('change.deptRegion').on('change.deptRegion', function() {
	            var pid = $(this).find('option:selected').attr('data-dept-id');
	            fillRegionSelect($('#selCity'), [], '请选择城市');
	            fillRegionSelect($('#selDistrict'), [], '请选择区县');
	            if (pid) {
	                loadRegionChildren(Number(pid), $('#selCity'), '请选择城市');
	            }
	        });
	        $('#selCity').off('change.deptRegion').on('change.deptRegion', function() {
	            var pid = $(this).find('option:selected').attr('data-dept-id');
	            fillRegionSelect($('#selDistrict'), [], '请选择区县');
	            if (pid) {
	                loadRegionChildren(Number(pid), $('#selDistrict'), '请选择区县');
	            }
	        });
	    }

	    function restoreSavedRegion() {
	        loadRegionProvinces(function() {
	            var provId = selectRegionByName($('#selProvince'), currentProvince);
	            if (!provId) {
	                return;
	            }
	            loadRegionChildren(Number(provId), $('#selCity'), '请选择城市', function() {
	                if (!currentCity) {
	                    return;
	                }
	                var cityId = selectRegionByName($('#selCity'), currentCity);
	                if (!cityId) {
	                    return;
	                }
	                loadRegionChildren(Number(cityId), $('#selDistrict'), '请选择区县', function() {
	                    if (currentDistrict) {
	                        selectRegionByName($('#selDistrict'), currentDistrict);
	                    }
	                });
	            });
	        });
	    }

	    function formatApplyDate(value) {
	        if (!value) {
	            return '-';
	        }
	        if (typeof value === 'string' && value.length >= 10) {
	            return value.substring(0, 10);
	        }
	        return value;
	    }

	    function loadSupplierAssociationApplies() {
	        $.ajax({
	            url: prefix + '/associationApplies/' + supplierId,
	            type: 'GET',
	            dataType: 'json',
	            success: function(result) {
	                if (result.code == 0) {
	                    initAssociationTable(result.data || []);
	                } else {
	                    initAssociationTable([]);
	                }
	            },
	            error: function() {
	                initAssociationTable([]);
	            }
	        });
	    }

	    function initAssociationTable(data) {
	        $('#bootstrap-table-association').bootstrapTable('destroy').bootstrapTable({
	            data: data,
	            pagination: false,
	            search: false,
	            showRefresh: false,
	            showColumns: false,
	            columns: [{
	                title: '序号',
	                align: 'center',
	                width: 60,
	                formatter: function(value, row, index) {
	                    return index + 1;
	                }
	            }, {
	                field: 'hospitalCode',
	                title: '医院编码',
	                width: 130
	            }, {
	                field: 'hospitalName',
	                title: '医院名称'
	            }, {
	                field: 'supplierCode',
	                title: '供应商编码',
	                width: 130
	            }, {
	                field: 'supplierName',
	                title: '供应商名称'
	            }, {
	                field: 'supplyStartDate',
	                title: '供货开始',
	                width: 110,
	                formatter: function(value) {
	                    return formatApplyDate(value);
	                }
	            }, {
	                field: 'supplyEndDate',
	                title: '供货结束',
	                width: 110,
	                formatter: function(value) {
	                    return formatApplyDate(value);
	                }
	            }, {
	                field: 'auditStatus',
	                title: '状态',
	                align: 'center',
	                width: 90,
	                formatter: function(v) {
	                    if (v == '0') {
	                        return '<span class="label label-warning">待审核</span>';
	                    }
	                    if (v == '1') {
	                        return '<span class="label label-success">已通过</span>';
	                    }
	                    if (v == '2') {
	                        return '<span class="label label-danger">已拒绝</span>';
	                    }
	                    return v || '-';
	                }
	            }, {
	                field: 'auditRemark',
	                title: '审核备注'
	            }]
	        });
	    }

        $("#form-supplier-edit").validate({
        	onkeyup: false,
        	rules:{
        		companyName:{
        			required: true,
        			maxlength: 200
        		}
        	},
            focusCleanup: true
        });

        function submitHandler() {
	        if ($.validate.form()) {
	            var companyName = $('input[name="companyName"]').val();
	            var companyShortName = $('#companyShortName').val();
	            if (companyName && !companyShortName) {
	                $('#companyShortName').val(generateCompanyShortCode(companyName));
	            }
	        	$.operate.saveTab(prefix + "/edit", $("#form-supplier-edit").serializeArray());
	        }
	    }
    </script>
</body>
</html>
