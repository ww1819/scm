<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>供应商注册</title>
    <meta name="description" content="供应商注册">
    <link href="../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="../static/css/style.min.css" th:href="@{/css/style.min.css}" rel="stylesheet"/>
    <link href="../static/css/login.min.css" th:href="@{/css/login.min.css}" rel="stylesheet"/>
    <link href="../static/scm/css/ry-ui.css" th:href="@{/scm/css/ry-ui.css?v=4.8.0}" rel="stylesheet"/>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <style type="text/css">
        label.error { position:inherit; }
        body.signin {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .signinpanel {
            width: 100%;
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px 16px;
        }
        /* 仅最外层主卡片，勿用 .signinpanel .row 以免表单内栅格行也被套成白盒子 */
        .signinpanel > .row {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 14px;
            padding: 32px 28px;
            box-shadow: 0 22px 48px rgba(0, 0, 0, 0.20);
        }
        /* 覆盖 login.min.css 半透明表单，与登录弹窗一致 */
        .signinpanel form {
            background: #f7f9fc !important;
            border: 1px solid rgba(0, 0, 0, 0.08) !important;
            border-radius: 10px !important;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
            padding: 22px 20px !important;
        }
        .signinpanel form.register-form-wide {
            padding: 22px 18px !important;
        }
        .form-tight .form-tight-row {
            margin-left: -8px;
            margin-right: -8px;
            margin-bottom: 10px;
        }
        .form-tight .form-tight-row > [class*="col-"] {
            padding-left: 8px;
            padding-right: 8px;
        }
        .form-tight .form-control {
            margin-top: 0 !important;
        }
        .form-tight h5 {
            margin-top: 18px;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }
        .signinpanel input.form-control,
        .signinpanel textarea.form-control,
        .signinpanel select.form-control { color: #222 !important; background-color: #fff !important; }
        .signinpanel input::placeholder,
        .signinpanel textarea::placeholder { color: #888; }
        .signinpanel .uname,
        .signinpanel .pword { background-color: #fff !important; }
        #registerMessage { display: none; margin-bottom: 12px; }
        .field-error { color: #a94442; font-size: 12px; display: block; margin-top: 4px; }
        .signinpanel,
        .signinpanel .signin-info,
        .signinpanel .signin-info h4,
        .signinpanel .signin-info h5,
        .signinpanel .signin-info ul li,
        .signinpanel .signin-info a,
        .signinpanel .signin-info strong,
        .signinpanel .signup-footer,
        .signinpanel form h4,
        .signinpanel form h5,
        .signinpanel form p {
            color: #333 !important;
        }
        .signinpanel .signin-info a {
            text-decoration: none;
        }
        .signinpanel .signin-info a:hover {
            color: #0b83f0 !important;
        }
        .signinpanel .signup-footer {
            border-top: 1px solid rgba(0, 0, 0, 0.08) !important;
            margin-top: 12px;
            padding-top: 16px;
        }
        .link-terms-of-service { color: #0b83f0 !important; }
        .link-terms-of-service:hover { text-decoration: underline; }
        .register-login-hint {
            font-size: 14px;
            color: #555 !important;
            margin-bottom: 10px;
        }
        .register-login-hint .link-direct-login {
            color: #d32f2f !important;
            font-weight: 700 !important;
            text-decoration: none;
        }
        .register-login-hint .link-direct-login:hover {
            color: #b71c1c !important;
            text-decoration: underline;
        }
        .register-footer-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px 16px;
            margin-top: 16px;
            margin-bottom: 12px;
        }
        .register-footer-actions .checkbox-custom {
            margin: 0;
        }
        #registerFormSupplier .input-error-tip::placeholder,
        #registerFormSupplier .input-error-tip::-webkit-input-placeholder {
            color: #c62828 !important;
            opacity: 1;
        }
        #registerFormSupplier .input-error-tip:-ms-input-placeholder {
            color: #c62828 !important;
        }
        #registerFormSupplier select.input-error-tip {
            border-color: #c62828 !important;
            box-shadow: 0 0 0 1px rgba(198, 40, 40, 0.25);
        }
        #registerFormSupplier .validator-sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            border: 0;
        }
    </style>
</head>
<body class="signin">
    <div class="signinpanel">
        <div class="row">
            <div class="col-sm-12">
                <!-- 供应商注册表单 -->
                <form id="registerFormSupplier" autocomplete="off" class="register-panel register-form-wide form-tight">
                    <div id="registerMessageSupplier" class="alert" role="alert" style="display:none;"></div>
                    <h4 class="no-margins">欢迎注册 <strong>耗材供应链 供应商平台</strong></h4>
                    <h5>账号信息</h5>
                    <div class="row form-tight-row">
                        <div class="col-sm-4">
                            <input type="text" name="loginName" id="supplierLoginName" class="form-control uname" placeholder="登录账号" maxlength="30"/>
                        </div>
                        <div class="col-sm-4">
                            <input type="password" name="password" id="supplierPassword" class="form-control pword" placeholder="密码（数字+字母，至少6位）" maxlength="20"/>
                        </div>
                        <div class="col-sm-4">
                            <input type="password" name="confirmPassword" class="form-control pword" placeholder="确认密码" maxlength="20"/>
                        </div>
                    </div>
                    <h5>公司基本信息</h5>
                    <div class="row form-tight-row">
                        <div class="col-sm-8">
                            <input type="text" name="companyName" id="companyName" class="form-control" placeholder="供应商名称 *" maxlength="200"/>
                        </div>
                        <div class="col-sm-4">
                            <input type="text" name="companyShortName" id="companyShortName" class="form-control" placeholder="简码（拼音首字母，自动）" maxlength="100" readonly/>
                        </div>
                    </div>
                    <div class="row form-tight-row">
                        <div class="col-sm-6">
                            <input type="text" name="legalPerson" class="form-control" placeholder="法人" maxlength="50"/>
                        </div>
                        <div class="col-sm-6">
                            <input type="text" name="registeredCapital" class="form-control" placeholder="注册资金（万元）" maxlength="20"/>
                        </div>
                    </div>
                    <h5>联系信息</h5>
                    <div class="row form-tight-row">
                        <div class="col-sm-4">
                            <select name="province" id="selProvince" class="form-control" title="省份/直辖市（数据来自部门管理）">
                                <option value="">请选择省份/直辖市</option>
                            </select>
                        </div>
                        <div class="col-sm-4">
                            <select name="city" id="selCity" class="form-control" title="城市">
                                <option value="">请选择城市</option>
                            </select>
                        </div>
                        <div class="col-sm-4">
                            <select name="district" id="selDistrict" class="form-control" title="区县">
                                <option value="">请选择区县</option>
                            </select>
                        </div>
                    </div>
                    <div class="row form-tight-row">
                        <div class="col-xs-12">
                            <input type="text" name="address" class="form-control" placeholder="详细地址" maxlength="500"/>
                        </div>
                    </div>
                    <div class="row form-tight-row">
                        <div class="col-sm-6">
                            <input type="text" name="contactPerson" class="form-control" placeholder="联系人" maxlength="50"/>
                        </div>
                        <div class="col-sm-6">
                            <input type="text" name="contactPhone" class="form-control" placeholder="联系电话" maxlength="20"/>
                        </div>
                    </div>
                    <div class="row form-tight-row">
                        <div class="col-sm-6">
                            <input type="text" name="email" class="form-control" placeholder="邮箱" maxlength="100"/>
                        </div>
                        <div class="col-sm-6">
                            <input type="text" name="website" class="form-control" placeholder="网址" maxlength="200"/>
                        </div>
                    </div>
                    <div class="row form-tight-row">
                        <div class="col-xs-12">
                            <textarea name="businessScope" class="form-control" rows="2" placeholder="经营范围" maxlength="1000"></textarea>
                        </div>
                    </div>
                    <div class="register-footer-actions">
                        <span class="register-login-hint" style="margin:0;">已经注册过? <a th:href="@{/login}" class="link-direct-login">直接登录&raquo;</a></span>
                        <div class="checkbox-custom"><input type="checkbox" id="acceptTerm1" name="acceptTerm1"/> <label for="acceptTerm1">我已阅读并同意</label> <a href="javascript:void(0);" class="link-terms-of-service">使用条款</a></div>
                    </div>
                    <div class="row form-tight-row" style="margin-bottom:0;">
                        <div class="col-sm-6">
                            <button type="button" class="btn btn-success btn-block" id="btnSubmitSupplier" data-loading="正在注册...">注册</button>
                        </div>
                        <div class="col-sm-6">
                            <button type="button" class="btn btn-default btn-block" id="btnClearSupplier">清空</button>
                        </div>
                    </div>
                </form>
                <!-- 业务员注册表单 -->
                <form id="registerFormSalesperson" autocomplete="off" class="register-panel" style="display:none;">
                    <div id="registerMessageSalesperson" class="alert" role="alert" style="display:none;"></div>
                    <h4 class="no-margins">业务员注册</h4>
                    <p class="m-t-md">选择供应商并填写账号信息，提交后需供应商管理员审核</p>
                    <h5 class="m-t-md">选择供应商</h5>
                    <select name="supplierId" id="supplierId" class="form-control m-t" required><option value="">请选择供应商</option></select>
                    <span class="field-error" id="err-salesperson-supplierId" aria-live="polite"></span>
                    <h5 class="m-t-md">账号信息</h5>
                    <input type="text" name="loginName" id="salespersonLoginName" class="form-control uname m-t" placeholder="登录账号" maxlength="30"/>
                    <span class="field-error" id="err-salesperson-loginName" aria-live="polite"></span>
                    <input type="password" name="password" id="salespersonPassword" class="form-control pword m-t" placeholder="密码（数字+字母，至少6位）" maxlength="20"/>
                    <span class="field-error" id="err-salesperson-password" aria-live="polite"></span>
                    <input type="password" name="confirmPassword" class="form-control pword m-t" placeholder="确认密码" maxlength="20"/>
                    <input type="text" name="userName" class="form-control m-t" placeholder="姓名" maxlength="30"/>
                    <input type="text" name="phonenumber" class="form-control m-t" placeholder="手机号" maxlength="20"/>
                    <input type="text" name="email" class="form-control m-t" placeholder="邮箱" maxlength="100"/>
                    <div class="checkbox-custom m-t"><input type="checkbox" id="acceptTerm2" name="acceptTerm2"/> <label for="acceptTerm2">我已阅读并同意</label> <a href="javascript:void(0);" class="link-terms-of-service">使用条款</a></div>
                    <button type="button" class="btn btn-success btn-block m-t" id="btnSubmitSalesperson" data-loading="正在提交...">提交申请</button>
                </form>
            </div>
        </div>
        <div id="termsLayerTpl" style="display:none">
            <div th:replace="include/terms-of-service :: termsScrollBox"></div>
        </div>
        <!--
        <div class="signup-footer">
            <div class="pull-left">
                &copy; 2018-2025 All Rights Reserved. Scm <br>
            </div>
        </div>
        -->
    </div>
<script th:inline="javascript">
    var ctx = [[@{/}]];
    /* 刷新（F5）时回到登录页，避免长期停留在注册页；从登录页链接首次进入为 navigate，不受影响 */
    (function () {
        try {
            var isReload = false;
            if (window.performance && performance.getEntriesByType) {
                var nav = performance.getEntriesByType("navigation")[0];
                isReload = nav && nav.type === "reload";
            } else if (window.performance && performance.navigation) {
                isReload = performance.navigation.type === 1;
            }
            if (isReload) {
                var loginUrl = (ctx || "/") + "login";
                window.location.replace(loginUrl);
            }
        } catch (e) { /* ignore */ }
    })();
</script>
<script src="../static/js/jquery.min.js" th:src="@{/js/jquery.min.js}"></script>
<script src="../static/ajax/libs/validate/jquery.validate.min.js" th:src="@{/ajax/libs/validate/jquery.validate.min.js}"></script>
<script src="../static/ajax/libs/validate/jquery.validate.extend.js" th:src="@{/ajax/libs/validate/jquery.validate.extend.js}"></script>
<script src="../static/ajax/libs/layer/layer.min.js" th:src="@{/ajax/libs/layer/layer.min.js}"></script>
<script src="../static/ajax/libs/blockUI/jquery.blockUI.js" th:src="@{/ajax/libs/blockUI/jquery.blockUI.js}"></script>
<script src="../static/scm/js/ry-ui.js" th:src="@{/scm/js/ry-ui.js?v=4.8.0}"></script>
<script>
// 在表单内显示提示（不依赖弹层，保证能看到）
function showFormMessage(formId, msg, isSuccess) {
    var mid = formId === "registerFormSupplier" ? "registerMessageSupplier" : "registerMessageSalesperson";
    var $box = $("#" + mid);
    $box.removeClass("alert-danger alert-success").addClass(isSuccess ? "alert-success" : "alert-danger").text(msg).show();
    if (!isSuccess && $box.length && $box[0]) $box[0].scrollIntoView({ behavior: "smooth", block: "nearest" });
}
function restoreSupplierFieldPlaceholder($inp) {
    if (!$inp || !$inp.length) return;
    if ($inp.is("select")) {
        $inp.removeClass("input-error-tip");
        $inp.removeAttr("data-err-msg");
        return;
    }
    var o = $inp.data("origPh");
    if (o !== undefined) $inp.attr("placeholder", o);
    $inp.removeClass("input-error-tip");
}
function clearFormErrors(formId) {
    if (formId === "registerFormSupplier") {
        $("#registerFormSupplier input, #registerFormSupplier textarea, #registerFormSupplier select").each(function () {
            restoreSupplierFieldPlaceholder($(this));
        });
        $("#registerFormSupplier label.error").remove();
        return;
    }
    var prefix = "err-salesperson-";
    var ids = ["supplierId", "loginName", "password"];
    ids.forEach(function (name) {
        var $e = $("#" + prefix + name);
        if ($e.length) $e.text("").hide();
    });
}
// 服务端错误：供应商表单项用 placeholder 提示；业务员仍用下方 span
function showFieldError(formId, msg) {
    if (formId === "registerFormSupplier") {
        clearFormErrors(formId);
        var $inp = null;
        if (/登录账号|注册账号|用户名|账号已存在/i.test(msg)) $inp = $("#supplierLoginName");
        else if (/密码|数字和字母/i.test(msg)) $inp = $("#supplierPassword");
        else if (/公司名称|供应商名称|归属名称|该公司|公司.*存在/i.test(msg)) $inp = $("#companyName");
        if ($inp && $inp.length) {
            if ($inp.data("origPh") === undefined) $inp.data("origPh", $inp.attr("placeholder") || "");
            $inp.attr("placeholder", msg).addClass("input-error-tip");
        }
        return;
    }
    clearFormErrors(formId);
    var prefix = "err-salesperson-";
    var fieldId = null;
    if (/登录账号|注册账号|用户名|账号已存在/i.test(msg)) fieldId = prefix + "loginName";
    else if (/密码|数字和字母/i.test(msg)) fieldId = prefix + "password";
    else if (/公司名称|该公司|公司.*存在/i.test(msg)) fieldId = prefix + "companyName";
    else if (/供应商/i.test(msg)) fieldId = prefix + "supplierId";
    if (fieldId && $("#" + fieldId).length) {
        $("#" + fieldId).text(msg).show();
    }
}
function initSupplierOrigPlaceholders() {
    $("#registerFormSupplier").find("input, textarea").each(function () {
        var $t = $(this);
        if ($t.data("origPh") === undefined) $t.data("origPh", $t.attr("placeholder") || "");
    });
}
// 供应商名称 → 拼音首字母简码（服务端 PinyinUtils，如「河北」→ HB）
var companyShortCodeTimer;
function refreshCompanyShortCodeFromServer(name) {
    if (!name || !String(name).trim()) {
        $("#companyShortName").val("");
        return;
    }
    $.get(ctx + "supplier/register/companyShortCode", { name: name }, function (res) {
        var ok = res && (res.code === 0 || res.code === "0");
        if (ok && res.data !== undefined && res.data !== null) {
            $("#companyShortName").val(res.data);
        }
    });
}
$(document).ready(function () {
    $("#companyName").on("input change blur", function () {
        clearTimeout(companyShortCodeTimer);
        var self = this;
        companyShortCodeTimer = setTimeout(function () {
            refreshCompanyShortCodeFromServer($(self).val());
        }, 250);
    });
});

function fillRegionSelect($sel, list, firstLabel) {
    $sel.empty();
    $sel.append($("<option></option>").attr("value", "").text(firstLabel));
    $.each(list || [], function (_, o) {
        var id = o.deptId != null ? o.deptId : o.dept_id;
        var nm = o.deptName != null ? o.deptName : o.dept_name;
        $sel.append($("<option></option>").attr("value", nm).text(nm).attr("data-dept-id", id));
    });
}
function loadRegionProvinces() {
    $.get(ctx + "supplier/register/deptRegionOptions", function (res) {
        var ok = res && (res.code === 0 || res.code === "0");
        if (ok) fillRegionSelect($("#selProvince"), res.data, "请选择省份/直辖市");
    });
}
function loadRegionChildren(parentId, $sel, firstLabel) {
    if (!parentId) {
        fillRegionSelect($sel, [], firstLabel);
        return;
    }
    $.get(ctx + "supplier/register/deptRegionOptions", { parentId: parentId }, function (res) {
        var ok = res && (res.code === 0 || res.code === "0");
        if (ok) fillRegionSelect($sel, res.data, firstLabel);
    });
}

$(function() {
    initSupplierOrigPlaceholders();
    loadRegionProvinces();
    $("#selProvince").on("change", function () {
        var pid = $(this).find("option:selected").attr("data-dept-id");
        fillRegionSelect($("#selCity"), [], "请选择城市");
        fillRegionSelect($("#selDistrict"), [], "请选择区县");
        if (pid) loadRegionChildren(Number(pid), $("#selCity"), "请选择城市");
    });
    $("#selCity").on("change", function () {
        var pid = $(this).find("option:selected").attr("data-dept-id");
        fillRegionSelect($("#selDistrict"), [], "请选择区县");
        if (pid) loadRegionChildren(Number(pid), $("#selDistrict"), "请选择区县");
    });

    $(document).on("click", "#linkTermsOfService, .link-terms-of-service", function (e) {
        e.preventDefault();
        var w = Math.min(720, Math.max(280, window.innerWidth - 24));
        layer.open({
            type: 1,
            title: "使用条款",
            area: [w + "px", "85%"],
            shadeClose: true,
            content: $("#termsLayerTpl").html()
        });
    });
    $.validator.addMethod("checkPassword", function(value, element) {
        var hasDigit = /\d/.test(value);
        var hasLetter = /[a-zA-Z]/.test(value);
        return hasDigit && hasLetter;
    }, "密码必须包含数字和字母");

    // 用户重新输入时清除该表单的提示与字段错误（下拉框 change 仅清自身，避免级联时误清其它项）
    $("#registerFormSupplier input, #registerFormSupplier textarea").on("input focus", function() {
        $("#registerMessageSupplier").hide();
        clearFormErrors("registerFormSupplier");
    });
    $("#registerFormSupplier select").on("change", function () {
        $("#registerMessageSupplier").hide();
        var $s = $(this);
        restoreSupplierFieldPlaceholder($s);
        var fid = $s.attr("id");
        if (fid) $("#registerFormSupplier label.error[for='" + fid + "']").remove();
    });
    $("#registerFormSalesperson input, #registerFormSalesperson select").on("input focus change", function() {
        $("#registerMessageSalesperson").hide();
        clearFormErrors("registerFormSalesperson");
    });

    // 初始化校验规则（不接管 submit，由按钮 click 主动触发）
    $("#registerFormSupplier").validate({
        rules: {
            loginName: { required: true, minlength: 2, maxlength: 30 },
            password: { required: true, minlength: 6, maxlength: 20, checkPassword: true },
            confirmPassword: { required: true, equalTo: "#registerFormSupplier input[name='password']" },
            companyName: { required: true, maxlength: 200 },
            province: { required: true }
        },
        messages: {
            loginName: { required: "请输入登录账号", minlength: "至少2个字符" },
            password: { required: "请输入密码", minlength: "至少6位", checkPassword: "密码必须包含数字和字母" },
            confirmPassword: { required: "请确认密码", equalTo: "两次密码不一致" },
            companyName: { required: "请输入供应商名称", maxlength: "名称过长" },
            province: { required: "请选择省份/直辖市" }
        },
        errorPlacement: function (error, element) {
            if (!$(element).closest("#registerFormSupplier").length) return;
            var $e = $(element);
            if ($e.is("select")) {
                $e.addClass("input-error-tip");
                error.insertAfter($e).addClass("validator-sr-only").hide();
                return;
            }
            if ($e.data("origPh") === undefined) $e.data("origPh", $e.attr("placeholder") || "");
            $e.attr("placeholder", $.trim(error.text()));
            $e.addClass("input-error-tip");
            error.insertAfter($e).addClass("validator-sr-only").hide();
        },
        success: function (label, element) {
            var $el = $(element);
            if (!$el.closest("#registerFormSupplier").length) return;
            restoreSupplierFieldPlaceholder($el);
            $(label).remove();
        }
    });

    $("#registerFormSalesperson").validate({
        rules: {
            supplierId: { required: true },
            loginName: { required: true, minlength: 2, maxlength: 30 },
            password: { required: true, minlength: 6, maxlength: 20, checkPassword: true },
            confirmPassword: { required: true, equalTo: "#registerFormSalesperson input[name='password']" },
            acceptTerm2: { required: true }
        },
        messages: {
            supplierId: { required: "请选择供应商" },
            loginName: { required: "请输入登录账号", minlength: "至少2个字符" },
            password: { required: "请输入密码", minlength: "至少6位", checkPassword: "密码必须包含数字和字母" },
            confirmPassword: { required: "请确认密码", equalTo: "两次密码不一致" },
            acceptTerm2: { required: "请同意使用条款" }
        }
    });

    // 供应商注册：点击按钮时触发校验和 Ajax 提交
    $("#btnSubmitSupplier").on("click", function (e) {
        e.preventDefault();
        if (!$("#registerFormSupplier").valid()) {
            return;
        }
        if (!$("#acceptTerm1").is(":checked")) {
            showFormMessage("registerFormSupplier", "请先同意使用条款", false);
            return;
        }
        var pwd = $("#registerFormSupplier input[name='password']").val();
        if (!/\d/.test(pwd) || !/[a-zA-Z]/.test(pwd)) {
            showFormMessage("registerFormSupplier", "密码必须包含数字和字母", false);
            showFieldError("registerFormSupplier", "密码必须包含数字和字母");
            return;
        }
        clearFormErrors("registerFormSupplier");
        $("#registerMessageSupplier").hide();
        $("#btnSubmitSupplier").prop("disabled", true).text("正在注册...");
        $.ajax({
            url: ctx + "supplier/register/supplier",
            type: "post",
            dataType: "json",
            data: $("#registerFormSupplier").serialize(),
            success: function (result) {
                var ok = result && (result.code === 0 || result.code === "0");
                var msg = (result && result.msg) ? result.msg : (ok ? "注册成功" : "注册失败");
                if (ok) {
                    showFormMessage("registerFormSupplier", msg, true);
                    setTimeout(function () { location.href = ctx + "login"; }, 2000);
                } else {
                    showFormMessage("registerFormSupplier", msg, false);
                    showFieldError("registerFormSupplier", msg);
                }
            },
            error: function (xhr, status, err) {
                var msg = "注册失败，请稍后重试";
                if (xhr && xhr.responseJSON && xhr.responseJSON.msg) msg = xhr.responseJSON.msg;
                else if (xhr && xhr.responseText) { try { var r = JSON.parse(xhr.responseText); if (r.msg) msg = r.msg; } catch (e) { } }
                showFormMessage("registerFormSupplier", msg, false);
                showFieldError("registerFormSupplier", msg);
            },
            complete: function () { $("#btnSubmitSupplier").prop("disabled", false).text("注册"); }
        });
    });

    $("#btnClearSupplier").on("click", function () {
        var v = $("#registerFormSupplier").data("validator");
        if (v) v.resetForm();
        $("#registerFormSupplier")[0].reset();
        $("#registerFormSupplier input, #registerFormSupplier textarea").each(function () {
            restoreSupplierFieldPlaceholder($(this));
        });
        $("#registerFormSupplier input, #registerFormSupplier textarea").removeData("origPh");
        $("#companyShortName").val("");
        $("#acceptTerm1").prop("checked", false);
        $("#registerMessageSupplier").hide();
        $("#registerFormSupplier label.error").remove();
        initSupplierOrigPlaceholders();
        loadRegionProvinces();
        fillRegionSelect($("#selCity"), [], "请选择城市");
        fillRegionSelect($("#selDistrict"), [], "请选择区县");
    });

    // 业务员注册：点击按钮时触发校验和 Ajax 提交
    $("#btnSubmitSalesperson").on("click", function (e) {
        e.preventDefault();
        if (!$("#registerFormSalesperson").valid()) {
            return;
        }
        if (!$("#acceptTerm2").is(":checked")) {
            showFormMessage("registerFormSalesperson", "请先同意使用条款", false);
            return;
        }
        var pwd = $("#registerFormSalesperson input[name='password']").val();
        if (!/\d/.test(pwd) || !/[a-zA-Z]/.test(pwd)) {
            showFormMessage("registerFormSalesperson", "密码必须包含数字和字母", false);
            showFieldError("registerFormSalesperson", "密码必须包含数字和字母");
            return;
        }
        clearFormErrors("registerFormSalesperson");
        $("#registerMessageSalesperson").hide();
        $("#btnSubmitSalesperson").prop("disabled", true).text("正在提交...");
        $.ajax({
            url: ctx + "supplier/register/salesperson",
            type: "post",
            dataType: "json",
            data: $("#registerFormSalesperson").serialize(),
                success: function (result) {
                    var ok = result && (result.code === 0 || result.code === "0");
                    var msg = (result && result.msg) ? result.msg : (ok ? "注册成功！待管理员审核授权。" : "提交失败");
                if (ok) {
                    showFormMessage("registerFormSalesperson", msg, true);
                    setTimeout(function () { location.href = ctx + "login"; }, 2500);
                } else {
                    showFormMessage("registerFormSalesperson", msg, false);
                    showFieldError("registerFormSalesperson", msg);
                }
            },
            error: function (xhr, status, err) {
                var msg = "提交失败，请稍后重试";
                if (xhr && xhr.responseJSON && xhr.responseJSON.msg) msg = xhr.responseJSON.msg;
                else if (xhr && xhr.responseText) { try { var r = JSON.parse(xhr.responseText); if (r.msg) msg = r.msg; } catch (e) { } }
                showFormMessage("registerFormSalesperson", msg, false);
                showFieldError("registerFormSalesperson", msg);
            },
            complete: function () { $("#btnSubmitSalesperson").prop("disabled", false).text("提交申请"); }
        });
    });
});
</script>
</body>
</html>
